    南院大王回复Lucifer''s*：跟着日经 韩国走

    彩色斑马：金风走那条路线呀，大王

    南院大王回复彩色斑马：陆地风电老大

    薰羽翔回复彩色斑马：

    Saint_li：新强联也还不错

    南院大王回复Saint_li：√，风电轴承龙头，国产替代的属性更强

    福禄：大王：周五新强联的冲高回落是受外围影响吗？

    南院大王回复福禄：板块和大盘影响

    提问：

    大王您好！看了您十五五规划中关于风-海上风电的政策解读，有个问题想请教您。家里在黄海盐城港一直有生意投入，前些年这边海上风力发电项目很火热，近几年基本上停止了，去年下半年开始，项目复苏，国家整个风电项目是有持续性的，就是不清楚黄海盐城港的海上风电项目是否有持续性，家里想做一些风电项目的配套生意，请大王帮忙看看可行吗。祈盼您的回复，谢谢！

    有的，且不说国电投之类在加大投入，江苏有位副班长就是中海油副总裁出身，指标拿的很快，中海油风电都在那边布局，正是切入的好时机。

    五级风控标准与强弱判定

    周五时思思做了个指引，说可以分为三、四，五，基本把技术说完。

    《三生万物》《四种投资人》《五级风控标准》。

    注，本文是《四种人策略》一文的摘抄延伸和多处精华问答等的总结，提练，专门给喜欢短线操作的同学们做个指引。

    第一，大盘的强弱和标准

    量能>2.5万亿，牛市，支持两条主线

    量能>3万亿，大牛市，支持3-4条主线

    量能<2.5万亿，平衡市，1条主线缩圈。

    量能<2万亿，猴市，无主线疯狂轮动。

    你把自己的仓位根据这个，

    进行50-90%的排布，放量加仓缩量减仓(你拿的正好是逆势品种除外。

    第二，主线及特征

    绝大多数钱都是靠主线赚的。

    第三，个股看强弱

    当强不强则为弱，比如业绩超预期，全新好消息，它竟然不涨停，或上午10点多冲高回落，利好钝化，此时视为弱。

    盘子越大博弈越充分，小盘子的主力可能反着来。

    当弱不弱则为强，利空突袭，业绩很差，整个板块或者个股竟然抗跌，麻木了，说明筹码认为利空出尽。

    招要走，强要留，此时可不用看具体的当天决定。

    通常来说，如果板块不强，大盘不配合，

    那个股也没办法，但起码你要表现的比其他人强，

    板块一样适用于强弱理论。

    第四，技术看去留

    我们列出"5级风控标准"让爱操作的对号入座。

    1/-5日平台/5日线(人气热门线)

    2/-13日线(走强走弱线)

    3/-21日线(调整支撑线)

    4/-34日线(主力强弱势线)

    5/-55日/60日线(牛熊分界线)

    这五级标准，你根据自己的承受能力来，

    心里承受能力越差，风控标准要越高，

    图形越高BAIS越高，风控要越高。

    大盘量能越小越缩量，风控要越高。

    这里有一个傻瓜口诀，5日线上穿10日线，击鼓进军，5日线下穿10日线，鸣金收兵。

    你根据自己的敏感值，承受力，利润垫，选择什么时候减仓或者走人。比如你胆子最小，大盘又不好，选最高的1级风控，你胆子大，可以看34日线不站稳或者跌破再走。

    风控要对号入座，不能承受力弱选低标准，也无需一向铁害怕风吹动；54风控标准和赔率成反比，虽然不一定有效。

    第五，注意事项

    越强的股，越强的大盘，越能守自己的线，第一次守时简直候百战百胜，比如8日从不跌破，第二次是21日线精准拉起，第三次开始到34，以此类推。

    唯一的折衷方法，是看它以前的"惯例图形"，比如每次回调21日线总会拉起来，那么你可以在这个位置观望平台，如果每次回调都往60日线去，跌破5日平台你别格局。

    如果大盘量能不够，很少有公司能走出深V反转，

    病来如山倒，病去如抽丝，通常的路径是

    大跌-反抽-再跌-60日线附近-量能极度萎靡-装死-慢弹一下-回踩-再涨。

    以后，我们将大幅减少问具体谁谁谁，该走该留的问题，风控标准仓位和承受力度不一样，结果完全不一样。

    就行有的同学，白板征信，农商行给你30w信用卡，建行只给批5千，都没问题，标准问题。

    口诀，箱在人在，箱坏人走，站稳再进，滞涨当心。

    第六，几个祖训

    很多软件都有量比，缩量放量多少，更准确。

    高位看图形，严重脱离基本面，放量大涨要走，放量滞涨要走，乖离值高了随时走。

