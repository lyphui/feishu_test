    之前讲要突破长期盘整位的拓荆，华海清科等剧烈表现。

    从技术上讲，就是之前盘整了几个月，高度出不了货而已，必须拉。

    拓荆华海陆积电等都在哪，上行轨道一直未破坏的588710。

    这几天95%以上的选手跑不过它。

    海外算力呢？还是那两个，一个是"几乎没怎么涨过"的MLCC，CCL铜箔等后排涨价缺物料，一个是DSP芯片平替的优讯和裕太微。

    华为线则是扩散到了后排，光迅华工等光模块涨过后，连接器的华丰，液冷电源的申菱环境中恒之类开始补涨。

    设备呢？早就给大家找好了图形完好，平台不破，缩量上涨的燕麦，多次打call，他可是正经能干cpo的。

    没有去弱留强，请深刻反思一下。

    会技术的继续看缩量上涨的品种，小车不倒一直推。

    其他人呢，控制仓位，手痒的可以找一找中位板块，给你-4%最好是-6%左右低吸的机会，高了抛一抛。

    稳健的就趁冰点低吸点etf，5日平台法网格搞搞差价，如果这些都看不明白，先学习，管住手，学完就懂了。

    主力多么仁慈，那么洗着盘给你腾地方等你学好。

    如果你感觉左右为难的时候，可以不为难。

    早上刚发文说，懂王了两个EDA软件，下午轮到大A的EDA涨了，量化也是神奇。

