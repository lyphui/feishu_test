    预计科瑞技术2026年净利润可达4-5亿元，当前市盈率约40倍，估值略显尴尬，核心看点是与Lumentum和Coherent的合作。

    从估值来看，科瑞技术不及博众精工，博众精工属于苏州板块企业，且有未公开的大额订单，订单规模虽不大但具备潜力。

