  文档内容正文: '英特尔链准备崛起

    算力，运力，存力，调配力，

    算力是GPU芯片，运力是光模块等，存力的存储很疯狂，现在大脑CPU不够了。

    总得要人给你分配工作吧，加上AI进入智能体时代后，更需要CPU居中调度。

    所以英特尔AMD开始大涨特涨。

    直接奔入正题，

    -CPU芯片：龙芯中科，纯纯CPU一哥。

    CPU&GPU双轮驱动，海光。

    禾盛新材：旗下熠知AICPU，号称性能对标英伟达Grace.

    中国长城：信创解决方案，服务器CPU.

    -配套芯片，

    澜起科技：主营cpu内存接口芯片，英特尔曾是二股东。

    杰华特：电源芯片华为、Intel均为其股东，各占3%左右股份。

    -封测：通富微电。

    -Bios固件开发：卓易信息，英特尔供应商，目前被异动监控了。

    炒完果链，达链，谷歌链之后，我们又要迎来英

    昨天因为它们涨的太快，不要追高，还是趁回调再看比较好，但趋势正在形成，

    简单粗暴的etf588200，有望接棒710，还有个更准确的芯片etf588780.

    马斯克昨晚表态，自动驾驶与人形机器人的量产在2026年要降低预期，不会大规模量产，人形机器人可能止步八强。

    而懂王要求继续加强核电，AI基建会让电工、水管工拿六位数年薪，电网设备尤其是sst电网出海再得一分。

    有了cpu的加持，国产半导体/芯片，进入决赛的可能性越来越高。

    ps，林峰当年是陈立武的助理，这两人是谁炒科技得有研究能力，当然没底仓别追啊。

    Don''t Cry For Me Argentina

    由麦当娜演唱的《阿根廷，别为我哭泣》是1996年电影《贝隆夫人》(Evita)的主题曲。

    曲中写尽了女主角对祖国阿根廷的一往情深和她个人渴望改革的坚强意志。

    巴西队的国旗上面，就是它独立那天，南半球的星座图，妥妥的商业航天，夺冠大热门状态出的太快，被裁判送回家了。

    Ai应用阿根廷，还在场上继续。

    今天指数的一个显著特征是，

    涨跌由易中天把持，而不是商业航天。

    这意味基本回到了轨道。

    之前有人怀疑海外算力到底是不是四强，今天应该没有悬念了。

    弹性大的是CPO，OCS，光芯片，

    中间校花们的好日子，

    随着业绩公报，又要来了。

    最后那张图是無@常同学编辑的，鸣谢。'
