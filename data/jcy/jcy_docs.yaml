  文档标题: Vol.260615 通假字；以无事取天下
  文档链接: https://my.feishu.cn/wiki/SYnAw4nDSixV61k69P5cY99rn2c
  文档内容正文: '通假字

    初中时大家都学过“通假字”，古人写错了，或者用一个代称。

    “巳日乃孚，元吉”。

    上周五是就是巳日，“乃”是不是应该通“买”，“巳日买孚”?

    当然只是个开玩笑了，它的筹码峰，趋势，美国小作文的错杀我们都得懂的。

    今天最靓的仔，其实是铜连接。

    之前讲过的黄仁勋的那句话，

    You use optics wherever you must, you use copper wherever you can。

    翻译要信雅达，

    “应铜尽铜，可光则光”。

    博创这种团宠如何，34-55吸筹，拉起。

    MPO，AEC连接器的行情还没有完。

    正在帮北美巨头筛选类似供应商，届时如果可以，将会用不违背原则的方式tell u.

    以无事取天下

    都回血了吧，受到日韩和停战的刺激，支棱起来的还是女方，是光，强者恒强，

    中国这帮基金经理们没待过企业，更没经历过周期，所以总是在自做聪明。

    有时候你自认为的高抛，一两周看着对，一两个月最后都发现抛低了，

    就比如今天早上我还在说CCL不好生产，

    它和MLCC和CCL，先跌30%，然后再涨3倍（知识星球鉴茶财经院）。

    技术不好的人和产业投资用《道德经》里的那句话最合适，终局思维，

    “以无事取天下”。

    技术好的呢？就得眼疾手快胆大心细，比如今天早上看到专门提示了JPT的小型平台，趋势漂亮，开盘果断换仓，稳稳的给你上车机会，

    以及一早看到太辰光博创等铜缆都高开上天了，马上敢去-8%抄底鼎通，瑞可达，就算还赶不上不还有个ydet（知识星球鉴茶财经院）。

    当时天心同学说，丙午年甲午月，火旺到极致，是不是要用液冷，是的，弹性最好的申菱很不错，当然寒武纪也很冷。

    有没感觉今年夏天反而没有那么热，午午自刑，正正得负，一切都是大模型啊。

    决定长线的还是产业和布局，是海外的力量和研发，就比如光库，通过并购JBL的工厂工程师和安捷讯，一路被我们打Call进了创业板指。

    一条暗线是什么，朱格拉周期的设备啊，尤其上光设备，卖铲子的新锐强不强，代表的是科创机械etf，中控，JPT，绿的等都在里头，今天大涨6.98%，你有跑赢吗？

    评论区：

    港湾：大王科技算调整完了，新主线是850吗

    南院大王 回复 港湾：高切高，男女主轮着表演

    港湾 回复 南院大王：收到谢谢

    king：请教大王，拳打脚踢最近在平台上不断整理。相对其他女方，他是不是概念更多，更有上升空间呢？

    南院大王 回复 king：它是中军主力，基本面扎实，不容易跌

    和煦微风：液冷还有ydet么？大王？这哥们真的是万金油。

    南院大王 回复 和煦微风：它主业其实是pcb和液冷，连接器是给安费诺供板子'
