  文档内容正文: '缩圈与分化

    昨天3.6万亿成交震撼生产队，

    上面进行了降温，减持，风险警告，宣布自己的公司业务占比很小等等。

    对此我们的判断是，

    牛市的节奏不会变，量能在就行，

    既然要压盘，那么就会导致，两大热点，商业航天与AI应用会进一步分化与缩圈，

    后排掉队的越来越多，你就集中前排和确实有实力的即可，不断去弱留强。

    商业航天此时完全和基本面没关系，就是看图阶段，破5日线就跑。

    胆子大等它批量跌停或者都要-7%-8%之类抓紧跑。

    AI应用昨天已经超越商业航天，

    依然要聚焦传媒广告视频等，后面的什么AI医疗，AI矿山之类的先不看。

    要变现最快的是广告费，做多再带点值得买之类的AI营销和导流。

    相比之下Ai应用刚起来，空间更大点。

    这两个错过又不会下手，宁肯慢点也想稳点还有什么能看？

    -AIDC数据中心，昨天万国数据大涨，英伟达而亲儿子corewave底部放量大涨12%,对A今天必然持续映射。

    -国产半导体，各路热点题材抽来抽去没有太抽动它。

    这两个板块具体有谁都谈过了往前翻，稳健的看etf.

    当然，这两个依然只看前排，板块里一点，最多看到龙3，其他暂时放放。

    当然还是不追高，AI应用给急杀最好。

    如约的分歧和调整

    两大热门商业航天和AI应用全部调整了， 这么涨下去也不是个事。

    不会走A杀的，

    这么大体量短期怎么可能撤得出来。

    会不断缩圈去弱留强然后形成复杂顶，

    商业航天正式进入第二阶段， 以后选股越来越难了。

    AI应用还在第一阶段里， 高标仍还非常强势。

    其他的板块，跟着顺势洗一把罢了。

    到底谁是真完了谁能跑出来，

    今天最多看出40%, 明后天才能看出个大概。

    牛市多急跌，一点都不用担心。

    为什么？

    市场3.6万亿的量，比昨天还多出500亿。

    有量能在就不用担心。

    如何盘中看出它要急杀还是急拉？

    A50期货啊，要手快。

    你要说AI应用会不会继续？会的。

    这会大A都收盘了，港股的阿里在涨。

    阿里可是中国的谷歌和最大的AI应用。

    它前两天是标准的回踩买点结构。

    恒生科技之前是被两个卖汽车的给耽误坏了，一 个比亚迪，一个小米。

    2026年的恒科指数，有望成为2022年底的银 行，刚开始。

    马年了，除了马斯克，我们也有自己的马老师。

    马老师属于龙的，

    26年是丙午年，

    辰午暗合，他不是谈恋爱就是悄悄发财。

    相比之下，王石日柱癸亥，财旺身弱，本来就不 担财，天地一气水，

    被丙午年的一气火克的不要不要的，

    所以田朴珺完全拿捏。

    他也是情关没过啊，（这个改天再说）'
