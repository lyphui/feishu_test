  文档内容正文: '生产队出手了

    今天都以为大盘会很惨，甚至复制去年4月7日 的大跌，想多了。

    你看果然给你拉起来了吧，放量5300亿。

    生产队在商业航天爆火的时候狂抛etf压盘，手 里可是有1万多亿现金呢。

    你说他们买啥？优先肯定是校花校草，

    它们压秤啊，一拉指数就上来，就算是硅光，旭 创技术储备也是很强的。

    旭创强天孚就弱，再说这么大盘子，乖离值50

