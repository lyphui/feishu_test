  文档内容正文: '又现巨额压单

    为了防止"过快上涨"，

    昨天生产队选择是

    "盘中砸热点，尾盘搞压盘"。

    有些已经放量大涨的板块可以不断去弱留强，谁不涨扔谁，(分批) 止盈。

    逐步转战化工，

    化工一开始看能源化工和精细化工。

    能源化工类似东方盛虹之类EVA，

    不知道搞谁就逢低看万华等大白马。

    不会就ETF。

    涨不怕，就怕加速，一加速完了就该跌了。

    AI应用能不能摆脱商业航天的连累，带动题材板块健康发展。

    丧标今天正式摆脱监管，考验操盘资金的智慧。

    这个属于AI应用大板块的延伸，阿根廷青年队，叠加H200入华预期和招标扩大，大板块里率先收复113调控高点的，

    AIDC包括两个方面，

    一个是润泽，大位，光环等代表的筒力服务商

    一个是铜牛信息，首都在线，青云科技等代表的云服务。

    优刻得已经率先走出了新高。

    本周就是能看出，到底是算力半导体等板块扭转

    局面，市场回归业绩主线。

    还是在压盘压力下，中小题材继续表现。

    注意啊，不追高，逢调整看，不要动不动一把梭哈，市场有的机会给你。

    去年看场子的是谁？

    银行。

    今年看场子的是谁？

    保险。

    四强格局日渐清晰

    开盘就砸，但没事

    进一步汰锅留强。

    重温一下四强选手们，

    决赛器

    国产半导体芯片VS AI应用。

    各自的板凳都很强。

    这两个就是588710/588200

    芯片有接力设备的迹象，

    反复揉搓你的东芯涨停了。

    谷歌的本质，是广告公司。

    所以跟大家讲一开始就看AI广告和营销，

    广告的代表蓝标，营销的代表值得买，

    正文里你若没记住AI营销，评论区专门提醒过露 露小姐。

    H200入华的预期差为何是协创，

    富士康郭台铭的哥哥是他背后股东，它早就有 BA30了，有些同学一直问存储，讲过好几次， 协创也是存储，最先进的HBM，0公里二手车。

    萝卜是英伟达和spacex的供应商。

    这些天如何？校草很快800。

    每当市场萎靡指数跌太狠，就会拉海外算力，队 长当然是创，它有点齐达内的感觉，很全面， 1.6T时代它领先，谷歌的3.2T目前也只有它能 做。

    如果25年年报miss呢(虽然概率不高)，那你 就继续等一季报。

    这里的etf515880也即将新高。

    这种很困难反复磨你的阶段，普通人很难跑过指 数。

    裁判保险。

    今天，大盘终于走出了老登想要的样子。

    谁加速它打谁，昨天打加速的有色。

    我们称为老登式涨法。

    现在允许涨，位置不高，又不惊动指数的方向， 下午发现了吗？AIDC和云服务。

    丧标今天涨的，很讲政治，你现在是卡尼古亚或 者巴蒂这种选手，加油，扛到年后慢牛你就是梅西。

    昨天-9%低吸标哥爽吗？

    最后问一下，阿根廷有跟德国队在决赛中遇到过吗

