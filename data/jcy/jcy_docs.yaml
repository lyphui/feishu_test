    易经第41卦损：身强担财

    从第38卦开始就是杀跌，

    烈火烹油大涨的时候，你冷静不下来，经济和市场遇到触底，调整，震荡，期间最重要的事情是什么？是反思，是总结经验教训。

    先思考自己不足的，失去的，做错的，再思考自己成功的，得到的，做好的。

    这就"损益"，财务中有损益表。

    先说损，

    损。有孚，元吉，无咎，可贞。利有攸往。易之用？二可用享。

    象日：山下有泽，损。君子以征忿室欲。

    损卦是吉祥的，将有所俘获，大吉大利，没有灾难，可以做点事情了，将有人送来两盆食物，可享口福。

    损明明是损失，损伤，亏钱了，账户缩水了，或者项目没做成丢单子了，怎么反而是吉祥的呢？

    因为你检讨自我，智慧成长了啊。

    损卦，上面是山，下面是水，水在一天天的侵蚀山的根基，君子看到这种情况猛然惊醒：

    酒色和熬夜，让我如此憔悴！

    "君子以征忿室欲"，

    然后明白了，人生在社会上，往往最难放下的就是执念与欲望，这才是陷入困境的根本原因，

    损，就是减损自己的贪、嗔、痴，回到自然本真状态，比如渴了喝水，饿了吃饭，冷了添衣，而不是永无止境的贪欲。

    你不快乐不是因为没钱，而且动给自己提出了更高的目标，

    你不幸福不是你得到的太少，而是你试图要求的更多，

    人要知止，知足，知进退，不断的回归自我和质朴，好事会自然而来，别人主动给你饭吃。

    一壶90度的水没烧开，你非常着急，普通人想的是加大火力，找来更多的柴火燃料猛烧，永远99度，越来越焦虑。而先贤告诉你，把水倒掉三成，水声鼎沸，你还能剩下不少柴禾。

    在这个过程中，先贤还告诉了哪些指导策略和智慧呢？

    初九。已事迷往，无咎，酌损之。

    象日：已事往，尚合志也

    黄仁勋说，他是和特别擅长遗忘的人，我们很多人特别不擅长遗忘，

    追一个女孩子很久，花钱，送礼物，请吃饭，总觉得自己亏了，不甘心，继续加大投入，不去看人家根本不喜欢你。

    拿一个股票好多年，不服气，总觉得非要翻本，不断补仓，不去看逻辑和图形还在不在。

    第一条智慧：

    学会翻篇，沉没成本不参与决策。学会"实事求是"。

    九二。利贞，征凶。弗损，益之。

    象日：九二利贞，中以为志也。

    长期有利的东西，如果贸然行动也会有凶险。此时，不损也不益，保持现状就是最好的策略，

    我们的教育以前很少会教人"灰度思维"中间决策"，

    导致很多人在操作和做事上，要么满仓，要么空仓，要么激进，要么悲观，就喜欢走极端。

    而没有学会中性仓位，观望事态。

    在感觉时机不成熟时，既不肯定也不否定，既不支持，也不踩他，

    只做试探性进攻或者观望，待形势明朗后再下注或者跟进，一把锁定胜局。

    过去有多少好事，好人，好股票，本来可以好好走下去，结果因为你的激进，冲动，太着急，反而弄巧成拙呢？又有多少人，创业和做项目的时候用力过猛，结果拔不出来了么？

    第二条智慧，

    学会中庸状态，永远留有余地。

    六三。三人行，则损一人；一人行，则得其友。

    象日：一人行，三则疑也。

    三人同行，会损失一人。一人独行，朋友自己就来了。

    三个和尚没水吃，因为没有主心骨，一个人做主反而能凝聚众人，因为你担起了事情。

    之前星球里不少同学问，朋友邀请他做生意，和朋友开公司等等，

    无论是社会学还是经济学，我们都不建议。友谊，不能明算账，去中心化，而商业，必须明算账，中心化。你要在创业和发展的过程中去交朋友，而不要和朋友去创业。

    否则，大概率反目成仇，人财两空。

    多少人栽在这个上面，强如苏宁，觉得和许老板关系好，投下去200亿打水漂。

    第三条智慧，

    不要考人性，少和朋友做合作。

    象日：损其疾，亦可喜也。

    能认识和改正自己的缺点，能让过去变成过去，这也是好事啊，没有害处。

    什么叫成长，成长就是你不断克服自己最大的弱点，不去美化没有走过的路。

    "悔以往之不谏，知来者之可追"。

    你发现自己赚的钱，都是在核心趋势发票上拿的，那么它猛杀跌，你就要敢于进。

    你发现自己亏的钱，都是鸡零狗碎的杂毛上亏的，这三千那一万，那么以后，管住手。

    如果你跟这个朋友做生意亏了，下回继续跟下一个朋友去做，那没辙了。

    熟悉给人带来"安全感"，这很虚幻，绝大多数人只会不断重复过去的日子，生活是364+1。

    第四条智慧，

    改错，是改错误的路径依赖。

    六五。或益之，十朋之龟，弗克违。元吉。

    象日：六五元吉，自上佑也。

    朋，是两串贝连在一起，是货币。龟，也是贝。

    有人送来了价值连城的宝物，你没法拒绝，大吉大利。

    在中国的命理学中，

    财，是钱财，美色，豪宅名车美酒

    印，是身体，学业，慈悲，智慧。

    财多了自然是破印的，钱多了就是对身体，学业等不利，

    硅谷大佬们，微软的比尔盖茨，meta的扎克伯格，OpenAi奥特曼，甲骨文的埃里森，都是大学退学没拿到正经学位证的，马斯克的博士就读了两天。

    你再看看中国那些有钱大佬们，几个身体好的？王均瑶，左晖，前两天的张雪峰，都是让人扼腕痛惜。

    那怎么办呢？要有舍啊，财布施，法布施，无畏布施。

    这些，会给你带来"官"和"印"，这些在八字里才是好东西，

    官，护财，印，生身，身强有靠，可不就担财了吗。

    马老师有十八罗汉，是真惠及了无数中心企业，华为有全员持股，不才有今天吗？

    爱出者爱返，福往者福来，你给别人创造了巨大价值，他们无以回报，只好用力给钱给你，给了就收着吧。

    第五条智慧，

    小胜靠勤，中胜靠智，大胜靠德，大胜靠公。

    你不需要刻意减损自己，就能自然地利益他人。你不需要讲什么东西，能得到天下人的拥戴。

