  文档内容正文: '把错卖的东西再买回来

    2026年2月份以来，

    全球市场陷入了一种"投入恐慌"，

    担心两个问题，

    一是大厂们(CSP)不计代价的动辄投入数千亿美元的砸AI硬件和数据中心，会不会非常过剩，这钱能不能赚回来。

    二是软件公司受到大模型冲击后，手中掌握的数据和客户是否会一文不值。

    因此不计代价的，

    卖出AI硬件，抛售AI应用。

    英伟达亲儿子corewave7连跌，连谷歌都被怀疑巴菲特是不是老糊涂。

    接着，人们掉头买入了大量的石油，化工等板块，回归传统。

    这也是A股那段时间狂杀科技，周期走的较好的原因。

    经过那段时间的"群体无意识"，有些人慢慢回过神来，

    "超前基建"是非常有必要的，你不可能等需求上来再去搞数据中心，没一两年没结果，根本来不及。

    这就是"宁肯人等装备，不能装备等人"。

    就像这次的红包大战，豆包红包非常顺畅，而腾讯明显跟不上，阿里点多了就崩溃。

    这就是AIDC的建设，犹豫和落后了。

    大厂们得先挖好池子，才能迎接到AI可能带来的泼天富贵。

    即：

    梭哈AI，可能找死，赢家不一定是你，

    不梭哈AI，一定等死，你一点机会没有。

    大资金终于回过神来，

    又开始把以前错杀的元器件和光模块等买了回来。

    因为不管谷歌还是亚马逊谁赢，它们都是供应商，它们不关心谁是县长，反正做县长夫人就行。

    我们看到：

    搞光器件的lumument，已经创下历史新高，

    做模块的相关企业，拉出了亮眼的走势。

    它们对应的中国哪些公司，往前翻都有提到不赘述。

    因此节后，元器件领域仍然会是关注的重点，中美大资金之间的节奏差，大约1个礼拜左右。

    很多时候老美都掉头完毕了，我们才回过神来。

    这几年来，中国的厉害的还是模型，算力领域的差距，不是缩小了，而是扩大了。

    我们国产芯片，数据中心建设，都大约相当于老美2019年的水平，

    在很多小作文里，1.6T都要被取代了，光模块要不行了，现实是，

    很多国内机房连800G光模块都用不上。

    华wei系概念为啥去年一年都不太行？

    你有多久没听过910C的消息了？

    它们被老美制裁有点疼的，很多地方主力是400G。

    以上是这几天和中美两边投资人与产业界的交流结果。

    一个核心的观点要坚定：算力的建设还差得远，根本谈不上不过剩，不要杞人忧天。

    2026年，新玩家会加入全球AIDC的竞赛。'
