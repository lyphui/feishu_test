  文档内容正文: '市场会杀到哪里呢？

    直接说答案，惯性下杀可能有，但乐观一点到55日线的4058附近，就算4050好了，这位置作为中枢上下震荡。

    悲观一点嘛，咱们不悲观。

    然后说应对，先讲被套瓷实了没跑成的同学，要先明白一个心态，反正重要均线都已经杀穿了，那么沉没成本不参与决策，昨天杀10个点8个点跟今天没关系，昨天的亏不能构成今天割的原因。

    再看一个方法，即要看市场做出修复动作，也就是缩量、形成小箱体、起码3天不再创下新低才行。如果还继续放量杀跌，就得先避其锋芒，若真有出货迹象更要谨慎。

    再谈手里还有仓位的同学，这回可以慢慢看修复了，主线依旧是光芯片、稀缺物料、核心元器件、CPU等，其次是分化的半导体设备和材料。

    仓位不要重，不给性价比就不上，市场严重缩圈后，能参与的标的越来越少了。

    昨天Amey同学尾盘大手笔抄底海外算力，实属眼光独到，这两天有反抽就可以降仓，拿点利润即可。

    高位的机会当然还有，但产业逻辑和技术面不行的标的不建议参与，后面整体态势是：“牵走一头驴，还你一只鸡”。

    贪图那点小收益，很可能亏损更大。

    中位板块将会被正式提上资金布局日程，但具体启动谁、打造谁，大资金也在观望，目前都是各种试探性进攻，跟着节奏小仓位参与即可。

    既然是试探行情，游资也会开始活跃，像陈小群、鑫多多、章盟主这类游资会出来带动市场情绪，板块轮动会加快。

    普通投资者该怎么做呢？就像朝堂博弈逻辑，不必急于跟风短线题材游资炒作，等资金试探出市场明确方向、盘面走出企稳形态再动手即可，不要盲目跟风题材追高。

    用当年佟国维给隆科多的原话来讲：

    “现在唯一的路，就是等。你要知道，阿哥们找你，想拉你站队，难道皇上就不找你了？”

    （支线题材都能短期挣钱，主线行情自然也能赚钱）

    “现在无论谁来找你，你都不要得罪他，也不要轻易答应站队。”

    （有题材反弹和修复机会，可以小仓位参与，但不要过度格局、重仓死守）

    “等到皇上找你，你就把宝全押上去。”

    （等到主流主线确立、机构大规模扫货时，再加重仓位布局）

    “只有按照皇上的旨意拥立的新君，才是铁稳的新君。”

    （主线行情体量够大、资金抱团力度强，上涨周期不只是一日行情，可持续参与获利）'
