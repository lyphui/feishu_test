    -AIDC，各地开工和招标的消息很多，很多人都忽略了新闻，我们讲了好几天已经开始起涨，东阳光，奥飞数据，润泽等那些人，普遍是回踩买点且放量的结构，同学们自己看，挑顺眼的就行。

    周末讲的农尚，大位那两个，适合高手看，它们如果回调揉搓或者急杀一下更好。

    这块的ETF没有太合适的，硬要就是云50etf.

    -周末有同学问创新药，有些小核酸，CATR概念

    的已经新高了，etf589720回踩34日线后明显放量，筹码也洗的很干净，未来可期。

    -很多人关心的AI硬件，主要是被商业航天抽血以及生产队要打压控盘，易中天这几个都是指数啊。

    周末有消息传来，谷歌的减产是假消息，TPU8提前三个月下线，且营收远超预期的730亿美元。

    今天主要看它们，是不是当弱不弱。

    你要问机会呢？光芯片和CPO.

    光芯片永鼎代表的几个我们都熟悉，CPO就是萝卜干，它是卖铲子给英伟达的，共封装光学虽然要27年以后才成熟，但渗透率不断提高，空

    间也越来越大。

    硬件在液冷调整后有望靠AIDC电源支棱一下，老朋友mgmt，中恒它们，20cm的是欧陆通。

    -可控核聚变，加速状态，看好。

    -有色，继续看好，铜，铝，钴。

    -化工&机械，继续看好磷化工与工程机械，既受益于底部反转，又是对日“军民两用物资”的制裁。

    今天预期最热的仍是航天和AI应用，如果调整，也是回踩一下4092.

    做自己擅长和能看懂的，念啥经都能成佛。

    太暴力了

    两大热点，航天和应用，

    航天逻辑就不讲了吧，

    最后都是为国网和千帆服务的，

