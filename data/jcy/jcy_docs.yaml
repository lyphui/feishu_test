- record_id: recvmIIKXWG1Bc
  文档标题: Vol.260616 产业预期差系列（6）再论玻璃基板
  文档链接: https://my.feishu.cn/wiki/VCjJwWCOIiKVQdkVRZScUK2Wnzd
  文档内容正文: '玻璃基板究竟长啥样，今天给大家看看。

    康宁的高管们认为，从3-5年看，玻璃基板是一个终局思维，高端芯片上必然要替代树脂基板。如图一。

    但玻璃的问题是不通电，没法走电路，上面必须打孔，这个孔一块板子上可能成千上万个，如图二，放大给大家看看，干法激光+湿法蚀刻。

    谁在上面打孔呢？那些激光玩家，尤其本身搞光学设备的，业内认为有机会的潜在玩家，

    炬光，JPT，帝尔，苏纳光电，以及一个候补，宇瞳光学，以前都以为宇瞳只做安防镜头，它的硅透镜做的不错，也在切入1.6T，并给孚同学在建立合作。

    它目前图形走的不顺畅，股性一般，看来切入通信还没被资本市场认可，等它走顺了说明认可。

    至于前几个，不要追高，用终局思维看，这中间还会反复很多回，待有较大调整再进也来得及，重要的是要掌握产业，心里有数。

    （话说西安，就是因为炬光和校草，才在光通信领域占了一席之地）。

    玻璃基板不带电，所以要打孔，带电的板子是啥，CCL铜箔，早上还又讲过。'
- record_id: recvmzrPAfrEYH
  文档标题: Vol.260615 在两种可能性中震荡筑底
  文档链接: https://my.feishu.cn/wiki/TG9mw789Si4ndPkypLicZD0jnoJ
  文档内容正文: '目前的市场有两个可能：

    A方案，目前就是调整的尾声，上证、创业、科创三大指数缓慢修复，那么，你继续持股甚至非常缓慢的推高仓位即可。

    这种可能性下，你要看到：上证不再创新低，创业板指、科创50稳住34日线，逐步修复612的大阴线。

    如果是这种情况：男女主的ETF，女方的通信、科创机械，男方的半导体设备、科创新材料ETF大家都清楚，你看谁强，参与谁就行了。

    具体点对高手来说呢？参与那些已构筑小平台的，比如在21日线上的某创，小碎步收复34日线的jpt等等，注意是不上头式参与，一旦风向不对立马跑。

    因为半导体早在5月中旬就已派发，有些资金又去回马枪，高切高的机会在哪，一个是材料，一个是“落后制程”。

    比如思瑞浦（国产MCU更贴服务器）、纳芯微（国产德州仪器还在车里卷），别看最近涨了，这都是21年历史高点下来腰斩的，还有扬杰科技这种IGBT。

    各位你有没发现，女主的海外算力主要集中在创业板，男主的国产算力主要集中在科创板，它们基本绑架了指数。

    上面是比较乐观的情况，但鲁迅说，我向来不惮以最坏的恶意来揣测中国人，还有一种继续走弱的情况，即B方案：

    这里仍是弱反抽，上证反攻，那是因为踩到强支撑，但双创调整的时间空间都不够，还要反弹后下探，加速去寻强支撑，基本各自都是55日线。

    科创50走势相对较好，创业板指的强支撑在3500左右，还有300个点空间，即使看向缺口位置3720，也还有100多点。

    按照这个方案，就能解释，上周五进场布局权重板块的是护盘资金，意在阻止全市场持续下跌；而减持科技股的，是公募资金在21日线抄底大盘股收获五连阳后的高位抛售，是两路资金各自操作。

    如果按照这个逻辑理解，那么710板块正在构筑双头形态，515880则会向34日线靠拢寻求企稳，走势和三四周前的半导体相仿。

    所以对应的操作思路如下：

    比如说AIPC，此前股价居高不下，如今华勤技术这类标的迎来调整，同时华为超节点相关个股也回落至55日线形成小平台，可试探性参与，一旦跌破支撑就离场。

    还有生益电子这类标的，走势欲扬先抑，从2025年11月至今形成了长期箱体形态。

    整体市场风向可以参考基金重仓指数，每日上午10点半前后基本能判断方向。国产芯片、国产半导体设备、海外光模块、海外CPO（光芯片/OCS）、新能源等六个细分赛道，能清晰看出资金的买入与抛售方向。

    如果无法分辨动向，说明对核心标的不够熟悉，或是对板块逻辑理解不足，需要多加观察学习。

    当下相对值得关注的，是具备科技属性的软件板块，泛微网络（背靠腾讯）、达梦数据、中望软件，这几家企业均保持盈利状态。

    除此之外，Claude大模型在海外被限制使用，倒逼大模型产业加速国产化，也会进一步带动软件与应用板块发展。

    这类标的操作方式较为简单，低位布局重点参考行业逻辑，不必过度纠结技术图形，出现大幅回调、性价比凸显时，可分批建仓，切忌重仓追高；若跌破关键支撑位，比如泛微网络的缺口位置，及时离场。

    想要判断权重板块是否有资金进场，可以观察规模1300亿的沪深300ETF（510300），看盘中分时红柱、绿柱的占比情况。

    再说说蓝标，该标的并不适合长期持有，短线行情主要依靠硬件板块带动。客观来看，它的发展处境和三年前某创有相似之处，应用类产业发展本就需要时间积累。它是国内规模最大、客户资源最多、盈利表现突出的广告企业，业内不少地方策划公司，都以能对接蓝标业务为荣。

    对于操作偏保守的新手投资者，可以参考此前思路，关注双创50ETF（588330），耐心等待价格回落至55日线或是1.1元附近再择机介入，当然市场也未必会给到这个入场点位。双创50基本可以看作“中国版七仙女”。

    长期趋势已经比较明朗，往后绝大多数上市公司的收益表现会不及这类核心标的，绝大多数普通投资者的收益也难以跑赢ETF产品。

    可以参考海外市场情况，美国大型杠杆ETF发行商ProShares，推出了以美元计价的单日两倍做多ETF，布局标的共计九家企业，包含易中天、妇联、立讯、宁王、兆易、海光、寒王。

    整体市场情况如上，以上内容仅为行情思路分析与案例探讨，研判不同走势可能性以及对应的操作思路，不构成任何投资建议。

    对于长期价值投资者而言，短期波动都属于市场扰动，可坚定布局科技主线不动摇，借助震荡行情观察板块与个股强弱。

    也可以借鉴林奇的投资方法，每个季度梳理持仓，剔除走势走弱、不符合产业技术路线、并非行业龙头的标的。

    短期盘面来看，4010点是重要生命线，指数回踩该位置不破，就可以小仓位做T；上方压力位在4070点、4090点，若指数无法站稳压力位，依旧要跟随基金重仓指数灵活调整持仓。'
