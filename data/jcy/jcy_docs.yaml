  文档内容正文: '春季行情二阶段

    春季行情的下半段，书接上回，逻辑不变。

    一条还是设备，全球缺存储，美国把长鑫长存拉出黑名单，国产设备依然聚焦飞测，京仪，微导等为代表的"两存"供应商，列入观察大跌看机会的是珂玛科技，先进陶瓷的细分龙头，为两存扩产供应商。

    一条则是芯片，春节的AI大战后，人们意识到字节迟早自研AISC芯片，国内设计排第一的芯原，中国小博通，目前主要供阿里，但和字节合作可能性非常高，毕竟也没其他人了，且是海康威视龚总投出的公司。

    一条是AIDC大招标的数据中心和电源液冷等环节，比如东阳光，英皇等。

    机器人要高灵敏度，也要用光纤。

    这几个"前沿科技"和旭创代表的光模块主力通常成跷跷板，一涨则有一滞，如果放量，共同上涨。

    北美需要马上能发电的，那就上燃气轮机，高盛瑞银看好的东方电气，已经接到北美客户询价，业绩释放估计迟早的事，梳理出来的叶片龙头同时有商业航天概念的应流股份，依然会有机会。

    变压器的核心，取向硅钢。

    论弹性，20cm的是固态变压器金盘。

    还是那句话，不要上头追高，念啥经都能成佛，选自己看得懂手感好的，

    上述谈了好几个标的，是从5000家里反复优选的，因为标的是轮动的，各家都有资金布局，不像去年6月，搞两个抱团不用管，况且，不理解全局地图，根本搞不懂手里的标的为什么涨为什么跌。

    手艺一般搞etf，比如159381，大部分人跑不过它。

    AIDC是润泽，大位，东阳光等和智谱概念，大模型在大A只能搞AI应用，核心供应商，很多人把华为概念拉上去一堆，华为里只提华丰科技就够了。

    在4月的季报和年报出来，懂王过来之前，科技成长应该是占优的，尤其是那些概念居多业绩没体现的，之后可能大面积回归价值。

    目前的市场，科技虽仍是主线，但和周期(化工/大宗)等的轮动是明显可见的，都不要上头，让子弹飞一会儿。

    评论区：

    彩色斑马：大王，请问taalas 芯片是不是对达链利空呀?

    南院大王 回复彩色斑马：管他谁是县长，达链供应商都是县长夫人

    张荣恩：新年继续推荐20+个好友加入大王圈子，共同成长

    神经蛙：lumument大王看到多少?

    南院大王 回复神经蛙：光通信一哥了，超出了所有投行预测，只能说，后面技术路线它基本全部压中。

    姝姝：大王，节后阿根廷队的走势怎么看呢?

    星程大海：大王，寒王有啥建议不?还一直拿着

    沐兴回复星程大海：同问，字节也自研的话感觉有点不稳

    南院大王 回复星程大海：技术上说，强力跌破60日线视为破位，通常要月度一级修复，目前在缓慢修复。产品上它的货能卖出去，其他三小龙基本卖不动

    星程大海回复南院大王：好嘞，那就继续趴着等修复

    叶枫：博创啥时候能企稳

    南院大王 回复叶枫：顶着两轮减持创下新高且进入创业板指，要知足，现在的图形是揉搓结构，跌破34线再谈不稳

    莹：所以今年pcb不用看了吗?

    南院大王 回复莹：pcb本身可能要到一季报后，现在涨的都是它上游原材料，钻针，电子布，ccl

    小龙：农尚的小红书算力还能等不?

    医学信息学：大王 东田微依然是卖铲子的哈?

    玥玥：大王，新年好!阅文集团还可拿?

    南院大王 回复 玥玥：黑猫警长早就老了，阅文才是超级小登，起码看到28年。未来会有大量的电视电影来源于起点的ip。

    今天涨的是周期

    今天，真正涨的其实是冲突和周期概念，是映射全球局势紧张的，煤炭，黄金，有色等，金牛化工是大家熟悉的标的。

    还有对日制裁相关，锂电在储能周期的磷化工，云天化等人。

    科技上的周期，电子布，钻针，光纤等。

    还有最早发掘的工程机械周期，"AI推土机"山推慢悠悠新高了，恒立是被机器人给带下去了。

    有一个纯的工程机械etf，515970，刚刚上市没多久，第一重仓股潍柴，懂海外市场。

    周期和科技是跷跷板，科技看润泽断板就该跑了。

    客观上说，cpo，硅光，ocs等总结的"前沿科技"，目前还在行业早期，只是刚刚验证了可行性而已，

    更为看好的原因：一方面是预期的存在，朦胧才是美，第二方面，到4月前后，因为没有季报和业绩压力，题材概念往往是表现的时机，

    所以天孚炬光萝卜腾景之类的，会表现更强势，天孚业绩在相关标的里最差，无奈有故事和预期，旭创的确定性太强，关键时候才会有突出表现。

    光纤是多重概念，有诸多未来预期逻辑，甚至包括替代存储，错过了龙1长飞，还有亨通。

    同样的还有北美缺电的逻辑，也是向上的趋势，变压器的核心，取向硅钢，具备投资价值。

    燃气轮机暂未实际落地，但预期很强，可行性非常高，所以东方电气、应流股份迎来上涨。

    传媒十年怎么回事？春节档票房"不及预期"和光线跌停带动板块走弱，但丧标的表现算合格的，踩了34日线后拉起来，明后天是关键，看能否站稳。

    大多数普通人的投资收益不一定能跑赢etf，比如159381这种擅长风格漂移见风使舵的品种。

    既然今天涨了周期，明天大概率轮到科技。

    东阳光停牌，是继续买液冷和数据资产，迟早跟英皇在液冷上battle一下。'
