  文档标题: Vol.260623 知止不殆
  文档链接: https://my.feishu.cn/wiki/UdgzwB6EEixXa7kMnsHcERtGn9d
  文档内容正文: '今天的大盘看似是受日韩的影响，更本质的是，先有天量，再有天价，是市场的基本规律。

    早盘讲历史级压力位4190果然没过去，一看基金重仓直接撂挑子，男女主一起杀，那你跟着撂挑子就行。

    不得不佩服，周末时讲“艮”的知止和止盈的智慧。

    要严防冲高回落和放量滞涨，用最高级的风控措施，长短线选手都具体怎么操作有何建议，昨天复盘都已经讲过了，现在无非是坐等历史的进城而已。

    etf的好处，涨了比别人涨的猛，跌的时候比别人跌的少，想必你体会到了知识星球鉴茶财经院。

    问产业都没问题，问短线自己看图，关键在于你信什么，标准是什么。

    就比如说派瑞，被罚时有些人觉得天都塌了，结果呢，人家现在7连阳，不但补了缺口，还收复了利空前当天的位置。

    你要问为什么，国网四万亿的最大受益人之一，国内那帮玩电的在西电所的跟前都是弟弟，它没有搞个

    11连阳，是得给面子。

    今天有什么亮点？先进科技不行了，落后科技顶上来，咱们说了很久的IGBT和MCU，纳思两个兄弟，后面的士兰微，扬杰，捷捷等知识星球鉴茶财经院。

    中午联系了在美国的朋友，说大厂资本开支不但没有缩减，反而有扩大的迹象，连微软这种中登都要加码。

    那就没什么好担心的，所有的经济危机，本质都是有钱人没钱了。

