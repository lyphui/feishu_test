    龙头当然是蓝标，但好像再涨5%就要进异动，就看龙2易点天下能否继续带动，其他的，省广集团，福石控股等豆包还能继续看好，估计断断续续一直能炒到字节赞助的春晚。

    AI消费，翻来翻去值得买。

    简单的etf560360.

