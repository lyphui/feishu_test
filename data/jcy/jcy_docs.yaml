  文档内容正文: '大金融的启动与几个板块

    1，大金融启动了吗？当然。

    你看用给新手指引的新华保险就知道，五六七十时不断说，现在80多。

    大金融板块里一共三个，银行，保险，券商。

    银行是叫你化债的，保险也起来了，券商还在后面，我们反复给大家讲，一看券商启动，不要买它，立刻看券商IT.

    金融科技的三家券商IT和后面那几个互联网金融昨天讲了不少，你就按三生大模型操作即可。

    对应的是金融科技etf.

    但券商这块，上面要慢牛，是不能太暴力的，如果你要更精确就得看盘中，

    就得时看秀尚，比如甲信，华泰乙天的大头在上拉，比如两家以上小券商封板，那就代表允许涨，没有压，

    如果券商超级大单在压，猛砸，那你就知道当天没戏了。

    同时，它们如果压盘压狠了，又给了较大机会。

    险资是市场庄家的理念跟大家谈过多次，它们除了买自己，还爱买谁？有色与化工。

    铜，铝，钴之类的，一共就那几家，比如盛屯这种，机构慢慢吃货的手法。

    险资也爱买化工，氟化工，磷化工之类的，尤其

    是云天化，兴发集团等调整时告诉大家这是机构偏爱，它们现在已经和即将新高。

    2，大科技的海外主线，就是跟着英伟达吃饭，黄老板还没谈完，易中天胜等几个就不断震荡，但你要看到什么？

    LITE，高意等昨天是大涨。一举反包，今天要看大A那些光芯片，理论上是要跟的，如果不跟呢？当强不强你懂的。

    3，美股的存储闪迪等也是大涨，国内的香农，江波龙之类前段时间就是回踩买点结构，今天高开非常狠当然不跟，

    我们看国产“含存”的，就是飞测，京仪，微导它们那几个，美光扩产说洁净室短缺呢？国内有个人叫美埃科技。

    简单的etf588710.

    至于寒王，它已经箱体震荡3个月了，构成了1190为底部，1530为高点的箱体，它就等催化来一个突突。

    它是不怎么涨，但也没跌啊。

    4，昨天上面担心疯牛各种降温，商业航天的两家停牌核查，八家商业航天和脑机公司发布风险警示，

    那么这个领域目前怎么看？

    要么是图形没有走坏，一路温和上涨的机构概念，要么是我们讲的商业航天+自动驾驶集合的导航概念，海格，北斗等它们，不要跌破5日平台。

    （之前游资喜欢的天银机电，航天智装等已经盘整好多天了，今天你是吸够筹码拉升还是顺势砸？）

    这个板块目前的情绪，今天很大概率压不住，你就看量能，有量就各种题材都有机会。

    5，如果你非常不想追高，不愿意那么刺激，宁肯涨的慢也涨增加安全系数，相对保守的多，目前在低位已经有资金进入的：机器人，AIDC数据中心,AI应用（传媒）。

