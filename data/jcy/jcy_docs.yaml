  文档内容正文: '今天是丁巳日，"巳日乃孚，元享利贞"。

    今天也变盘节点日，静待光带领的反弹。

    并严防放量滞涨和冲高回落，在4010附近的压力位时，观察基金重仓指数在什么位置，它拿着光你拿着光，它冲高回落你跟着做T，它切换你跟着切换。

    市场交易的，其实并不是对日替代，而是整个AI产业链卡点的上游和间接物料，从涨MLCC和CCL的时候就开始了，最近无非是国产再一次接过海外的棒而已。

    这个趋势，短期当然是没有走完的，只是波动非常剧烈，也很难选，看图说话就行了，如果你理解不了光刻胶、探针卡、CMP抛光液之类的，简单粗暴的有材料和设备的ETF，比你自己瞎折腾胜率高很多。

    如果，大盘整个缩量下跌撂挑子又拉银行充数，你跟着继续减仓，越是调整的末期，有可能突然给你加速杀震出车外。

    方方面面都考虑到了，战略，就是设想各种可能性并做好应对。'
