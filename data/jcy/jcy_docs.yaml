    批是早批了，我们买不买才是关键。

    但昨天英伟达大涨4%，市场选择相信。

    那利好什么？首先是易中天代表的达链，515880的上升轨道都没有破坏依然健康，

    然后是AIDC，很久之间我们就讲H200入华预期的首要利好是协创，后面那一溜利通，宏景，大位之类的。

    应用当然利好，只是缺乏催化，资金暂时依然不信没去关照而已，美股软件一季报普遍都超预

