    倒不是小觑国内这帮机构，

    他们研究产业都还刚入门，研究国际形势更小儿 科了，连这个岗位都没有。

    达利欧能把英美中荷几百年的历史捋出规律，咱 们那帮研究员能给你说明白五代十国的都没几 个。

    加上最近被吓破胆，

