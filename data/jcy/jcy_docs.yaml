  文档内容正文: '如图

    5浪之12345之阶段4-5。

    今天上午10点20之前是阶段4，10点20之后开始阶段5。

    5，有一定概率比4低点更低，

    之后就反弹了。

    最难受的其实是3，3浪上涨和3浪下跌都是要命的，中间没有任何抵抗。

    你说你为啥没看出3的瀑布，这个是120分钟线。

    上证的120分钟线，是一个多重底，甚至可以追溯到25年的924。

    人类一思考，上帝就发笑，意思是越是充分博弈和折腾，最后越是呈现了大模型的特征和数学规律。

    W双底与光学材料分析

    第一个是底是3794，（以其为A点）拉上去后会在3956有压力（突不突破都以其为B点），其特征是放量，然后再下来，回到第二个底（C点），再上去。

    昨天美股是大跌的，今天我们对大A不悲观，可能继续用低开化解，如果放量拉升，滞涨的止盈，缩量上涨的板块就是将来进攻板块。

    跌了另说，无非是推迟B点的到底时间，迟早要去。

    早上趁时间谈下上游的光学材料，之前说的零散汇聚一下，

    先讲法拉第旋光片，这个咱们也讲过很久了，它主要是做光隔离器避免光模块的信号干扰。

    -旋光片上游的核心材料是SGGG（取代钆镓石榴石）供应商包括法国luxium、日本住友、国内科瑞思创等，稀土禁运后本子大幅减产，法国luxium严重供不应求，

    国内谁能替上来呢？福晶科技。它其实是中科院福建物质所。

    它具备从晶体生长到旋光片加工的全流程生产能力，也是唯一能从SGGG的衬底，到⁻TGG/TSAG高端磁光晶体全打通的上市公司，且通过了lite和光迅的测试。

    其他的旋光片生产商包括森一量子、成都飞锐特等。

    旋光片再做成光隔离器是东田微，以及我们的老熟人长飞光纤，你以为它只做光纤吗？东田之前可能锁定了点日本的产能，后面也在东莞开厂准备造小片。

    -谈到光学材料就得说腾景科技，它不光是靠钒酸钇晶体（(YVO4)主打OCS光交换机和光通信非式器件，DIIH它也是少数具备TGG磁光晶体自研与量产能力的企业，能提供旋片+波片+棱镜一站式组件，客户含Lumentum、谷歌等。

    它没有福晶那么纵深，但做的是高端方片（国产基本都是小片）当前月产2000-3000片，2026年扩产一倍，规模远小于东田微，但高端属性强、单价高。

    旋光片不怕涨价，下游光模块承受能力很强，你涨一倍，别人可能也就多个几十美金成本。

    -旋光片的衬底是稀土石榴石，光模块和CPO的核心材料和衬底是什么呢？

    是InP、GaAs.磷化铟是云南锗业在搞，是光模块主流衬底，砷化镓主要用于制备短距离的VCSEL激光器芯片，除了光芯片还能用在导航，卫星等，老熟人长光华芯出场。

    InP能够干到1.6T，目前也是缺货的，到了3.2T以上，性能就跟不上了，这时需要薄膜铌酸锂，它的光电系数是磷化铟的20倍以上，支持110GHz+超高带宽，完美适配800G/1.6T以及更高阶光模块。

    谁搞这个呢？天通股份。旭创和它合资成立公司，相当于新能源那会宁王去锁定的德方纳米，这个衬底的特性，还可用于商业航天，6G，量子通信等。

    它到28年才会爆发，所以适合波段操作。

    谁把薄膜铌酸锂做成调制解调器呢？有请老熟人光库，不光是谷歌交换机，将来是3.2T的中游厂商。

    目前大量使用的InP、GaAs等，是三五族（（Ⅲ-V族）化合物，下下一代的半导体和激光材料创新，可能就是ZnSe硒化锌，CdTe碲化镉等二六族(Ⅱ-VI)化合物，其透光性，光电转换效率更强。

    当年日本有家公司，就叫II-VI光学（二陆光学），后面卖给了coherent，成为其重要支撑。

    以上只谈产业，买卖时点和切入方式讲很多了，图形自己看，但当时二陆总经理的一句话可以分享给大家，

    他说福晶等这帮国产厂商迟早能搞出来的。

    虽然一开始么，糙是糙了点。

    ps，腾景能说是二陆的人马出去开的公司。'
