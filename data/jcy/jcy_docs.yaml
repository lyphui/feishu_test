  文档内容正文: '科技又归来了

    每当动荡的时候，大A就会完全没有主见，下意识地去抄题，就看美股映射。LITE跌，它狂卖大科技，西方石油涨，它把中石油拉涨停。

    为什么说算力出海、华为线这伙子人比较硬，能扛着压力啊，今天它们如无意外会继续表现，昨晚美股科技大涨，今天的科技尤其是光通信要回血了。

    但你今天如果又跟着风扇去追龙虾割了周期，明天油价一涨，说不定又两头挨打了。

    正确做法呢？要么在一个方向的核心品种里坚持，你爱咋咋地，但这比较极端。

    要么两个都配，自己也双轮驱动，在A涨B大跌的时候低吸B，在B涨A大跌的时候低吸A，不是那种大跌级的不吸。留一部分仓位查缺补漏。

    一个人受到伤害，都是因为情绪被对方牵着走，舔狗到最后一无所有。

    你不入局，电风扇就拿你没办法。

    如图是美股的IGV，砸法比大A狠多了，现在是修复的十连阳，应用应该也能喘口气。

    那些喊着商业航天是星辰大海未来能炒十年的兄弟们呢，它现在回踩60日线已初步有稳住的架势了，卫星etf的观察仓可以建起来了。

    这会大家都不看中，反而我们会给大家说，十五五规划里的几个强国。

    十四五规划里有11个“强国”。

    一举新高

    别看大A5000多家公司，能看的就那些个，今天大涨的，都是底子不错的。

    国产科技的龙头华工，咱们说资金布局时89，现在基本要走出130伯利恒钢铁时刻，完全复刻经典，现在乖离值也到了50，后面就要看图了，放量滞涨或者跌破5日线起码止盈一半以上。

    电源还是麦米，弹性大的olt，飞龙要谷歌验厂，舒服吧。

    海外算力也是今年科技的主题是光通信，光模块先看联特汇绿剑桥等二线厂商补涨，剑桥跌成狗那会也没鄙视它依然列在阵营，不是说多看好，而是逻辑就是逻辑。

    光通信，就是cpo+ocs。

    ocs四小龙里面，德科立有dci概念，还能搞电，所以弹的强。

    天孚是机构打造的。

    cpo里头，萝卜是主力地位。

    新龙头不解释，技术量是高的是校草源本。

    长光有外界不知道大订单的预期翻来覆去的讲了N遍，昨天还重申它兼具商业航天与核聚变，那这不就是很相对的确定性，今天历史新高了吧？

    谁能在上周五看狗都不理的商业航天？今天也反弹，这就是《三生万物》的魅力，主力在吸筹走廊吃货。

    其他板块观点不变，轮动的周期也没啥问题，涤纶和氨纶都还行吧？两个都入6个点收益，昨天10点多的第一买点，你是板上吸筹。'
