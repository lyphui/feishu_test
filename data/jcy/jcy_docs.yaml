  文档内容正文: '升

    节前已经给了这礼拜的主题词，【升】。方向当然是国产算力，几个人跑得过588200/710，说继续看好它都腻了。埋伏已久的CPU大爆发，还只是开始。即使卓易信息狂洗那个样子，依然敢看多。

    因为没有人比咱们更懂CPU，AMD前中国区副总裁刚喝过酒，英特尔的高端CPU是大王二哥在批条子别人没货。

    有自主创业搞数据中心需要买CPU的可以私信思思，emm当然按规定不能卖给华为中兴。

    趋势已经谈了，相信光就行了。该让坚持的也坚持过了。

    连韶关城投的朗科靠光都逆袭了。

    下午要去应酬，今天可能就不复盘了，按图索骥前进即可。

    下午说不定海外算力又支棱了呢。毕竟是白月光。图一不要外传啊。

    这轮国产狂飙最大的获益人之一是Amey同学的儿子，他妈妈用他的压岁钱在159381的高点抛了跟着主力吸筹扫货588200，果然祖国的下一代自有福。

    谈几个产业内部信息

    永鼎的EML也做出来了，在北美通过了初步验证，仕家的CW芯片也获得国内两个光模块公司的初步认证（快的话6月份先小批量供应，是谁不能讲）。

    仕家现在是河南第二AI巨头，第一是工业富联。当然以上只是产业信息，不要盲目追，目前海外算力是一个调整的大背景，结合图形参考三生万物，总体上说回调消化一下较好。

    另，好几个大厂的人去昆明好几次，意图锁定云锗未来3年的产能和价格。其中就包括拳打脚踢。

    但云锗优先供应华为，感觉它有点当年碳酸锂的感觉了。

    所以海外这块特别强调了磷化铟。

    早上专门再次谈燕麦的图形比萝卜强，之前反复讲它也能做CPO，且是北美某大厂的供应商，这个厂商是JBL，美国版工业富联，也是历史新高，对，它就是把英特尔武汉光模块工厂卖给光库的那位。

    图形健康一般长这样，你品品。

    今天基本上把节日期间美股大涨消化完了，时间有限没法看盘，明早再谈今天谁是一直比较硬气的。

    RKD拿住了吧。'
