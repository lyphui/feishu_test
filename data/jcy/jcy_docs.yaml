  文档内容正文: '围绕3794震荡

    市场对美伊正在脱敏，但为什么仍不能梭哈，防止二次探底。

    未来，市场大概率会围绕本次低点3794上下波动震荡，这个点位成位为中枢。

    一旦行情更差，不排除有考验3731的可能性，后面同学们根据自己的情况灵活做T，但最大仓位不建议超过70%，低吸了的要择机T，动态持有。

    回到市场，美股昨天强的是商业航天，

    SpaceX在IPO中或募资超750亿美元，大A今天估计也有映射，

    太空光伏的HJT设备咱们讲过了。

    今天看市场情况，当强不强或者冲高回落可以T一部分。

    美股昨天的光通信不够强，大A今天要看罗博这个6亿大单的带动作用，大家过去说它只能拿几千万的小订单，现在它证明预期很大。

    早就和多次讲过要搞CPO的耦合和高端封测，它是绕不开的环节，技术图形自己看，产业上爆发还在后面，起码短期它在东南亚的订单外界还不知道。

    它对应的美股设备龙头上泰瑞达，市值超500亿美金，目前的市盈率在91倍，市销率15倍，你可以对比一下。

    光纤的涨价依然没有结束，数据中心之外的几大应用早就跟大家讲过，无人机，机器人，汽车。

    大盘和光模块今天可能走出分化，单纯从图形上看，光模块搞好几天了，主力这几天会不会搞下PCB?生益电子这种图，如果几个均线在进一步粘合下更好。

    前几天跟几个企业沟通，不少订单已经排到2028年了。

    今天要看机构格局了，继续往上顶，还是冲高回落做T把前天低吸的卖出去。

    看好基金重仓指数就行。

    补缺口

    一看日本韩国股市不行就知道大A今天的剧本要去补缺口。

    韩国股市主要是存储科技，全球科技一盘棋。

    光通信一看萝卜当强不强和基金重仓指数冲高回落你可以跟着做渣男，学机构尾盘再接回来。

    早上说了，市场不会v型弹上去，而是一个复杂底，所以这里就是跌了敢买涨了敢卖，大家都在里头做T。

    3800变成震荡中枢，围绕着上下波动。

    怎么做T？最简单的一种方式，这个标的得在箱体或者主线里头，先拿住一定仓位，

    机动部分不跌不买，比如-4%-6%左右，不涨不卖，比如+8%，+10%，当然早早涨停的除外（看好大盘根据形势来）。

    至于谷歌的KV缓存压缩技术，AMD早就提出过，目前还是学术阶段，也就对推理有用，相对有可行性的反而是用光纤直接传，不存了，这也是当时咱们强化它逻辑的原因之一。

    以前讲过。

    本周就这样了，预期下周剧本，先抑后扬。

    带孚的朋友今天表现凑合，仍是风向，下周还得看它。'
