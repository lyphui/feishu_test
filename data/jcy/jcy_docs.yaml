  文档链接: https://my.feishu.cn/wiki/YRXqwZJB0iMpHektDT2cb4eXnBh
  文档内容正文: "战略的本质，是对可能发生情况的判断和预案。本周的大盘又到了一个敏感点，会有两种情况。\n \n情况一：\n如果按b浪反弹的模式，上一次高点4258，低点3927，区间为4258-3927=331点。\n\
    那么反弹高点在：3927+331×0.618=4131点。\n上周五高点在4117点，空间也差不多。\n如果是这种情况，指数就要去回踩C浪，补掉4007甚至3923的缺口再往上，毕竟之前那段科技板块的调整，时间算不上充分。\n\
    \ \n情况二：\n在当前位置强势盘整突破，向上冲击4399，之后再走整理或回调结构。\n \n怎么判断会走哪条路线？指数到达4130/4150附近时，观察基金重仓指数，尤其是寒王、中际旭创带领的国产算力与海外科技板块走势即可；板块稳住就持有，板块放量杀跌则同步减仓。\n\
    \ \n绝大多数普通投资者应当收缩持仓范围，聚焦机构核心持仓赛道，也就是常说的通信ETF、科创机械ETF，科创芯片/半导体设备ETF，今日可布局半导体材料赛道，数千只个股里仅精选三十只核心标的。\n\
    以5日均线向上/下穿8日均线作为入场、止盈标准。\n \n适合进阶投资者的细分标的梳理：\n \n1. 国产芯片设备主线：半导体材料中报业绩兑现难度较大，芯片与设备板块内部轮动特征明显，可结合K线走势择机布局，重点关注回调至21日、55日均线后温和上行的标的。芯片板块若寒王走势坚挺，可关注芯原股份能否突破新高；箱体走势强势的标的，例如近期持续提及、主营探针卡且进入华为哈勃供应链的企业。\n\
    国产分支一：AIPC赛道，华勤技术、春秋电子等标的，遵循去弱留强思路操作。\n国产分支二：IGBT、MCU功率半导体，先进制程产能挤压成熟制程产能，持续看好思瑞浦、扬杰科技等标的。\n\
    2. 海外算力板块：受陈立武周末产业观点催化，玻璃基板、磷化铟相关标的存在行情机会，该板块此前已持续跟踪布局。\n玻璃基板方向：京东方为板块中军，弹性标的为布局打孔玻璃基板的帝尔激光；JPT等企业同样具备布局价值，这类标的容易走出破旗形态行情。\n\
    磷化铟代表标的：云南锗业，后排标的博杰股份；同时覆盖陈立武提及的三类第三代半导体材料的标的为长光华芯；金刚石散热片当前产业兑现尚早，风险偏好较高的投资者可小仓位布局沃尔德。\n\
    市场关注度较高的英特尔产业链核心标的为澜起科技。\n \n海外算力弹性中军赛道为MPO光模块，太辰光、博创科技为前排龙头，致尚科技、仕佳光子、奕东电子等标的轮动行情为主，板块出现大幅调整时可低吸前排龙头；与MPO产品实现柜内外互联的孚能科技持续看好。\n\
    海外算力存在预期差标的华星科技，企业转型成效显著，旗下投资的富创优越即将过会，富创优越为马威尔、AAOI等海外企业供应商，深度绑定光通信产业链。\n \n\
    从半年报业绩维度看，光纤板块业绩确定性最强，海外龙头藤仓上调产品价格，该板块可继续持有；为工业母机提供刀具耗材的企业半年报业绩预期亮眼，核心标的中钨高新、新锐股份。\n\
    \ \n中报季最先披露业绩的板块为锂电，亿纬锂能超预期的业绩并未带动板块上行，说明当前资金对锂电板块关注度较低；若AI主线行情走弱，锂电板块才有望迎来资金回流，届时可关注业绩弹性较强的昊华科技、德方纳米、天华新能。\n\
    \ \n市场核心主线依旧是光通信产业链，深耕熟悉赛道更容易获取收益；周末发酵的氧化MLCC涨价题材已持续发酵许久，当前入场性价比偏低。\n \n盘中高抛低吸操作方法：参考基金重仓指数，在4131/4150压力区间、4080/4060支撑区间观察主力资金买卖行为；指数实质性跌破4067且无法快速收回，则市场走势存在转弱风险。\n\
    \ \n以上均为短线战术操作思路，中长期战略层面持续看好AI基建赛道，行业发展仍处于早期阶段，目前市场上头部企业尚未大规模并购AI相关资产，说明行业分歧依旧存在。\n\
    \ \n今日整体偏向乐观，但操作仍需结合盘面走势判断，重点规避放量滞涨、冲高回落以及海外日韩股市拖累大盘的风险；若国际局势出现突发扰动，市场将再度迎来震荡调整。\n\
    \ \n摩尔定律逐步逼近瓶颈，陈立武重点押注三大新材料赛道：氮化镓、碳化硅、磷化铟，先进封装成为产业下一阶段核心突破口，三类材料均完成布局投资。"
