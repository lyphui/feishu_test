    上周末的解读是，

    井收勿，"有孚，元吉"。

    其实原意是，要搞开放的生态和心态，坚守诚信，长期利好。

    大家都喜欢问利好究竟有无模糊对应，

    老同学们都知道，天孚同学，

    这是第二次赏饭，第二次谈"有孚"了。

    当然，如果你纯靠这几句话就构成决策依据，

    那就是妥妥是拍脑袋，

    其实科学的原理是，上一轮高点366它突破不了后，通常要进行一番W型盘整，在521日长短均线紧密粘合。

    学过《三生万物》你就会发现它的案例极其典型。

    然而仅看个股是不够的，你还得看大盘和板块，又是一轮急跌基本到位后的反抽期，而它又是主要基金们的头牌，且前段时间旭创代表的光模块大涨时，它并未怎么参与。

    思考到这里，你就知道胜率相当大，早盘绿盘时候可以低吸了。

    决策是一个系统工程，背后都是算法。

    立体滚筒式前进

    市场的调整速度非常快，短短一周时间内从4258调整到4067，基本代表着派发行情进入尾声。

    什么派出去了？高位的半导体和国产居多，比如周末各种减持，5000亿放量那天很多量化和散户割肉了。

    上周四隔壁说过，基本一步到位，因为在55日线站住了，又回到了4.27日出发位置。

    那么什么板块会再起来？大概率是光，即提前调整的海外算力板块，普遍到了21日线的支撑甚至60日线，资金在本周有望重新开始新的布局。

    因此可以在这个板块逐步推高仓位。迎接新阶段，注意，逐步的意思是不上头，偏绿盘低吸，压力位要会高抛，回归真正的价值。

    比如，周末发酵的MLCC和CCL都只适合持有你就别追了（当然CCL粗看还有空间，给大绿可能吸），再比如PCB本B，各种科普你也别追了，要求稳就拳打脚踢的东山，200GEML尚未充分定价。

    要谈预期差你只能往上，博杰股份既有磷化衬底的概念，还能做mlcc的电性检测设备。

