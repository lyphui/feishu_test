  文档内容正文: '春季行情二阶段

    春季行情的下半段，书接上回，逻辑不变。

    一条还是设备，全球缺存储，美国把长鑫长存拉出黑名单，国产设备依然聚焦飞测，京仪，微导等为代表的"两存"供应商，列入观察大跌看机会的是珂玛科技，先进陶瓷的细分龙头，为两存扩产供应商。

    一条则是芯片，春节的AI大战后，人们意识到字节迟早自研AISC芯片，国内设计排第一的芯原，中国小博通，目前主要供阿里，但和字节合作可能性非常高，毕竟也没其他人了，且是海康威视龚总投出的公司。

    一条是AIDC大招标的数据中心和电源液冷等环节，比如东阳光，英皇等。

    机器人要高灵敏度，也要用光纤。

    这几个"前沿科技"和旭创代表的光模块主力通常成跷跷板，一涨则有一滞，如果放量，共同上涨。

    北美需要马上能发电的，那就上燃气轮机，高盛瑞银看好的东方电气，已经接到北美客户询价，业绩释放估计迟早的事，梳理出来的叶片龙头同时有商业航天概念的应流股份，依然会有机会。

    变压器的核心，取向硅钢。

    论弹性，20cm的是固态变压器金盘。

    还是那句话，不要上头追高，念啥经都能成佛，选自己看得懂手感好的，

    上述谈了好几个标的，是从5000家里反复优选的，因为标的是轮动的，各家都有资金布局，不像去年6月，搞两个抱团不用管，况且，不理解全局地图，根本搞不懂手里的标的为什么涨为什么跌。

    手艺一般搞etf，比如159381，大部分人跑不过它。

    AIDC是润泽，大位，东阳光等和智谱概念，大模型在大A只能搞AI应用，核心供应商，很多人把华为概念拉上去一堆，华为里只提华丰科技就够了。

    在4月的季报和年报出来，懂王过来之前，科技成长应该是占优的，尤其是那些概念居多业绩没体现的，之后可能大面积回归价值。

    目前的市场，科技虽仍是主线，但和周期(化工/大宗)等的轮动是明显可见的，都不要上头，让子弹飞一会儿。

    评论区：

