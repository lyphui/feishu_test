  文档内容正文: '大涨完后分化的原理与策略

    昨天表现不佳的是几个高位板块，包括光通信、光纤、医药，这些是大盘不好时大家抱团的方向。昨天资金流向低位板块，高位板块资金难以承接。

    低位科技方向，海外相关为光模块（如旭创表现优于天孚），其他如东山、联特等；国内方向包括剑桥，博创可关注是否延续1.6T预期；国产芯片与算力方向，如平半、寒工、杰毕特等。AI板块此前持续调整，昨日有机构资金入场，部分标的走出回踩买点，该板块波动较大需注意风险。

    低位超跌方向如传媒、商业航天，调整时间充分且具备题材支撑，航天受SpaceX上市利好，传媒受Happy Horse加持，其性能对标竞品，价格仅为竞品2.0的一半。低位超跌板块操作需注意，一旦涨势放缓或放量滞涨可减仓，涨势延续则持有，严格关注图形与箱体走势，跌破支撑及时离场，遵守操作纪律。

    今日观察光模块是否带动低位板块上攻，高位板块如长飞代表的光纤、光库代表的OCS是否滞涨，若出现该走势可调仓换股，跟随强势方向操作。高位板块需重点观察二线品种补涨情况，光纤方向关注通鼎互联、永鼎等，光材料关注东田等能否延续高度，光芯片关注仕家，设备关注科瑞技术（Lumument供应商），若二线品种走弱，板块大概率调整。永鼎具备光棒生产能力，光棒是光纤中技术含量最高的环节，拉丝环节技术含量最低。

    短线资金更偏好低位标的，中长期来看，季报窗口期过后，光通信仍具备较强预期，产业趋势明确，需等待一季报落地。昨晚美股LITE、高意、康宁表现强势，A股今日或面临方向选择，不排除前沿光通信继续走强。

    旭创走强代表光模块等业绩硬件方向强势，可沿光模块、PCB、连接器、液冷、电源产业链挖掘强势标的；天孚走强代表光通信等产业趋势方向强势，可继续关注CPO/OCS方向。天孚与旭创是市场选择业绩还是题材的风向标，天孚业绩远不及旭创。通常放量行情、临近业绩披露期，旭创表现更强；缩量行情、资金抱团题材时，天孚表现更强。天孚与旭创同步走强的情况也可能出现，需放量或资金从其他板块流入。

    光通信此前无对应ETF，机构资金入场买入旭创、寒工等标的，方向明确，国产算力可关注588200，海外算力可关注159381。电网设备尤其是燃气轮机三杰（可延伸至可控核聚变方向）值得关注，资金或偏好该中等热度板块，可观察标的海联讯（现名杭州汽轮）走势。今日大盘压力位4018。

    孚比创略强

    盘前提示：有量行情关注光通信，无量行情关注光模块；乐观市场行情旭创走强，悲观市场行情天孚走强；放量行情旭创走强，缩量行情天孚走强。

    开盘油价上涨、大盘低开，市场情绪偏悲观、成交量缩量至一千多亿，此时天孚走强概率大，可关注光通信及前期抱团方向。天孚阵营核心为FAU，光纤方向无需赘述，CPO/OCS产业链后排补涨标的如光库，仕家均线粘合多日，回踩走势形态经典。

    此前提示光纤新锐通鼎互联存在预期差，今日迎来反转机会。亨通、永鼎、通鼎均位于苏州吴江，通鼎产品质量与竞争力弱于亨通，非专业投资者不建议参与。长光若按5日平台理论，次日不宜跌破225价位。

    此前资金持续布局光学材料，今日天通、锗业表现良好，东田实现五连阳，福晶暂不看空。天通被某创持股49%，类似宁王与德方纳米的关系，具备2028年预期，同时涵盖商业航天、量子通信概念，自身也生产PCB。

    横跨商业航天与昇腾950预期差的航天电器逐步兑现利好，此前提示或分流华丰订单，目前已试制光模块，注意乖离值趋近50的风险。

    博创走出主升浪走势，按趋势看先看240价位，保守投资者可在230价位部分止盈，当前乖离值较高，涨势延续可继续持有，资金正博弈其1.6T预期。博创自去年五六月份开始关注，期间历经多次减持仍维持看多，至今涨幅达4倍。

    此前提示的某创目标价位700今日已触及，核心是产业趋势驱动。159381指数纳入博创、联特等标的，贴合板块核心标的。大盘层面，天孚与旭创同步走强时，其他板块大概率走弱，主线仍聚焦天孚与旭创阵营，晚间继续关注美股市场反馈。'
