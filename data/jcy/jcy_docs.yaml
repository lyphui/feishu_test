  文档内容正文: '生死有命富贵在天

    中国人最厉害的地方在于，把很多大模型用通俗易懂的语言让你明白记会。

    生死有命，是说生命有其本质和规律，你不能逆着来，比如每天跑两个7公里就是不科学，专业的运动员跑个5公里后都又是冰敷又是按摩的，你有啥？

    同时也告诫个体遵循自己的喜忌和感觉，忌火的不要再火旺年份折腾，喜水的多去北方和水边待着，远离让你劳累的，愤怒的，不平和的人和事。

    而富贵在天，则是人与外界的互动，天时﹥地利>人和。

    达则兼济天下，穷则独善其身，

    不是说你有钱了就去帮别人，没钱就龟缩起来读书。没马老师富就不能做慈善？

    而是说大环境好的时候，你可以大干快上搞格局，大环境有限的时候，减仓卧倒装死或者观望，富人穷人都一样。

    比如2022年那会，管你什么人都低调点。

    回到市场，目前就是动荡，肯定不属于“达”的环境，那就谨慎为上不要谈格局，

    昨天还讲市场可能二次探底，今天的可能性就很大，给自己留下再去3800甚至考验3731的余量。

    那有啥策略呢？跟着基金重仓指数就行了，留一定底仓的基础上，它干啥你干啥。

    主线弱反弹

    诚意有，但是不够，市场还缩量900亿，

    所以是做T的好时机，

    比如20%机动部分，在长给你-7%，长飞，天孚给你-6%，旭创博创博创给你-4%时低吸，尾盘或者则一个放量 的日子T出去，动态保持50%。

    市场的主线依然是光通信，比如CPO罗博，长光，JPT/OCS的三小龙，光纤说太久腻了。

    略稳一点是那个带()的朋友大家都熟悉。

    万然同学既然说了，多提一下光库科技，它主营的其实是光交换机的光纤器件和面对3.2时代的薄膜尼酸锂调制解调器，是做上游器件的，

    （薄膜尼酸锂和磷化衬底专门给大家讲过天通，云南业）。

    当年1700万美元抄底了美股上市公司捷普的武汉工厂，这个工厂原来是谁的呢，是英特尔的，做什么？800G、1.6T 光模块。

    也就是说它有光模块生产能力，捷普的厂子不大，改造后再加东南亚布局，年产200万差不多，市场没怎么给这块计价。

    咱们怎么知道？问就是跟英特尔的高管熟悉，intel是最早做光模块和硅光的大家可能不知道。

    但请注意，光库的波动率远超它那俩兄弟，只适合极度大跌低吸，做反了你很难受。

    最后贴一个信息，来自于招聘会展板。

    "城县人力资源和社会保障局联合商丘安捷讯光为家乡人民带来就业机会：现面向社会急招800名员工，福利好、待遇优，找工作的朋友别错过！

    安捷讯与多家世界知名企业长期合作，包括：Google、Intel、Broadcom；海信、海康威视、烽火通信；旭创、 Neptec、Datwyler等"。

    安捷讯是谁的人？

    想当年，光库可是牟牟的心头好啊，

    一转眼，牟牟变成了牟局。

    都保重身体啊同学们，最健康，最方便，最不累的健康方式，喝茶。喝三天就有明星改善。'
