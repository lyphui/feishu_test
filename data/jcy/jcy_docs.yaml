  文档内容正文: '博创买了什么

    博创父子是我们这轮春燥行情和谷歌链看好的中流砥柱，昨天博创准备4亿并购上海鸿辉光通科技。

    光通干啥的呢?

    以下是摘录:

    "面对数通新蓝海，光联应时而变，精准布局，除了可以提供性能优越的AI数据中心光模块用薄膜芯片外，还迅速上马了AWG封装、Z-block，以及AI数据中心LPO、CPO用"FAU+高精密V槽"项目，AWG封装、Z-block已向客户批量供货；

    FAU方面可以为客户提供普通PLC FA和高速RX/ TXFA，以及各种定制FA。

    同时，还可以生产高速光模块的核心无源部件MT-FA，MT-MT mini和MT-MT，并可根据客户要求定制各种结构的MT类产品，FA用V槽也可以定制化生产，满足客户的多样化应用需求"。

    技术具体做什么不用重要，我来解释一下这些领域都有什么上市公司。

    -薄膜芯片:涉及薄膜铌酸锂调制器等。光库科技、天通股份。

    -AWG封装:仕佳光子，博创科技本创。

    -Z-block:东田微、腾景、永鼎。

    -FAU(光纤阵列单元):天孚通信，光库科技(通过收购安捷讯)、杰普特等。

    -MT类产品(MT-FA，MT-MT等):太辰光。

    -高精密V槽:炬光科技。

    上述列到的都是好公司也都是在卡位的，

    说实话上海光通吹的有点大，上述这么多环节，你别说全搞了，你搞成一个市值就得翻一番，博创更不可能把别人都干趴下，

    但这说明，我们判断和从产业一线的分析趋势，光通信器件要往上游走，是没有任何问题的，产业资金后续还会不断加大投入，所以这段时间的科技，重点是盯上游，尤其是有涨价预期的上游。

    美股昨天的铟公司AXT大涨23%，在大A就是磷化铟(InP)板块，主要代表是天通股份，云南锗业等。

    市场主线和结构图谱

    大的板块是两个跷跷板，周期和科技，一升就有一降。

    1,周期的代表，化工，有色，工程机械，延伸下去就是建材家居之类的。

    -周期内部，金银和其他稀缺金属互为跷跷板，金银的逻辑是避险，其他的逻辑是"供给短缺"，比如钴，铜等。

    2,科技的内部，是海外算力和国产算力互为强弱(略有跷跷板效应)。

    两方的强弱，目前阶段不看业绩，就看消息和催化，今天有消息说国产芯片产能要扩大5倍，因而大涨。

    这个etf就是588710，微导，京仪，飞测等，昨天讲的新受益是珂玛。

    这就是国产设备的逻辑所在，先进制程的扩产。

    3,海外算力的内部，也是一个跷跷板效应，

    是新易盛旭创胜宏等代表的"集成商"和天孚，萝卜代表的cpo，ocs，硅光等"上游器件"互为跷跷板，xys和天孚，就是各自板块的风向标。

    -几个校花的中线业绩并无大的问题，有些同学欲仙欲死的宏妹，高盛认为的目标价是550。

    以前跟大家说过，我们在一线掌握的情况是，沪士电子27年的产能都已经订光了，而120层以上的板子只能宏妹能做，板子后就得穿孔，这就是鼎泰大族它们的逻辑。

    -cpo和ocs也无问题，催化因素是花旗发报告说节奏没那么快，这个板块已经涨那么久了，今天才算是第一次正经的分歧。

    4,这个大跷跷板之外，单开一摊子的是中登电力设备，变压器依然很稳，逐步扩散到燃汽轮机，叶片等，

    -最后再说下AI应用，属于泛科技板块，也跟周期是跷跷板，最近最大的问题是什么?美国AI鬼故事狂杀软件和服务公司，人们对它的未来产生怀疑。

    长线看属于情绪错杀，如果你看短线呢?如果13，21日跌破都没跑，34日线再跌穿且不拉回或者在这里站稳一个小平台，那就减仓或者走人相当一部分，看什么?看它在55日线是否稳住，站稳再买回来不就得了，耗费的是时间而已。

    美国的AI应用和中国完全不一样，老美的应用，本质是黄牛，我们天天喊着"不让中间商赚差价"，是能点单住店的，真应用。

    总体上说，都有机会，都不要以一两天成败论英雄。

    5,市场的主线，从纯粹的科技，变成了"科技+周期"的双轮驱动，你要么分配仓位，要么操作轮动，但切记不要追，一追两面挨打。

    -周期方面，如果你不想去小金属里追高，可以搞化工etf与工程机械的etf，其他的什么家居建材，造纸之类都能看。

    -科技方面，海外算力159381和国产设备588710是主力，你要追求弹性和技术好的可以去搞cpo和光交换机等。

    如果这几个跷跷板踩不动了，则可能把电池，光伏，商业航天之类的拉出来轮动一下。

    目前的地图和导航就这个样子，你在集合竞价和10点前后就能看出走势了，会玩的全天能搞的飞起。

    今天大A的科技什么都说明不了，就看明天早上，英伟达公布的年报和业绩指引吧。

    然后再看，大聪明们会不会又一次买预期卖现实。'
