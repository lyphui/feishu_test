  文档内容正文: '开门见山，科技必然是没有走完的，属于缩圈加分化阶段，尤其是前两天杀过之后有反抽需求。

    科技目前的独苗是谁？半导体设备，也是唯一咱们上周讲强行轨道未破坏的。

    叠加长鑫一季度归母净利润330亿，同比增长12倍催化，这是什么概念，一年1000亿，市值2万亿起步，涨到3-4万亿不稀罕。

    长鑫概念的兆易创新、合肥城建之类必然一字板，老朋友拓荆、华海清科、中科飞测、京仪等表现也不会差。

    高手可以看强一股份，已完成面向HBM的2.5D MEMS探针卡验证，华为哈勃也是股东，图形走势良好，不破5日均线平台为佳。

    还有一家同时是大普微和长鑫的供应商深科技，订单已经排到27年，这两天冲高回调，短线博弈需留意止损位31.31，即缺口支撑位。

    为长鑫长存提供配套服务、属于卖铲子逻辑的是中微公司，老板尹志尧和任正非同岁，也是老一辈归国产业报国的典范。

    半导体设备板块重点关注前期盘整一两个月、主力筹码充分、短期暂无出货空间、刚刚启动突破拉升的标的（参考214课）。

    相关ETF：588710，目前走势没有走坏。

    设备之外还有各类电子化学品，如安集科技等，这条赛道不如直接看氟化工，以多氟多和永和股份为代表，业务一端衔接新能源、一端布局氢氟酸，后续部分资金分流布局新能源及电力板块的概率较大。

    当然，上述标的若大幅高开切勿追涨，一致性过强的板块容易上演冲高回落走势，散户割肉后行情往往再度启动。

    海外算力板块重点关注CPU修复行情，尤其是内存池化方向，有资金意图复刻当年存储板块的炒作路径，具体品种不赘述；另一方向是硅光设备，美股周五大跌，但Tower低开高走，仅微跌2.3%。依旧遵循小仓位试探布局原则，冰点低吸，走势不及预期及时离场。

    当前市场具备承接力度的方向，最突出的是机器人和工业母机。

    板块龙头为绿的谐波，后续昊志机电等标的继续看好；峰岹科技主营关节驱动芯片，当前刚好守住5日平台，切勿跌破支撑。

    其余拓普、三花等老标的保持关注，遵循三生万物操作逻辑。

    机器人板块内最强ETF为159530。

    另一主线为算力网络建设，中国电信、上海电信推出Token流量计费模式，可关注资金是否挖掘AIDC数据中心相关标的。板块上周五已有抗跌企稳表现。

    AI应用方向重点观察Figma大涨能否持续带动易点、蓝标等标的延续修复行情。

    需要密切留意，市场轮动节奏极快，个股行情持续性不定，能连续上涨三天已属强势，相关标的当日也存在大幅回调风险。若要参与博弈，需小仓位试错，紧盯大盘支撑位和情绪冰点；卖出则在压力位顺势操作，跟随市场节奏，这才是博弈性价比所在。

    除此之外，电源设备、玻璃基板、IGBT等细分赛道均有轮动机会，今日市场修复行情大概率以科技、高端制造方向为主。

    目前市场尚未明确新主线，主线都是市场走出来、资金博弈出来，伴随事件催化逐步明朗。一个板块走出主线行情具备五大标志：

    市场处于转折动荡阶段，新手建议多看少动、管住仓位，不见明确信号不轻易入场；老手以低吸为主，小仓位分批布局，规避日内诱多拉升陷阱。

    近期大盘需考验4085/4060支撑区间，反弹有效突破4189且非银行板块护盘拉升，才具备企稳反弹诚意；操作上依旧遵从技术形态，不盲目格局，认清支撑与压力位，把握高抛低吸节奏即可。

    整体而言，对A股牛市行情依旧保持充足信心。

    今日大盘大概率走出低开高走走势。

    重点关注基金重仓指数，切勿盲目追高入场。'
