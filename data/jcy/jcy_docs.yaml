  文档标题: Vol.260131 易经第37风火家人:浪够了快回家
  文档链接: https://my.feishu.cn/wiki/OoVKw8pYhiMDBskja7lcEjaUnOg
  文档内容正文: '上一卦是地火明夷卦，夷是受伤，太阳落山了，

    你追高太空光伏和黄金被套太空了，

    被题材暴打一顿，受伤了之后咋办？

    回家呗，因为家是疗伤的温暖港湾，是心灵的栖息地，回去找老婆安慰你。

    这就是"家人"卦。家人们，这个词是易经里来的。

    家人。利女贞。

    象曰:风自火出，家人。君子以言有物，而行有恒。

    家人卦，像女子持家一样过好日子，是吉祥的。

    古代家里做饭，在灶台下面点火，风在上，火在下，烟囱就冒烟了。看到炊烟人们就知道这是个光景，这就是"风火家人"。

    女人，为女则弱，为母则刚，跟你谈恋爱时候，可能要买包逛街各种花钱，但真操持家庭了，就精打细算，不会乱来，每天给你热饭做好，照顾周到。

    君子看到这种景象，感悟到要接地气，要守正道，说话注意言行，不乱忽悠，做事要有准则和规矩，不能朝三暮四和半途而废。

    初九。闲有家，悔亡。

    象曰:闲有家，志未变也。

    在家中做好防范，不会发生悔恨的事情。

    古代院子的大门都是两片木头做的对开门，关上门后插上一根横木，象形字就是"闲"。

    无论是你带团队，搞事业，搞投资，一开始就要建立自己的投资纪律和风险控制原则，并且坚持下去"志未变也"。

    比如说你绝不追高，比如说你不碰题材，比如说你打野-8%一定止损，+20%就会走人。

    很多人一会一变，非去干自己不擅长的，还没有关门机制。没有规则的冒险，终会后悔。

    六二。无攸遂，在中馈，贞吉。

    象曰:六二之吉，顺以巽也。

    妇女在家中料理家务，安排膳食，没有失误，这是吉利之象。

    到点吃饭，按时做事，这就会"顺"。

    问题是很多人非不顺着来，上面说了要你别碰航天，你非要追高，说了是科技牛市，你不站在主线，各种追高，着急忙慌的。

    财富的增长，就像女人一天三顿的操持一样，看着一点不刺激，但这不就是慢慢变富？

    九三。家人嗝嗝，悔厉，吉；妇子嘻嘻，终吝。

    象曰:家人嗝嗝，未失也；妇子嘻嘻，失家节也。

    贫困之家，众口嗷嗷待哺，这是愁苦之事，但能辛勤劳作，可以脱贫致富。

    而富贵之家，骄奢淫逸，妻室儿女只知嬉笑作乐，终将败落。

    这就是中国版的财富管理之道，用我们的熟悉的话说，永远保持谦虚谨慎，不骄不躁的作风，

    你踏实奋斗，锐意进取，一定是可以出头的，你什么时候亏钱，是放松警惕，自以为是，觉得自己是个股神的时候。

    六四。富家，大吉。

    象曰:富家大吉，顺在位也。

    家庭内部的稳定，则会大吉大利，

    而吉利的原因，是体系合理，各守本分。

    要打赢仗，你得有一个稳固的后方，公司要上新的业务，你得有一个成体系的，运作有序的团队，各自能做好各自的事情。

    就像你搞投资，打野可以，但稳健型的选手，是不能拿主力持仓去冒险的，买入盘子太小，市盈率吓人的股票，

    哪怕慢，也要布局在绩优股和主线的方向。

    "顺在位"，就是遵守纪律、深耕能力圈，然后像滚雪球一样越做越大。

    田朴珺采访段永平，人家其实把真货告诉她了，"本分"。

    九五。王假有家，勿恤，吉。

    象曰:王假有家，交相爱也。

    以上说的是小家，延伸到外面的大家呢？道理一样的。

    君王治国就像治家一样，要主动化解矛盾，让人们都像一家人一样相亲相爱。

    《潜伏》里吴敬中说，没有人情味的政治是走不远的。

    你要有家长式的责任感和关爱心，带动和感染每个人，就像鼓励家中每一个人发挥他长处一样去搞治理。

    大王当时管理几千人的制造业企业，班子很大，人员很杂，层次众多，从高中毕业的到博士生都有，怎么办？

    把前任运营总监讲的"管理就是制度流程表单"那一套放一边，

    讲企业是三种文化，

    军队文化，令行禁止，学校文化，日日精进，家庭文化，互相关爱。

    上九。有孚威如，终吉。

    象曰:威如之吉，反身之谓也。

    领导者掌握杀罚之权，威风凛凛，权柄不移，恩威并用，且能够反身自律，终归吉利。

    家文化虽然温馨和谐，但也不是做滥好人的，家庭成员和孩子，包括自己，犯了错就得承认改正，确定好的行为准则必须一贯到底。

    管理既然是科学也是艺术，

    艺术在于，你可以有自己强烈的个人风格，比如谈吐，批示，开会模式等等，

    但科学在于，你是规则的代言人和一部分，必须忠诚于它。

    在你的炒股和投资中，有孚，意味着对自己的资金负责，忠实于自己的纪律和策略。不欺骗自己，不侥幸投机，必然能获得市场的奖励。

    你为啥反复在牛股上都能亏钱？不忠诚了。

    昨天有同学在评论区说，守着校花一个月，只是微红，小有盈利，

    这不挺好吗？有多少人挂在航天和白银上面下不来呢？

    投资难，但投机更难啊。

    既然这一卦，是利女贞，那如果单纯按这个"意象"，

    代表着下周小姐姐的收益应该不错。

    也代表着下周就是女方的海外算力和通信，要打一个漂亮的反击战了，

    在KTV里浪了快两个月，你终究是要陪正宫回家过年见家长的。

