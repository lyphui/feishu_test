    消费和科技，这两个板块上午拉起来的，说明有诚意，

    目前是家长反对，只能先作罢再观望。

    下周继续磨，年前就是这样的双轮驱动了。

    直到不管上涨还是下跌，有量能出来。

    四渡赤水，教员磨了军阀们三个月呢，咱们也不差这几天。

