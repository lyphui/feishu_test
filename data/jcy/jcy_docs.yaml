  文档内容正文: '关键在科技自立自强

    周一开盘前讲过，缩量情况下，是跷跷板效应，即科技和周期的双轮驱动。

    昨天科技如此大涨，周期并未猛砸，说明主力的心思和阵地是还在的。

    但要考虑两个情况，

    第一，昨天消息，关键在科技自立自强，你品品，这是再次强调主线。

    当然利好自主可控，或者说半导体设备，以及AI应用。昨天智谱AI的唐杰也参加了，此君清华计科系教授，博导。

    智谱的概念都有谁，

    股东-电广传媒，凌云光，

    合作-华策影视，

    算力-优刻得。

    云-首都在线。

    第二，昨天的美股继续大涨，英伟达冲高，LITE大涨4.6%，高意终于收复了所有跌幅，AI应用app大涨13%。

    利好海外算力，光模块等。

    尤其是罗博，炬光，杰普特等轮动涨的cpo(现在小机构又发掘了后排的燕麦科技)，天孚，致尚搞的FAU，校花校草等代表的光芯片，和ocs交换机那几个。

    过去一说科技，就是pcb光模块，现在玩新的，去年12月就说了，往上游cpo，光器件，ocs走。

    不会玩的，就搞etf不赘述，大多数人跑不过的。

    问题来了。到底切不切消费和周期，

    要看科技会不会放量滞胀，即你手里的东西，量能很大，但上不去，两三个点萎靡了，或者长上影线了，冲高回落了，尤其是注意下午。

    就比如说，通信etf之类，距离前高一步之遥，你能不能冲过去，还是说被他压制。

    如果发生这种情况呢？下午看资金的是否流入可分部分仓进入周期。

    比如，旅游酒店，家居建材，化工等。

    它们最近走势不差的。

    比如说呢，300的酒店君亭，明显沿着34日线一路走来后面有个宋城。

    做香料的新和成，搞家居的顾家家居，三棵树等。

    上午可能是要砸它们的，下午要看有无资金进入。

    科技如果全天强且放量，那可能就冲过金沙江，彻底完成四渡赤水，直接冲到过年决赛了。

    相比之下，我们一直希望，也看好，四强，尤其是谷歌链，应用/传媒，需求会稳步增长的AIDC之类继续走强，毕竟很多人仓位在那边，也坚持了这么久。

    切记祖训，不要追高。

    今天是演绎当强与当弱的重要一天，春节前是情绪和催化的战场，而非基本面。

    调虎离山，到底谁调动谁？

    机构你有鸡贼，你玩切换，你搞风格漂移，而我们站在C位的一边。

    跷跷板

    周一开盘就说，本周的剧本很可能是，

    科技涨两天，周期/消费涨两天，

    大家跷跷板轮动着来，

    所以你绝对不能追高，拉高了是给你卖的，砸了是给你吸的。

    -周期/消费的具体代表什么呢？酒店餐饮，家居建材之类。

    比如今早讲的，20cm的品种，君亭，宋城，其他顾家家居，三棵树之类的建材，新和成代表的化工。

    你看今天的情况是否如此，上午就能发现端倪了，天孚，xys.萝卜，一早就稍微冲高撂挑子，部分资金就跑去消费抄底"避险"了。

    如图一，上图旅游酒店，下图CPO，是不是跷跷板，发现节奏和真相没。

    -如果你没切呢？那就视为科技一个正常的调整，明天再砸了低吸，毕竟昨天涨多了，明显再看跷跷板。

    这两天的主题当然是传媒了，有点当年小deepseek的感觉，院线既然都涨，早上讲智谱合作的华策影视，又怎么能落后呢。

    -再说下丧标，它属于GEO板块，算AI应用，因为机构资金进去了，所以和大科技一起走的，和大科技比它不算弱了，嫌弱你就推了去etf或者语料。

    逻辑并无问题，即梦的视频做好了，不也得它推广营销。

    -后面踩空的资金会上车谁呢？

    一类是华策，奥飞娱乐之类的后排动漫，

    一类是AIDC和云，

    视频消耗的流量和数据很大，算力肯定是不够的，这个逻辑谈过很久，

    字节的算力，是润泽，大位，光环新网之类的，

    今天的彩蛋向阳而生，太阳东方升起，当然东阳光了，这个老同学们应该知道不用猜吧，咱们可是谈过它不少次，

    液冷元年，AIDC大年，

    它都有，早上就是等着它新高的。

    当时有同学问逻辑，记得回复是，又不是刘圣退股了怕啥。

    抖音也加入了红包大战，也就是说，你追求弹性，继续看语料，视频，追求稳一点，低吸AIDC就可以，过了这阵，它后面还需要。

    当然，前提是前排的捷成和中文不能摆倒。

    简单粗暴，不就是传媒etf？缺口处反复给了上车机会，传媒大年不是说着玩的。

