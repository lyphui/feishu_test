    今天还好，并没有放量。

    业绩和涨价，会成为这一段时间的主题，

    同学们在不同的行业可以谈谈，

    你那边有什么要材料，元器件，产品，上下游之类涨价。

    这就是彼得林奇的"身边投资法"。

    我先来，igbt要涨价。

