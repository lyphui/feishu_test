    今天的较大概率，早上可能有惯性急跌，跌到4150左右，极限会到4120附近补缺口再反抽，抽到4220附近可能叉有压力要回去，拉个小阳线是可能的。

    还在恋战的根据这个调整脚步，操作型选手就看好基金重仓指数，它的态度就是市场的态度，你跟着就行了。

    吃不准又无所是从的空出仓位或者观察两天比较好，尤其是今天和下周一，看资金要往哪个板块去。

    一般来说，高位的部分撤了后尝有两个选择。

    1，暂时离场，观望一下再来。

    2，直接切往低位。

    昨天的情况是，有小部分选择了2，甚至切去了更低的白酒建材，很快在大形势下管住了手。

    用好五日平台方法，在一个箱体内缓慢爬坡向上，不放量大涨更不跌破底部的都健康，你硬要玩就跟他们，一跌破箱体人，一放量大涨你不是利润？

    今天的重要观察方向，是资金会去进攻哪个中低位，连续3天以上，就可能成为潜在方向或者题材之一。不要怕追不上，它短短几天买不完，短短几天能买完的反而是让你接盘的。

    总结成一句话，密切观察今天抗跌，或者4150-4120区间先拉起来的品种，那起码是资金要护盘的方向，看都不会看的就别参与了等确定性机会，会玩的择其前排从之。

    ps，最后跟大家找了一些图形能看的，或者紫色位置可以试错低吸的一些图，仅供参考用来说明，【什么叫“还算健康”】，用来红你比对。

    超级高手可以根据基金重仓指数的走势，在剧烈下杀反抽后轻仓试错，不能跌破箱体，普通人不建议。'
