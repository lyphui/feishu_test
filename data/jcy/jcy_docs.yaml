  文档内容正文: '观望和等待光明阶段

    难，都难，懂王，伊朗，美股，大A都难，不可抗力。

    战争中的市场通常都是3个阶段交易，

    1，交易冲突，油气替代等强化，

    2，交易滞涨，上游和大宗猛涨，但下游跟不上，股市也走不动，目前是这个阶段。

    3，交易机会，寻找错杀，要等美伊和来华明朗，

    那么，周期+科技的双轮驱动，就会快驱不动了，很容易老登小登你一天我一天，追进去隔天就挨打。

    驱不动还记得我们之前讲谁拎出来呢？新能源之类的中登，比如储能，风电。

    它有望在尴尬脱毛期稍微扛一扛。

    风电谈过了，储能目前的低估品种是阳光，市盈率不到20倍，大储本身是龙头，数据中心拓展顺利，风电逆变器也是行业领先。

    目前这个位置，就得看逻辑，牌没有问题。

    中东油气危机下，在欧洲布局户储最多的不是德业，德业是亚非拉，而是固德威，澳洲第一，欧洲强力复苏。

    储能的核心是电芯，游资和弹性喜欢搞鹏辉，海博思创和亿纬是机构式图形也就能博个一锤子。

    而电芯基本是磷酸铁锂，咱们讲过云天化，磷是化肥，弹药，对日制裁，正极材料，给缺口处位置低吸而不跌穿34最好。

    中东因为产油，副产品硫磺占据全球70%的出口，学过高中化学你就知道三酸两碱靠硫酸，没有它你很难生产磷肥，云天化也是高端磷肥，全球春耕开始了亲。

    那么氮肥呢？煤化工华鲁恒升。既有煤制油，又有尿素，氨。

    周期的概念本周有可能走到煤化产的农药化肥电解铝（看期货）之类。

    再说到科技，

    3月16-19日，英伟达GTC大会，

    3月17-19日，全球光通信OFC大会。

    GTC大会利好当然pcb液冷之类，看他们是否撂挑子或者当强不强，

    英伟达联合沪电已启动测试M10级CCL材料，利好菲利华，当然太高开不看，如果给砸一下更好。

    最近当然是不追高看错杀的，

    液冷方面，业内传说飞龙坐地起价可能进不了英伟达，这种行情下你说信好还是不信好。

    整体两个都利好的，当然是光通信，

    就是cpo/ocs，不断去弱留强，观察风向标就是天孚，天孚稳了科技才会稳。

    成长的板块要看日韩，日韩低开涨起来，大A放量涨，可以拿科技，日韩低开低走，大A缩量跌，可跟着基金重仓股指数做渣男。

    当油价当强不强，油气已经不涨了，

    当科技当弱不弱，科技对战争麻木了。

    就可以提高仓位等大盘就走出来了。

    进场了但不坚决

    之前说过4055是支撑位，还是拉了起来，跌破就击穿4000了。

    早盘就能看出，低开后砸盘后是在放量拉升的，尤其是基金重仓指数。

    这就说明主力在入场，但下午放量又缩回去了，入的不坚决还不够大。

    那就只有前排，缩圈，催化的能看，

    比如，机构想做多就拉国产半导体既是习惯，也是华虹说投产7nm，

    比如，汇绿化工陨落之后，二线光模块的东山，剑桥，

    GTC大会的液冷，英皇也是支棱了一下，弹性大的申菱表现的凑合了，因为它主要是国产，催化可能是月底的华为会。

    光通信今天并没有怎么发力，光通信会明天才开，腾景德科立都是揉搓状态，继续看好长光，他的互动问答隐约验证了大王早先验证的消息，但估计看的人没几个。

    不看空周期，别看今天大跌了，反而建个仓的机会，现在的关键是筹码位置要低，咬口肉先走点，猫一天狗一天的。

    旭创基本确定了一个506的箱体底部。

    港股已经先有点企稳的态势了，老外的钱是真来了。

    这个区域就是机构的“吸筹走廊”，所以你难受。

