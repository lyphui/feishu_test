  文档内容正文: '当强与当弱

    目前市场最热的板块两个，

    国产半导体与商业航天。

    昨天商业航天又出了海上回收的消息，

    那它是当强。

    昨晚美股的LITE，高意等大跌，对应光模块和海外算力，那它是当弱。

    今天看当强的有没强，当弱的有没弱。

    当然这些都是情绪，

    大盘短期是情绪阶段

    （海外几个硬件大跌，是中国替代太强）

    商业航天筹码峰发在了隔壁，目前没有看到主力出逃的迹象，但分化严重，龙头轮番换，高位看图形，图形没坏继续拿，尤其是多题材的。

    比如航天+电源，航天+FSD等那几个，相对于其它简直没涨过。

    恐高又相对低位的在哪里？

    前几天反复提过的，

    -AI应用（传媒），谷歌已经历史新高了。

    -AlDC数据中心，昨晚美股的万国数据大涨

    8%，叠加H200入华预期，这个板块有资金流入。

    -可控核聚变，第一轮的游资撤走后，机构开始进场搞第二轮。

    这几个就看龙头，资金刚去是也是打出情绪和空间。

    昨天还跟明天幸福在谈广州的航天公司，晚上就出消息了。

    广州我就熟悉个海格，年后开盘前给你过大家了，

    其他本地人有熟悉的吗

    百花齐放

    口诀都记得吧，

    当强不强则为弱，

    当弱不弱则为强。

    昨天商业航天一顿利好，今天当强的，有些掉队了，

    这个板块完当然没完，后面会去伪存真，机构逐步入场，撇去浮沫买真东西。

    金风连续拿4个板，就是机构审美。

    瀚讯今天全程强势，之前也是大资金逐步吸货的走法（图3），我们讲它相对中国卫星简直没涨，

    北有国网，南有千帆，绝大多数人其实不知道这个信息。

    这个行业其实就一句话，

    我们之前讲过的，

    “所有的公司基本都是给国网星座和千帆（垣信）干活的”。

    个人觉得，长期看国网不一定干的过垣信，上海的市场能力更强。

    你可以搜一下（智勇，看它以前的工作单位。

    我们要看到一个什么迹象，很多大资金去哪了，

    正是早上讲的三个板块，

    -AI应用/传媒，引力传媒，同学们自己挖掘的，我昨天讲过了吧，盘整8个月就为个涨停？你要是《三生万物》多看一遍，昨天不会卖的，

    蓝标（谁给起名的叫丧标啊）猛涨，易点天下20cm历史新高，

    反复提示过传媒的战略性机会了吧？

    大林你的易点天下还在不在？

    字节会赞助春晚，豆包概念是有搞头的。

    -AIDC,，核心的是谁，字节供应商润泽，1000多亿盘子给你拉快涨停，机构干的。

    东阳光老朋友了，全资收购了秦淮数据，这可是刘圣布局的公司，大资金在里头长远玩的，它的产业逻辑不赘述了。

    -可控核聚变，不就是合锻那几个，再不会最简单是永鼎，左右光芯片右手核聚变。

    至于海外算力，天塌不了，很多不在踩了34日线拉起来吗？

    lumument你不行了，是因为源杰，永鼎，长光之类的起来了，

    易中天之类的虽然审美疲劳需要在这里震荡，但光芯片，cpo，比如萝卜等人，因为盘子小概念多，还是有人青睐跑的更快的。

    国产芯片昨天就说当强仍强，寒王就差一个小作文和催化了，给大家找的低位芯原也不错。

