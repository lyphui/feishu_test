    昨天中际旭创业绩表现亮眼，同时召开了业绩电话会，即便不参会也能明确几个核心要点：

    美股AXT大幅上涨，国内对标标的为云南锗业，也有观点认为ST京蓝受益程度更高，该企业为东北地区ST上市公司。

    当前光通信板块的行情格局，与当年新能源赛道高度相似：中际旭创类比宁德时代，新易盛类比亿纬锂能，中孚信息类比阳光电源，联特科技类比鹏辉能源。

    整体行情剧本为：核心标的上涨后，行情向上下游两翼扩散。

    宁德时代大幅上涨后，行情向上游锂矿、正负极材料扩散，催生天齐锂业、赣锋锂业、璞泰来等标的；向下游锂电设备扩散，催化先导智能、杭可科技等企业。

    光通信赛道逻辑完全一致：上游为INP旋光片、光芯片等材料环节，中游为光模块环节，下游为各类耦合、贴片、检测设备环节。

    OCS（光交叉连接）定位类似当年新能源赛道的高镍三元锂等技术催化方向，谷歌计划推进的内存池化技术，将进一步大幅提升OCS的市场需求。

    历史行情总是相似演绎并螺旋上升，完整行情剧本已清晰呈现。

    Lumentum昨夜股价走强，今日有望带动孚系标的行情，该板块已调整多日，光通信板块本质上是中际旭创为核心的配套行情。

    市场情绪极度亢奋的阶段，往往距离阶段性高点不远，或迎来板块分化，切勿过度追高。

    创业板七大核心标的（易天股份、中际旭创、天孚通信、新易盛、中石科技、光库科技、东田微）成交额已占板块半数，市场拥挤度处于高位，当前呈现五阳逼一阴的逼空走势，下周需密切关注市场风格是否切换。

    美国针对光模块领域的扩产相关法令，主要影响环节集中在测试环节。

    打开天花板

    市场几乎完全按照咱们预设剧本，

    1，先是弹性补涨，

    昨天宁王爆表，弹性大的是谁，鹏辉。

    今天旭创业绩爆表，弹性大的谁，联特，以及博 创之类（四大谷歌光模块）。

    早上讲了，联特≈鹏辉。

    2，再是两翼展开。

    上游是长光代表的EML芯片，天通锗业代表的衬 底，下游是科瑞凯格等的设备。

    秀秀

    上游当然比下游强，技术含量高很多，但下游人 们还没多关注。

    设备里强的就是科瑞了，小lite+小萝卜，之前乖 离高，然后连续3天给了调整。

    昨天谈光为的光模块设备，我只能提醒到深圳的 厂商，多了不好说呐，就跟长光没公布的大订单 一样。

