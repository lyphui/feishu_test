  文档内容正文: '双轮驱动

    昨天美股大涨的就两个大板块，

    用我们的话说，

    科技+周期。

    英伟达给lumument和coherent各自投20 亿美元，这两家公司咱们可都谈的都包浆 了吧。

    投资的目的是什么，确保光模块上游尤其 是硅光产能，加快推动CPO.

    lite对应谁？主要是硅光的几个，源杰，长

    光华芯，仕家，永鼎。

    源杰当然是龙头，校草，如果你觉得仕家 战线太长，永鼎昨天减持，那么业内尚不 知道的消息是，

    长光的CW光源获得某大厂认证。

    coherent呢，主要是光模块，竞争对手是 旭创，国内最大供应商之一是武汉均恒， 上市公司是汇绿，有同学嫌人家名字不好 听。

    AAOI再次大涨21%,对应二线光模块，汇 绿，剑桥等。

    CPO是英伟达要加快推进的技术，核心当 然是萝卜，后面还有杰普特等人，当然讲 过小机构发掘了后面的燕麦科技。

    萝卜已经获得校花在泰国工厂的产线订 单，这个也是我们独家了解到的消息。

    CPO板块注意乖离率和图形自己看，容易 暴涨暴跌。

    然后说下周期，这两天涨的是油气，

    错过了油，可以看天然气，比如广汇，天 然气也赶不上，那可以看煤炭，煤炭就看 兖矿能源，它在澳大利亚有矿，

    油气煤适合高手看，如果都嘀咕，那看炼 化设备，昨天开盘前讲的jerry股份，昨天 美股石油设备也是大涨。

    上面也都赶不上，还是化工，之前咱们， 从TDI代表的万华，云天化代表的磷化工到 金牛代表的甲醇等谈了个遍，

    后面还有谁，新和成代表的香精和维生素 原料，咱们可是全网最先发掘的，我们了 解的情况也是有涨价预期的，同学们熟悉 的问问家属。

    继续看好光。

    躲不了十五

    本来上午大A还试图雄起，韩国股市熔断，直接带崩市场。

    资金都去了油气，

    周期+科技的，咱们点的几个核心的萝卜/长光，能源的广汇，煤炭的充矿，香精的新和成，都还不错，至于jerry，被燃气轮机也带下去了。

    其他没什么说的，市场趁机释放情绪，遍地错杀，

    下探结束了吗？当然没有。低开不是底，二次探底才是底，明天估计还要恐慌性的释放。

    那可能会跌到什么位置呢？

    今天击穿34日线，抵抗的位置基本是55日线的4045左右，跌破4000的概率很低。

    也是服了生产队这些人，韩国跌是美帝要撤走防空导弹，我们的红旗系列都多的过剩了。

    收盘后要开发布会了，等会议的内容吧。

    今天放量大跌，大跌是好事，杀出恐慌盘，恐慌后才能涨的更狠。

    明天要开正式的会议了，

    四个字送给生产队，

    守土有责。

    你总不能还不如波斯人吧。

