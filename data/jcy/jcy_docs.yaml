    如果错过了鼎泰高科，苏州的PCB钻针商是新锐股份，目前估值并不贵，之前也讲过它屯了大量的钨，分批次建仓比较好，它喜欢走破旗翻，搞不了的还有个中钨高新，整体上，钻针今年还是非常缺的。

