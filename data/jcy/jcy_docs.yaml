    第一条智慧：

    学会翻篇，沉没成本不参与决策。学会"实事求是"。

    九二。利贞，征凶。弗损，益之。

    象日：九二利贞，中以为志也。

    长期有利的东西，如果贸然行动也会有凶险。此时，不损也不益，保持现状就是最好的策略，

    我们的教育以前很少会教人"灰度思维"中间决策"，

    导致很多人在操作和做事上，要么满仓，要么空仓，要么激进，要么悲观，就喜欢走极端。

    而没有学会中性仓位，观望事态。

    在感觉时机不成熟时，既不肯定也不否定，既不支持，也不踩他，

    只做试探性进攻或者观望，待形势明朗后再下注或者跟进，一把锁定胜局。

    过去有多少好事，好人，好股票，本来可以好好走下去，结果因为你的激进，冲动，太着急，反而弄巧成拙呢？又有多少人，创业和做项目的时候用力过猛，结果拔不出来了么？

    第二条智慧，

    学会中庸状态，永远留有余地。

    六三。三人行，则损一人；一人行，则得其友。

    象日：一人行，三则疑也。

    三人同行，会损失一人。一人独行，朋友自己就来了。

    三个和尚没水吃，因为没有主心骨，一个人做主反而能凝聚众人，因为你担起了事情。

    之前星球里不少同学问，朋友邀请他做生意，和朋友开公司等等，

    无论是社会学还是经济学，我们都不建议。友谊，不能明算账，去中心化，而商业，必须明算账，中心化。你要在创业和发展的过程中去交朋友，而不要和朋友去创业。

    否则，大概率反目成仇，人财两空。

    多少人栽在这个上面，强如苏宁，觉得和许老板关系好，投下去200亿打水漂。

    第三条智慧，

    不要考人性，少和朋友做合作。

    象日：损其疾，亦可喜也。

    能认识和改正自己的缺点，能让过去变成过去，这也是好事啊，没有害处。

    什么叫成长，成长就是你不断克服自己最大的弱点，不去美化没有走过的路。

    "悔以往之不谏，知来者之可追"。

