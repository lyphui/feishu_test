    GPU、CPU、云服务、存储、MCU，都在涨价。

    题材的狂热逐步过去，市场回归“有业绩预期的故事”和“业绩的本身”。

    看看美股就知道

    这段时间，就是要不断去弱留强，腾笼换鸟，把资源聚焦在最核心龙头。

    怎么看出核不核心？都跌的时候它扛着，都涨的时候它大涨。

    你说你不会看？不是专门说过ETF吗。90%的人跑不过etf，你非不信。

    515880今天有望冲击新高，搞通信它非常纯。

    还有个搞笑的事情，159381本来全是硬件，然后它把里面的全志科技，软通动力等阿里系华为系的标的全扔了，最新买入咱们天天讲的蓝标，协创，润泽等，一水决赛圈阵容。

    继续看好AIDC和云服务，没有它们，哪来的AI应用呢？迟早算力也要涨价。

    最近扒拉了好几个etf，都把标子弄进了自己持仓，虽然比例不算大，但它是创业板指数股，说它是科技也行，是软件也行，是消费也能沾边，文科生就是百搭。

    既然大家都要涨价，半导体设备也要涨价，所有品种芯片的涨价，也是预期，etf不赘述了吧。

    （目前这种行情，绝对是不能追高的，很多人都没明白压盘对你来说意味着什么：

    别人吃完加速你再追进去不就傻吗？

    今天要检验海外算力的成色了，如果板块大涨，而它高开低走或者萎靡不振，开除出法国队。）

    当强不强和当弱不弱，最后一遍给大家复习。

