  文档内容正文: '据说谈的很乐观

    昨天白天大A还交易海峡关闭呢，晚上伊朗代表团又宣布去谈判了，刚刚懂王又说谈的不错，

    看昨天的美股，但除了存储强之外，其他看点不多,lite是8个点冲高回落,coherent也被带了下来。

    大A今天的光通信可能会分化，看“传统硬科技”板块顶上来的预期，比如交易4.22-4.24谷歌大会。

    GoogleCloudNext''26将于4月22-24日举行，或将发布新一代TPU架构。

    谷歌链我们都熟悉的，去年10月份搞现在，长飞父子是中坚，其他的光模块(旭创xys),pcb（沪电），连接器（博创，液冷电源（olt英皇中富等）都明牌了，现在看图就行。

    谷歌一直要搞掉韩国人的“内存池化技术”是通过近端DRAM服务器加OCS组网，将部分昂贵的HBM需求转移至成本更低的DRAM，形成分级存储体系，OCS玩家我们熟悉的。

    光库真是捡个大便宜，1700万美元买了武汉捷普，自带给谷歌做整机的code和技术。

    之前跟大家讲过谷歌还要用3D堆叠光纤取代推理的部分HBM存储，这是下一步。

    亨通没有长飞强的一个重要原因，是长飞有个谷歌爸爸（当然不是让你追高光纤）。

    谷歌主打ocs，英伟达的优势是cpo，都要拉扯到2728年。

    这两天国产半导体，尤其是华为链，设备等都有资金进入，看今天能不能支棱一下，光材料毕竟板块小，带动效应不强。

    还有一个大家忽视的新闻，一是Meta给corewave210亿美元的算力中心订单。

    “24年要看懂英伟达，25年要看懂谷歌，26年要看懂meta".

    meta的那些光模块pcb等和英伟达高度重合，某创还是首席供应商，东山的索尔思也在给meta供800g，预期差么剑桥科技谈过了，箱体底部98.8.

    之前有同学问美股，我们看好的几个，是lumument,康宁，安费诺,meta给了康宁60亿美元的光纤订单要求保供，康宁自己是做不过来的，

    国内的代工交给谁呢？长飞，通鼎，特发信息，最近的通鼎和特发就是补涨概念，飞哥3000亿，那哥俩才200亿。

    JPT跟meta也有合作，以前主要是眼镜。其他的供应商和预期差么，在托前高管在问，

    同学们有知道的也可以谈谈。

    ps，最后说一个行业故事，光模块行业早期根本没旭创啥事，刘圣还在美国读书呢，垄断三巨头，北有光迅，南有飞通，西有飞博创，堪称黄埔军校。

    飞博创和台湾Luminent合并，变成了索尔思，然后被基金卖来卖去，直到被东山的老袁全资收购。

    新飞通则卖给了Lumentum.

    飞博创和xys都在成都还离的不远，个人认为，它没有收购索尔思是个遗憾。

    创比孚强 感谢助攻

    还记得那个的公式吗？

    缩量涨孚，放量涨创，市场不好涨孚，市场好了涨创。

    所以今天旭创代表的“传统硬科技”光模块pcb液冷电源等阵营的要好很多，

    而抱团光纤光通信（cpo/OCs就承受压力了。

    产业链的延伸讲过多回，前几天专门谈均线粘合的pcb生益电子，有两天没涨有同学就急了，今天不给你涨出来了吗？胜宏也是一样，后排的液冷跟着补涨，就是这个逻辑。

    光通信直线拉涨啥原因呢，下午刚开盘lumument的ceo出来讲话，说产能售罄至2028年，感谢助攻，拉高了正是给你出货的，卖飞了也不怕，你不还有一半仓么。

    按理说，lite老板出来讲话，罗博之类应该硅光应该直线拉涨停，然而呢？这不就是“当强不强”，机构反而坚决的进攻了创条线，为啥？位置低啊。

    孚的压力位之前讲过，336,344,366,今天如果你会玩，365止盈部分,perfect.

    创，目前看10000市值是压力位，话说咱们N久之前讲这个时估计大多数人不信。

    燃气轮机这几天也不错，今天算是没有压盘走人的，这个板块咱们也是经典指引，BIAS50时高抛，回踩55/60时买入。

    你说哎呀这个好难把握不住，买不了688,300,有最识趣的压岁钱概念etf159381.

    其实这一轮你什么都不干就盯着它，账户也跟着历史新高了。

    再回头看一下校花16倍pe时咱们讲的逻辑，那会才366啊亲。

    大家周末快乐，预期下周后半周，好多尤物能给你买~。

    大王的MBTI:ENTJ.

    南院大王

