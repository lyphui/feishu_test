  文档链接: https://my.feishu.cn/wiki/SSnAwQdXYiI59akuoRvcjxqonQe
  文档内容正文: '佩服先贤的智慧，果然是艮，是止盈，停止，是知止不殆，但也是某个新阶段的平台

    随着中报季的来临，部分资金开始撤出那些预期性“卡点”的领域，转战有业绩的方向。

    业绩最好的光纤当仁不让，错过了长飞还有亨通，错过了亨通又谈了通鼎，错过了通鼎又讲了新龙远东，切糕的故事都给讲了，还是没赶上，说明无缘。

    其他还什么人有业绩呢？龙头。比如国产的寒王，海外的旭创，那么多AIDC里唯一真有阿里订单的协创，以及锂电的定海神针宁王。

    当然少不了券商，科技牛这么久，他们业绩赚爆了，有资金做很正常。

    其他盘子太小的，挖掘起来有难度，要看27年28年爆发的品种，可能就会受到短期冲击，资金干脆连盆带水一起泼了。

    就比如说博众这种，趋势和方向没有问题，中报预期也非常ok，属于泼水式错杀，还有萝卜本博，技术确实好，问题是订单才刚出来，业绩可能又miss，有些资金先跑为敬。

    如果在往常，这会形成什么局面？冲高回落，高低切换，或者缩量下跌，又是一地鸡毛。

    但问题在于FOMO资金太多了，有些人半天上不了车，趁今天像样的调整，毅然杀入，于是市场互道（），放量上涨。

    这些新进来的机构的钱，不在乎中报如何，哪怕跌了也认，反正要的是一个上车。

    所以我们讲今天的低点是4070，那会要看基金重仓，果然严丝合缝机构大量买入科技，那你跟着抄就行了。

    如果还担心分歧过于巨大呢？

    -对于短线选手来说，用最高级风控，图没坏就依然拿着，跌破5日平台或者MA8走人。

    -对于产业选手来说，这是正常的震荡，起在将来新高的过程中，这一个多礼拜的震荡是沧海一粟。

    so，以下重点思考。

    破位就走，没必要硬扛着很对，

    根本不在乎一城一地的得失也很对，

    卖可能卖飞，

    留可能回撤超出你想象。

    要想清楚你是什么样的人，晚上能睡好觉才行，别骗自己，更别左右横跳。

    短线严丝合缝和长线拿住牛骨，

    此事古难全。

    谨慎的同学短线流也可以有一个选择，只拿业绩大票或者在ETF高抛低吸，仓位降至5成左右观望错杀或下周的机会。

    如果要以年度去展望，回调是好事，科技连山脚下都没到。

    现在的市场，你怎么做，不取决于业绩K线基本面，取决于你信什么。

    如果要简单粗暴的定义什么叫业绩，

    能赚美元者，乃是真男儿也。

    你在体质里待过或者有朋友在地方搞招商引资就知道了，$饥渴，每年都有指标的。'
- record_id: recvnbHA4ENZ5l
  文档标题: Vol.260621 易经第52艮：止于至善
  文档链接: https://my.feishu.cn/wiki/SbKpwIQTpiQPEHknzRfcU9KMnKV
  文档内容正文: '杭州市里有个地方叫艮山，以前有个艮山门。现在依然有艮山桥，有艮山东路，艮山西路，立交桥很堵的地方。

    艮( gèn)是什么意思？是土山，是停止。

    上一卦震，狂飙突进，电闪雷鸣，经历了剧烈变动之后，人们该赚的赚了，该干的干了，这时候需要停下、休息、冷静，卖出，有所不为了。

    所以震卦之后紧接着就是艮卦。

    艮其背，不获其身。行其庭，不见其人。无咎。

    象曰：兼山，艮。君子以思不出其位。

    停在他背后看不到他的面容，行走在他的庭院找不到他的踪影，他挂笏隐退，泛舟江湖，远走高飞了。自然没有灾祸艮卦的意境，是山叠着山，凝重不语，沉默渊深稳重。君子观此卦象，以此为戒，知止不殆，明哲保身，不该做的就不要做。

    初六。艮其趾，无咎。利永贞。

    象曰：艮其趾，未失正也。

    控制自己的脚趾，在脚趾迈出之前，若发现错了就该马上停止，这样就不会有过错，因为你还在正道。

    一方面，人是不能胡乱给自己开口子的，这次开一分，下次开十分，医生说你不能喝酒，你说就沾点红的，结果一喝，白酒也上了，后面拎壶冲，直接送医院。

    另一方面，聪明的人要是擅长从重大细节中发现问题，提前止盈，抓紧离场。

    比如2015年那波牛市，完全是各种配资和杠杆炒起来的，当年发现上面出台了严查伞型信托和信贷资金的新闻，就知道得走了。

    历史上的著名案例，是箕发现纣王让人做了一双象牙筷子，他去劝，纣王不听。

    箕子回去后，立马抓紧润的的动作，因为纣王换了象牙筷子，后面就会配玉石杯子，整锦衣玉食，大修宫殿，必然横征暴敛，诸侯背叛，能有个好？

    后面果然武王伐纣，天下大乱，而箕子早就把族人家产转移到了辽东了，建立了“箕子朝鲜”。

    知止的第一关是严密遵守纪律和逻辑，早发现早治疗，不要有侥幸心理。

    六二。艮其腓 (féi) ，不拯其随，其心不快。象曰：不拯其随，未退听也。

    腓，是小腿。

    控制自己的小腿，看到别人都在往一个方向去，你不跟着，心里是不痛快的，是很难退回来听取正确意见的。

    人们有两个人性弱点，一个是从众心理，别人都干了你没干，心里感觉空荡荡的，会孤单失落，怕被时代甩下，缺乏安全感，一个是攀比心理，本来一起躺平的好好的，兄弟开上路虎了咋整。

    到现在都经常有人问大王，自己要在哪哪开一个咖啡厅，自己要做燕窝生意了问有什么建议，

    问她们为啥开，因为闺蜜/朋友/同事开这个都赚钱了，小姐妹一聚会就自己没个营生，不是老板。

    问题是别人做跟你有啥关系？她们能成的要素你有吗？况且她们真的赚钱了吗？

    因而大王开玩笑式的跟她们讲，美容院/咖啡厅/茶室/幼教/花店/民宿/瑜伽房/，总有一款适合你亏，你选哪个？

    知止的第二关是摒弃群体意识，众人≠真理。

    九三。艮其限，列其夤（yín），厉薰心。象曰：艮其限，危薰心也。

    限是腰部，夤（yín）是脊背两侧的肌肉。

    控制自己的髋关节，脊背的肉像撕裂了一样，内心像火烧火燎一样。

    “利欲熏心”就是这里来的。

    看到别人都赚钱了，看到别人都在冲了，看到别人都考公上岸了，自己条件比他们好，能力比他们强，凭什么不行，

    当有人再把创业和合作的机会送到你跟前时候，你火烧火燎的想行动，

    这时候如果喊停，你难受不，摁得住不？

    但成年人怎么能被一时脑热和荷尔蒙控制呢？你想想过去，有多少只花了5%精力决策却花了95%精力去捞起来的事情?

    一时冲动，买了那个房，

    一时冲动，开了一个店，

    还有一时冲动，英国人脱欧了。

    知止的第三关，是摁住自己的冲动。

    六四。艮其身，无咎。

    象曰：艮其身，止诸躬也。

    控制自己的整个身体，不要继续往下做越格的动作了。

    有时候事情已经发生了，棋盘已经开局了，都已经错了，就不要再继续扩大，把性质给弄你不可收拾了。

    中国人总喜欢来都来了，小饭馆脏乱差，强行吃吧，跟老板吵一架，回去还肚子疼，

    中国人还喜欢将就过吧，本来处起来就不愉快，因为没有太好的选择，强行再一起，最后弄的撕破脸很不体面。

    知止的第四关，是不要将错就错被惯性推着走。

    六五。艮其辅，言有序，悔亡。

    象曰：艮其辅，以中正也。

    辅，指脸颊。

    控制自己的脸颊，要讲话分寸有条理，不要随便乱说话。

    有的场合，你一开始就知道不该来，

    但是脚控制不住，腿控制不住，腰控制不住，身体控制不住，最后还是来了，

    来了就最起码把你的嘴巴管住，不要乱说话信口开河。

    最经典的案例就是马老师，陆家嘴论坛那是你该来的吗？没有你也不会缺什么，但你非要来，来了就乖乖的，非一通乱喷各种开炮，结果。

    知止饿第五关，是万言万当，不如一默。

    上九。敦艮，吉。

    象曰：敦艮之吉，以厚终也。

    能够以敦厚笃实的德行抑止邪欲，这样就会获得长久的吉祥和善终。

    艮卦，整个就是按照人体的结构来安排各个爻，从脚趾，小腿，腰部，身体，嘴巴你都管不住，问题出在哪？在心。

    你到底是被浮躁冲动的贪欲控制了，还是在一直保持着诚实厚道的品格？

    人为什么要做好人？因为好人符合天道和规律，大模型加持，拉长看投出产出比是最高的。

    总之，艮卦是一篇阶段性知止，知盈，是一篇低调做人，厚道做事，要懂得踩刹车和挂P档的学问，

    高潮之后，会有低潮，冲动之后，会有静止，

    知止不殆，动静等观。

    ps，如果从单纯国学意象的映射看，在科技龙头冲刺一番后，大盘可能在下周陷入低潮和盘整期，如果水落石出，那么有些涨不动的和图形萎靡走坏的又该止盈了。

    艮又是土，是厚重的山，土来生金，我们一直看好的钨矿刀具上周五似乎非常不错。'
- record_id: recvn5LGZdx6VK
  文档标题: Vol.260619 至阳至刚 端午安康
  文档链接: https://my.feishu.cn/wiki/UY2hwMmCIiqWrFk7TLcc9P84nuc
  文档内容正文: '清华大礼堂草坪前放了一个雕塑日晷，原本是圆明园的遗物，1920级学生毕业时捐赠给了母校，

    它背后是拉丁文FACTA NON VERBA,

    正面是四个字“行胜于言”，这个logo后来被经管院拿去用了，那届里有陈岱孙等著名经济学家，再再后来的朱总，钱颖一我们就比较熟悉了。

    这个日晷的起源于《易经》，

    “日中则昃，月盈则食。”

    中华文明是一个来自于宇宙和天文学的文明，很早就破解了太阳系的大模型，总高度概括和凝萃的语言来描述世界的规律。

    比如说午，

    就代指奔腾，阳极，鼎沸，明亮，太阳，马匹，正午就指12点。

    端午节又在五月初五，两阳相重，因此古人称之为“重午”或“端阳”。

    今天是丙午年，甲午月，端午节，如果再加上12点，四午重叠，至阳的磁场力量达到最强。

    先贤会做“午时水”，认为此时之水最得天地阳气，一年疫气不侵。

    《本草纲目》中也有记载，

    “五月五日午时取井华水，可疗百病”

    具体的方法呢？感兴趣的同学，可以净水机放水或者矿泉水放进容器，于11点-1点期间，放在太阳下至少晒满30分钟，这就是“午时水”。

    将来可以洒扫，擦拭家具，洗脸沐浴，饮用可以烧开。

    天阴下雨咋办？放阳台上一样，太阳又不是没出来。

    今天午时，宜静坐，养生，凝神，感受一下自己出厂的设置。

    如果你有鼻炎咳嗽，睡觉手脚冰凉，可以午时晒背或者太阳底下走15分钟。

    午也是科技、中女、牛市，想必大家也体验到了。很多人都跑不过小姐姐们，这是属于她们的时代。

    祝同学们端午安康，福慧吉祥！'
