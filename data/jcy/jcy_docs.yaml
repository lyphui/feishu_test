  文档内容正文: '巴菲特为什么买纽约时报

    老巴已经正式退了，卸任前的最后一次拍板，应该是建仓《纽约时报》，持仓市值约3.52亿美元。

    对于新钱类"成长"标的，他基本不会重仓。

    老巴买入纽时的原因可能如下：

    国内与纽时属性相似的标的分析：

    从经营和业绩上说，是新华网，其在AI+媒体+政务领域布局较早，技术落地快、产品矩阵全，受益于数字经济与政务数字化采购趋势，新华去年同比净利润增长30%，净利润率15.58%，超越很多科技企业。

    短期看弹性更强的是人民网，新华网机构持仓多，社保新进，人民网更受游资量化青睐，且理论上人民网的权威性更高一点。

    可以列入观察的新锐标的是新媒股份：

    该公司是广东省电视台的企业，是少有的持续盈利且正增长的省级广电企业，市盈率仅有15倍，云视听系列APP全国有效用户2.25亿户，智能终端3000万台。

    与华为早有合作，持有全国仅7张的互联网视听牌照之一。

    这家公司股息率达8.96%，股息支付率高达99%，当前市值约100亿，上市以来派发的股息高达25亿，股息表现超越了所有银行和绝大多数红利股，仅因规模较小未被险资大量布局。

    从图形上看，它的弹性太小，从不涨停，简直对不起它20cm的代码，可以观察它有资金介入起飞再说。

    广东的同学们可以多了解一下，它的“喜粤TV”咋样。

    巴菲特送报纸起家，临退休以买报纸股份结束，充满了命运的气息与周期的循环之意。'
