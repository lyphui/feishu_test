    周期的代表看化工，

    之前弹性比万华大的新和成新高，

    替代石油的煤化工两个重点，

    龚彧

    宝丰和金牛，昨天-9.99可以低吸，

    或者快跌停的能源化工etf，化工etf,

    当然鲁西也不错，

    两个华纤表现也对得起观众。

    周期强，科技就弱了点，退守主要阵地，

