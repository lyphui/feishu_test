  文档内容正文: '老小登暂时打平

    已经压了这么多天了，今天就理论上要有反弹，看能否登上4080的反弹中枢，如果真继续下探到4030附近也别慌，看基金重仓指数在干什么，跟着它做即可。

    极限情况是4002。

    这两天国产半导体有资金进去博反弹，因为只能看头部，冰点时刻激进的可以低吸一部分588010/588710的仓位，注意是部分，这个必然要拉锯一番。

    电力煤炭涨了两天，女方的CPO和男方的国产半导体各自涨了一天，2：2平。

    理论上今天决出胜负的可能性灰常大。

    男女方的科技今天和下周一再起不来，市场耐心消耗差不多可能进入乱涨煤炭电力等电风扇模式，如果谈起来了重聚人气，科技继续。

    评论区：

    Crocodile：沙发。大王，今年九紫离火运的大势之火遇上丙午流年的双火共振，再加上6月5号芒种后即将进入的甲木生午火的月份，对大A有什么影响呢？

    南院大王回复 Crocodile：极度爆炸或者分化

    朱格拉周期

    早上讲压力位4080，果然4078过不去开始跳水，那这又是做T的点。

    如果又眼睁睁的看着没跑呢？

    科技里就两个，

    一个是光，高位派发的迹象有，但核心ETF的上升通道尚未破坏，后面会有反弹机会，光的新龙远东，还好好的。

    机构就算派发一下也是发不完的，会给你复杂顶，今天放量的下跌说明有资金承接，你想想前段时间半导体派发时那个缩量3000亿的狠杀。

    科技不好好洗一下，怎么去博弈中报期呢？

    一个是半导体和设备，这个反复讲你应该走差不多了，这几天的涨，昨天说是派发后的试探性博弈，如何？真花钱它今天就持续拉升了，所以低吸小下做波段可以，不能格局，主要是调整的时间不够。

    关键是什么，

    新老登决战半天，赛出来的是设备。

    不要觉得今天资金去的是机器人，那么理解就偏了，是扩产设备（知识星球鉴茶财经院），是这一轮朱格拉周期的受益。

    中坚的两个咱们都熟悉，绿的和吴志。

    手快的一看绿的高开，猛拉和涨停，昊志还给了你低吸机会。

    不要把绿的当成单纯的谐波减速器甚至机器人看，那天的调研咱们讲过（公众号鉴茶院），工业母机，自动化产线之类的它都能干。

    周末不要听各个直播间给你瞎吹机器人，而是（）设备，（）设备，AI巨头们开新厂要的（）。（）里的东西能懂的都懂的，下周一前再细说。

    科技不会死的，它挂了牛市就没了，

    好好过周末吧。

    评论区：

    Joey：校花这么长一根阴线是不是已经在派发了

    南院大王回复 Joey：哪有这么粗糙的派，派都是扶老太太下楼梯慢慢跌

    summer：再次请教一下大王关于对MIcc国瓷的看法

    南院大王回复 summer：图没有坏你就好好拿着，论技术实力潮州三环最强

    Crocodile：大王，华勤是买点还是卖点

    南院大王回复 Crocodile：AIPC的分批建仓点问题不大，春秋电子昨天跌停今天不都拉起来了。

    尤优：烦请大王指点一下光库今天的长上影线，今天没走，后面是否还能继续拿着？

    南院大王回复尤优：纯粹大盘拖累，算能扛了，敏感就MA5，利润垫厚愿意等就5日下穿8日线'
- record_id: recvlxbF3Z6GCd
  文档标题: Vol.260604 关键的一两天与一些产业资讯
  文档链接: https://my.feishu.cn/wiki/EtNWwn0soiW8KdkC04ccbJWpncg
  文档内容正文: "昨天的跳水使得科技基本都顶着一根长上影线，往电力或其他板块切换的局面岌岌可危，因此大盘今天必须做出决断才行。\n \n4112仍然是一个重要压力位，看其得失，如果早上略微探一下4070附近再上去（回踩一下20周线）则形成完整结构。\n\
    \ \n把4070击穿了继续往下也别慌，到达4032附近无非增加了性价比，那时又是个小买点，你看基金重仓指数在干什么，跟它搞里面的成分股可以。\n \n目前的科技盘面，如果错过了孚、DSP、CPO等，有什么机会呢？\n\
    \ \n1. 铜缆，老黄在GTC大会除了推马沃尔，还讲了一句\"You use optics wherever you must, you use copper\
    \ wherever you can\"。能用铜则铜，不能铜则光。\n \n大A的风格一向都很偏激，\"光进铜退\"其实是很片面的，AEC铜缆之类没有那么快退出柜内。\n\
    \ \n那么铜链接都有谁？ETF~长芯博创+鼎通+RKD。\n \n纯看技术，RKD是不是在34日线拉起来？那跌穿这个平台走人，其他照理类推，比如博创就是55。\n\
    \ \n2. AIPC，之前的那波如果没先手你没法追，现在它们正在调下来可以看机会。\n \n比如华勤技术，8日、20日线附近可以先打底仓，后续看行情催化，34日线跌穿作为风控线。春秋电子如回到25左右则同样思维。\n\
    \ \n3. CPU，核心是澜起、AIPC，机柜放量、内存池化（这个还没怎么计价），另外是卓易（它有点偏应用和软件），禾盛新材则看83左右缺口的机会。这几个都是，在缺口上方分批进入试探，补了就走。\n\
    \ \n注意什么呢？这几个毕竟属于\"二线\"，追高毫无必要，低吸才好。同时整体的科技，都是在易中天源的手下混饭吃的，它们情绪不能差、不能倒，昨天有高位派发之嫌疑，今天得缩量涨才行。\n\
    \ \n过马路你要看红绿灯，搞自己的东西你得看前排龙头，你都不知道自己拿的品种前期龙头是谁，那就不合格了。\n \n没有这个微操能力，冰点去吸甚至定投通信ETF和科创机械ETF，比如上上周，讲你大不了定投515880为主，本周下来你收益远跑赢大盘。\n\
    \ \n钨最近又在涨价了，这可是机械刀具和PCB钻针的灵魂，钻针今年依然缺，中高新本身产钨（下面有个金洲精工做PCB钻针），刀具之前跟大家讲过苏州的新锐股份，它脸很大，收购的慧联电子以前是厦门业的PCB事业群，如此看厦钨给新锐保供了，这两者都是中期看好，新锐市盈率也不高。\n\
    \ \n高手打野的呢？沃尔德在55日线的平台上你懂的，人们以前把它只当刀具加工商看的，它也搞出了PCB钻针（注意用的人造金刚石），这个钻针同时可以钻最硬的玻璃基板，针长啥样、金刚石散热片长啥样，大家看看。\n\
    \ \n有人问自己拿的PCB为啥走的黏黏糊糊，钱和预期都在上游，什么电子布、铜箔、钻针、CCL之类涨多少了。\n \n如果今天科技扛不住，什么会顶上来呢，大概率是电力。"
