  文档内容正文: '看谁是真龙头

    昨晚闪迪大涨15%，今天又要看大A的存储表现了。

    我们的存储分三块，

    一块是三星sk代理商，什么香农芯创之类的，说白了就是代理商，没啥技术含量，不知道为什么炒这么高，屯货能算商业模式？

    一块是海外的技术和延伸，比如协创，买回来0公里二手存储，能给你攒出服务器和算力，尤其澜起这种，英特尔真把技术拿了出来的。

    最后才是国产长鑫长存的供应商，严格说都不是存储概念，而是半导体设备和自主可控。

    我们只需要看资金认可谁就行了，扛跌的，拒绝回调的，市场的盘面会说明一切。

    其余的领域也是，AIDC、硅光、应用、电网等等，要看跑出来的龙头，它们是市场的共识。

    至于这些龙头是谁，以前说过多次，再不会就点开“板块”，挨个看下前几名。

    投资和生活是一样的，要追就追校花，要搞就搞龙头，最多搞一下龙2龙3的补涨，太远的就没必要看了，不会的直接搞etf，大多数人还真跑不过它。

    回到市场，金银的期货昨天稳住了，金银有望反弹，搞短线的，有些误入歧途的可以趁反弹减仓跑路，要么你就躺平看懂王和金银的长期对决。

    其他的主力机会在哪？昨天本来要涨，被大盘带下去的，尤其是长上影线有量的那种，纯看图像是主力出货，但论逻辑也是趁机洗盘，比如腾景、萝卜这种的（但也不能跌穿重要均线）。

    今天如果继续下杀，放出量能，午盘后或者14:30前后又有资金进去拉起来，形成长下影线，那就是标准的揉搓形态，那会你就知道可以下手了。你说你不会看，那别参与。

    不光是光通信板块，其他的也一样。

    今天反弹的机会是比较大的，最好的盘面是上午一定要杀得让有些人离场才行，下午一个漂亮的V型硬反转，完美。

    若没量，又是干杀的一天，那就痛苦了。

    又是一句祖训，有量反弹拿着，无量反弹减仓。

    求放量。

    二阶段开始了吧

    之前咱们多次谈过26年的主题，

    硅光元年，液冷元年，传媒大年，应用大年，涨价大年。

    这几个抓住了，里面都是发财密码。

    现实的走势按照这个路径，

    其他的cw光源、eml芯片等都是为硅光和最终的cpo服务的，12月8日的文章多看。

    当时有人问逻辑，又不是刘圣减持，慌什么？

    上涨有量，下跌无量，这图会看不？

    光纤涨价我们说了很久，下游有钱的，涨起来更利索。

    元宝红包经常刷不出来，说明算力和服务器不够，彩蛋利通电子这两天都给了从容的上车机会，它本身也给英伟达供液冷产品。

    再说说寒王，它在1353跌破了34日线、60日线应该走，如果没走，它今天纯属小作文影响，它崩了中国的国产芯片还玩个毛线，正好生产队前段把科创50卖光了，你砸了好啊，它慢慢吸，200多亿放量杀跌是互道**。

    用好三生万物，再结合点产业逻辑，胜率就会很高。

    比如萝卜这种，180那会都告诉大家坚决扛住，后面又专门发文说把陈小群洗出去了，你再回头看，34日线上是极佳买点。

    还有永鼎，乖离值50的时候告诉你要起码减仓一半，这几天34日线盘整，又逢硅光崛起，不就趁势拉起来么。

    拔到萝卜，搭上硅光了吗？

    关于光器件产业的延伸阅读1、2，'
