  文档标题: Vol.260521 放量5000亿派给你
  文档链接: https://my.feishu.cn/wiki/ELafwiPrqiNKewkbSx9ca6jenhf
  文档内容正文: '回顾一下之前的判断，中观上，是大科技高位派发阶段，总体是一个复杂顶。

    微观上，反抽是给你减仓用的。

    注意我们的用词，“反抽”。反抽和反弹、反转，是完全不同的概念。

    反抽的高点，前天早上、今天早上也给了，上一次大阴线那个一半的位置4190点，低点4108，甚至之前的4080、34日线。

    这段时间的应对标准也给了，注意放量大涨，警惕放量滞涨，一旦破坏上行轨道走人，用最高级的MA5或者5日平台风控。

    如果你有利润垫，想恋战、想等，极限看21日线，尤其那种带关键帧的缺口，站不住走人。

    当然，有的投资者觉得卖完后行情又涨了心里难受。其实，不可能卖在最高点、买在最低点，非要追求严丝合缝、利润吃尽，那是执念。执念只会让你再度入场追高，最终产生亏损。

    但并不是说高位所有品种都会走坏，什么品种还可以继续持有？上行轨道完好、图形走势健康、缩量上涨的标的。

    总体市场还会反复震荡，不排除部分标的再创新高，比如我们提到的CCL、MLCC，但大势上涨的强势势头正在逐步消退。

    所以专门给新进投资者和准备布局下一阶段行情的投资者梳理了中位方向，抱团关注绿的xb，重点看好工业母机，同时还有北美电网及相关应用板块。

    中位行情初期只有龙头具备辨识度，后排标的难免普跌调整，所以提醒不要盲目追高。

    今日盘面明显能看出，工业母机和减速器板块有资金承接，并未出现大幅冲高回落，无法参与688和300标的的投资者，可关注机器人etf159530，选择它的原因是绿的为第一大持仓标的。

    新手关注标的昊志再度给出-4%~-5%的低吸机会，大家把握住了吗？

    上周专门讲解了“困”卦，寓意进退两难。

    “来徐徐，困于金车，吝，有终”。

    今日冲高回落走出“金车”走势，大量散户高位接盘，吝，便是亏损之意。

    近两日市场反抽行情，有人会质疑判断是否出现偏差，觉得市场走势向好。实际亲身参与操作，就能感知真实行情难度。

    牛市氛围往往是散户容易亏钱的主要诱因，当下行情正是如此。

    再者，即便对大盘走势暂且不论，也十分了解过往操盘资金的手法，其操盘模式固化、没有新意。

    笑你我枉花光心计

    爱竞逐镜花那美丽

    怕幸运会转眼远逝

    为贪嗔喜恶怒着迷

    花未全开月未圆，人生小满胜万全。'
