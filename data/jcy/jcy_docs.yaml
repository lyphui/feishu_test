  文档链接: https://my.feishu.cn/wiki/Ca10wF6XrihpZ0kPCxdccbk2nPg
  文档内容正文: 'B浪反弹，连接器产业，再谈胜率

    昨天的反弹是市场选择了方案A，那么，总体就是一个B浪反弹，目标是拉锯中攻克4258。

    因为调整的时间和空间并不太够，总体的空间不会太高，预期是4399。

    别看昨天暴力上涨了，今天有人又想追高，不要追，有的是机会给你缓慢的去弱留强和低吸。

    上面全是大的压力位，4170、4199、4230、4258。

    第一压力位是4102，考虑到美股昨天暴力上涨，今天突破估计问题不大，那么看4130/4160就行了，能不能站稳，站不稳再回去踩了比如4060，那就是你的低吸点。

    当然踩不能破MA5线即4023，不然又略显弱势（但总体向上空间不变）。

    市场的主要玩家就是女主和男主，即海外算力和国产算力（知识星球鉴茶财经院），女方代表，通信etf科创机械etf，男方代表科创芯片etf科创新材料etf。两边是轮动的，涨完这个涨那个，涨完那个涨这个，

    说过N遍，普通人不要弄个股，搞男女主就行了，尤其是新手菜鸟，你玩不过机构抱团的，5000选30个的概率比刮刮乐还低，你非不听，市场已经了你答案知识星球鉴茶财经院。

    你再回头看看，人家是不是跌的时候比你少，涨的时候比你多。

    在市场中认为自己是和普通人是好事，亏的那种赚钱和情绪价值都要的。

    它们怎么轮动？盘中尤其早上，观察基金重仓指数在拉谁，在踩谁，你跟ETF就行了。

    举例，开盘主力猛搞寒王海光，你就要知道这对应科创芯片etf，开盘狂砸中控绿的JPT，你就要知道科创机械和光设备今天是压力，同样的，支撑位上你看重仓股们在干什么，

    它们把什么抄起来，你去搞那个板块知识星球鉴茶财经院，比如狂抄江丰长川拓荆之类，你就知道这代表科创半导体设备710，狂拉光库天孚之类，代表光上游光器件，狂砸旭创xys，代表光模块本身，延伸到传统AI硬件的pcb液冷电源等。

    中间非要操作，用5日平台理论，跌破了就跑，站稳了再进来，或者更简单粗暴的口诀，5日线下穿8日线，鸣金收兵，5日线上穿8日线，击鼓进军知识星球鉴茶财经院。

    今天是N+1次再讲上述道理，就是为了让大家形成肌肉记忆。

    为什么我们帖子里会有一些代号典故甚至诙谐，一个是合归要求，一个这本身就是一种筛选机制知识星球鉴茶财经院，筛出那些根本就不适合搞个股的同学，你连往前看几个月帖子答案和评论区的耐心都没有，还想跑赢市场吗？

    （你不明白的任何专业术语和或者代称，星球里都有答案都有解释，且不止一遍，不明白就右上角点搜索，最好是文章看到去年6月的牛市开始）

    昨天的美股，光存设备都是大涨，

    今天的看点于是变成了，

    看太辰光，光库代表的女方，是不是带着光继续上涨，它们高举高打，你可以搞点后排补涨尤其是图走的漂亮品种，

    还是说男方表现一下，芯片/设备/材料，看谁拉出来，材料的空间依然存在。

    最近光的趋势是在计价连接器涨价，里面可以粗暴的分为柜内/邻柜的AEC铜缆和柜外光互联的MPO(多芯光纤连接器），长远看后者更强，

    AEC铜缆的阵营主要是鼎通，RKD，博创，华丰科技（国产线）

    MPO将是光互联绕不开的组件，最垂直的是太辰光（自研MT插芯，给康宁代工），直接给北美供货且最综合的，是我们从50块就开始看好的团宠博创，河南第二AI的仕家光子也能搞，做连接器的能力比它做光芯片强，其他都有点蹭概念不纯正。

    真要说蹭，JPT有北美认证，正在投产MPO自动化产线，量能还没放出来。

    科技方面，同时相对低位的IGBT和落后制程的MCU芯片也很强，有望继续。

    昨天谁在评论区说要犀利观点来着，一直在说，牛还在，AI还在山脚下，你还要怎么个语不惊人死不休？

    非要这种式表述，不要怂。

    有孚元吉

    果然到4102压力位就下去了，如果到4030左右会比较强力的调整，所以你得知道机构在涨什么，到时候再去看它们，

    -先说国产的男方，主要是半导体材料和低位科技，

    新材料的什么光刻胶电子化学品硅片你把握不住的，洗起来非常狠，上科创新材料etf就行了知识星球鉴茶财经院，

    落后制程半导体，是谈了很久的IGBT，什么斯达半导士兰微都是老面孔，这轮我们看好带点AI概念的，周一又讲的思瑞浦，扬杰之类。

    正因为不流畅，所以大绿盘会给机会。

    -女方的海外算力也是两个，一个涨价题材和稀缺物料，

    错过了MLCC，一直昨天开盘前还敢讲CCL铜箔，生益华正强不强，后面又找个量价齐升的薄膜电容法拉电子，被起名法拉利，它洗的已经很温柔了，想想之前的三环。

    一个是在mpo的方向延伸，亨通通鼎之类的大涨，因为MPO里的大头是（价值量大的）是光纤，核心（技术壁垒高的）是MT插芯。

    博创厉害是有爸爸长飞，自己直接供货谷歌，且有光模块，太辰光是自己有插芯。

    这几个既然高了，昨天还谈个预期差，给安费诺供货有连接器概念的YDET，同时也是液冷新贵。

    MPO又没赶上呢？机构是在往机柜里延伸的，找到了和它连接的FAU，咱们的孚同学等候多时了，知识星球鉴茶财经院，光库收购的安捷讯也做这个东西，JPT做MPO和FAU设备，谈过5888505就基本代表。

    想必这下你能理解，为什么这两天，孚比中、易，要强。

    对大多数同学们来说，知道牛奶好喝，有孚元吉就行了，不必要非得去琢磨牛。

    这个态势这几天估计还会继续，直到618美联储议息日，敏感性高的同学，明天就可以看情况，预期你的预期，去减仓，

    加不加息不重要，都是扰动，产业逻辑才重要，不要一惊一乍的，就比如（）倍种子kewell，之前有同学反复问，11和12号那两根大阴线有没被吓跑，拿稳了吗？

    评论区：

    雨田：大王，申菱和欧陆通比，怎么差这么多，涨跟不上，回落厉害

    南院大王 回复 雨田：欧陆通有谷歌电源，申菱的大甲方是华为阿里

    無@常：大王，帮忙分析下四氯化硅的三孚，逻辑怎么样。

    南院大王 回复 無@常：没给康宁供货，是亨通长飞供应商，21日线上行轨道

    蜗牛：大王喂饭心切

    金泓：大王，光纤的话，那远东呢~

    南院大王 回复 金泓：远东的龙当的好好的，它据说还要搞铜箔

    慢慢炖：大王，问个被遗忘的消费股。东鹏饮料高位腰斩了，低位持续大量还蹭上张雪机车的热度。长线是不是可以关注起来了？

    南院大王回复慢慢炖：造纸涨不起来的话，消费起不来，谁不要包装

    秋至小满：泛微断魂刀，求大王按摩

    南院大王 回复 秋至小满：硬件时代软件不用搞太多，估计又是量化小作文，只要腾讯还是爸爸，微信Ai还是要出，天塌不了

    文心：大王，IGBT还带派瑞吗?

