  文档内容正文: '还是涨价

    -芯片涨价,

    闪迪,美光,大涨6%, 9%,

    这是存储芯片,

    德州仪器也大涨9.9%,这是MCU,你把它和中国德州仪器的图比对一下,发现走势大差不差,

    之前略有延迟,甚至价格都差不多。

    intel大涨11%,CPU只是投机资本只是没有看到,价值迟早被发现。

    -全球科技的叙事,不断从元器件,算力,转向设备,芯片等。

    简单粗暴,科创芯片ETF。

    大A只是被极致风偏和情绪带动,很容易矫枉过正。

    -问题又来了,有色这一轮上面会疯狂出手吗?

    就算会也不会力度太大。

    一是,有色是周期导致的,二是,咱们确实缺矿,三是,纽约comex金银主连还在疯涨,四是,里面的大玩家都是自己人。

    我们之前一直讲,机构主线三大品种,光,电,有色。

    当时大家不看好的时候

    新华哥等几个人在里头哼哧哧的买,

    就比如神火盛屯云天化等这种500亿起步的盘子的图形,一看就是险资的牛马天天上班在扫货。

    有色里还有什么品种预期差?钴。最近是缓慢爬坡,锂电池的必须。铜,中国是缺铜大国,子弹都用钢壳的,挂铜。

    铜才是贵金属+工业金属的核心。

    图形呢?看那些没怎么加速的,加速不会看就别看了,普通人别追高祖训。

    有个板凳队员加化工,也是挨了很多年打周期底部逐步上来了,少年闰土2个涨停了。它怎么搞不用说了吧。

    昨天踏空的部分资金去了哪里?稀土永磁。谁在回踩34日线后涨的不错,比如,银河,中科,龙磁等等,仅限高手自己看市盈率和图形打野。

    半导体设备的预期差,长川科技,2025年度归属于上市公司股东的净利润12.5亿元~14亿元,同比增长172.67%~205.39%,熬出来了吧。

    先进制程扩产的逻辑没问题。

    逢低搞好主桌的男方女方,再添点大宗商品,这轮牛市你起码踩中一半,不知道它们是谁,文章往前看到6月份一清二楚。

    仅为学习啊不构成任何建议,操作型选手短线上注意大盘，破4100注意减仓。

    率先挺近决赛

    率先挺进决赛

    今天的主角就是AI应用和有色了,

    AI应用凸显了决赛范儿。

    AI广告AI传媒AI营销等,10倍股的集中营嘛。大A才刚开始。为啥?以前没算力。

    北有蓝标,南有省广。

    为啥大王知道呢?

    蓝标当年是我们的了方啊,大王的个划总监就是蓝标出来的。

    蓝标可是房地产和恒大都没有搞死的主儿。

    省广是改开的是1979年成立的,有点美中不足的是,是国企,国企干广告,但全国也就广州的国企能做广告了。

    -再说有色,早上告诉大家有色的核心是铜,

    你瞎追黄金白银了可能就套了,但在一天最佳买点的10点半前后进去,涨停是有的。

    错过了去打野,不就是稀土永磁?点到的几个,银河,中科,正海,都是10.30后精准拉起来。

    -新手菜鸟为什么可以搞保险,人家是庄啊亲,一砸狠了就卡拉。

    不知北京或者业内的同学们是否知道当年还有个很文艺很厉害的广告,叫做红鹤。

    像北京的颐和园著,朱雀门,苏州的拙政别墅等,都是它的天才谋划。

    最大的区别是,红鹤没有上市,也没赶上IT化。

    AI出来以后，天才就越来越少了。'
