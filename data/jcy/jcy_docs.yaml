    都是地摊文学，东大崩溃论97年说到现在了。外往哪撤？是分裂的美帝、散沙的印度、安全保证不了的中东，能源都供不上的欧洲？现在老外们发现虽然中国竞争强，但还是市场大环境稳，通用，大众，奥迪，日产等一帮车企都在加大投入狂推新能源车

