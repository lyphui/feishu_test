    它同时有GaAs(化)、InP(磷化)、GaN(氮化镓)三大材料储备。

    拉指数旭创最管用，它在506站住箱体，三生万物不正好是回踩买点？它现在最主要的问题是交付来不及，满世界招人。

    同样还有回踩买点是谁？

    新能源。代表是阳光，

    那就说明下周可能在两个方向展开，

    高位的光通信，低位的新能源。

    最后谈个外面不知道的产业信息，特斯拉确实找中国企业下单光伏设备了，市场传言是捷佳和拉普拉斯，我们了解的情况，它找的是迈为，首批下单5亿美元，准备5月份开始。

    这小作文

    今天算力大崩是 AMD 的高管走私芯片的事情，可能是真的，美国这么干的人多了，还有直接卖给大毛的呢，比这个过分多了。

