  文档内容正文: '光通信产业基地

    4月3日，苏州光通信产业基地签约仪式举行，基地由旭创科技在内的多家光通信领域企业合作共建，聚焦光芯片、光材料、光器件、光模块等重点领域。

    以上几个领域都是日常重点讲解的内容，现集中梳理苏州相关的布局企业：

    核心关注孚同学和长光的态度，二者属于高新区，旭创则属于工业园区。

    问答环节

    有知无畏：大王，产业逻辑中核心是不是光芯片>光材料>光器件>光模块？

    南院大王回复有知无畏：聪明人，答案是对的。政府的公文都是字斟句酌的，这个排序是按照领域的紧缺度来的。

    黄颖：东湖高新可以吗？

    南院大王回复黄颖：我们现在说的是苏州的产业基地，东湖高新是武汉的。当然，光谷的相关企业发展也不错。

    文心：大王，中天科技怎么样？该企业也布局了光纤业务。

    南院大王回复文心：光纤领域前排企业是长飞、亨通，中天科技的发展会受前排企业带动，若前排企业扛不住市场压力，后排企业的下跌速度会更快。

    星际迷航：大王上午好！感恩遇见大王！

    易经第42益卦：百年好合，踔厉奋发

    从38卦睽卦开始，市场经历了分歧、翻脸、下跌、底部震荡、自我检讨、弥补损失的阶段，如今终于迎来反弹，如同感情出现裂痕后迎来修复。

    40卦为损卦，41卦为益卦，对应财务中的损益表，盈亏同源，二者一体两面。

    益卦卦辞：利有攸往，利涉大川。

    象曰：风雷，益。君子以见善则迁，有过则改。

    益卦的寓意是有利于开展事业、开仓布局、开拓进取，如同百万雄师过大江一般势不可挡。

    此卦上卦为风，下卦为雷，风雷激荡，春意盎然，寓意君子看到大势扭转，秉持“见善则迁，有过则改”的理念，不断学习、精进自身。

    初九：利用为大作，元吉，无咎。

    《象》曰：元吉，无咎，下不厚事也。

    解读：只要发心纯正、动机向善，就可以放手大展拳脚，不会出现大的问题。

    原因在于，当前市场处于底部区域，后续下行空间有限，此时有所行动，做出的都是成绩。

    现实中，收拾烂摊子往往是展现个人能力的绝佳机会，许多高层领导者，都是从“救火队长”的角色中脱颖而出。

    六二：或益之十朋之龟，弗克违，永贞吉。王用享于帝，吉。

    象曰：或益之，自外来也。

    解读：前文提过，十朋之龟代表着巨额的财富。

    寓意会有外界送来价值连城的机遇与财富，这份利好无法拒绝，坚守正道则会一直吉利。

    究其原因，如同君王诚心祭祀天帝、秉承天道治国理政一般，自身品德端正、行事靠谱，意外之财和优质的合作机会便会主动找上门。

    财富是对忠诚与自身价值的奖赏，因此要敢于重仓趋势方向，在市场底部摒弃恐慌。不要平日一味期待机会，当真正的机遇来临时，却不敢把握。

    就当下的市场而言，若追求最大的确定性，可关注上证50ETF；若想要更高的弹性，光通信是优质选择。

    六三：益之用凶事，无咎；有孚中行，告公用圭。

    《象》曰：益用凶事，固有之也。

    解读：将自身获得的好处、利益，用来帮助他人解除危难与灾祸，这样做不会招致麻烦；

    待人处事要真诚，行事秉持中道，如同手持玉圭向王公汇报工作一般，保持程序透明、心怀敬畏。

    赚得丰厚收益后，要懂得分享，主动做公益、行善事，进行财布施、法布施、无畏布施，最好能解他人燃眉之急，切勿独占利益。

    同理，立下大功之后，也要将功劳分享给团队与下属，让整个集体都能受益。

    只有做到让人挑不出大的毛病，才能坐稳位置、守住财富。“固有之也”，便是指通过分享让自身的利益根基更加牢固。

    当下万科出现重大问题，究其根本就是“无孚”，即缺乏诚信：掏空、欺骗外部股权合作公司，独占利益还倒打一耙；掏空上市公司资产，转移至核心高管的关联企业。

    六四：中行告公从，利用为依迁国。

    象曰：告公从，以益志也。

    解读：以稳妥、持中的方案，向领导者建言远大的战略与目标，会得到上级的认可与支持，这套方案甚至能像“迁都”一般，成为组织未来发展的核心依托。

    想要持续赚取丰厚收益，就必须立足远大战略、放眼星辰大海，这也是反复提及的“第二增长曲线”。

    市场营销学中有“金牛、明星、问题、瘦狗”四大矩阵：金牛业务当下的现金流与利润表现优异，明星业务则是未来有望扛起发展大旗的项目。

    与上市公司高管交流时，常问的一个问题是：“如何再造一个本企业？”

    当下企业市值5000亿，下一个5000亿的增长来自哪里？

    这个问题同样适用于个人：

    五年后、十年后，你依靠什么能力、什么资源赚钱？

    比如你是律师，当下做诉讼业务盈利颇丰，5年后你的下一个发展支点在哪里？

    比如你是普通打工人，当下依靠老东家的人脉发展，5年后你的核心大客户又在何处？

    九五：有孚惠心，勿问元吉。有孚，惠我德。

    象曰：有孚惠心，勿问之矣。惠我德，大得志也。

    解读：若想赚取巨额财富、成为优秀的领导者，就必须怀着真诚造福他人的仁爱之心行事，这无需占卜，必然是大吉大利的结果。

    因为你的诚心与德行，身边的人也会用真诚与拥戴予以回报。

    此前提过，伟大的企业之所以伟大，并非只因盈利能力强，而是发心与其他企业截然不同。

    看看那些世界500强企业，皆是为了人类、地球的美好未来，为伟大的事业而奋斗：为了绿色低碳、为了攻克癌症、为了人类幸福，即便是沃尔玛这类超市企业，也是为了让普通人买到平价优质的产品。

    而A股的许多上市公司，行事蝇营狗苟、毫无格局，整日想着拖欠供应商货款，琢磨着与妻子假离婚来完成股份减持。

    中国有众多超市企业，为何难以做大做强？反而胖东来和诸多夫妻老婆店能持续盈利？

    核心原因在于：你把员工的薪资待遇与后方生活放在心上，员工自然会将企业的战略目标放在心上；你把客户的安全与实惠放在心上，客户自然会认可你的品牌。

    上九：莫益之，或击之。立心勿恒，凶。

    象曰：莫益之，偏辞也。或击之，自外来也。

    解读：当自身的增益达到极点时，若心态发生转变，从“让大家共同受益”变成“只想独占所有好处”，

    那么身边便不会有人再施以援手，甚至会有人前来攻击你。因为你初心不再、坚守不恒，失去了诚信与分享的德行，必然会遭遇凶险。

    最典型的案例便是马老师，昔日的屠龙少年最终变成了恶龙，从前为他发声的人，纷纷反戈一击。

    益卦整体解读

    益卦属于上上签，寓意市场经过底部震荡盘整后，即将迎来向上的走势，核心启示如下：

    若从玄学角度结合本卦的走势来看，节后市场大概率会出现风雷涌动的政策或行为，激活市场活力。此时要顺势而为，看到明确信号后大胆加仓，同时保持纯正的发心，懂得权衡长远发展与适时止盈。

    其实益卦向我们揭示了一个核心道理：

    人生最大的智慧，并非懂得如何获取，而是懂得如何给予。

    附：纯从字面解读，“有孚中行”“有孚惠心”，带孚字的相关标的依然具备布局价值，若该标的未能突破新高，需注意止盈；若一举突破新高，则说明企业志向远大、发展潜力充足。'
