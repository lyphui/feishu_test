  文档内容正文: '去弱留强

    韩国救市，指数已经大涨了11个点，

    应该能带动今天的科技，

    大盘必须要反弹了，真跌穿55日线不拉回，那这里就会是一个顶部结构。

    所以这两天必须反弹了，

    科技，海外是硅光+cpo/ocs，国内看华为链，尤其是我们谈的几个硬件，也受益于昇腾950超节点，即将要出来的deepseek新模型，也适用于昇腾。

    950就是全光互联。

    总体去弱留强，看前排的。

    华工今天看你了，有没有昇腾王者气质，能不能上演伯利恒时刻，如果别人强板块强，你不强就推。

    ps做个补充，因为有同学问了，昨天跟几个刀具巨头的高管又交流了下，钨粉涨价仍未结束，主要是中钨高新和厦门钨业，

    刀具上，他们认为华锐精密最好，欧科亿略次。但同学们注意，钨等有色不要追高，它给大跌了再分批进，刀具等企稳再说，欧科亿之前乖离值50了。

    稳健的还是铝，神火云铝等继续看好。

    有色折腾不明白的，化工etf。

    拉出危险区

    4045上方拉起来，总算是没有跌破55日线。

    自己这么大的市场竟然要靠韩国利好的催化，无语。

    市场并未怎么放量，先入场的是游资量化，他们喜欢的，什么micro led，量子科技，商业航天之类的，

    机构方向也就根据在华为线方向见风使舵洒洒水，根据美国搞电力建设的新闻，继续涨了变压器，

    还有我们潜伏"快电"的燃气轮机。

    几个咱们能看上的，应流，东方电气，jerry。

    几个都是双主题的，应流的叶片也能做商业航天，东方电气也有核聚变，jerry主业是石油机械。

    应流之前乖离值50了，放量滞涨可以高抛一下。

    之前我们觉得丙午年，天地一气火，是代表可控核聚变，核聚变依然看好，且有资金流入，

    今天量化机构告诉大家，丙午年，一个叫光，一个叫电，名字带光电的都能涨，笑死。

    十五五规划草案收盘前后才出来，资金们都要等一下。

    之前回答韩虎头同学东电的问题，讲今年正财在东，东方电气乖离值已经50了，重庆之光也快50了，有的自己注意止盈和图形啊。'
