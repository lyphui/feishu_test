  文档内容正文: '韩国的指数大跌，昨晚美股也是光和存一片惨淡，虽然日韩反弹了，但我们不能上头。

    直接说策略：

    剧本就这样，根据自己的信仰和标准做决定，市场和生活是不一样的，它必然没有最优选择，你所有的选择都是追求“次优解”而已。你追求严丝合缝和踩对所有的点本身，就是一种“执念”。

    今天的看点依然只有两个，一个是光里二线品种的弹性和MPO，比如名校汇绿几个连接器等，一个是国产半导体设备或者“落后科技”IGBT等的反弹，市场就是男女主轮动。

    昨天参加一个聚会，产业如火如荼，趋势一点也没变。'
