  文档标题: Vol.260519 犹在眼前
  文档链接: https://my.feishu.cn/wiki/Ht4GwexYcimkvlkl0wHcI8IenHg
  文档内容正文: '美股大跌，之前明星的光和存，5个点起步，10个点正常。

    那生机勃勃、万物竞发每晚涨10个点的盛况犹在眼前，然而，盈不可久。

    现在就是全球主力震荡出货的阶段，上周一说到本周一，高位派发，要止盈、要减仓，不能心存侥幸，不能没有利润垫追高。

    周末的“困”，更直接说会泽水干涸，严重缩量，结果应验了吧。

    谨慎的继续观望，积极和激进型小仓位跟踪三大中位板块：机器人/工业母机、电网设备、AI应用。

    总经理昨天考察了机器人，今天应该会有表现，龙头是反复讲到的绿的，这是个新抱团，回踩买点已经出现很多天了。

    它的基本面也非常不错，特斯拉供应商，也能做数控机床，也能做自动化设备，机器人公司做这些并不难。

    后面的昊志、拓普、柯力等个股大家自行看图，老朋友瑞芯微也处在均线粘合状态，它能做机器人的小脑，整个SOC板块是存储涨价的最大受害者，但它们用一季报证明，业绩并未走差。

    机器人ETF此前也讲解过。

    昨晚美股的AI应用板块上涨，软件集合IGV，有点走出底部的感觉，当然依旧会有震荡，应用板块只看头部核心玩家。

    昨天也讲了，懂王已经抄底软件板块，他的眼光可以参考。

    电网设备板块龙头依然是四方，今日要看金盘科技的带动，SST固态变压器今年开始落地应用，中恒是800VHVDC领域最强标的，对标维谛。

    今日重点观察，板块是往传统变压器如西电、特变这类方向走，还是往数据中心电源方向走，电源板块近期走势一直不弱，安靠智电已进入北美大客户供应链，图形再粘合整理，在60元左右稳住走势更佳。

    美股昨日商业航天板块上涨，但暂未将其列入中位板块，因为板块没有整体效应，除了信维和西部材料这两家纯正SpaceX供应商，其余标的也跟随光模块板块在次高位进行派发。

