- record_id: recvhX0Nk6PoIv
  文档标题: Vol.260427 震荡分化与五月展望
  文档链接: https://my.feishu.cn/wiki/XRj9wCga6iRPEekkFyBcJeVBnRf
  文档内容正文: '这两周的市场模式大概率是1+1+X，其中第一个“1”，是光通信分化后的继续抱团，只是会缩圈，方向如下：

    看好昊志机电，市场多将其归类为机器人概念，其主业为数控机床主轴与电机，同时供应AI服务器机柜、PCB转刀电机，一季报表现优异，当前为回踩买点结构，乖离值合理，筹码形态健康，绿盘低吸更佳。

    PE较低的华锐精密，主业为刀具，需观察55日线处能否站稳平台。

    另一个“1”是国产算力，Deepseek周末引爆市场，该方向早有预期，但仓位不宜过重、不宜单一持仓，走势连贯性较弱。

    华为昇腾链标的繁杂，重点关注华丰科技、航天电器、东方国信（不跌穿15.05元），龙头为盛科通信（国产交换机芯片龙头）。周末市场一致性过高，若大幅高开不宜追涨，可转向CPU方向。

    海光为X86架构，龙芯为全自主指令集，该板块龙头是杰华特（曾为英特尔供应商，华为哈勃持续投资）。英特尔链的卓易信息处于回踩买点结构，震荡粘合均线更佳，不宜跌穿2.9元，同类结构还有澜起科技。

    短线可关注苏州禾盛新材的开盘机会。

    CPU板块布局较早，全球市场维度，GPU今年表现未必优于CPU。

    芯片行情将扩散至设备领域，预期龙头为长川科技（同时为光模块测量、SpaceX供应商），其余江丰电子、京仪装备等标的表现较好（京仪装备处于均线粘合回踩阶段，主力或在等待季报，不跌破101元）。

    甬夕电子为寒武纪先进封装相关企业，已实现扭亏，一季报已公布无风险。

    国产线核心ETF为588200、710，持续看好。

    “X”为商业航天、新能源（重点看纳电正负极隔膜），或新延伸题材，例如从昇腾延伸至华为光模块、PCB、液冷产业链，再扩散至AIDC、应用、软件等方向。

    操作策略：新手无利润垫时，以观察为主，关注低位后排标的，优先配置ETF，逐步加仓，规避未公布业绩的标的，绿盘低吸为主，跟踪持续抱团、站稳支撑的品种。

    光通信高位品种，短线需参照《5级风控》执行，走势破位及时离场，勿等待至跌破55日线再决策。

    高手可在21日线附近，选择熟悉且企稳的标的做反弹套利，止损离场即可。

    以上仅为学习参考，不构成投资建议。若无突发事件，海外算力相关的光通信板块，调整或于今日至下半周基本结束，后续有望延续行情。

    短期与日内操作提高胜率，可参考基金重仓指数节奏：直线杀跌时先行离场，企稳后再低吸。

    今日先看4050点支撑，下一级支撑为4020点。'
- record_id: recvi0mSBiIXLv
  文档标题: Vol.260427 拉锯式调整
  文档链接: https://my.feishu.cn/wiki/BoipwBOVXiusqpk45o5cNLqkn5g
  文档内容正文: '调整幅度80%ing，因为踏空的人更多。

    抱团只是松动，又不是死，分歧之后继续，它没那么极端了，因而就会变成双轮驱动，海外算力和国产算力都有机会。

    海外算力是有业绩和有预期的两块，业绩在旭创之外就是pcb本B，生益电子，沪电等，

    有预期的是光芯片，衬底，ocs等，这票人基本今天都走出企稳的架势，

    尤其光模块设备强力拉起来，它们当然也受益于朱格拉周期，带头的JPT，萝卜等，

    后排的燕麦凯格之类那一串继续看好，

    国产方面，华为昇腾一致性太强大家反而不想给游资抬轿，除了盛科仍是主升浪，资金果然去了芯片和CPU，东芯，海光，寒王，卓易等都不错，澜起也是回踩34就在讲过，重视intel链。

    芯片强了设备自然要扩产，业绩在长川已经体现了，玩家们都是老面孔，京仪装备等回踩买点结构的补涨就行了。

    今晚看美股的带动，如果大涨的促进海外算力的修复，就这么左脚踩右脚，右脚踩左脚的上去。

    越来越深刻体会到，设备更新的朱格拉周期来了。

    简单粗暴的588200/710讲了很多天，终于到了收获期，今早调整都仍然是机会，马前炮的，新手和后来者的福袋领到了么。'
- record_id: recvhWTap2U0Al
  文档标题: Vol.260426 国产芯片
  文档链接: https://my.feishu.cn/wiki/RRC0w1S0Uid7vgkJ8Xsc6jbFnDh
  文档内容正文: '财经媒体经常语不惊人死不休，标题是摩尔扭亏。这么说也没错，只是没讲时间尺度。

    摩尔线程一季报业绩：实现营收7.38亿元，同比增长155.35%；归母净利润0.29亿元，同比增加1.42亿元；归母扣非净利润亏损0.54亿元，亏损同比收窄60.10%。扭亏了，但未盈利。

    芯片与半导体领域的长期逻辑，是此前提到的“董事长执念”，本质是国家诉求。我国在芯片和半导体领域，不做到全球第一绝不罢休，即便做到单一领域第一也不会停止。

    在顶层视角，发展芯片与发展造船、卫星没有本质区别。汽车产业能够弯道超车成为全球第一，芯片产业同样可以。若寒武纪等企业无法超越茅台，就谈不上转型成功、实现科技强国。

    即便指出靶材、制程、全球协作等问题，也不会改变顶层发展决心，产业突破本就是需要攻克的难题。若不懂相关趋势，投资与产业判断都难以做好。

    从微观层面看，国产芯片四小龙为寒武纪、摩尔线程、沐曦、燧原，其中寒武纪市场竞争力最强。

    芯片的发展前景，并非取决于能否绑定互联网大厂，而在于能否面向广大中小企业实现稳定出货。

    寒武纪股价跌至900至1000元区间时，经分销及零售终端调研，其产品终端动销顺畅，而其余三家企业产品主要依靠关联方订单、人情订单支撑，例如某大厂作为燧原股东，会采购一定数量产品作为支持。

    终端市场中，用户首选英伟达显卡，在无英伟达显卡的情况下，海光与寒武纪产品可勉强替代，但存在应用场景少、运行速度慢等问题。

    行业内幕：在BATDM等互联网大厂中，国产芯片企业若能拿下一家合作方，市值基础可达4000亿；拿下两家，市值可达8000亿。寒武纪陈天石近年多次前往杭州，寻求与相关企业合作。

    利好方向：持续看好588200、710相关标的。零售终端反馈，CPU产品近期销量走高。

    浩宇星辰：芯原同时有阿里和字节两个合作方，是否会大幅增长？

    南院大王：芯原以IP与设计业务为主，不涉及芯片制造，芯片制造属于重资产行业，仅处于行业风口阶段。

    大元：卓易是否可以关注？

    南院大王：处于回踩结构，若能在均线粘合位置企稳更佳。

    春·江·水·暖：国产芯片是否应以华为海思为核心？

    南院大王：昇腾产业链竞争较为拥挤。'
- record_id: recvhNXalNX3ph
  文档标题: Vol.260425 大王与你读兵法6：命运要掌握在自己手中
  文档链接: https://my.feishu.cn/wiki/IGi2wCUChi7dKSkArdEc9RS7nPc
  文档内容正文: '大家都知道，在俄乌24小时大毛斩首失败时，大王就预测俄国赢不了了，再看他64公里长的车队堵在基辅外围，大王就更加判断他必然失败。

    同时俄乌的走势，从此不由俄国人说了算。他将从棋手的命运沦落为棋子，他更没有资格和别人唇亡齿寒。因为你沦为二流强国，充其量只有利用价值。

    判断的依据呢？

    孙子说，

    “夫钝兵挫锐，屈力殚货，则诸侯乘其弊而起，虽有智者不能善其后矣”。

    如果你的部队没有靠锐气一鼓作气拿下敌人，势头被挫败了，矛头钝了，将士疲惫了，力气用的差不多了，积累的财货物资也消耗殆尽了，那么其他的诸侯和国内外的反对势力，必然趁着你的颓势和不利局面趁火打劫，这样，你有再聪明的人也无法来挽救危亡。

    今天的俄国完全是这种情况，因为死活拿不下乌克兰，还被人家搞个大反攻，国内的财政也消费殆尽，正是“钝兵挫锐，屈力殚货”，所以外面是印度和非洲蹬鼻子上脸，拿了便宜还要骂，内部是普里戈津这种诸侯趁火打劫，大帝和他智囊研究半天，10多个小时没露面，但一点办法都没有。智者不能善其后啊。

    孙子说，

    “故兵闻拙速，未睹巧之久也”。

    所以用兵和战场上的，只听说过踏踏实实的速战速决，没有听说过花里花哨的把仗打的很久。

    二战时德国的“闪击战”，就是集中空军和装甲力 量搞突然泰山压顶式的袭击，一举摧毁敌军的有生力量，像攻克巴黎、闪击波兰都非常成功。

    91年海湾战争的沙漠风暴更是典型，开战后24个小时，美军通过巡航导弹、战机轰炸、特种作战等方式，完全废掉了伊拉克的指挥系统、防空系统、通讯系统，让整个伊军变成了聋子和瞎子。

    开战后4天，联军就击毁了伊拉克几乎所有地面的装甲部队，几乎摧毁了他整个陆军。

    击败一个拥兵百万的大国需要多少时间？美军告诉你，43天。

    美军有用到什么计谋吗？没有，就是导弹袭击、空军轰炸、二话不说压着吊打。这就是“拙速”。

    相反，30年后的俄军一会个新式武器，一会一个“下大棋”之类的，还不是说明别人有还手之力，你根本搞不定么？

    大王当时给俄军的建议是什么？拿不下基辅，立刻和谈，止损，丢点面子无所谓，这是他的最佳方案。

    为何？

    孙子说，

    “夫兵久而国利者，未之有也。”

    打仗打的很久而对国家有利的，从来没有过。

    同样是美军，沙漠风暴很成功，阿富汗一开始反恐很成功，一周内就占领了首都拿下90%的国土，“拙速”赢了。

    但是后来，美军驻扎在伊拉克和阿富汗不走了，打治安战，这就是“巧久”，结果亏了2万亿美元灰溜溜走人。

    唐代的杜佑说，兵者凶器，久则生变。时间一长，内部是你打仗日费千金烧不起钱，外部有人生出别样心思。朋友可能变成敌人，盟友可能决定卖你，平民也可能有了逆反心理。

    打仗啊，一定不能被对手拖成持久战。抗战的日军失败就是最典型的例子。

    孙子指出，

    “故不尽知用兵之害者，则不能尽知用兵之利也。”

    所以，不能详尽地了解打仗用兵的害处，就不能通 过对比全面地了解用兵的益处。

    孙子在这里强调的是底线思维，先考虑失败，先设想最坏的情况。

    一个仗你如果非要打，好。你先测算一下如果失败，你是什么结局。如果这个结局你能接受，那么 你再开战，如果不能，你悠着点。你所设想的益处 如果未经对比，都是一厢情愿。

    大王讲投资、创业、炒股时，为何一再跟大家讲，一定要低成本甚至零成本创业，一定要闲钱投资即使亏了也不心疼的那种，千万别加杠杆？因为你要做好最坏失败结局的心理建设。

    那个你都能接受，你做事必然游刃有余，因为不伤底子。

    当年抗美援朝，从纯战争角度，教员他们推演如果去朝鲜拿不下，“害处”是什么？最后总结是大不了相当于晚解放几年。益处呢？国际环境、收回东北、苏联的工业化体系。

    一合计，害处能接受，兵出鸭绿江。

    相反，俄乌战争，如果有人告诉大毛，你的害处是被世界封锁沦为二流强国，你看大帝还打么？

    综上，孙子告诉我们，在投资、创业、做事的时候，尽量搞低成本、零成本项目，目标不要太远大，短促突击积小胜为大胜，一个一个啃下来，不要加杠杆乱借钱，一定要有底线思维设想最大危害。

    当高管不要从老板手里接过目标太模糊要不断追加预算的项目，否则，你做大公司做大投资是做大风险，那资产就不是你的，而是债权人的了。

    动用老本的事情，一定要在自己可控的范围之内，命运才能掌握在自己的手中。'
- record_id: recvhFrO3Ksp8f
  文档标题: Vol.260424 苏州ETF又有新人
  文档链接: https://my.feishu.cn/wiki/NsPCweuzXigFaAkRLUqcPTCcn1q
  文档内容正文: '新易盛一季报：营收约83.38亿元，同比增长105.76%；归母净利润约27.80亿元，同比增长76.80%。

    和中创无法相比，业绩明显不及预期。

    龙一和龙二差距显著，中创是性价比最高的光模块企业。

    中际旭创最大的战略失误是没有收购同在成都的索尔思，索尔思堪称行业黄埔军校，成都地区研发实力本就偏弱。

    中际旭创当前处境尴尬，纯拼业绩不及中创，纯拼题材不及中孚。

    东山精密已超越胜宏科技，但无法超越中际旭创，与中际旭创的竞争值得关注。

    市场走势预判：板块上午或再度下探，下午开始修复，甚至上午低开即可完成调整，可参考基金重仓指数操作。

    此前跌幅达8%-10%、一季报业绩未不及预期的优质企业，若今日再跌6%-8%，激进投资者可分批机动抄底，后续有做T机会；稳健投资者等待走势企稳再入场。

    光模块板块行情未结束，此次是首次明确的分歧调整，后续上涨标的集中在业绩扎实或技术领先的企业，中游企业走势将承压。

    整体判断：短空长多。

    PCB板块

    生益电子2025年实现营业收入94.94亿元，同比增长102.57%；归母净利润14.73亿元，同比增长343.76%。

