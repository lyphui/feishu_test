  文档内容正文: '美股的昨天又是大涨，根据盘面和最近我们跟实体企业的交流，发现未来一段时间的上涨主要是三个卡点，

    物料、器件、设备。

    物料主要是上游的光学材料，半导体材料等，比如磷化铟的衬底，法拉第旋光片，铜箔，树脂，电子布，掩膜版等。

    器件是关键元器件，之前的GPU，光模块就是，现在体现为CPU、存储、CW/EML光芯片，光纤，光交换机，电感芯片等等。

    设备，则是用来扩产上述的生产设备和检测设备，比如光刻机那一串子，光模块全自动生产线，示波器等。

    把这三个领域捋清楚了，你就基本有了整个AI硬件的全景图。

    主力资金就是在这三个领域切来切去，在内部切来切去，一个搞完了搞下一个，具体不知道是谁们点右上角去搜，其实我更建议把文章通读，包括评论区，肌肉记忆了就。

    这三个领域毫无疑问是海外主导，玩家们业绩出色，催化不断，很难被证伪，女方一直就涨的比男方强。

    东大也差不多，卡点之前是GPU算力卡，昇腾和寒王基本解决后，会赶紧补AIDC数据中心，然后国产那套链会根据海外全部补一遍，最近的光迅就是，光模块三大黄埔军校，国产CPO。

    粟裕和101最喜欢干的事情是对地图发呆，打仗的首要任务吃透地图和地形，知道敌我双方兵力配置和意图，知己知彼百战不殆。

    今天虽然不上班但不开市，有条件的同学要多深入学习思考，自己得做点笔记的，把上述几个板块的主要玩家和态势搞清楚，这样你看到市场波动就心里有数了。

    美股昨天的大涨是给大A注入强心剂，下周预期还能拉一拉，但高处不胜寒，现在看图即可。

    如果给下杀，又是一轮低吸核心光，业绩光，技术光的机会。

    下周的两个方向，

    1，逼空式上涨，让很多人“投降式追高”再次相信光，呈现加速。

    2，切往机器人，软件，商业航天，电网设备等。

    1+2也是很有可能的，你心里有个本本，见招拆招就是。

    到了大家最喜欢的产业信息环节，数据中心的电源检测设备是个高端产品和要命环节，以前主要是台湾致茂在供应，根本做不过来，打电话给老美，讲潜在供应商是Xi''an
    Actionpower，即爱科赛博。

    （技术图形自己看哈）

    屯黄金太贵而且不好出手，这个铟条，屯起来供不应求。'
