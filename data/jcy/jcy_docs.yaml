  文档链接: https://my.feishu.cn/wiki/O3fOwKQWsiyl0ZkgQPBcISncnZb
  文档内容正文: '光扩产设备是咱们最早捋出的，产业逻辑是，如同宁德时代当年扩产成就先导之类的锂电设备，AI的朱格拉周期会更爆炸。之前说过的主要玩家，再捋一下：

    凯格精机（既有PCB也有光模块）、罗博特科（自动化整线，海外订单多，比如AAOI）、科瑞技术、智立方（科瑞更偏光耦合，也有检测，智立方更偏自动化，有整线）。

    博众谈了很多回，讲它buff叠满，20年果链经验，有灵猴机器人，收的中南鸿思尚未并表，给苏州某光模块巨头有做自动化设备，某电池巨头准备扶持它，还有个预期差在评论区讲过了，山姆奥特曼给它下单做硬件，这个业内还没什么知道。

    快克智能也有做光模块设备（AOI），同时还把很多精力放在了半导体封装。

    kewell，理论上也属于扩产受益，同类产品交货期高达9个月以上。

    为什么今早判断要反弹，因为本应是上周五就要的。

    上周一咱们的主题是“依然相信光”，埋伏的两个方向，光和光扩产设备。

    设备说过了，光以为代表，总体偏上游，至于应用，猫一天狗一天的很正常，等美方映射就行。

    “有孚，元吉”的背后，是我们顺天应人，仔细分析了技术到产业逻辑的全链条。

    ps，本星球所有内容均为产业研究和个人感悟，不构成任何建议。'
