  文档内容正文: '接力

    阿里平头哥又要上市，四小龙之一的燧原现在IPO得到受理。今年注定是自主可控大年，有芯片跟上，国产半导体/芯片挺进决赛的可能性进一步加强。

    平头哥利好什么？

    芯原股份，老朋友了，从回踩34日线就说它是低位。

    利扬芯片，平头哥核心测试伙伴。

    数据港，阿里系的IDC和云服务。

    云天励飞，回踩34日线后爬坡。

    其他要么不核心，要么图不行。

    当然，更核心的还是阿里本身和恒生科技ETF，只是弹性小点。

    这些东西如果高开，反而不要去追。

    如果利欧打开跌停更促进一步。还是强调不追高，水平一般的，ETF更好，实在左右搞不定，宽基科创50指数也合适，生产队手里的筹码出完了。新手菜鸟组合依然有用，机器人是当弱不弱。

    688＞300＞002＞600。

    王阳明有首诗：

    躲天意、避因果，诸般枷锁困真我；

    顺天意、承因果，今日方知我是我。

    盘感

    什么叫盘感和战场嗅觉？既看到大环境的情况，也看到风向的带动。

    被错杀的AI应用，在蓝标带领下企稳回升，且天地在线等人的强势封板并未引发打压，说明大环境尚可。今晨你再看到浙文率先封板，利欧也从地板直接起来，就知道情绪已然酝酿，很多人尚在观望，此时留给你低吸蓝标、易点、值得买的机会，尤其是早上再提的光云科技，688开头，本轮急先锋，又经过充分调整，时间有半个多小时，足够你从容排兵布阵，然后直线拉升。

    昨天专门提示的AI营销（露露小姐相关）、值得买之类，就是相信阿里能憋出大招。如果用“低开不是底，二次探底才是底”的方法，在易点二次探底的-13%左右补仓，今天应该能盈利。蓝标也是，第二个低开基本就把散户洗怕了。

    商业航天虽然总体上很容易被打压，但机构方向的品种你一眼就能看出来，不会给你直线跌停，反而试图在重要均线稳住，就像早上开盘前给刘旭讲的瀚讯这种，同样的还有利润超级高的中简（碳纤维龙头，中石化旗下的公司）。

    唯一我们对后来者用“战略性机会”“大年”“错杀”来描述，从去年说到现在的，就是传媒。它的ETF已经提示了，准确时点给你连续4天时间上车，一次20%起步，你起码建仓也差不多了。

    阿根廷队的速度、体力、身体都不是最强的，但战场嗅觉好啊，你但凡让梅西拿到球，瞬间就是一道蓝色光标。

    卫星也是猛，ETF再度涨停，这是要再试下监管的态度啊。除了咱们点的几个没怎么涨的，危墙之下不去为好。机构也是聪明，趁着太空的概念把套了很久的光伏设备导给散户。'
