  文档内容正文: '秘籍

    体会到双轮驱动的感觉了吧，

    科技一个滞涨，资金去拉了周期，

    这就是上上下下，左左右右，ABAB,

    周期的代表看化工，

    之前弹性比万华大的新和成新高，

    替代石油的煤化工两个重点，

    龚彧

    宝丰和金牛，昨天-9.99可以低吸，

    或者快跌停的能源化工etf，化工etf,

    当然鲁西也不错，

    两个华纤表现也对得起观众。

    周期强，科技就弱了点，退守主要阵地，

    比如华工这种，圆满实现伯利恒钢铁时刻，校友V5，孟小姐加油。

    乖离值50后，今天涨停，那就继续拿着，等它涨不动出现长影线的放量滞涨止盈，

    先往70看，70突破了再说100的事。

    用《三生万物》套阳光电源，一套一个准。

    真男人从不回头看爆炸，真龙头向来不会补缺口。

    科技和周期都不会死，各有各的逻辑，

    就比如上午大资金冲高卖了科技去买周期，但下午又有资金冲进来抄底了科技，基本是今天放量的那1000多亿来源。

    既有科技，又有周期，

    所谓性命双修，AABB.

    三个热门主题与一个产业消息

    光通信，龙虾/华为，算电协同。

    -科技埃了很久的打，这几天是回血窗口，

    昨晚，AAOI涨近9%, Lumentum涨超4%；继续映射二线光模块和光通信。

    英伟达GTC大会16号召开，各种技术和材料都有空间，

    哦对了二线光模块加上东山精密，以前谈过但没单拎，同时做 pcb+光模块，确实收购了索尔思之后有了些原料保障，号称拳打旭创，脚踢胜宏，也是醉了。

    -龙虾，无锡、深圳等地快速发布政策支持，继续是AIDC，云，龙虾+华为硬件，当然华为线的机构布局更深入，光模块后面还有电源，液冷之类。

    这个好好港股智谱和minimax的风向标，

    今天可能会往网络安全的概念上去凑，游资在搞的你板块里自己分析，比如我英方软件这种灾容备份，机构喜欢的一直是360。

    注意安全这块估计也就一两天的风，纯纯只适合高手手痒打野，今天如果高开可以不看。

    普通人也不建议线下装龙虾，门槛太高，token可是很贵的，另外你一堆权限都给了它让它自己玩，那就有个别名叫“木马”。

    -算电协同这两天有点分歧，毕竟从咱们说电开始，已经炒了多久了，这里不适合追高，反而要看乖离止盈，总体还是变压器稳一点，柔性直流输电关注igct，派瑞股份，最好是洗到18.18附近盘整，把那个大阳线追涨的时候洗走，乖离值也下来。

    最后再谈一个产业内部消息，好像苹果折叠屏手机要上市，但大王专门问了苹果公司前高管，他讲目前的铰链技术苹果看不上，不美观，有痕迹，采用的技术是液态金属，大A做这个的是东睦股份

    这里你心里有数即可，待催化热度上来，市场要炒这个概念你再计议。

    ps, pcb的宏妹，沪电等，昨天收复34日线且跳空高开，如果不补这个缺口，视为 pcb触底基本调整到位，那 pcb又能看看，弹性更大的，M9级电子布树脂涨过了，可以看CCL覆铜板，高端铜箔，日本那边是涨价的。

