- record_id: recvm6oxQiftYh
  文档标题: Vol.260610 时间换空间
  文档链接: https://my.feishu.cn/wiki/FMxKw75eIiAS2akdwc9caYvln6g
  文档内容正文: '来温习下最近的思路，市场调整的时间和空间都不足，反弹大概率呈现N字型走势，因此有机会就要减仓。昨天有没有操作失误的？

    如果周一早上拉升、昨日拉升时都没有离场，今日早盘就不建议割肉了。原因在于，今日大概率低开，倘若放量下跌打出恐慌盘，午后探底回升的概率会大幅增加。

    昨晚美股冲高回落，主要也是因为自身调整时间不足，各类资金都在观望今晚的CPI数据。一旦加息预期升温，市场走势会更加复杂，所以资金选择先行离场。

    还有哪些产业催化？网传消息称英伟达800V、HVDC和全光通信（包括CPO/OCS）相关进度将要延后，海外市场也因此率先下跌。

    CPO方案若延后，NPO方案依旧利好光模块。今日重点观察光纤能否顶住抛压、光模块能否企稳回升。从市场调研情况来看，6.4T光模块的技术路线与市场需求都保持顺畅。

    该消息同时利空近期走势向好的服务器电源板块，例如麦米、OLT等。Kewell类产品属于“其他电源”，是否会受到冲击还需进一步观察。相关消息也提到行业会以测试为先，例如台湾致茂。

    从更大维度来看，上周就提到黄仁勋提出“能铜则铜”，相关标的包括鼎通、博创、RKD、太辰光等，市场也将YDET归为连接器范畴进行炒作。

    今日主要观察三个方向：

    短线压力位依旧为4032、4053，指数若无法站稳该区间，将会再度向下寻求支撑，类似走势会反复出现。

    想要判断强势方向，可以参考基金重仓指数的动向，近期市场大多采用跟随策略。

    对于经验丰富的投资者而言，以上盘面动态与行业信息，足以作为操作参考。

    当然，相关网传消息只是短期扰动，并不会改变整体产业趋势。拉长时间维度来看，这类波动都只是短期情绪影响。

    附言：以上内容均为产业研究与个人观察心得，不构成任何投资建议。'
- record_id: recvm9yUe2zPNg
  文档标题: Vol.260610 谈谈玻璃基板
  文档链接: https://my.feishu.cn/wiki/AxpKw6KeXiIhsKkl0m2ceYQFnbf
  文档内容正文: 'N型反弹的情况下，只有放量下跌后才能实现洗盘目的，今天上午，主力哼哧哼哧的放量1200亿，不容易啊，只是洗出了一点点恐慌盘，

    所以下午V度就有限了，

    全球科技一盘棋，今天的情况说什么都没用，大家都是随波逐流的舟，也不用多问，晚上看美股的数据的反馈。

    谈谈战略级别玻璃基板，跟康宁的本土与海外高管沟通后，得出如下初步结论，

    1，玻璃基板是必然要做的，现在树脂类的基板在散热，损耗，布线等方面已经接近物理极限，未来2-3年，部分先进制程的高端芯片要用玻璃。

    2，国外目前主推的是英特尔，台积电也做了一些封装测试，良率不高，但可行性经过了验证。

    3，这个领域第一个环节是玻璃原片，这个由美国康宁，肖特等垄断，要对玻璃配方进行不断的升级优化，中国的京东方，买回原片后，进行打磨，打孔等，做成衬底，

    京东方是康宁最大的客户之一，也就是说，它会变成绕不开的一环，但注意，它的主营业务还是面板，玻璃基板是第二增长曲线。

    4，第二个，玻璃基板要把集成电路排进去，最难的问题是打孔，太脆，很容易碎，解决方法有两个，一个是用激光，TGV打孔，一个是蚀刻，湿法化学，相当于用药水泡出纹路。

    5，这个产业里，弹性最大的应该是激光设备，蚀刻设备，通常激光厂家会把蚀刻做进

    TGV整线，我们沟通下来是帝尔激光有可能性，但并未完全确认，市场上认可的是沃格光电，美迪凯说自己做了湿法蚀刻，我们后面找人去验证。

    康宁讲理论上那些激光玩的好的都有机会，同学也可以打探发掘。

    市场的调整有其周期，时间幅度到了，自然就上去了，有时候什么都没错，需要的是时间而已，就比如我们说的新龙远东，

    无锡的公司，老板蒋锡培很多年前就成名了，号称宜兴首富，人非常精明强干，本来就做电缆，后来折腾个上市公司三普药业，十几年啥也没搞出来，最后还是回归电缆光纤，现在市值终于超过500亿了。

    大王当年参与过他们一个咨询的项目，对方很重视很配合，做的也很扎实，

    只是工厂不知道在哪个荒郊野外，路边过去的草丛有半人高，带队的大佬是大城市过来，说请大家喝下午茶，路边买了块小零食，8两，一两40块，花了320。

    那是我第一次认识切糕。'
- record_id: recvm0qvKxSdo4
  文档标题: Vol.260609 迎接修复的方法论
  文档链接: https://my.feishu.cn/wiki/Mtc8wqygUiF9Tek1PfvcjY3Hnuc
  文档内容正文: '昨晚美股修复的是光模块、存储、光纤、连接器、部分硅光设备，估计大A跟它的修复差不多。

    你的科技板块上涨了，是逢高离场还是继续持有？缩量上涨或者冲高回落，代表上涨缺乏持续性，建议减仓或离场；放量上涨则可以先持有，再观察一两天。

    注意，高位阶段出现缩量上涨，说明抛售筹码较少，主力并未离场；底部阶段出现放量上涨，说明入场资金增多，主力开始进场。

    如何判断放量？券商软件里可以查看量比，也可以对比分时成交量。和前两日对比即可，比如上周三、周四单日成交量在15亿左右，若当日上午10点成交量就达到10亿，即为放量，成交量柱体红且变长也代表放量。

    具体产业催化如下：

    谷歌向英特尔下单，计划到2028年生产超过300万颗TPU，英特尔股价大涨。澜起科技股价触及34日线叠加缺口位置，关注能否守住该位置，此次事件对制程领域利好更为明显，红板科技是英特尔优质PCB供应商，相关走势自行研判，切勿盲目追高。

    亚马逊宣布与康宁达成数十亿美元协议，康宁股价大涨，利好长飞、亨通等企业，以及通鼎等代工企业。

    除海外板块修复外，半导体设备板块出现反弹的概率也很大，该板块调整时间早于光模块板块，例如标的710股价临近55日线。

    昨日走强的机器人板块今日大概率承压回落，这也是检验个股强弱的关键节点，今日物理AI板块若高开，切勿追入。

    整体来看，当前市场位置较为尴尬，行情虽有调整，但并未调整到位，整体性价比一般，不过仍有资金进场博弈。

    反弹行情会持续数日，但反弹结束后再度回落的概率较大，回落之后市场依旧会再度回升。

    大家可结合自身情况参考分析思路，技术经验不足的普通投资者，短期建议保持谨慎。若想参与行情，可关注两类标的：

    此前有投资者询问苹果折叠屏相关标的，结合与相关企业高管的交流信息，其较为看好东睦股份，该企业的液态金属材料应用后可实现屏幕无折痕效果，同时也有业内人士对此观点进行佐证。需注意，该题材行情需要相关新闻与产业催化配合，走势才会更强，需密切关注外部相关动态。

