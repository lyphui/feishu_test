- record_id: recvkdNEjWD8UH
  文档标题: Vol.260510 大王与你读兵法8：保住本金，让利润奔跑
  文档链接: https://my.feishu.cn/wiki/GpL3wE68WitDNQk1Xeqc8efBnpd
  文档内容正文: '孙子告诉君主长年打仗和漫长补给线的危害："力屈、财殚，中原内虚于家。百姓之费，十去其七；公家之费，破车罢马，甲胄矢弩，戟盾矛橹，丘牛大车，十去其六。"

    如果久久拿不下对方，国家常年处于战争状态，军力耗尽，财力枯竭，国内便会出现十室九空、普遍贫穷的状况。

    百姓的财产将因战争而耗去十分之七；国家的财富也会由于车辆损坏、马匹疲劳生病、盔甲服装、箭羽弓弩、枪戟盾牌、车蔽大橹的制造补充而耗去十分之六。

    也就是说，居民部门、政府部门、军工部门都会耗尽积累，走向贫穷，金融部门提前就已经陷入瘫痪。

    所谓的国力，本质就是能给各个部门加杠杆。当再也没有办法腾挪资源，财力、民力、军力就会集体陷入衰竭。

    "故智将务食于敌，食敌一钟，当吾二十钟；秆一石，当吾二十石。"

    所以，高明的将帅总是力求在敌国解决粮草供应问题。消耗敌国的一钟粮食，相当于从本国运送二十钟粮食；耗费敌国的一石草料，等同于从本国运送二十石草料。

    希特勒当年吞并捷克、闪击波兰、占领法国都十分顺利，因为那些国家本身经济发达，搜刮到的资源能够支撑战争消耗。但后来攻打南斯拉夫、苏联，就违背了作战原则，这些地方本身经济落后、民生困顿，道路条件极差，坦克都难以行进，贸然进攻只会白白耗费自身资源、得不偿失。

    德国原本就不算富庶，东线战场最终将其彻底拖垮；即便是财力雄厚的美国，发动阿富汗战争也亏损严重。

    孙子认为，打仗必然要以谋求盈利为目的，底线是绝不亏本。一方面要减少自身消耗，没有看准局势绝不盲目投入重金；另一方面要想方设法消耗敌人实力，做到自身少花钱，最好不花钱。

    守住自身的资源和本金，就是保住有生力量，方能立于不败之地。

    比如投资中有10万元本金，盈利1.6万元，明明已经超出自身止盈标准，却因贪心想要赚取更多收益，迟迟不愿卖出。

    后续遭遇市场大幅调整，盈利从1.6万元变为亏损7000元，此时又盲目补仓20万元，最终深度被套。

    正确的做法，正是前文所说的"拙速"。到达止盈点位果断离场，即便有所保留，也应大部分卖出，只用盈利的1.6万元继续操作，这就是"因粮于敌"。后续操作亏损殆尽也绝不补仓，若能盈利则验证自身投资逻辑即可。

    在创业领域提倡的低成本创业、零成本创业，并非是让创业者不购置基础设备、空壳公司忽悠牟利，而是倡导践行"务食于敌"的思维。必要的开支仍需投入，但尽量让客户承担相关成本，减少动用自有本金去做远距离、高消耗的投入。

    举例来说，想要开设精酿馆，第一步绝不是租赁门面、采购设备，而是先精准找到喜爱精酿啤酒、有休闲社交需求的潜在人群，准备精美方案与酒样对接洽谈，邀约客户提前充值办卡。设定前20名成为联合创始人，可享受饮酒八折优惠，还能分得5%利润。

    若有10人每人出资一万元，门店房租问题便能顺利解决，打造纯预付会员制的私密精酿馆也就有了基础。

    当然，这样的举例只是为了讲解底层原理。

    再看一个典型案例，贾跃亭造车几乎从未动用过自己的资金，全程都是践行"务食于敌"，依靠外部资源维系运作。

    贾跃亭能够长期维持自身运作，核心就是不用消耗自身后勤资源，依托市场与投资方资源立足，这也是他能够一直周旋的原因。

    读懂《孙子兵法》的不只有高启强，还有贾跃亭这类资本玩家。'
