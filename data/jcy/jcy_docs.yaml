    东阳光老朋友了，全资收购了秦淮数据，这可是刘圣布局的公司，大资金在里头长远玩的，它的产业逻辑不赘述了。

    -可控核聚变，不就是合锻那几个，再不会最简单是永鼎，左右光芯片右手核聚变。

    至于海外算力，天塌不了，很多不在踩了34日线拉起来吗？

    lumument你不行了，是因为源杰，永鼎，长光之类的起来了，

    易中天之类的虽然审美疲劳需要在这里震荡，但光芯片，cpo，比如萝卜等人，因为盘子小概念多，还是有人青睐跑的更快的。

    国产芯片昨天就说当强仍强，寒王就差一个小作文和催化了，给大家找的低位芯原也不错。

    用好34日线，如鱼得水。

    丙午年，信了吗'
