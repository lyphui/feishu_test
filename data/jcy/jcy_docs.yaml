  文档内容正文: '继续看反抽

    4190是一个强大的压力位，如果能突破或者站稳，有望形成震荡中枢，不能站稳则有继续下探4108的可能性。

    普通人管住仓位，不要上头，高手想要做T和抄底，可以根据这两个位置操作，当前行情更不能追高。

    半导体设备今日或将出现分化，核心的设备或者材料板块依然会加速走强，588710上行轨道未破，依旧可以继续持有，后续操作要坚持去弱留强，高位行情目前以看图博弈为主。相关技术逻辑，这几日已反复讲解。

