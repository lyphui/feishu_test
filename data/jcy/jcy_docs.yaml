  文档内容正文: '为什么要多读书呢？读书多了，你才能明白人家背后的真正含义。

    上一卦我们学习了奶茶妹的名字泽天。

    今天学习国内一个券商叫做“天风证券”。

    天风是啥意思，卦象上是天下有风，吹遍大地，寓意着阴阳交合，万物茂盛。

    在上一卦的夬，决断以后，旧的去了，新的来了，就像天遇见风，

    这个就是“姤”，是一种未经安排的不期而遇，孽缘也好，正缘也好，天意要给你，躲不开的。

    姤：女壮，勿用取女。

    象曰：天下有风，姤。后以施命诰四方。

    这个姑娘太强大，不宜娶来当老婆。

    先贤是非常智慧幽默的，没你想的那么古板，他是打比方教你。

    你在聚会或者某个场合遇见一个女孩子，两人感觉还好，她跟你一开始也有互动，但随后冷了下来，开始玩高冷，

    你打开她朋友圈，不是高端聚会，就是名牌包包，国外旅游，文案是各种享受孤独，自立要强，放手吧兄弟，这不是你的菜，万万不可娶回家里去。

    真能给你好好处下去的姑娘，哪有天天标榜自己独立女性的，武则天那么强说自己独立女性了吗？

    “后以施命诰四方”，古代的女性的地位都是“诰命夫人”，人家是号令四方或者周旋于各个男人之间的，你hold住吗？你发现了就晚了亲。

    先贤是警示你，不是所有的不期而遇都是美好的，机会可能潜藏着危机，不要贸然行动，做好沉着应对。

    那么一个人，怎么对待缘分中突然出现的人和事呢？

    初六。系于金柅，贞吉。有攸往，见凶。羸豕孚蹢躅。

    象曰：系于金柅，柔道牵也。

    柅，是车的制动装置。羸（léi），瘦弱。豕，猪。孚，同“浮”，浮躁，不安静。蹢躅（zhí zhú），同“踯躅”，徘徊。

    用细柔之线牵附于黄铜柅之上做好刹车，上来就长驱直入是凶险的，最后会像瘦弱的猪被不情愿地拖走。

    有些人刚认识一个人或者刚看一个股票，都没好好了解，就掏心掏肺，重仓买入，一点都没有刹车装置和止损措施，

    但现实呢？这个世界上绝大多数人都是得到了就会厌弃而不懂得珍惜，绝大多数主力都是散户你敢追高它一定埋你一下。

    生活中，很多人忽然有个朋友来找他，说有个什么煤炭工程医美能赚钱，他就给真信了，觉得这机会真好，热血沸腾的，几天后立刻投入百万，能有好事吗？“有攸往，见凶”。

    关系要慢慢展开，机会要冷静观察，一旦发现直觉警告或者自己驾驭不了的东西，要刹车，止损，抽身。

    九二。包有鱼，无咎，不利宾。

    象曰：包有鱼，义不及宾也。

    包，通“庖”，指厨房或包裹。

    厨中有鱼，这是好的，但是不能用来招待宾客。

    为什么？你就这条鱼啊，你给她们吃了你吃啥？

    你就几千工资，省吃俭用吃糠咽菜的，刚认识个女孩子又是买苹果17又是买Lv的，一有好东西就想着对方，对方有为你想过吗？

    你进入一个所谓“上游圈层”，你经常给大佬跑腿办事，问题是大佬给你打招呼办事吗？你说他身份敏感不方便，那逢年过节想到你吗？

    人和人，和事的相处要“均等”，你对她好当然可以，但应有限度，不能严重牺牲自己去补贴别人，但凡一方付出太多的都不长久。

    不要让感情和女人来支配你，要保持对所爱者的控制能力，不是每个人都值得你敞开胸怀。

    九三。臀无肤，其行次且。厉，无大咎。

    象曰：其行次且，行未牵也。

    屁股上蹭破了皮，行进很困难；会遇到危险，因为你力所不能及，反而不会有大的灾祸。

    很多人恨不得抓住所有的牛股，吃到每一个主升浪，踏空一次那个叫做难受，

    你就没想过可能反而是保护你吗？真上去亏了咋办？

    人们错过机会是正常的，严丝合缝是极不正常的，把错过等同于坏事，心智还不够成熟。

    绿城的宋卫平和融创的孙宏斌，就是不期而遇，两人一开始谈的特别好，老宋掏心掏肺，犯了前两爻所有的错，

    2014年，宋卫平把绿城中国卖给了融创，说是托付，

    卖完后老宋就后悔了，顺驰的营销铁军那是一个什么打法啊，加上行情反弹，宋卫平想把公司拿回来，

    未果后又卖给了中交，他基本淡出地产大佬圈。

    但你看现在呢？许家印认罪，王石被传出事，孙大圣焦头烂额一头白发，

    宋卫平反而成幸存，每天悠哉在杭州喝茶。

    九四。包无鱼，起凶。

    象曰：无鱼之凶，远民也。

    相遇之道需真诚互动，礼尚往来，人和人的关系，最终要靠真诚和心意，

    网上有各种教程段子谈人要自私，什么有事说事没事别bb，什么关系就是互相利用，看似拎得清很冷酷，其实是“远民”之道，丢掉了为人处世的根本，

    你是什么人，你就吸引来什么人。你周围都是唯利是图狐朋狗友，哪一天你兜里没鱼了没利用价值了，你还有什么用处？

    要和一个本身就素质很高很好的人相处，就算翻脸也不会伤害你，要去持有基本面本身就很好的股票，就算波动也迟早能起来。

    古人讲的门当户对，是说不要和层次太低的交往，讲话粗俗，缺乏教养，脾气暴躁，对你再好这种邂逅也不要。

    九五。以杞包瓜，含章，有陨自天。

    象曰：九五含章，中正也；有陨自天，志不舍命也。

    杞，是杞柳，可以编成筐。章，是璋，也是美。

    五星酒店大堂的导视牌，xx家“弄璋之喜”，你要知道这是生男孩。

    用杞柳包着甜瓜，就像含章之美，内怀美质而不外露，机遇就会像陨石坠落般从天而降。

    不要天天去追求机会，这里一个项目，那里一个圈子，你把自己做好，品德和才华修养好，富贵腾达自然会来找你。

    不要去做个追求机会的人，做一个让机会过来追求你的人，让蝴蝶自来好不好？

    上九。姤其角，吝，无咎。

    象曰：姤其角，上穷吝也。

    遭遇野兽，处于它的角锋之下，不是好兆头，但没有大的灾难。

    机遇是因人而异的，不要强求，好高骛远，孤傲硬刚，终将会遗憾无助。

    姤，是什么呢？

    是缘分带动我们的相遇。

    诺贝尔文学奖得主、波兰诗人辛波斯卡写过一首诗，

    他如此形容这样的相遇：只因在人群中多看了你一眼。

    后来被台湾漫画家几米写进了《向左走·向右走》，还拍成了电影。

    ps.从象的寓意上说，“女壮，勿用取女”。

    此时，阴气开始渐长，阳气有点消退，新的题材，可能是谁呢？

    谷歌的TPU/OCS或者校花带动的上下游。

    也有可能是别的，突然间跃入眼帘。

    愿我们，

    珍惜所有的不期而遇，

    看淡所有的不辞而别。

