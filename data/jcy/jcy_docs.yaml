  文档内容正文: '马年尤其要注意的两个方位

    封建迷信，断不可信，仅为娱乐。

    丙午马年，属于中国历里面的"赤马红羊"。

    九宫飞星，是能量的布局和分散方式。

    以你家的中轴为核心，有两个位置尤其重要。

    一是正北，这是偏财位。

    代表中年男性，贵人、权力、驿马，主偏财、技术权威，军警公职、晋升调动等。

    股市赚的钱，也是偏财。

    催旺之法：遵"金生水"之理，用金属性的风水蛇、锅、金属聚宝盆等，金气生水，象征财源滚滚。

    禁忌：摆放大型木质家具，忌红色、紫色等，忌阴暗、潮湿。

    公职人员宜摆官印摆件，强化权力气场。

    二是正南，离宫五行属火，代表中年女性，又是太岁方位、主灾祸、疾病、血光、重大破财，需重点化解。

    遵"宜静不宜动、宜泄不宜克"之理，用金泄火气，可缓缓疏导凶性能量。

    首选铜葫芦、铜铃、六帝钱等大型金属摆件。次选白色系装饰，南方离宫大都是窗户及阳台，可选用白色、银色窗帘化其凶性。

    尤其注意，不要在此方位动土、装修、钻墙、敲打、钉钉子之类。

    忌摆放红色、黄色物品，忌堆放杂物、垃圾桶、破损家具。

    今年一定要把家中存的纸箱子壳子、快递包装之类的扔掉，把冰箱里的各种冷冻肉、僵尸肉扔掉，这些东西不仅价值低，还很有可能伤害中女的健康，易引发失眠、炎症等问题。

    最后，午也是驿马，出差和变动的机会增多，一定要注意，禁止开快车、开斗气车，酒店尽量选择品质高的。

    有口腔溃疡、上火、嗓子疼、眼睛不舒服、烧烫伤、热感冒的人群需多加注意；有老年人的家庭，一定要注意心脑血管疾病。

    多喝水，大量喝水。家里常备NFC椰子水，椰子水性寒，归脾，还能补充电解质，是食补下火首选。

    最后忽然想起伊朗人，

    这帮人每天神叨叨的，却不真研究五运六气，真有懂行的，要在蛇年争取和懂王把协议签了，拖到马年，火如此之旺，丙午又是冲突和清算，

    伊朗有很大概率要打一下子了。'
