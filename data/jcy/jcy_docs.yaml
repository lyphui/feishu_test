  文档标题: Vol.260505 来鹅城就干三件事
  文档链接: https://my.feishu.cn/wiki/FUrJwjSVhivm6ekBzpTcLI1xnhg
  文档内容正文: '假日期间见一个好朋友,他同学是meta在美国的高管(不是上次买负责采购讲供应商的,而是行政和市场的)。

    他讲现在小扎亲自就盯三件事,

    一个是算力,大建数据中心,

    一个是人力,保留优秀有用的人才升级Ai。

    meta今年要砸1600亿美元,花钱的任务很重。

    还见了当年一个朋友,此君当年也是国内互联网领域的大拿,咖位仅次于雷布斯那一级,他每年一半时间在硅谷,

    就讲这两年北美大中小云厂商找他明显多了起来,希望他推荐引荐中国的供应商,甚至指名道姓要买Innolight的光模块的(即某创,当然买不到)。

    包括亚马逊之类的巨头们就在搞三件事,

    一是搞电力,大力上马各种快电,

    二是搞算力,狂建数据中心。

    老美的很多私募基金发明了新玩法,自己买卡买电搞土方,建成"独立数据中心",然后直接打包转卖给大厂。

    你搞不定的批文,他能搞定,你弄不来的变压器,他能买到,他建成AIDC卖给你,里面有什么东大违jin装备,那不是你的事。

    老美各种二代们的关系用淋漓尽致。

    三是人力,一边挖各种华人的优秀人才和超级工程师,一边在内部砍人。

    总之有钱了就搞电力算力人力,没钱了就裁员弄出钱来。

    中国有吗,中国有国家算力服务平台。

    国内目前还没没有大干快上数据中心,主要是卡买不到,等到腾950等国产卡大面积稳定后,你放心,

    各地的城公司城建公司肯定会大干一轮,发出各种算力债,数据中心债,再出现几个xx城投之类的基建牛骨。'
