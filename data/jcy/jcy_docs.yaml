  文档内容正文: '乐观一点

    鹤公在《两次大危机研究》中说，

    "这些明显的错误在事后看起来显得可笑，但对当事人来说，实施正确的政策却困难重重。这是因为，大危机在人的一生中往往仅会遇到一次"。

    最近有些同学们的账户受到冲击，比如回头想明明应该配置煤化工的，明明应该在跌破位后走人减仓的，但就是没有行动。

    其次不用苛责自己，那些政治家们都经常遇到这种问题和误判，碰到剧烈波动也是一把抓瞎，何况凡人呢，你也仅遇到过一次。

    看到长期的更远的方向就行了。

    昨天，十五五规划的全文正式出炉，显然，这是结合了最近美伊局势的，

    摘几句原文，

    对大环境的判断，

    【世界经济增长动能不足、风险积累；大国博弈更加复杂激烈，外部环境的不确定性不稳定性明显增强。

    百年变局加速演进，国际力量对比深刻调整，新一轮科技革命和产业变革加速突破，我国具备主动运筹国际空间、塑造外部环境的诸多有利因素】。

    是机遇和挑战都更大了，但有利于我们的机遇明显增多，就看怎么把握。

    那我们怎么办呢？

    【以历史主动精神克难关、战风险、迎挑战，集中力量办好自己的事，统筹布局、精心安排，巩固拓展优势、破除瓶颈制约、补强短板弱项，

    在激烈国际竞争中赢得战略主动，以高质量发展的确定性应对各种不确定性，续写经济快速发展和社会长期稳定两大奇迹新篇章。】

    说的已经很明白了，保持战略定力，增强必胜信心，积极识变应变求变，勇于面对挑战，短空，长多，风浪越大鱼越贵！

    后面，我们会把规划里提到的产业跟大家做一个系统梳理，

    尤其是那些"加强""加""着力打"内容和方向。抓住下一个5-10年的重点。

    全文内容很多官媒都是晚上10点后发的，他们也很着急啊。

    易经第38卦睽，办小事，找大腿

    不得不佩服先贤的智慧和顺应时事啊，美伊战争之际，走到了第38卦，睽。

    睽是瞪眼睛，众目睽睽我们都学过。

    睽。小事吉。

    象曰：上火下泽，睽。君子以同而异。

    火苗是向上燃烧的，而水是向下渗透的

    这两者是朝相反的方向行进的，水火，是背离的。

    这就是睽，睽即矛盾。

    矛盾而没有合力的情况下，大盘背离的情况下，小事是吉祥的，不能办大事。

    如今的美国和伊朗，真是水火不容啊。

    那问题是，在这种环境下需要什么策略呢？或者

    说在职场和生活中，你碰到了跟你对立的

    人和事，应该怎么办呢？

    初九。悔亡，丧马勿逐，自复。见恶人，无咎。

    象曰：见恶人，以辟咎也。

    马丢了，不必悔恨，也不要去追着寻找，自己会回来的。遇到你不喜欢的人或事，主动去见见，避免冲突。

    初期有分歧时，保持开放沟通，比如刚破位先减个仓，

    硬碰硬不如以柔克刚。

    九二。遇主于巷，无咎。

    象曰：遇主于巷，未失道也。

    在狭窄的小巷里遇到了贵人，你知道自己没有偏离大的路线。

    搞斗争一定是要有山头的，你不能单枪匹马跟别人干，要有大佬的依托。

    比如财务部总是为难你这个小销售员不给报销，你跑去财务部闹有啥用，你知道市场总监跟财务总监很不对付，就得投靠站队。

    投靠就得放下身段，在非正式的、私下的小场合"小巷"，去喝酒吃饭，主动寻求沟通与联合。

    大环境不好，总有相对是好的，这就是我们经常说的"去弱留强"，

    大盘不行了，总有几个板块拒绝下跌，板块不行了，总有几个死扛的，别人稀里哗啦它还坚挺，那就是贵人画像。

    六三。见舆曳，其牛掣。其人天且劓，无初有终。

    象曰：见舆曳，位不当也；无初有终，遇刚也。

    舆是车子。曳，是拖，拉。

    天，指古代在罪人的额部刺字，劓，是割掉鼻子的酷刑。

    看见一辆拉货的车，拉车的牛一俯一仰拉得很费劲，赶车的人是一个烙了额，割了鼻的奴隶。起初车子陷着不动，后来终于拉动了。

    这是个形象的比喻，说明了困境非常艰难，左右摇摆，前后掣肘，到这时候你得坚持住，坚持住了才有统战价值。

    五行不定，输个干净啊。

    九四。睽孤，遇元夫。交孚，厉无咎。

    象曰：交孚无咎，志行也。

    在众目孤立你的大环境中，你遇到了一位有地位、可信赖的大人物，

    此时，只要以诚相待("交孚"，哪怕过程有风险，也能转危为安。

    要投靠靠：

    六五。悔亡，厥宗噬肤，往何咎。

    象曰：厥宗噬肤，往有庆也。

    找到大佬和结盟成功后呢？

    悔恨消失了，大家像同宗族的人一样一起去吃肉，开心的庆祝，又有什么问题呢？

    一旦投靠大国和龙头，环境好转后资金和支持源源不断，吃肉喝酒。

    就像咱们，50年代时教员的策略是什么呢？

    "一边倒"，"打扫干净屋子再请客"。

    朝鲜战争以后，苏联的156工程全面落地

    同志+兄弟的帮忙，5年时间我们就变成了一个工业国。

    而印度呢，东西横跳，试图在东西方之间渔利，

    搞"第三条路线"，结果两边都不是真心帮。

    上九。睽孤，见豕负涂，载鬼一车。先张之弧，后说之弧，匪寇婚媾。往遇雨则吉。

    豕，猪。涂，是泥。弧，弓箭。说，同"脱"。

    处在极其孤立的状态。恍恍惚惚间看见一头猪，背上涂满污泥；又看见一辆车，满载着像鬼一样的人。

    你起来张弓欲射想和他们拼命，后放下了弓箭。原来不是来杀你的强盗，而是去迎亲队伍。认识清楚后前往，遇雨可获吉祥。

    这是对整个背离的一个总结，在混乱的时期，要么减仓观望，要么双轮驱动，不要忌盲目跟风或重仓押注方向，因为机会只有小的，

    越是底部的时候，越是悲观的时候，鬼故事越多，"载鬼一车"，而当你做对事情后，悄然间发现雨已到来，种种的怀疑都烟消云散，喜酒将要喝上，一切又变的美好。

    最后根据先贤本卦指引做两个仅供一笑的预测，

    一是，碰到迎亲的队伍基本代表走出困境了，迎亲也就迎懂王了，大概3月底前后，那天会下雨或者是雨后的一天吗？

    二是，"交孚无咎，志行也"。

    孚是龙头，大佬，是不是也指带孚的呢？

    交往带孚的中间有波折，最终行稳致远。

    大A里带孚的了可不少，

    通信是天孚，铝业是中孚，电池是安孚，脑机是可孚，特气是三孚。

    到底谁是真孚呢，哈哈'
