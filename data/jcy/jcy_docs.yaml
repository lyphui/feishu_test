    生益电子回踩至买点结构低点，涨幅表现良好，略逊于头部企业。

    三环集团一季报：营业收入26.81亿元，同比增长46.25%；归母净利润7.91亿元，同比增长48.48%，业绩稳健。持续看好MLCC领域，该领域看似不起眼，但利润率高、行业壁垒高、技术含量不低，是AI基建的核心基础材料，不可或缺。

    设备板块

    科瑞技术2025年全年实现营业收入26.32亿元，同比增长7.55%；归母净利润2.73亿元，同比增长95.93%。

    2026年一季度实现营业收入6.18亿元，同比增长15.42%；归母净利润6942.10万元，同比增长56%；扣非归母净利润5291.25万元，同比增长仅17.50%。受行业淡季与结算周期影响，业绩表现不及预期。

    公司N类业务占比22.5%，其中光模块与半导体业务占比8%，相关设备已实现出货。

