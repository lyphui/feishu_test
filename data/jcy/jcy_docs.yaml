  文档内容正文: '把错卖的东西再买回来

    2026年2月份以来，

    全球市场陷入了一种"投入恐慌"，

    担心两个问题，

    一是大厂们(CSP)不计代价的动辄投入数千亿美元的砸AI硬件和数据中心，会不会非常过剩，这钱能不能赚回来。

    二是软件公司受到大模型冲击后，手中掌握的数据和客户是否会一文不值。

    因此不计代价的，

    卖出AI硬件，抛售AI应用。

    英伟达亲儿子corewave7连跌，连谷歌都被怀疑巴菲特是不是老糊涂。

    接着，人们掉头买入了大量的石油，化工等板块，回归传统。

    这也是A股那段时间狂杀科技，周期走的较好的原因。

    经过那段时间的"群体无意识"，有些人慢慢回过神来，

    "超前基建"是非常有必要的，你不可能等需求上来再去搞数据中心，没一两年没结果，根本来不及。

    这就是"宁肯人等装备，不能装备等人"。

    就像这次的红包大战，豆包红包非常顺畅，而腾讯明显跟不上，阿里点多了就崩溃。

    这就是AIDC的建设，犹豫和落后了。

    大厂们得先挖好池子，才能迎接到AI可能带来的泼天富贵。

    即：

    梭哈AI，可能找死，赢家不一定是你，

    不梭哈AI，一定等死，你一点机会没有。

    大资金终于回过神来，

    又开始把以前错杀的元器件和光模块等买了回来。

    因为不管谷歌还是亚马逊谁赢，它们都是供应商，它们不关心谁是县长，反正做县长夫人就行。

    我们看到：

    搞光器件的lumument，已经创下历史新高，

