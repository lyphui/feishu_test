    嗨，干脆不要了，不入你的局，小性子给别人使去吧，无情破全局。

    这一卦的困境，是冲的太猛，升的太多，所造成的后果，

    先贤告诉我们，在投资和人生这场马拉松中，最大的困境，往往来自内心的贪婪与恐惧。

