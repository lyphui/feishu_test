- record_id: recvkeuP9jofpJ
  文档标题: Vol.260430 大王与你读兵法7：不要添油战术频繁补仓
  文档链接: https://my.feishu.cn/wiki/GRwOwZHPTiBFg8kwVukc0V1lnSf
  文档内容正文: '孙子说：“善用兵者，役不再籍，粮不三载，取用于国，因粮于敌，故军食可足也。”

    这里的“再”“三”，都是多次的意思。役是服兵役，“籍”是从人口名册上征兵。《木兰辞》中“军书十二卷，卷卷有爷名”，就是要征发木兰的父亲去打仗。

    这句话的意思是：善于用兵的人，不用多次从国内征集兵员，不用多次从国内运送军粮。武器装备从国内取用一次后，要从敌人那里设法夺取粮食，这样军队的给养就可以充足，打仗不会亏钱。

    为什么呢？

    “国之贫于师者远输，远输则百姓贫。近于师者贵卖，贵卖则百姓财竭，财竭则急于丘役。力屈、财殚，中原内虚于家。”

    如果长期远距离输送物资，国家财政就会入不敷出，大量消耗国内的资源，百姓会因此而陷入贫困。

    凡是大军所使用的物资，都容易因大军的需求而紧俏、涨价，那么百姓只能花高价购买，导致民间财力枯竭。百姓财力枯竭，就会引发国家赋税告急。

    长久下去，整个国家民力匮乏，财政破产，内部被完全掏空。

    孙子告诉我们，打仗是一件极其花钱的事，而远距离供应前线，对所有人都是一场灾难。

    首先能供应上去的比例非常低，因为运粮的人马也要吃饭，沿途需要保护和各项开支。汉武帝征讨贵州时，供应比是120:1，军队吃1斤粮食，路上就要消耗120斤。

    其次因为物资管控完全依靠行政和官方渠道，必然导致效率低下，进一步加剧物资损耗。

    第三因为物资紧缺，会导致贪腐四起，黑市横行，老百姓财富急剧流失。

    所以，打成黏糊仗必然是国家、居民、军队的三输局面。

    美国实力再强，在阿富汗和伊拉克采取远距离补给模式，也亏掉数万亿美元最终撤军。

    孙子的思想和建议：

    一是，打仗要么不打，一旦要打，就要狮子搏兔，一次性带足火力、装备与给养，以绝对优势一举击溃对方。

    二是，如果无法一举打垮对手，千万不要频繁补仓，用更大的错误去掩盖小错误，只会让亏损窟窿越变越大。

    就像炒股，很多人本打算只用一万元小试牛刀，亏损600元后，再补入两万元想要翻本，再次亏损2000元，又继续补入五万元，最终深度套牢。

    欧奈尔和霍华德·马克斯的观点高度一致：看准行情就重仓布局一次，这种操作高度依赖自身胜率判断。

    如果只是小额试水，一定要提前设定好止损线，盈利多少卖出、亏损多少离场，必须严格遵守交易纪律。欧奈尔后期只做杯柄形态交易，大部分时间保持空仓，盈利目标看到40%，亏损达到8%就认定判断失误，直接离场。

    最忌讳的就是犹豫不决、拖泥带水，既舍不得止损，又一心想着翻本。拿抗日战争举例，李宗仁曾这样评价日军：等到中国民愤达到最高潮，以致卢沟桥事变无法收场，大规模用兵在所难免之时，日本又不愿倾尽全国兵力来犯。等到兵力不足时，才逐次增兵，投入作战。这种“逐次增兵法”，已然犯了兵家大忌。

    中国地广人稠，日军一个师团、一个师团陆续开进中国，就像把酱油一滴一滴滴入水中，直到整瓶酱油滴完，也会被湖水慢慢稀释、消融于无形。

    日本人就是这样，一步步向中国大陆投入了六七十个师团，最终依旧深陷战场泥潭，进退维谷。

    说白了，日本在东北、朝鲜靠投机赚了巨额利益，原本只想在华北小打小闹，结果卢沟桥事变后不断添兵补仓，千里运粮、跨海补给线消耗巨大，最后国内百姓连铁锅都捐献出来造枪械，把1895年以来积攒的全部家底都亏得一干二净。

    《作战篇》给到我们三点启示：

    严守纪律，牢记纪律。

    俄乌战争也是同理，先是特种部队作战失利，随即补充国防军；依旧无法取胜，再增派雇佣兵；战局仍无改观，又在国内先后征兵三十万、再征三十万。

    再强大的主体，也经不起反复三次添油式补仓。'
- record_id: recvi8SNs6E5tx
  文档标题: Vol.260429 独走的一日
  文档链接: https://my.feishu.cn/wiki/Dm7Kw91cZioQ4mkoHuBcq08gnnh
  文档内容正文: '昨天政治局会议出了研究工作的通稿，主线还是科技自立自强，提了六张网。

    水网、新电网、算力网、通信网、地下管网、物流网。

    新电网的核心是柔性直流输电，绕不过的是做变流芯片IGCT的派瑞股份，真“算电协同”的代表是南网数字。

    当时它们都处于高位，后来建议待60日线收敛回踩后再进场。

    算力网的核心是AIDC数据中心，年初就提到招标不断，龙头当然是协创，昨天提到可以博一下业绩的恒润也不错，去年一共也就盈利8000万，今年一季度基本达到，略超市场预期，今年总利润大约5亿，折合当前估值也就25倍PE左右。

    国内数据中心/算力租赁的情况是，协创有GB300和存储，宏景据说有GB300，恒润、利通，都是英伟达H800。

    国家一体化算力的芯片/设备=588200/710。

    目前看，设备的弹性更大，造芯片先得设备扩产，龙头长川即典型的“高位放出巨量+高位放量滞涨”，以前都是每日20多亿的成交量，4月27日成交70多亿，换手率大了3倍，4月28日依旧70亿成交，但涨不上去了，这种图形此前多次讲过，大家自行对照，上涨就持有，一出现这种情况，盘中剧烈杀跌先跑为敬。

    半导体设备这两天看江丰能否接过旗帜，688板块里的拓荆已经箱体盘整了4个多月，迟早突破这个平台，后续的京仪处于回踩买点的震荡粘合期。

    再看海外算力的业绩，胜宏不及预期是预期内的，生益电子一季报扣非归母净利润为4.41亿元，同比上升122.8%。

    PCB板块长期受上游压制，比如鼎泰、宏和等钻针、电子布价格上涨，因而一直没有启动，二季度下游有望涨价15%-30%。

    其他的业绩报基本没什么好谈的，大幅超预期会遭遇卖现实压盘，不及预期则被认为利空出尽，中线上还是要看产业逻辑。

    短线则跟随基金重仓指数走势即可，大幅砸盘时不要接飞刀，走出双底且有量能拉升后再跟进。

    日本股市今日放假，作为日经升级版的A股，量化和机构没了参考物大概率走势混乱，就看下午能否走出拉升行情。

    最后谈一个产业情况，了解到PCB上游还将长期缺货，品种包括玻璃纤维布、覆铜板、半固化片（PP）。

    大家可以看看还有哪个板块和标的基本没涨过。'
