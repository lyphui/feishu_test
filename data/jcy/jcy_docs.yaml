  文档内容正文: '缩圈与分化

    昨天3.6万亿成交震撼生产队，

    上面进行了降温，减持，风险警告，宣布自己的公司业务占比很小等等。

    对此我们的判断是，

    牛市的节奏不会变，量能在就行，

    既然要压盘，那么就会导致，两大热点，商业航天与AI应用会进一步分化与缩圈，

    后排掉队的越来越多，你就集中前排和确实有实力的即可，不断去弱留强。

    商业航天此时完全和基本面没关系，就是看图阶段，破5日线就跑。

    胆子大等它批量跌停或者都要-7%-8%之类抓紧跑。

    AI应用昨天已经超越商业航天，

    依然要聚焦传媒广告视频等，后面的什么AI医疗，AI矿山之类的先不看。

    要变现最快的是广告费，做多再带点值得买之类的AI营销和导流。

    相比之下Ai应用刚起来，空间更大点。

