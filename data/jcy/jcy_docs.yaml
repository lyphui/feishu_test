  文档内容正文: '这是一个系列，考察和访问的都是业内或者特定领域比较有影响力的人士。

    这次考察的结论分享，

    1，苏州能成这一轮光之国的主力，在于长线眼光和雪厚坡长，

    它们在2007年就开始真刀实枪的投资硬科技，“攻成不必在我，攻成必将有我”。

    中国MEMS第一股就是苏州投出来的，2007到2015亏了8年，没关系，坚持。

    8年后这笔投资回报100多倍。

    所以，投资科技产业，要有钱，更要有决心和耐心。

    2，感觉AI现在谈不上泡沫，大厂巨头们资本开支的高峰在2027年，通信产业（AI）机器人取代消费电子产业的趋势明显。

    它们给出的订单更大，利润更高。

    消费电子火了多少年，想想苹果。

    3，能出口和赚美元的企业都是好企业，有句玩笑话，东大不会干的叫做高科技，东大会干的叫做制造业，东大大面积干的叫做内卷。

    东大准备干的光通信，趋势无疑。

    4，以前觉得工程师厉害，科学家厉害，现在搞管理，做战略，觉得教员厉害，教员是人性的大师啊，没事多看看《大决战》，和企业管理异曲同工。

    ps，领导者是非常优秀的企业家，谦虚低调，平易近人，热爱家庭，正在往通信产业积极迈进。仅为分享感想，不构成任何建议尤其是mai入，目前的图形没有走好，科技整个板块也处于尴尬位置。'
- record_id: recvmxuc7XsgQm
  文档标题: Vol.260613 易经第51震，一震之威，乃至于此
  文档链接: https://my.feishu.cn/wiki/RMOrwacQxiJxWpkDweUcW5qSnMg
  文档内容正文: '革故鼎新之后，新不是一天就能出来，故也不会瞬间就能走的，中间有个激烈博弈的过程，这个过程就是震荡的“震”卦。

    雷声滚滚，既是危险，也是机遇。

    那普通人面对这种震荡如何自处呢？

    震。亨。震来虩虩，笑言哑哑。震惊百里，不丧匕鬯。

    象曰：洊雷，震。君子以恐惧修省。

    虩虩（xì xì），恐惧、害怕的样子。

    哑哑（è è），指谈笑自若的样子。

    匕（bǐ）：古代的汤勺。

    鬯（chàng），古代祭祀用的香酒。

    洊（jiàn）：再，连续不断的意思。

    这句意思是，

    就要办大事（祭祀）之时，巨雷猝响，震惊百里，有的人吓得瑟瑟发抖，片刻之后才能谈笑如常。有的人却神态自若，手里拿着酒勺子，一滴酒都没有洒出来。

    震的意象，本卦上下卦都为震，震为雷。巨雷连击，就是震。君子看到这种情况，从而心怀敬畏，反省过失，迎接新的阶段。

    初九。震来虩虩，后笑言哑哑，吉。

    象曰：震来虩虩，恐致福也。笑言哑哑，后有则也。

    雷声传来，吓得浑身发抖，是因为相信敬畏重大的天象可以免罪得福。

    后来听到雷声仍能谈笑如常，是说后来对这类事情有了些经验。

    人在生活中总会遇到突发事件，也坏的也有好的，慌是正常的，这是生物的本能，其实你不用硬装镇定，先承认冲击，接纳现实，然后立刻执行预案，该备份备份、该止损止损、该通报通报、该确认确认。

    我们解读的兵法和每天复盘，核心目前之一都是让大家养成思维和行为的肌肉记忆：

    “如果发生了什么什么，那么你应该怎么办？”

    打雷不是坏事，恐惧不是坏事，怕才会认真检查流程和自己哪做的好，哪做的不好，比如说跌破支撑该走的，贪了，看到冲高回落要卖的，犹豫了，事后还能回到规则、回到章法，那就叫吉。

    这就是教员说的“成绩是总结出来的”真正含义。

    六二。震来厉，亿丧贝。跻（jī）于九陵，勿逐，七日得。

    象曰：震来厉，乘刚也。

    雷电交加，洪水泛滥，损失了不少钱财，这时候抓紧跑到高高的山陵上去躲避。别去追那些丢失的东西，过七天它自己就回来了。

    遇到大动荡，先保全自己最重要，不要因为了眼前的损失去硬拼，时间会给你补偿，这就是我们反复说的，“机会成本不参与决策”，只要大势在，暂时的撤退也不算什么，I
    will be back。

    为什么全球一动荡美债就会升？美债是全球流动性最好信用最高的资产，是“九陵”，买入它，可以“避险”。

    通样的，还有中国机构一遇大波动就喜欢买的煤炭银行之类的“高股息”。

    “敌进我退，敌退我进”，留待有用之身最重要。

    六三。震苏苏，震行无眚（shěng）。

    象曰：震苏苏，位不当也。

    出门时，雷声让人心神不宁，疑惧不安。但只要你顺着雷声的方向谨慎前行，就不会有灾祸。

    前行和革新的道路并不是一帆风顺的，而是很多波折甚至大震荡，所以一开始不能重仓，只能试探性买入，试探性跟随，待行情逐渐明朗，趋势日渐成型之后，再大把押注，

    所以，学会看大势，观察雷声的方向就非常重要。你为什么赢，因为你永远现在赢的一方。

    中国互联网过去的20年何止雷声震震，而孙正义是怎么投出阿里的，1999年，它平铺了几乎所有的中国电商企业，给了马云2000万美元，

    2003年看到和ebay打的有来有去，再投资6000万美元的投资+3000万美元的可转债，

    2004年看到胜局初定，又追加6000万美元，成为阿里第二大股东。

    不要光看到2014年上市时，软银从阿里身上赚了2900倍，更要看到孙正义是怎么建仓和观察风向的。

    试探也并不一定就都是好的，马上有结果，

    九四：震遂泥。

    象曰：震遂泥，未光也。

    雷一打，地面烂，车陷泥里，局面没法清亮起来，这时候别瞎折腾，非想着要大干一场，越挣扎陷得越深，

    先做好止损、清理、切割、反思等事情，先把泥弄干净，理清关系头绪、拔出腿来。

    有些人生活中一团乱麻，失恋，亏钱，身体不好，亲友吵架全纠缠一起，第一件事不是马上去硬杠，而是先好好休息，把情绪从烂泥里拔出来，再去分头解决。

    你说要彻底改变自己，看齐全球精英，别立那么大志向，先从今天跑步10分钟开始。

    六五。震往来厉，亿无丧，有事。

    象曰：震往来厉，危行也。其事在中，大无丧也。

    震动来来回回，局面持续紧绷，不管往上走还是往下走都很危险，这时候要稳住核心，就不会有大的损失，将来依然能翻盘。

    这个核心是什么？你的心态，纪律，操守，人品，价值观，不因环境剧变而改变。

    就像邓公，三起三落，多大的震荡，他矢志不渝，初心不改。

    大底子和自己的系统不丢，将来就还能卷土重来，这就是为什么可口可乐说，

    哪怕你拿走它所有的土地厂房和资金，它还能再建一个可口可乐。

    震荡里最怕两种极端，要么非常激进，硬顶着上，要么坐视不管，眼睁睁看着事态糜烂，危机的时候，反而是观察核心人才，核心企业的优质窗口，

    上六。震索索，视矍矍，征凶。震不于其躬，于其邻，无咎。婚媾有言。

    象曰：震索索，未得中也。虽凶无咎，畏邻戒也。

    矍矍（jué jué）,眼神乱跳、四处张望，

    躬（gōng）, 自身。

    婚媾（gòu）, 联姻方，合作人等。

    雷声到了顶点，吓得瑟瑟发抖，眼神乱瞟，这时候出击就凶险。好在雷没劈到自己，只是劈到了邻居，所以你没啥事。这会抓紧查缺补漏，引以为戒，别去搞谈婚论嫁之类的大事。

    现实中这种事情很多，某公司出现问题，全行业自查自纠，某兄弟单位有了事情，你抓紧看自己这方面有没问题，赶紧补漏，雷声滚滚，一切好处和坏处，都容易被放大。

    总之，震卦讲的是面临“未有之大变局”和突发情况时的处置之道。

    遇到变故，恐惧在所难免，要调整心态，冷静处理，不被财物所累，先保安全位置然后持守中道，顺势而为；见邻有震，预先戒备，迎接下一个周期的到来。

    震，其实是一个吉卦，没有震动，哪来的机会，没有惊蛰，哪来的万物复苏，没有新的第二增长曲线出来，哪来的更上一层楼呢？

    震，意象，是两个木，是挺拔，是生长，是底部放量，有没点类似之前讲过的图一？

    ps，上周五，主线科技发生了我们要“严防”的放量滞涨，冲高回落，而底部老登如同一声轰隆，纷纷绽放。

    如果按纯国学的意象，下周将电闪雷鸣，高度震荡，普通人已经不适合再参与了，最好守纪律，控仓位，观风向。

    那么，到底是（1），震中风格切换，辞旧迎新，高低切换，还是（2）震中高位辗转，去弱留强，高高切换呢？'
