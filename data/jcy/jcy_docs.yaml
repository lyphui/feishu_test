    它是一整个AI工厂全套方案，推动液冷、CPO共封装光学规模落地，定义800V高压供电标准，联动电源、散热、光模块、先进封装全产业链升级。

    采用用1.6nmGAA工艺、背面供电、硅光子光互连，带宽提升10倍，能耗下降90%，专为世界模型、物理AI、通用人工智能打造。

    沿着光芯片光通信的道路，前进。

