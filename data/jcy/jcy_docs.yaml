    这是损卦的最高境界啊，大道之行也，天下为公。

    我们日常做的那些蝇营狗苟，苦心孤诣，各种钻营，在圣人看来都是非常可笑的，本未倒置啊。

    你做好自己的产品，不用宣发搞什么百亿红包，外卖大战，客户自然会来，

    你精益自己的技能水平，不用溜须拍马，升值加薪就在眼前。

    你不要想着，求财，求爱，求未来，

    那个求不来的，

    你自己就当成是财富，是光明，是爱本身，

    你就是春天，春天自然而来。

    ps，有孚，元吉，无咎，可贞。

    你懂的。'
