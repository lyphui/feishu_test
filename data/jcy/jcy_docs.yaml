    光模块：华工

    光芯片：长光，袁杰

    cpo：jpt，天孚

    ocs：德科立

    变压器：重庆之光

    快则明天有个反弹。

    电源液冷等都体现了强烈华为特征。

    去年华为收入约8809亿，分红大约770亿。

    评论区：

    大维：龙科中芯怎么看

    南院大王：纯技术说，昨天非战之罪，跌破60日照，明天不反弹或随板块上涨可以减仓，等企稳

    Carl：今天如果抗跌的甚至涨的科技方向的股，未来是不是很大可能性会更好

    南院大王：去弱留强

