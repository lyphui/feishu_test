  文档标题: Vol.260330 大王与你读兵法3：打仗不是用阴谋诡计
  文档链接: https://my.feishu.cn/wiki/Jb7hw6xI2ivjmKk4xVbcG3wynxA
  文档内容正文: '孙子说：“计利以听，乃为之势，以佐其外。势，因利而制权也。”

    君主和统帅听从了有利的计策，在内部完成5+7大模型的推演计算后，还要懂得造势，以此作为重要的辅助力量和外部条件。

    “势”是什么？就是根据实际情况灵活机变，主动制造对自己有利的局面。

    孙子用兵，一向注重造“势”。管理者和统帅要善于做“势”，而不是只埋头做具体琐事。

    他在后文专门设有《势篇》，讲到造势要做到“如转圆石于千仞之山”。不用多说从千仞高山滚下圆石的巨大杀伤力，就好比从三十楼抛下一块重物，其中蕴含的重力势能是极其恐怖的。

    因利制权、借势造势有一个典型案例，就是对越自卫反击战。首先国内新闻大面积报道越军侵入云南边境烧杀抢掠、大规模排华的斑斑血泪，激发全民愤慨，让这场战争具备天然的正义性。

    随后邓小平同志闪电访美，期间谈及越南问题，外界无从知晓中美达成的具体共识。

    访美回国之后，苏联因不了解内情，不敢贸然出兵支援越南；联合国及西方主要国家普遍对中国抱有同情；而越南内部争吵不休、陷入慌乱，无法判断我军真实决心。

    紧接着解放军发起突然反击，以势压人，一次性投入三十万大军，杀鸡用牛刀，数周便兵临谅山、直逼河内城下，一举戳破越南自诩“第三军事强国”和“东南亚霸主”的神话。

    相比之下，俄乌冲突中普京的打法，既没有掌控大势，又缺乏国内充分动员，还采用添油增兵的战术，完全是反面教材。

    孙子又说：“兵者，诡道也。”

    这是大家耳熟能详的一句话，大众普遍的解读是，兵法就是玩弄阴谋诡计。

    很多地摊文学还把《孙子兵法》和《三十六计》合编为一本书。

    其实二者境界相差甚远。三十六计顶多是小技巧、小手段，属于技巧层面；而《孙子兵法》是战略层面，是一套严谨缜密的完整体系。

    所谓诡道，并非玩弄心机、刻意欺骗，而是隐藏、变化、灵活机变的意思。“诡”在古汉语中，本义是变化、隐藏、隐匿踪迹。

    孙子真正想表达的是：兵法，是一门围绕战略目标，衡量各方参数变化与实力对比，随时隐藏自身意图、调动牵制对手的学问。

    归根结底，一切布局都是为了提升战争胜算。内在核心永远是道、天、地、法、将以及整体大模型推演。世界上绝大多数战争，都是强者战胜弱者、先进战胜落后、灵活变通战胜僵化保守。

    那些以少胜多、以弱胜强、八百破十万的传奇战例，和中彩票一样极其稀少，不能寄希望于赌这种小概率事件。

    孙子一贯的要求是，在形成实力碾压的基础上，还要在具体战术层面高度重视，用尽所有方法手段。

    曹操解读诡道，谓之“兵无常形”；后来岳飞也说“运用之妙，存乎一心”。因为道、天、地、法、将的局势条件，时时刻刻都在发生变化。

    在战略层面的内在根基稳固夯实之后，战术层面该如何借力操作？

    “故能而示之不能，用而示之不用，近而示之远，远而示之近。”

    也就是有作战能力，反而装作没有能力；准备出兵作战，反而装作按兵不动；打算进攻近处，反而装作要攻打远方；打算进攻远方，反而装作要攻打近处。

    “利而诱之，乱而取之。”

    对方贪图利益，就用好处引诱他；趁对方混乱，或是主动制造混乱，再伺机攻取。

    “实而备之，强而避之。”

    如果敌方兵力雄厚、实力强盛，就要严加防备，不可贸然行动。

    李靖说：“观其虚则进，见其实则止。”

    如果敌方集中优势兵力强攻某一区域，就要避开其锋芒，不要正面硬拼、无谓消耗。

    存人失地，人地皆存；存地失人，人地皆失。

    像一战凡尔登战役打成绞肉机，尸山血海、死磕硬耗，在中国兵家看来，就是笨拙的打法。

    “怒而挠之，卑而骄之，佚而劳之，亲而离之。”

    对方性情易怒，就故意挑逗扰乱、激怒对方；对方谨慎保守、怯于出战，就刻意吹捧使其骄傲自大；对方休整充分、精力充沛，就不断袭扰使其疲于奔命；对方内部团结和睦，就设法挑拨离间、制造内讧。

    刻意诱导俄罗斯出兵乌克兰，就是典型的“怒而挠之，卑而骄之”。刻意吹捧俄罗斯军事实力世界第二，再纵容乌克兰谋求加入北约，刺激俄罗斯因怒兴兵、贸然开战。

    “攻其无备，出其不意。”

    很多人把这句话简单理解为趁人不备、突然偷袭，这是片面的。

    在孙子的思想里，这是战术层面的总体指导原则：进攻对方薄弱、防备不足的环节，打击对方战略疏忽、重视不足的短板。这种薄弱点，既可以是战场层面，也可以是政治、军备、将帅决策等各个层面。

    核心思路始终是以己之长，克敌之短。

    “此兵家之胜，不可先传也。”

    这是兵家克敌制胜的核心要领，只可意会实操，不可预先外泄。'
