    另外磷化、旋光片也是缺的，衬底在云南业之外，博杰股份也有2-6英寸的。

    -核心元器件，cw/eml光芯片、DSP的优迅、裕太微(国产)。

    -cpu，澜起为代表。

    海外设备的龙头评论区谈过是JPT，有人问国产萝卜智立方怎么没提了，好端端的不用提。

    根据和coherent高管沟通，CPO硅透能做出来的他们也就看好个炬光。

    其他旭创代表的校花们不整述了，要追她搞159381就可以了。

    预期下个礼拜光还能搞搞，今天能反包昨天阴线的多看一看。

    这里注意《三生万物》的基本原理，21日线弹上去的，就不能再跌破弹上去的5日平台了，一破要奔着34-55日去。

    有子弹的一定的陪着涨涨，后面的一条隐约支线已经出来了，上游材料涨价和设备缺货。

    周末给大家整理一下，

    《AI稀缺物料设备与拟涨价材料一览》，刚和英伟达几大供应商聊过，放心，你来得及的，今天又是缩量5000亿的上涨。

    咱们之前反复说MLCC和CCL铜"简直没怎么涨过"，威力你也体会到了。

    昨天感觉一步到位，一语成谶啊，

