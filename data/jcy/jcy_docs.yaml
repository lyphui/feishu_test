  文档标题: Vol.260513 残暴的欢愉(2)；加速的美好时光
  文档链接: https://my.feishu.cn/wiki/UtHfwjzs1ipwk2khNuecfudjnNe
  文档内容正文: '残暴的欢愉(2)

    思思讲关键的时候中午要可以加更，既有害怕跌，更有怕拿不住了要。

    好建议，下述仅对短线和操作型同学，

    昨天市场跌成那样，昨晚美股大跌，为什么依然能量看好今天低开高走？

    因为还有一哆嗦，哆嗦没来怎么跌？

    这一哆嗦的巅峰体验，你懂的。

    今天是那一哆嗦吗？还不是，我们本来预计的是周四五。

    因为没有大放量，因为大妈富联还在崩老头骗人

    进来。

    两个ETF159381和588710和主力品种，前天讲过了，图好好的干嘛卖？

    就算高了也要有配得感，坚守这么久不就为了欢愉这么一下子？

    啥叫图没坏？

    最优秀的是，始终缩量上涨的那种，偏前排的那种。

    最差的，今天拉升还算努力，21日线不跌穿的那种。

    其实最严格的风控是跌破5日线跑路。

    有的均线粘合或者凌乱的总那么在箱体里面的，不要跌破箱体。

    标准讲了N遍，图要学会自己看。

    到了明天，看情况就得把你拿的“后排品种”，前排猛涨它很萎靡的那种，基本出掉了，尤其是海外算力，国产半导体，商业航天。

    那新来的和还有仓位的呢？这不是搞加法的时候。看涨的眼热能不能追？会刀口舔血的也就明后天了，你有那个技术自己上？

    如图，这条黑色的线就叫“上行轨道”，最近是不是一直不跌破？它跌破了就走。

    我们有没看错的可能性，有的。但关键时候，要的是一万，不是万一。

    下班年的大机会酝酿中了，资金在悄悄的切往咱们之前说的中位，比如电力设备，软件，没怎么涨的AI通胀品等，谁是王者暂时不清晰而已。

    耐心，稳住，几天的事情。

    新主题是啥？不知道，但一定有，高度也可能更高。就像以前，你听说过具身智能和商业航天的概念吗？

    善用兵者，先为不可胜，以待敌之可胜。

    最新消息是黄教主最后时刻也上了空军一号，利好光和AIDC,应用。

    加速的美好时光

    如何？昨天看到美股跌一堆预言今天要跌的大V，扭头就给你反包了吧？

    早盘割肉的又后悔了吧？明天等你追进来，呵呵，最好是你明天观望一天，后天追。

    咱们为什么能踏准节奏？因为太了解机构了，不涨出不了货啊。

    这几天市场，就是踏空的机构和两融进来追涨，买的啥，前排龙头。

    男方半导体设备/芯片，女方的光模块，pcb等。

    普通散户恐高是不敢进的，你拿后排的人家不给你涨。

    所以一直很大家讲那两个etf，90%的人跑不过的。

    来复习下知识点。

    -高位的海外算力里还有什么机会补涨？

    多次谈过的CCL，MLCC。

    铜箔的铜冠之类涨了多久，生益科技，华正才多久？MLCC的三环，风华等，简直没涨呢，Q布错过了二代也给大家谈了三代的菲利华。

    -高位的国产算力里还有什么补涨？AIDC数据中心，协创到大位那票子人我们熟的。

    -中位呢？电网设备，工业母机，AI应用等，切换不会顺畅而已。

    所以整体的思路是什么？错过了海外算力看国产算力，错过了国产算力看二线补涨，错过了二线补涨看中位板块，层层退台切换。

    只是你切到一定地步就有卡顿，我们最好是避免这个卡顿。

    而不想卡顿又要在刀口舔血的最佳方式，就是搞ETF。

    你今天不一定能跑得过压岁钱EtF。

    那么它放量了吗？没有。

    创业板创下来了2015年以来的新高，

    放量了吗，不好意思，没有。

    缩量上涨还要继续涨。

    今天，尚且没有看出到顶的迹象，量能3.2万亿不算过分，五大指标也就仅出现复联涨停而已，主线的品种继续拿着。

    ps，有些新同学说我刚来，错过那一波主升浪怎么办？后面还有的，管住手'
