  文档内容正文: '今天虽然多点开花，其实就两个东西。

    1，一个是稀缺材料和涨价品种的修复，

    比如光纤，铜缆，衬底等，

    光纤是光板块的最前锋，远东修复了吧，铜缆则是上周讲过的逻辑，老黄亲自说能用铜则铜，谈了三个代表性的，博创，鼎通，RKD，之前表现的是后两个，今天轮到创业板的博，你再看铜缆一片红火，地板上趴着RKD，打个野6个点到手。

    MLCC，CCL等老生常谈了，有没体会到"它们基本没涨过"？

    谈技术可能错失产业，谈产业就得容忍波动。

    比如kewell，每当你动摇的时候，问问自己，缺货期9个月以上的情况还记得吗？还看好()倍对标的致茂吗？它涨了多少？

    同样的派瑞，既然它529放量跌破21日线你不走，那就是看产业和国网5年的4万亿规划的，起码拿2年以上，一时涨跌重要吗？

    论在电这个领域的造诣，kewll，铂科，中恒等人，在它面前都是幼儿园，你去问一下专业搞电的朋友，西电所在中国什么地位，毛利率67%，净利润32%，A股几个公司有这么高？

    不要反复给你说没事，阐述的文章都没看，总是慌不择路咋办咋办，那不就只盯着眼前？ 四道菜你都吃不上啊亲。

    今年以来的判断，这是一个新朱格拉周期的开始，所以更看好工业母机和自动化设备之类，今天机器人有点退潮，但创世纪，新锐等机床还可以，不断在验证这个趋势。

    另一个是早上说的国产半导体设备，如期顶上来，因为710已经触及34日线快55了，绝大多数人都跑不过它这个etf。

    好同学把法拉电子叫成法拉利，这个东西专门沟通过大厂的高管，也是有涨价预期的，包括之前谈铂新材的芯片电感。

    没有人比我们更懂量价齐升，MLCC直讲三环集团最强，因为大厂只认日本村和潮州三环。

    "鼎，元吉，亨"。

    元吉的这回轮到亨通了。

    依然看好孚在21日线是否企稳，巳日就是周五，看你表现了。'
- record_id: recvlUCSHrkumw
  文档标题: Vol.260608 六月兵棋推演与行情展望
  文档链接: https://my.feishu.cn/wiki/NKABwiyxPiTtoFkwVAQcLyRonSf
  文档内容正文: '首先讲一下现在仍是牛市，3万亿成交。

    周五的市场大跌，市场的资金走了没？并没出逃，放量3000亿，只是调仓换股了。

    你会发现上涨家数比以往多了。

    革故，上礼拜基本革了，主要对高位科技，鼎新，本周来鼎。

    我们分高位、中位、低位，来谈。

    1、科技未来怎么走势？一轮调整后，冰火两重天。

    真有业绩和利润的还会上来，蹭概念和充数的可能就上不来了。

    短期可能是有下挫的，主要是村长讲了，"坚决遏制赌押赛道、风格漂移、高位发行等顽疾，更不能回到''冲规模、赚快钱''的老路上去"，这比美联储的加息预期狠多了。

    拥挤度太高了，调一下也正常，以某创为代表，51到现在涨了快40%了。

    如果你拿的是科技，开盘不用慌了割，你看到10点甚至10点半前后，看有无资金进来抄底拉升，那时候你再减也来得及。

    那手里还有仓位，谁赢你站谁的隆科多们要抄底呢？先看缩量企稳。起码大阴线后3天不创新低你再去试错。

    科技的调整，先极限看看某创震荡一番在千元大关附近稳住，正好是21-34日线附近。

    不要慌，515880上升通道的5日线不都还没跌破？

    2、鼎新可能的中位。

    中位的三个板块，机器人、电网设备、AI应用。

    首要代表的还是机器人，抱团龙还是绿的，白毛股神带货只是催化而已。

    绿的涨了我们并不像市场看好减速器，反而是朱格拉设备代表的扩产设备，工业母机等。

    工业母机以昊志、创世纪、纽威数控、中控等代表，扩产设备是老朋友萝卜、凯格、博众等，去弱留强。

    同时，密切关注中钨高新（金州精工）、新锐股份21日线的机会/动静。

    同时要看，资金到底是否往"纯机器人"切，比如鸣志电器、兆威机电上切，个人认为他们的景气度不如那些带AI的装备。

    这里的ETF科创机械588850。

    电网设备也是大多数人跑不过ETF，比如159320，现在依然在箱体上，本周你就看它究竟是受益被切入方向还是血包方向，AI应用也一样。

    中位的问题在于，比较尴尬，说高不高，说低不低，要看博弈结果。

    3、还可能一步切往的低位。

    比如零售和白酒。

    这个以前谈过，只看超级龙头，比如零售的步步高，白酒的金徽、酒鬼。

    美股的周五就出现了切消费的苗头。

    4、中长线趋势怎么看？依然看好科技，所以有些同学可以采用的策略是，止盈科技后观望，反正不去消费。

    当然市场部分可能搞的活跃方向，是6G、玻璃基板、商业航天、AIPC等，玻璃基板就看做板的京东方和打孔的帝尔激光，商航只有两家能看，马斯克供应商的信维通信和西部材料。

    这几个也是泛科技，毫无必要追高，不给性价比不要，最好方法是分批次试探性试错。

    本周前期要深度考虑的两个问题，

    其实是：

    A、半导体派发完后，CPO即将跌倒后，谁作为科技新一代领军人物顶上来。

    B、科技部分资金外溢后，谁在承接切换。

    我谈一个可能搞笑但概率不低的可能性，市场乱战一番后，未走向高切低，反而是科技切科技，高位切高位。

    5、想了解盘中情况，风往哪吹呢？点开基金重仓指数，看里头它在买卖什么板块品种，跟着就行。

    以上，就是我们对高中低位可能发生情况的演习和"兵棋推演"，它发生什么，你怎么应对。

    既然是甲午月，那么，调整的幅度可能很大，烈度可能很高，但好处是，调整的时间可能很短，可能噼里啪啦的就调完了，比如直接把3993甚至3923的缺口补了。

    今天压力位4032，支撑则在3993，那时会观察主力机构在做什么了吧。别慌，牛还在。'
