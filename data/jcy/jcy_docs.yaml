    横批，有失有得。

    有时候吧，你觉得天塌了，3天后发现没塌，就比如乐乐同学拿的快克，左手韬定律，右手光模块，跌停板再加每天-5%开盘的洗，始终未跌破上行通道，今天不照样逆市10cm么?

    收盘了就不要想太多了，晚上看美股的表现吧，放心，牛还在，天没塌。

    你又没有周期考核压力你怕啥，最多陪点时间。'
