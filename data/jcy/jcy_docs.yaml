  文档内容正文: '又会是跷跷板的一天

    万众瞩目的成绩公布了，

    英伟达2026财年第四财季实现营收681亿美元，同比大幅增长73%，高于分析预期的656.84亿美元。

    完全符合预期，但市场不买账，盘后从涨上4%到跌成绿的。

    现在市场交易的是"AI恐慌"，一手砸AI，一手买进AI替代不了的重资产。

    昨天美股的锂矿大涨，SGML大涨23%，中国对应的盐湖股份，藏格等，我们看好的是盛屯，有钴，有铜，为新能车订制。

    神火代表的电解铝也依然看好，34日线拉起来。

    这里谈一个小预期差，镁，当年率先被IBM用在笔记本做轻量化，它的密度仅1.74g/cm2，强度高，减震强，新能车机器人都要大量使用，国内龙头的是宝武镁业，20cm有个星源镁业。

    今天的市场大概率仍将是跷跷板模式，周期和科技只能赢一个，集合竞价和10点前你就能看出大概，你想短期体验舒服，谁赢跟谁就行。

    会看那些风向，比如硅光/cpo看天孚，集成商看胜宏，半导体设备看江丰拓荆（以及当时说300没有惠及到的长川），周期你就看那一堆小金属，

    前排都扛不住，后排肯定稀里哗啦。

    英伟达公布了下一代的AI系统Vera Rubin，每瓦性能提高10倍，确实强，

    它那些材料和涨上游的逻辑咱们都提过，1.6T光模块（中/易），M9级的树脂（东材）+Q布（菲菲）+覆铜板（生益/铜冠），140层以上的pcb（胜宏），钻针的鼎泰加速了，没有的别看了，它是机械钻针可以穿的很厚，后面还有个搞激光钻的大族数控。

    今天的市场，很可能在大环境下依然路径依赖去涨上游材料，但并不意味着中线角度那些集成商就没机会。

    值得一提的是，液冷的供应商里终于出现了Envicool的名字

    主见

    极端情绪行情下，最重要的要有主见，跷跷板行情，但凡你去追涨，基本一追一个不吭声，跟着风扇跑，则会两头挨打。

    有主见的核心是要看产业逻辑，你的视角比它高，你看的时间比它长，那你就是降维打击，你就赢了。

    比如今早的液冷，一通猛砸，英皇-3%，你要是怕了就割肉了，它可是第一次上了英伟达的名录，传说中的情人扶正了，那当然要看好。

    但只看产业逻辑会错过弹性最大的，所以咱们有《三生万物》谈技术，看前排，我们从图形里发掘出是申菱环境，你看它34日线一路上去不带停的。

    现在大科技的代表就是天孚，一看它上去，后面搞硅光，cpo，ocs就得了，就是那一票子人，今天轮到了杰普特。

    开年第一天各界热炒算力出海，很多散户第一天追高后昨天割了，今天机构们拉起来，核心就咱们谈的两个，润泽和华丰。

    token其实出不了什么海，英伟达的Vera Rubin发布以后，算力的差距更大了，自己都不够用怎么出？

    真正能出的就电力，恭喜拿了燃气轮机核心两家的兄弟们，重庆之光走势健康，目前可视为主升浪，但注意观察BAIS值。

    润泽的乖离值已突破60，后面看能不能一口气冲到130，放量滞涨就要注意止盈减仓。

    年后新出的题材是什么呢？中国算力出海，今天发酵的可能性很大，其实就是AIDC核心供应商。

    推大模型，核心供应商，很多人把华为概念拉上去一堆，华为里咱们就提过一个就够了。

