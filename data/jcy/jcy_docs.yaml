    特朗普称将在"适当时机"作出结束对伊朗军事行动决定

    美国总统特朗普8日对以色列媒体说，将在"适当时机"作出结束对伊朗军事行动的最终决定。

    看谁抗跌

    早上特意说了不要怕，结果拉起来了吧。

    疾风知劲草，板荡识诚臣。

    话不多说，看谁硬气。

    先说板块，油气煤炭之类不讲，

    强的是AIDC，华为昇腾，电力，储能等，

    科技今天最扛的是AIDC，受益于龙虾和算力出海，算力的润泽，协创，大位，等老朋友了，云是当时谈智谱的优刻得，首都在线等。

    东阳光也是算力，这种利好，按理要给涨停，你

    给跌停去？不合逻辑。

    token出海板块的资金这几天是硬气的。

    -华为，反复打call的是华工科技，不赘述了吧，后面还有拓维等，华丰踩34日线拉升，看这里要站稳。

    -液冷，今天整体反弹不强，川润（这个有维缔来验厂，它同时还有燃气轮机和机械概念）飞龙（谷歌要来验厂）。

    服务器电源今天也反弹不强。

    -海外算力，主要光模块汇绿(coherent第一大供应商)，联特（谷歌验厂）等二线光模块，博创（是因有减持影响）

    -cpo/ocs里，目前是长光华芯，好几次讲它有某大厂订单，它主营光芯片，同时有的概念，是聚变，商业航天（本质是激光扩展）-11%险些拉红。

    -传媒/应用，受情绪错杀在跌破34日线后已在60日线处反弹了4天，最近美股的IGV（软件指数）比半导体强，这都是回复中谈过好几遍的。如果不破新低且有量，收复34日线视为回踩买点结构。

    阳光电源代表的储能，同上。

    国产CPU，同上，龙芯中科，杰华特，中国长城为代表，明显资金流入，评论区讲过吧。

    商业航天，同上。

    -电力，有从变压器过渡到算电协同的趋势，周末谈了三个，南网，国网信通，远光，如果南网顶住，后面补涨和估值低的就是信通。

    综合上，都是我们讲过的，产业逻辑如果没有问题，价格起来就是时间问题。

    至于风控标准和技术，不同的人承受能力不一样，有人掐一下就疼，有人打针没反应的，怎么风控，怎么买卖，《三生万物》给了，看你自己承受能力和触发。

    你要是看到血就晕，弄个etf，跌破5日平台就跑路，站住了再回来。

    其他什么板块和品种抗跌，同学们可以评论区发掘下。

    市场进入重要观望期

