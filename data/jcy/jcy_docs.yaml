  文档内容正文: '今天果然来还了一只鸡，主要是修复光。

    未来就沿着4080-4190震荡了。

    催化还是大摩拆解了英伟达的Rubin，各环节价值量提升情况为：内存(+435%)、CB(+2%)、LCC(+182%)、AB(+8%)、源(+32%)、散热(+12%)及OD代加值(+35-40%)。

    不能光看到涨，要看到它们已经提前国产半导体调整好些天了，基本到了支撑位，比如库、萝卜这种，到了21日线，

    再比如天孚，这小A杀下来要命的，都到了60日线。

    再比如pcb都快是被遗忘的角落了，能回血人家应该的。

    光的核心内容有哪些，复习下早上讲的，

