  文档内容正文: '昨天为什么讲相当大概率反弹，

    因为马上要触及21日线，牛市和强势的基本这里都会反抽一下。

    所以MA5没走的，稍微想兼顾一下时间。要看21日线附近形成抵抗和小箱体，《三生万物》谈过，前几天也反复反复的各种说。

    那么弹上去之后呢？大盘的压力位肯定是4258，但一般不会直接上去，而是在那根大阴线一半位置前后(4190)附近遇到压力，回来再震。

    具体品种就不一样了，

    有些是会创下新高的，

    有些是诱多。

    那你怎么看呢？21日线反抽上去的，就不能再跌破以当日为起点的5日平台下沿了，一旦跌破，很大概率往34-55日线而去。

    如果它一路弹上去，新高，继续拿着。

    如果碰触到上次高点附近，冲高回落，不给你利索温和放量突破，或者反复在那边折腾，大概率是营造复杂顶。

    昨天的芯原就是典型案例，514在5日线没走，515站在了21日线，关键是下面还有个巨大缺口，不补为强势，那么昨天你应该给机会或者即使走了，也可在缺口处博一把的，真补了再走不迟，况且BIAS26不过分。其实他最喜欢破旗翻，超短期体验一言难尽。

    再比如有些同学有的科瑞，这不是在21上线形成了箱体在抵抗？下沿做风控位。更之前谈的燕麦，5日平台一直在维持，MA8附近不是形成了一个上行轨道？

    但你要明白一个情况，这里总体上是量能维持不住，营造短期复杂顶的一个过程，高位看图形，所以要不断的去弱留强，破位的是趁反抽走人的机会。'
