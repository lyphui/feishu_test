    东阳光也是算力，这种利好，按理要给涨停，你

    给跌停去？不合逻辑。

    token出海板块的资金这几天是硬气的。

    -华为，反复打call的是华工科技，不赘述了吧，后面还有拓维等，华丰踩34日线拉升，看这里要站稳。

    -液冷，今天整体反弹不强，川润（这个有维缔来验厂，它同时还有燃气轮机和机械概念）飞龙（谷歌要来验厂）。

    服务器电源今天也反弹不强。

    -海外算力，主要光模块汇绿(coherent第一大供应商)，联特（谷歌验厂）等二线光模块，博创（是因有减持影响）

    -cpo/ocs里，目前是长光华芯，好几次讲它有某大厂订单，它主营光芯片，同时有的概念，是聚变，商业航天（本质是激光扩展）-11%险些拉红。

