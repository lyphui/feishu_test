  文档内容正文: '独照峨眉峰

    美伊没有谈好，周末反而各个直播间都挺乐观，纷纷开始看好cpo,

    现在特别怕这种一致性太强，但凡周末猛吹的，周一要么冲高回落，要么反手一下，要么加完速进入调整。

    上周的大涨反弹，很多同学被动着仓位给加上去了，保持5成仓左右依然比较科学。

    你要考虑到，

    1，战争可能钝化，但美元指数反弹可是真的，它就要再破100了。

    2，4015是个明显的压力位，

    3，中美的科技龙头长飞和lumument，已经出现了明显的分歧，第一次第二次给你拉起来，第三次呢？

    加上周五大王的判断就是，第一次基本谈不成，油要反弹。

    因此，周一二可多看，你反正有仓位和先手，理解也比外面的深，不用太上头。

    主线依然是光，我们看什么呢？三大块。

    一是光模块，业绩比较硬，旭创代表，后面包括xys，东山，沪电等pcb液冷等传统AI硬科技，目前是温和放量（个别大量）。

    二是光通信（芯片/器件/互联），故事比较多，即cpo/OCS各种光学材料等，除了个别选手，有点涨不动的意思。

    玩家都很熟悉不赘述了，谷歌大会即将来临，可以多看tpu和ocs的机会，它们上周大多是揉搓的状态，可在5日平台之上操作或低吸。目前是光库在前面顶着，毕竟可以做整机，

    OCS三大主流方案：MEMS、液晶、压电陶瓷，谷歌之前主打MEMS，现在青睐压电陶瓷，受益人是凌云光，目前只适合小仓位给优惠了打野，箱体突破也不迟，

    三是光设备（对应到光模块的扩产），耦合、贴片、测试设备分别总价值的40%、20%和20%

    左右，明年总共大约有400多亿的体量吧，这个有可能走成一个重要支线

    最高端耦合设备当然是萝卜了，但它的东西好，贵，某创大量用的是猎奇（拟上市），比萝卜略差一点的是科瑞技术（lumument供应商，没错也是苏州公司），JPT也有耦合机，科瑞乖离值太高建观察仓可以，补一下缺口更好，凯格精机（做贴片和测试），待站稳60日线5日平台。

    另外就是周二准备上的联讯仪器，这个能打新的必然要打，上市后希望砸出机会。

    国产链，继续看讲过几周的几个，芯原，华丰，航天电器。

    电网领域，燃气轮机逻辑和态势健康。

    这里着重强调一下随时做好止盈或者抽身准备的图形，

    1，高位放出巨量，

    比如拳打脚踢，3月底日成交额50多亿，之前历史高点也不过100亿，上周五换手率飙升到10%,巨量200亿。

    还记得那句口诀吗，

    缩量上涨还要涨，放量大涨要当心。

    倒不是说要你马上跑，它加速你陪着，但时刻注意哪天放量滞涨，成交额很高，换手率很大，价格上不去了，你就分批开始止盈，尤其是绿盘那天。

    2，高位放量滞涨，

    智立方为例，它是萝卜的超级平替，国产cpo,平时也就3-5亿成交，4月1号放量涨停，换手率18%,10亿成交，3日成交13亿，换手21%,4月7日15亿成交，但冲高回落一根长上影线仅涨3%，这时候就得跑了，但看样子很多散户追进去了，再不跑次日又是14亿巨量，仅涨1.94%,这就典型的放量滞涨，

    它有没可能盘整两天再拉上去？不排除，要看催化，但追这个侥幸干吗？8号乖离值50且滞涨，按纪律止盈。

    你相比之下，萝卜都比他健康，没有放出巨量。

    暂时情况下，创系比孚系要强，孚系涨太久了，

    100倍pe的一大把，越临近业报季越容易miss,且你看创系的后排，比如带动的pcb，生益电子，沪电，液冷的申菱等，补涨力度明显强很多，且基本是踩买点结构，光通信的二线仕家光子就有点涨不动。

    当然孚系略弱只是相对，主力并没有大面积跑路，它相对别的板块强多了。

    当然具体依然要看盘面的反馈，集合竞价就能看出很多东西来，分化可能成为本周显著特征。

    今天如果大低开，给的优惠力度够，机动仓位别上头分批次吸一下，你有底仓的那种更好，这样当天或冲高能跑路，

    光，不排除走出逼空的概率，但越一致越加速越放量你越要注意，图形一不对劲，分批止盈，边打边撤。

    4015上面的压力位4050,下面的是3955,如果能稳住3950一线，整体就会变成A股非常罕见的岛型反转。

    稳不住就再给3924一线生机，真跌穿了可能要去寻找C了。

    总体策略是依然是，不追高，小冰小吸，大冰中吸。吸谁，主线啊。

    一共给了两周的停火期，最佳的机会，反而可能在停火协议结束前的两三天，

    那时，认为钝化的人终于不乐观了，被油价美元和市场搞怕了，终于决定要走人，而协议这时候基本落定。

    风口浪尖啊亲们

    今天指数是红的，个股就一言难尽了

    缩量1700亿，下跌快3000家，

    主线依然是光，“独照峨眉峰”，

    总体上，创比孚强，即光模块pcb液冷等传统Ai硬件要强。

    比如剑桥，光模块几乎就剩下它了，周末专门讲过没啥问题，-4%左右敢不敢吸？

    仅次于光模块的是pcb，生益电子反复讲图形粘合的很好，周末时专门又说类似美国的credo,现在表现如何？

    液冷的申菱，爱恨交织的英皇一样是这个逻辑，

    孚系最抱团的是光纤，好几天前就讲分歧要注意了，长飞撂倒，去搞通鼎的刀口舔血悠着点，

    其余还在路上的cpo/ocs等今早普遍回调，但周五你已经减仓，比如今天-4%左右多好机会低吸孚，明天高开了T出去，

    其他明确讲图还可以的，比如萝卜，温和放量，乖离值主动调了下去的长光也都还行，

    孚系虽然略弱，那也比别板块的强，市场一不好资金们就来抱团。

    这里的补涨龙就是仕家了，之前专门谈过k线，粘合要比生益好。

    动荡期最怕的就是埋人，所以最佳策略是在底仓

    的基础上滚动低吸，T出利润。

    今天光模块设备崛起的趋势在加强，萝卜，科瑞，联讯，世嘉，全都是苏州的，东莞凯格的设备厂也在苏州，航天电器也有液冷，它的厂也在苏州

    昨天是实在不想再说光模块设备博众精工，它也是苏州的。

    光通信≈苏州ETF.

    用好三生万物和冰点低吸，这个环境刀尖起舞，比如化工回踩买点，低吸弹性品种新和成，这就是收获也还可以。

    继续看好光，刀口舔血有点心慌慌，等最后的空头也加入进来疯狂看好，就又要轮到调整期了。

    南院大王

