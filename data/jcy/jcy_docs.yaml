  文档内容正文: '重新买回AI

    昨天我们讲投资者把错卖的再买回来，

    第一财经的最新新闻，

    说AI抛售潮接近尾声？

    新加入的买家有什么变化呢？

    加入了段永平这样的"老钱"。

    从昨天阿段公布的持仓来看，

    大幅减持第一大重仓股苹果，

    在2025年Q4将英伟达仓位狂拉逾11倍，

    这就是之前我们谈oldmoney的投资逻辑，

    "它们要看跑出来的公司"。

    谷歌在AI应用发力后，巴菲特认为它跑出来了，临退休前把它买成前十大重仓。

    芯片大战一番后。

    段永平认为英伟达是彻底跑出来了，开始狂上仓位。

    和谷歌之前是否涨了4倍，英伟达是否涨了20倍，一点关系都没有。

    老钱要的是，赢多大另说，你不能输。

    它们喜欢的是从10到100的过程，

    从0到1，从1到10，那是新钱们喜欢的刺激。

    这种"刺激"阿段买了吗？

    买了，他轻仓"试水"三家极具代表性的AI垂直领域公司，CoreWeave、Credo Technology、Tempus Ai，

    持仓分别占比0.12%、0.12%、0.04%。

    这三个我们都谈过，

    CoreWeave，英伟达亲儿子，做数据中心的，你可大概理解为润泽plus豪华自主升级版。

    Credo Technology，做连接器的，你可以理解为博创+太辰光高端升级版，

    Tempus Ai，能挣钱的AI应用，在大A没有太好对标，硬去凑是蚂蚁阿福，AI电子病历。'
