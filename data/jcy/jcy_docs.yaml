  文档内容正文: 'W底进行时（3月31日）

    昨天说今天最怕放量滞涨冲高回落，没想到开盘一个多小时就给你干完了，

    想想今天也是一季度的最后一个交易日，是公募、保险等机构进行业绩考核和调仓换股的关键时点，也就能理解它们的狗和弱了。

    现在是直接去踩W的另一个底的时期，

    主线就是要在这里拉锯，形成筹码的充分交换，

    外面一个公募一个生产队，手里捏着快1万亿，恨不得蚊子腿也榨出油才入场。

    光通信波动很大也正常，风口浪尖上的主力就是这样，能一己之力把市场带上去拉下来，那就说明它依然是主线。

    市场没有放量，说明它们也没怎么跑路，就是对倒砸盘。

    等另一只脚回踩到位，基本上快了，

    今天不是抄底的时机，毕竟既不是3850也不是3731，况且也没看到生产队和机构入场的信号。

    什么叫主力很鸡贼在这里拉锯，看一个图，它就是把前面几天的涨幅给你跌回去，让追高的人割肉，

    后面呢？看情况了，市场好，它直接收复34往上拉，市场不好，它就在这里墨迹粘合均线，碰到大冰点，它给你跌破60日线下面形成新出发阵地。

    所以，跟住机构的节奏就行了，不用担心卖飞，也不用担心它不拉。

    昨天见了发G委的一个兄弟，他有句话分享给大家，

    要有战略定力了，你长期看这都是扰动，

    十五五的日子还过不过？

    没有最好，相对好就行了。

    再过3-5年，中国天下归心。

    现在反而暴露坐稳扶好的时间。

    会反弹，但不要上头

    市场现在是W底的ABC三浪走势，

    B点的高点，昨天反弹的太弱，今天有可能趁美股的大反弹再提高一下B点位置。

    但你说有没可能就这么直接上去？

    概率不高。

    大环境不支持，关键是生产队和机构又没入场。他们真入场了你的预备队再动也不迟，如何看不用再教了吧，

    所以拿着半仓就够了，在板块间去弱留强，

    不用怕你的预备队踏空，机构真买入，是一两天甚至一个礼拜都弄不完的。

    今天具体就看大A和你手里品种的成色了，流畅坚决的留下，放量滞涨的要走，

    【严防高开低走，冲高回落】。

    高位的品种，游资的品种，放量是坏事，是散户给诱进场。

    低位的板块，机构的品种，放量是好事，是机构在吃货。

    昨天有两件催化，一个是英伟达投20亿美元给marvell，它本身做光模块DSP芯片的，利好硅光，CPO等，带（）的朋友也是它供应商。

    另一个，磷化铟(InP)出口管制再收紧，北京通美（全球InP衬底36%份额、产能100%在中国）出口许可被大幅削减，昨天咱们刚讲过光学材料。

    最后谈下阳光电源的财报，有些人解读不及预期，什么四季度净利润腰斩暴雷，

    其实他想干嘛?

    “部分储能项目施工/并网进度滞后，收入确认推迟至2026年Q1”，港股挂牌前后把平滑一下利润，腾点空间”。

    还是看基本面，

    它以前是搞光伏逆变器的，现在储能去年发货43GWh，全球市占率14%，稳居世界前三、欧洲第一，中东增长300%，

    海外业务占比60.54%，同比增速48.76%，第二增长曲线的转型很成功啊。

    第三增长曲线，

    “针对AI数据中心推出的800V高压直流电源系统，通过了亚马逊、微软等国际头部云厂商的认证，目前已完成小批量试产，2026年将实现批量交付”。

    25年净利润增速明显超过营业额增速，账上经营性净现金流169亿，同比大增40%，好公司啊。

    关键是这厮竟然自产电芯了，在合肥一期就搞了个10GW的，宁王都头疼。

    按照我们了解的净利润估换，折合26年PE大约15倍左右，27年大约10倍。

    你既要短期的快感又要长期的确定性，老曹也难办啊。

    依旧看主线

    主线就是能直接影响盘面的力量，别的板块遛来遛去，那都不是机构的菜，我还不了解当年的下属么。

    光通信如何，它起来了指数才会起来。cpo/osc那票朋友们就不多介绍了，弹性最大的长光，既然不补缺口，那就调调乖离值继续往上，

    冰了吸，热了抛，昨天JPT前天-4%冰点，昨天-10%冰点其实都是给你进的机会，非要追高进去，好在是主线，今天就给你解套吧，

    左手新能源，右手光通信，两大赛道它全占了，不枉我单开一章讲它。

    它的图形和YD，炬光一样，都走的很经典，

    仕家也是典型的均线粘合。

    板块就是这么大起大落的揉搓，通信其实已经横盘横了很久了。

    今天仅放假190亿，好事，说明散户还没背大面积忽悠入场，暂时算安全。

    有可能的剧本，是突破3956再放量，B点给你拉高点超标，散户诱多进来，再反手一杀去踩C点，天都塌了。

    创新药怎样?板块上长期压制位是不是有效突破还要观察，品种上前面那几个看图。

    但整体上，它得回调，拉据一下，再上去就比较健康。

    第一压力位336，第二压力位344，第三压力位366，突不了它就要回调震荡再发起冲击。

    对，说的就是那个带()的朋友，

    这段时间几乎天天讲它，要你去弱留强，去粗取精，拥抱校花，

    交割了吗？

