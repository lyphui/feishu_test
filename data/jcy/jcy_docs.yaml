  文档标题: Vol.260624 依旧男女主
  文档链接: https://my.feishu.cn/wiki/BYPpwbDhXip403kwXaEcWFYZnKk
  文档内容正文: '看似今天大A雄起，反转？都跟着日韩市场走罢了，大模型越来越同质化。

    因而短线你就很难玩，有的60日跌破不回头，有的5日平台都不破。

    所以搞产业投资拿得住，拿什么很重要。

    再跟有些新同学温习下市场主要结构，

    -我们圈子里的女方，指海外算力板块，接英伟达谷歌订单，光模块pcb光芯片等知识星球鉴茶财经院。

    海外市场好，日美韩大涨，就会映射到他们受益，

    -圈子里的男方，主要指的半导体芯片设备等，他们是自主可控，和海外是对冲的。

    科技就这俩玩家，非此即彼，男女主主来回轮动，

    比如昨天，日韩美国大跌，女方主力易中天等今天就弱势，也就涨涨二线，光芯片，连接器，早上讲过的名校涨停，汇绿给你-4%的机会，光芯片的永鼎仕家长公主都不错知识星球鉴茶财经院。

    海外大环境不好资金通常会转战国内板块，基本去半导体设备，老生常谈710。

    你说男女通吃？常州快克，技术上讲过它叫做“上升轨道一直未破”。

    市场宽幅震荡就会让具体品种非常难搞，今天涨这个明天涨那个波动又非常大，所以男女主etf是最好的次优解，

    我们一再讲，90%的玩家跑不过它们。

    etf是5500选30，概率是千分之五，就是百里挑一叫做俊，千里选一叫做杰知识星球鉴茶财经院。拿ETF做杰出青年还不够吗？

    不想搞etf非要搞具体品种，就需要勤奋努力，圈里文章好好看，思考，做笔记，真的能理解产业并具有耐心，宠辱不惊。

    就比如错过光纤后后来又跟大家找的通鼎和切糕，有几天也是不顺的，错过MLCC和CCL后又给大家找的薄膜电容，法拉利新高了吧知识星球鉴茶财经院。

    这点洗算温柔的，潮州三环当时先洗30%再涨三倍。

    没有人可以严丝合缝抓住每一个机会，只能用中局或者终局思维看它来时的路，

    就像我们率先讲也一直讲的朱格拉周期，设备是必然受益的，今天起来的是专门搞工业母机的创世纪，

    再比如()倍种子kewell也是设备，-10%那天低吸了吗？

    甲午月当然涨液冷，专门谈过那个新贵叫YDET，同样有连接器的预期差。

    乐乐同学说感觉咋不对，涨的有点不敢信，有啥不对的，外面4100家下跌好吗，你感觉好是你站在了主线。

    咱们看好的公司，白毛股神接连看好啊，上个绿的，这个尾盘资金纷纷去抢孚。

