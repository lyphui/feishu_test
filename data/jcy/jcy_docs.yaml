  文档内容正文: '观察窗口期

    机构的主线，光，电，有色。

    机构早就布局了一些核聚变，刚刚买了点商业航天。

    随着业绩披露期的到来，电网设备尤其西大缺电和小金属有色会表现更强。

    游资量化在led，商业航天，脑机接口，量子信息。

    那堆光电里头，牟牟研究发现华灿算正宗，我们之前讲过的乾照光电，真能搞太阳能电池且上了卫星，它的led是红黄光芯片，比那帮做电视机的高端多了。

    市场放量就表现机构的科技，不放量就表现游资的题材，当然普通人别跟着量化瞎追高。

    今天可以观察一下，大家对十五五和工作报告的不同理解。

    主线并未改变，伊战还会绵延，注意去弱留强。

    仙人指路与商业航天分析

    大盘的剧本我们都知道，既然科技和周期互踩跷跷板，那么科技弱了，必有一强。

    看隔夜美股就知道了，昨天周期>科技。

    周期的代表是化工，化工里弹性大的是香精、维生素卖铲子的新和成，有望成为新花旦。

    伊朗长期化的受益呢？金牛和宝丰，金牛弹性更大，宝丰更稳更扎实。

    中国和德国有点像的，多煤，缺油，少气，逼急了玩煤制油，煤化工。

    所以这俩，极度大跌和反转的时候分批次吸吸，过几天反过来又涨了。

    电网设备就不赘述了，说腻了。

    科技目前就靠华为线和二线光模块撑着，华为线的代表华工，二线光模块汇绿，联特，剑桥等。

    圣火令那么硬，主要材料当然是钨钢了，钨也是目前有色板块的龙头，钨粉继续涨价600%还在继续涨的两家受益跟大家讲过，如果给大跌的机会再进。

    之前跟大家讲过，商业航天会在55-60日线区域磨合筑底拉锯，现在基本就是这个时间段，谁有真东西给大家一个小集合，其他忽悠居多，你在里头看图就行：信维（天线），真雷（导航TR组件），飞沃/超捷（铸件），乾照（电池），瀚讯（载荷），中国卫星（集成），新雷能（电源），中简（碳纤维）。

    那具体怎么选，你用两个技术图形去套上述，看谁符合：

    1，在55-60日线附近站稳，形成箱体，而且缩量，量能大约是其高峰期的一半。

    2，在34日线处站稳，收复，或者有量。

    单独的1，2，或者1+2均可，分批建仓最好。

    很多都会形成一个在34日线以下，55-60日线以上的"建仓走廊区"（图一），主力在里头吸筹，你就看谁的图形更健康做选择。

    其他的泛科技等，基本处于主力建仓期，所以没什么好谈的，他们还在买或者没入场，都是成本区怎么拉升呢？

    前天的西电，昨天的华工（图二），都叫仙人指路。

    有些同学认为涨高了，或者涨停了，就要止盈经常卖飞，要看两个指标，一是是不是高位放量大涨，二看乖离值。

    新和成为例，换手率2.99，量能也并不是非常大，乖离值32，所以可以继续拿。'
