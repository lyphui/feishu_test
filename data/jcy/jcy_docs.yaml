  文档链接: https://my.feishu.cn/wiki/UwQlwIfs4i0fs5kwhnOcYc7pnEb
  文档内容正文: '重要的一天乃至一周

    这两天尤其是今天是极其重要，事关55日线的反弹，按理说，周四诱空之后，周五应该强力反弹的，谁知国产设备把整个带了下去。在大王个人看来，今天理论上要有个V型反转。

    但你也不能忽视，毕竟高位筹码松动了，大盘跌破55日线，大盘进行漂移，轮动，甚至风格的切换概率不小。

    因而稳妥一点的策略是观望，是控仓，是谁赢了你站谁。不要有踏空的思维，新主线真起来，根本不差你这一两天一两周，你看易中天涨了多久？这也是之前一直讲，留着肚子吃主食。

    那么风格激进的还有什么看头呢？分水火两个领域，

    A，一个是科技，主线的海外算力尤其是孚代表的光，各种上游原材料衬底、FAU、电源检测设备之类的在现实中依然是量价齐升的，两个ETF讲过很多次了。

    这里的新热点是AIPC，联想戴尔大涨，分布式服务器和AI电脑可能进入千家万户，这里看图优秀的梳理了4个供应商，华勤技术、春秋电子、博杰股份、飞荣达。

    周末各种发酵，我们还是祖训，高开勿追，如果这些太高，则可以看分批次看延伸的CPU和内存条，澜起、卓易、江波龙。均有缺口可以做止损位。

    之前提到的薄膜电容，法拉电子是有北美大客户订单的，也有涨价预期，绿盘分批低吸较好，回到缺口附近的151左右不破更佳。

    光纤的新龙则看远东，也是老牌公司了。

    B，一个是风格可能切换的消费，消费只能在龙头里挑拣，比如步步高，金徽酒。

    另外是世界杯概念的共创草坪/金陵体育，它的玩法是什么呢？你极小仓位，亏光不心疼的那种，当个刮刮乐去搞一下，赚就赚了点，跌破箱体走人。

    注意世界杯这个是纯游资玩的，并无基本面可言，不适合99%的玩家和新手。

    更注意消费是没什么基本面可言的，目前不能当反转看待不能格局不能重仓，

    你想稍微比这两个概率大点的去看科技的反面，那就是电力，etf516370。

    超级高手自己去看粤电力，涪陵电力。

    切换当然也有可能往中位的软件，以标哥易点哥为代表，老美的IGV软件etf，已经悄悄走出w双底在往上了。只能说，懂王抄底厉害。

    这个阶段可能简单的理解为，科技的震荡洗盘期，因为基本都是高位，对仓位太重和老同 学来说，看图就成了重要任务，MA5-MA21具体怎么应对谈过好多次了。

    大盘的走势方向，非常大的概率，是震荡/洗盘/微切换之后，又会重新回科技，新找一个方向抱团。

    对新同学来说，重要任务反而是学习，宜观望，宜轻仓，宜学会冰点低吸ETF，宜在这里学到用机构的思维看市场，机会还多的是。

    以上我们谈的东西是什么呢？叫做预案和应对策略，一个统帅最重要的事，就是观察局面发生的情况，反复验证自己的判断，验证完毕后，在适当时候把主力和预备队压上去。

    不要害怕踏空，那是散户和股民的思维，把自己当成手握重兵能一锤定音的投资者，技术上不破4002都当成短期调整来看待，只是要不断消化4170一线的密集套牢区。

    如果想要刀口舔血呢？在4002的冰点附近看基金重仓指数在干什么跟它一把。

    不要担心，牛还在，3万亿的成交不可能是熊市，4000点又不是7000点，战术上要重视敌人，战略上要藐视敌人。

    这就是革命

    体会到了么？周末说本周是"革"，这就是革命，激烈，动荡，你死我活。

    今天科技重挫，市场宽幅震荡，原因是多方面的，

    主要是机构资金没啥格局，小年轻哪里经历过科技革命周期，7年一轮的设备周期都没经历过，割别人割出肌肉记忆了。

    直接原因是上面不准风格漂移，4000亿要调仓，基金出货导致很多大热门跌停。

    所以技术流，短线流选手看图就行了，跌破平台走说的都腻歪了，跌破MA5走，极限21生死线。

    问题来了，又没走咋办？看它3天是否能不创新低，如果后面依然盘中放量大跌，先走了等它稳住，有了抵抗阵线再说。

    如果你手里拿着科技热门没跑跌停了，不用问为什么，跟产业跟趋势没关系，就是踩踏。

    资金有望哪里切的态势？

    主要是中位板块，现在捋出三个，

    （机器人当时也略高了，暂时调出，电力游资线）

    这三大板块，盘子够大，扩散够多，能影响指数，因此列入夺嫡，

    他们是不是切换的方向？不知道，概率不低，起码观察三天，要看谁跑出来，跑出来你也来得及，真很激进轻仓参与，高抛低吸别格局。

    科技会死吗？不会的，科技去参加革命了，淬炼一番还会归来，往更高一个高度。

    机构的羊群和小家子气啊，你没办法。

    今天还有人骂丧标吗？如果再涨两天，估计老赵减持结束的新闻也出来了。

    真的佩服懂王，敢在软件底部的时候坚决抄入，以后大A这个板块逐步会找到映射。'
- record_id: recvl7sW8mMQKG
  文档标题: Vol.260530 易经第49革，水火相激，决出新主线
  文档链接: https://my.feishu.cn/wiki/K5rKwQCSOiEunjkSQ79cWx9QnDe
  文档内容正文: '冲的太猛太快而收不住卡住了，这就是"困"，人遭遇困难和危机就会痛定思痛，深刻反省，明白了要回归本源和真正的价值，这是上一卦井。

    思考积累的够了，就要吐故纳新，消灭自己身上那些落后时代的东西，开启人生又一个新阶段，这就是"革"。

    革，既是人生转型升级，又是你作为管理者，在公司领导改革和破局的操作手册和白皮书。

    革：巳日乃孚，元享利贞，悔亡。

    《象》曰：泽中有火，革。君子以治历明时。

    在时机成熟的日子进行改革，吉利长久，悔恨消失。

    为什么？因为到了不得不变的时候。

    革的意象，外卦为兑，兑是泽，是水；内卦为离，离为火。要么水把火浇灭，要么火把水烤干，然后开启新一轮周期。

    君子看到泽水涨落，草木枯荣，心有所感，从而修治历法，明确时令，顺天应人。

    初九。巩用黄牛之革。

    象日：巩用黄牛，不可以有为也。

    用黄牛的皮革束紧捆住战车，一开始不要有什么作为。

    都要做大事了，为什么束手束脚？因为任何事情一开始时，局势并不明朗。

    作为领导者刚上任，不能上来就"新官上任三把火"，因为手下你可能不了解，前任和外面可能埋了很多坑，上来大刀阔斧，很容易被人利用或者被人看笑话，根本打不开局面。

    我们都熟悉的"康梁变法"几个年轻人加上光绪，一腔热血在上头发号施令，一口气推出几百项改革措施，上面没人支持，下面不理解，100多天就失败了。

    普通人面临大机会，第一件事，是反而要管住手。多观望，待主力们初步决出胜负你再下注。

    否则，你身板太小贸然冲进去可能被挤的粉碎，弄不好就变成牺牲品。

    六二。巳日乃革之。征吉，无咎。

    象日：巳日革之，行有嘉也。

    到了巳日，你再改换门庭，变更政令，这样出征吉利，没有什么问题，行动会有好结果。

    "巳日"是祭祀的日子，又指时机成熟。

    什么叫成熟？就是到了大多数人都明白不得不变，再不变就要死人了，箭在弦上不得不发了。你再顺应形势，顺水推舟。

    就比如武王伐纣，在历史上叫做就叫做"革命"。因为八百诸侯被欺负的没办法了，自己的嫡亲血脉动不动被商朝贵族拉去剁成肉酱活人祭天，这哪受得了？

    同样还有我们的改革，安徽小岗村的农民都写了血书，再不把地分了要饿死了，万里去了看了后大受震撼上书北京，连最保守反对派也讲不出话来，邓公顺势推出家庭联产承包责任制。

    普通人要学会观察时机成熟的标志，在生活中是重大的历史事件或者新闻，而且是反复出现的。

    在股市和投资中，则是多重信号的交叉而不是单一的，比如底部放出巨量，龙头纷纷涨停，回调依然保持强势，板块扩散延伸，等等。

    九三：征凶，贞厉。革言三就，有孚。

    象日：革言三就，又何之矣。

    急着冲上去会有凶险，关于变革的言论和方案，要反复讨论多次讨论，取得大家的信任，不要怕耽误时间。

    任何变革都不可能是一帆风顺，必然是有巨大阻力的，你要获得最广大人民的信赖和支持，才能把策略持续推下去。

    强如邓公，也得在九二年展开南巡，发表各种讲话，用地方的支持倒逼那些棍子都敲不醒的人。

    在公司里搞变革，你就要做好职能部门甚至高管反对的准备，方案要反复酝酿，取得最基层销售员，人事，行政等普通牛马的广泛支持。

    股市中也一样，新主线出来后必然面对"回踩"，所以你一是要控好仓位，不要急着梭哈，二是要观察结构，踩完能不能再上去。

    九四：悔亡，有孚改命，吉。

    象日：改命之吉，信志也。

    确定大家的信任，在关键转折点决胜之后，你就可以大刀阔斧的建立新秩序了。

    放手去干，是因为力量对比发生革命性的变化了。

    这种在现实中是有明显特征的，就比如2024年的924，国家队入场上万亿的资金把指数都拉到涨停，这时你应该知道，"其志不小。

    而上峰反动股市，同样也是科技强国必须资本市场的配合，普通老百姓"苦熊市久矣"，到了不得不改，不得不牛的时候了。

    九五：大人虎变，未占有孚。

    象日：大人虎变，其文炳也

    大人物和他推动的变革，像老虎换毛一样，焕然一新，花纹鲜明，所有人都看得到好处，不用占卜询问，都知道人们信任他。

    变革的最终目标，是让大家伙有明显的，看得见的好处，就像我们的改开，几十年民众就富起来了，创造的财富超过过去几千年之和。

    市场的新主线一定是能够打出赚钱效应，让普通人跟着能喝到汤的，猫一天狗一天的没有持续性，那不叫主线。

    上六：君子豹变，小人革面。征凶 贞吉。

    象日：君子豹变，其文蔚也。小人革面，顺以从君也。

    君子像豹子一样变得细致缜密，普通人也改变了面貌顺从你。这时候如果还要继续激进就有凶险，坚守正道才吉利。

    激进的措施差不多时候就要见好就收，慢慢让大家巩固成果就行，因为变革意味着高压和折腾，弦崩的太久太紧，反而过犹不及。

    差不多时候，你就要事了拂衣去，深藏功与名了，龙头股隐去，行情开始扩散，补涨开始进行，让下面的人表现，大家才会念你的好。

    同样的，吃时代红利，差不多就行了，不能穷凶极恶，就像房地产和互联网，1998年到2015年，上面是睁只眼闭只眼看你放大杠杆，灰色操作，在监管边缘各种作死的，但2016年以后，时代变了，你就得收敛起来，回归正道，好好的"小人革面"。

    无奈非得有人，要吃干抹净，赚完最后一个铜板，皮带，马老师，小目标老王等那票人，无一不是如此。结果我们也看见了。

    如何作为一个普通人，如何做一个锐意改革的领导，如何踏上时代的浪潮，你学会了吗？

    ps，革卦代表着变盘，轮动，新主线的崛起，可以预料的是，下周，科技VS消费的斗争将非常激烈，你死我活，一方是要革掉一方命的，赢下的一方，将带领市场继续前进。

    而你，我的朋友，在这种场面中如何应对呢？

    张牧之提示，"谁赢他们站谁"，

    佟国维提示，"只有黄上拥立你新君，才是铁稳的新君"。

    "巳日乃孚"，孚同学看来依然有一票，只是"革言三就"，恐有一番波折。'
- record_id: recvl0VzHX173k
  文档标题: Vol.260529 今日更新
  文档链接: https://my.feishu.cn/wiki/JYOlwxlDziabnOkigjxcjPHOnnf
  文档内容正文: '现实角度看科技产业

    今天一跌，有些同学就慌了，觉得是不是科技完了，后面要没戏了。

    换个本质，从技术上说，是你忍不住诱惑去追高了不该追的板块尤其是国产算力，从产业上说，对一线的情况不了解。

    大王团队就是基本天天跟这些搞科技、搞Ai的人们在一起，普遍感受是什么？

    第一，行业如火如茶，还早的很，山脚下都不能算，大量的技术路线、延伸应用都是只是刚过了验证期而已，铺开后又是一个天翻地覆。

    第二，基本是所有优质公司的订单，都普遍排到了明后年甚至2028，就比如PCB，去年就讲过沪士电子订单排到27年，老板时隔34年后再度加仓昆山，磷化钢衬底、云锗被锁单3年，博杰股份下面的鼎泰、索尔思都跑去"预防饥饿式下单"，还有各种CCL、MLCC等紧缺物料我们讲很久了，丝毫没有缓解迹象。

    第三，目前各大企业最大的问题是产能问题、是良率问题、是单子来不及做，LITE甚至直接要把安捷讯（某库的公司）在泰国的厂包下来扩产能，以前很多的海外大厂讲究，如果你给华为供货，他们是不要你东西的，现在设备跟不上、厂子建不起来，这条潜规则也没人讲了，现在是得产能者得天下。

    第四，消费能不能起来？这两年我做了这么多届评委看了那么多创业项目，消费类接近为0，唯一的一个是AI自动咖啡机，还给否了。

    所以对大家有什么建议呢？还是要坚定看好科技的方向，不要一涨就卖，缺乏配得，一跌就慌，末日来临。

    当然这和你技术均线控制仓位和止损并不矛盾，只是核心优质企业，关键均线的位置可以多给两天时间或者耐心，你比如凯格精机，21日线盘整了一个半月，你没耐心就洗走了。

    另外还要注意一点是什么？全球科技的总龙头是美国，有弹性的是日韩，大A是跟着人家走的，接人家订单过日子，美股的科技没死之前，大A都是自说自话和自作聪明。

    然后再谈谈心态，闲钱炒股，不要加任何杠杆，要有进市场这钱不是你的了的洒脱，永远保持"亏光也不心疼"的仓位，更不要试图有任何买在最低卖在最高的想法，来股市，你必然要接受遗憾、接受错失、接受自己的不完美，因为那里的一切都是你性格和不足的放大，受不了波动最好的方法，是定投ETF，尤其是那些能赚美元的企业。

    当你接受了自己的漏洞百出和反省的习以为常，学会了按耐心性和不被情绪左右，交易就上路。

