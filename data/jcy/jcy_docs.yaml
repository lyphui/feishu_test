  文档链接: https://my.feishu.cn/wiki/NmqfwZQVoiYqrtkVCwbci5imnxe
  文档内容正文: '除旧布新，日日精进

    黄庭坚曾说，

    一日不读书，尘生其中，

    两日不读书，言语乏味，

    三日不读书，面目可憎。

    我们休息的这几天，全球的科技界大事频繁，中国的红包大战如火如荼。

    感觉都像脱离了时代似的，

    想想当年的乾隆皇帝，

    每年也就休息两天半，

    冬至，生日，大年初一。

    今天除夕，

    以学习和精进的姿态迎接马年到来吧，

    干货是华为的创业元老应大王要求，写给我们星球的独家《仙童与华为，中美硬科技的裂变与黄埔军校》。

    一、基本定位

    时间：1957年成立

    地位：现代半导体产业发源地

    标签：硅谷叛逆文化、风投启蒙、集成电路商业化起点

    时间：1987年成立

    地位：中国通信与硬科技基石企业

    标签：工程师文化、强管理、全产业链、被制裁后加速外溢

    二、裂变逻辑对比

    天才扎堆，但内部管理冲突

    股权、激励、理念不合→批量出走

    风投崛起，创业成本低

    结果：从1家裂变出整个硅谷半导体

    超强组织与人才密度

    业务分拆/出售/独立+外部环境倒逼

    人才外溢到新能源、工控、机器人、芯片

    结果：从1家裂变出中国硬科技集群

    三、仙童"子孙"公司(最核心)

    创始人：诺伊斯、摩尔、格鲁夫

    领域：CPU、存储器

    地位：定义计算机时代

    创始人：桑德斯

    领域：CPU、GPU

    地位：唯一能与Intel长期抗衡的x86厂商

    创始人：唐·瓦伦丁

    投资：苹果、思科、谷歌、英伟达等

    创始人：尤金·克莱纳

    风投四大天王之一，互联网时代重要推手

    其他巨头：

