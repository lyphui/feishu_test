    -指数型光模块现在再给你杀五六个点，那都是 给机会，不拉它们怎么稳指数聚人心？

    -弹性大的，cpo之前大涨之后，这两天是ocs在 扛着，砸最狠的那几天，腾景德科立连图都没走 坏，那就是有想法。

    国产芯片有资金流入，继续观察势头，这回是纯 芯片，不是设备。

    另外半条的主线新能源，风能今天长下影线最 长，

    总体上，诚意不大，但是有

    后面依然较大概率走美股复制的概念。

    倒不是小觑国内这帮机构，

    他们研究产业都还刚入门，研究国际形势更小儿 科了，连这个岗位都没有。

    达利欧能把英美中荷几百年的历史捋出规律，咱 们那帮研究员能给你说明白五代十国的都没几 个。

    加上最近被吓破胆，

