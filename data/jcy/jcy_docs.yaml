- record_id: recviNB7CD5DPf
  文档标题: Vol.260506 五六月份行情展望
  文档链接: https://my.feishu.cn/wiki/Ca3zwGeHaioAJlkNSAscm924nSK
  文档内容正文: '首先说风格，风格会是高低切，然后说内容，内容依然是1（海外算力）+1（国产算力）+X（题材概念）。

    一、切换，是可能大切小，前切后，高切低，外切内，硬切软。

    大切小，大盘大市值切往中盘和中小市值。比如中证2000涨幅明显活跃超过500。

    前切后，

    a，本品种中，切往后排涨幅不多的，比如前排cpo，切往后排cpo，燕麦的图形明显比罗博走的好，

    b，前排品种切往后排品种，比如海外算力本身，光模块切往PCB，连接器等。

    高切低，

    既指本赛道切往低位的，更指整个大盘切往低位的。

    目前的高位，海外算力全产业链、AI与涨价上游产业链（光纤铜箔电子布碳酸钾等）

    切往的次高位，国产芯片/半导体，CPU，商业航天，锂电。

    后排待切低位板块，机器人（工业母机），电网设备，化工。

    外切内，

    业绩突出，海外客户为主的将切往自主可控，国产替代，如国产芯片，设备，华为链等，

    硬切软，

    硬件要切往部分软件，应用等（需要等待催化）。

    切换不是流畅的，顺滑的，马上就办的，而是一个过程，切换的前提是前排不能崩盘，基本得稳住。

    前排不会死，它会聚焦，缩圈，继续抱团上攻，此时就看图说三遍。

    二、把一些主要板块和玩家做些梳理

    高位看分化，海外算力的光模块等只会更加缩圈聚焦，

    一般来说，不要跌破5日平台，如东山这种目前在维持，以及前两天的剑桥再洗也不破关键位。

    即使利润垫厚，也要在5日平台跌破后，看在21日线是否形成抵抗，比如光库，德科立，好歹缩量站住一个小平台，这种就继续观察，跌破了走。

    21日线不抵抗往34日线去，大概率要往55/60日线，视为图形走坏，调整按周计算。

    光芯片，光模块，ocs，扩产设备，mlcc等谁是新一轮抱团对象，看资金走出来。

    次高位看补涨，

    次高位是国产芯片，半导体，继续延续节前走势是大概率。

    A，芯片线，

    核心是ASIC芯片，寒王，海光，芯原，后面补涨的云天励飞。

    CPU：龙头杰华特，龙芯，卓易信息（洗盘后依然看好，英特尔BIOS），禾盛新材（入股ARM CPU），中国长城。

    昇腾：代表还是航天电器，华丰科技等，龙头盛科通信看是否能企稳，不能就要换人。

    请注意，昇腾在节前反而没怎么表现，预期差是有的，位置比科创芯片不高。

    后面要看资金是否延伸到华为光模块cpo电源液冷，比如华工，光迅等（这块要仔细观察，毕竟前面随着涨了一段。）

    B，设备线，

    300的看江丰和长川谁先反包，这俩都出现了放量滞胀，江丰略好点，

    688看华海清科是否突破新高，寒王的封测甬夕电子图形也还可以。

    主板的即通富微电，华天等封测。

    设备是朱格拉周期，整个都看好，大家沿着板块做补涨即可。

    继续看好588200/710。

    C，材料线

    比如路维光电，半导体掩膜版，玻璃基板的封装。

    聚合材料，收购韩国SKE的空白掩模版业务。中日关系会带来材料的替代缺口。

    D，数据中心，

    老玩家们大家都熟悉，协创，宏景，昨天大单的东阳光等，韶关国资的朗科科技。

    华为的算力中心是谁在做呢？行云科技。

    ABCD，国产线四大天王。

    三、注意，以上的部分，很可能今天是高开，追上去很难受，有耐心可等调整，

    还有什么在中位呢？

    电网设备，etf（比如159320），

    弹性大的，是搞IGCT的派瑞，以及算电协同的南网数字，回调不破缺口为好。

    变压器里的中国西电，要看是否站稳55日线。

    机器人，绿的谐波，昊志机电（同时还有工业母机的概念）。

    低位有潜力的：AI应用。

