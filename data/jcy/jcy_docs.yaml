  文档内容正文: '会有第二阶段

    这段时间的市场属于"极不正常的情绪状态"，航天吸完黄金吸，黄金吸完白酒吸。

    昨晚黄金白银巨震，跳水又拉了回来。

    今天看黄金分歧后，

    流出的资金去哪里。

    有色依然没完，科技蓄势反弹。

    等到这些情绪化和压盘结束后，春季躁动的第二阶段就会开始。

    昨晚的meta大涨10%。

    今年东大AI界，就看AI应用的突破和CSP大厂的资本开支。

    根据有关消息，有些人应该是拿到英伟达卡的进口批文了。

    青海智核绿色算力产业园项目，

    总投资84034万元，建筑面积3700平方米，建设算力中心、配套基础设施、智算中心软硬件、基地日常运营及机房网络链路。建设256个20KW机柜（折合2048个2.5KW标准机柜），购置256台国际高性能算力服务器。

    国际高性能说的就是H200。

    年用电量5300万度。

    回归

    大A业绩最好的板块就是通信，

    前段时间被情绪摩擦的不像样子。

    当时我们讲他"非战之罪"，

    纯属不合理压制，

    今天在情绪释放差不多后归来，通信etf515880新高。

    谷歌/达链率先调整，也率先走出来。

    四大光模块，

    旭创，新易盛，联特，博创。

    博创前段时间要减持，况且它主业是连接器而非光模块，更纯的联特当了龙头。

    联特最早提它时80多块，现在涨了3倍。

    看到长飞早早新高，今天涨停，不会补博创，就说明手速和脑筋不够快，还得加强。

    25年涨光模块，26年会涨物料和组件，cpo，和数据中心配套。

    今早依然告诉你萝卜没问题，它继续创下新高。

    什么是数据中心配套呢？电源液冷之类，比如麦米，英维克。

    英皇在液冷界的地位，其实比米在电源界要强。

    懂得产业逻辑，你就不会被k线左右，能耐得住寂寞扛得动波动。

    现在萝卜涨起来了大家开始吹，咱们可是在180那会敢坚决看多告诉你这是能玩到27年的品种的。

    很多时候，拿到好公司并不需要你的技术，而是你的忠橙。

    真要看技术，三生万物足够了。

    校花们在跌破34日线，踩着55日线坚决往上的时候，就是单身又失恋，此时才是你最好时机。

    图二是v槽概念的走势，说的当天刚启动。

    588200已经走的比710要强了，芯片会接棒设备逻辑讲过多次，这几天英特尔链的澜起，卓易都很不错。

    按收盘价旭创也新高了吧。

    那天我啥也不能说，只能放张去开会的图。

    光器件都有哪些呢？

    看12月8日的文章。（点击蓝色字体跳转）

