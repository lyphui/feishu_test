- record_id: recvdFQGLMAo0n
  文档标题: Vol.260312 今日更新
  文档链接: https://my.feishu.cn/wiki/GHoOwOgtOiEmwpkQKFccKhuknOg
  文档内容正文: '又将是风扇的一天

    伊朗说要布雷，懂王口气软化，

    美股的科技，昨天是冲高，回落，又稍微拉回来。

    今天的大A，因为重要会议结束，叠加油价冲到90，很可能又是周期比科技强的一天。

    周期就看化工，尤其是煤化工，东旭当年看不上但最终超不过的宝丰，煤制油。

    科技继续看华为线能不能支棱吧，电力随着大量散户入场，有点要盘整的意思了。

    电力这块，昨天跟某电企高管深度会议，他讲柔性直流技术是未来的一个要点和趋势，负责电力鸿蒙和整体调度的，真正有AI+电力业务的，南网是电网数字，国网是国电南瑞，

    但我们分析了一下， 一个太高， 一个股性不好，还是看关键元器件，尤其是IGCT，这个国内有垄断地位的还是我们谈过的派瑞股份，它是西安电力研究院的国企，目前有点高，等调整下来再吸。

    今天唯一的希望，因为净卖出放开，希望某队不要砸盘。

    和石家庄首富公司的交集

    文章本来是前几短时间写的，谈了国际庄的裕华区，有同学就比较焦虑，担心错过上涨，或者又没踩中。

    就谈下石家庄的前首富李兆廷，

    他可是80年代的大学生，毕业后在石家庄柴油机厂干的非常出色，30岁就是全河北闻名的副厂级干部。

    1997年，亚洲金融危机，32岁的他辞职创办东旭，专攻被日韩垄断的CRT玻璃装备，仅用7年就打破康宁垄断，成为国内液晶玻璃基板龙头。

    我们看的那个大脑袋电视变成平板电视，业内有他功劳，

    04年时，他石家庄国资委手中拿下宝石集团的控股权，即老玩家才知道的(宝石A)更名为东旭集团。

    既然玩光电一定要切入光伏，2015年又搞出了上市公司东旭蓝天，

    最后成为拥有东旭光电，东旭蓝天，嘉麟杰三家上市公司的东旭系。

    那他怎么出问题的呢?

    一手觉得要尽快产业金融结合，得有牌照，伸手入股山西的德御系，弄了一大堆什么农商行金租公司的资产，结果套进去上百亿，

    一手不断生怕错过电站机遇，搞出来75亿的定增和35亿的债券去扩规模，要知道那时候可是2015年啊。

    那会，产能，技术，人才，团队，市场等都跟不上，2015年的光伏电是什么水平，发电成本快1块2，电价9毛，你还很难并网，组件4块钱一瓦，现在呢，0.8元。

    他从一个个小窟窿补成一个个大窟窿，

    最后只能陷入造假-借钱-收购-质押-再借钱-再造假永动机模式，

    结果呢，虚构利润130多亿，待偿债务130多亿元，外面还有茫茫多的各种民间借贷，中小金融机构借款等。

    今年春节，李被带走，公司40名高管罚没十几亿，出事一大堆。

    我们当时因为很早投光伏，他们在收购上市公司时来咨询，帮着确定了宝安地产，后来更名东旭光电，

    东旭定增时，大王的一个老大哥不建议李兆廷搞这么大，说目标的光伏技术不成熟，补贴不到位，

    但李兆廷急着要做大做强，成为中国的康宁，漫山遍野的圈光伏用地。

    再后来他们找我们探讨融资，在北京的一个四合院吃饭，说实话他们的团队都非常优秀，虽然一再要求简单，一顿饭毛估计也吃掉x位数。

    后来投资经理问报告还要写吗?

    不写了，本来就不可能投，再说这么“穷奢极欲”，一看就不是干实业的料。

    再后来就没有他们的消息，直到春节知道李出事了。

    千亿帝国不到10年崩塌了。

    大王再问当年指点他的那个老大哥， (此君也是体制大部门出身)，说东旭系就十二字，

    “穷者攀富，富者慕贵，贵者羡仙”。

    其实就是不知足啊，总是不看自己已经有什么，老是想自己没什么，非要成为某某某，太用力了。

    已经石家庄首富了，康宁关你啥事?

    人其实是不能逼自己的，不要太用力的干一些事情，不要去竭力追求什么，那是在消耗你，

    就像张高澄道长说，

    你看老鹰，老鹰飞那么高，它不使劲的，大部分时间在滑翔。

    所以各位，

    平时做的事情也好，自己待的圈子也好，手里持的仓位也好，要让自己感觉不焦虑，不用力才行，

    盈亏无所谓，看到它只是数字，那就是松弛，人一松弛，钱和福报就来了。

    太把什么东西什么人当回事，舔狗到最后一无所有。

    反者道之动啊。

    只要你进行了自己的思考，参考了外界的信息，使用了学到的方法，做出了“科学”的决断，那就是尽到力了，

    你就问心无愧了，剩下的无非是时间和回报的早晚。

    “安时而处顺，哀乐不能入也”。

    送大家三个字，“不受力”。

    预期明天格局明朗

    会开完，机构们禁售打开，砸盘，真是无语。

    周期方面人们终于回过神来要看煤化工，

    煤化工的本质是，没有美伊战争，它本身也要涨价。

    化工说了n久了，继续看好。

    科技方面，华为线的华工乖离值超50且完成伯利恒时刻算是退休，带头的变成光迅，能不能持续要观察，光迅是有 cpo概念的。

