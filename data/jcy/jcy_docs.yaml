  文档内容正文: '上一卦的睽，是瞪眼，是吵架。

    在经历了大跌，吵架，或者低谷后，人们总希望能V型反转，马上好起来。

    但这个违背客观的规律啊，大寒之后想要酷暑，这不是自然界的规律，200公里瞬间刹停后，你要马上再加速到200，不符合物理学。

    要有一个震荡，寻底，不再创新低的过程。

    这就是第39蹇卦。

    蹇。利西南，不利东北。利见大人，贞吉。

    象曰：山上有水，蹇。君子以反身修德。

    这个卦，上卦是坎，坎为水，下卦是艮，艮为山。山高水深，骑虎难下，困难重重。

    君子看到这种情形，见险而止，明哲保身，可谓智慧。

    西南东北啥意思呢？西南是坤卦的位置，代表大地，东北是艮卦的位置，代表高山，也代表挑战。

    走平坦的大路有利，走高山不利，得贵人大人扶持有利，守正能够吉利。

    不是你什么时候都能去挑战困难的，也不是躺在舒适区就一定有错，要学会分析力量对比和具体形势。

    初六。往蹇来誉。

    象曰：往蹇来誉，宜待也。

    如果暂时没有前进的机会，那就做好自己的事，耐心等待。

    我们以往受到的教育，总是进攻，挑战，去卷，当个螺丝钉永远努力，一定要把事情搞定，拿下，还要力求完美，这是把人当工具用的。

    "君子不器"，要回归作为人的完整属性，该进进，该退退，不要硬上。

    你追一个女孩子，嘘寒问暖，分享生活，人家要么不回信息，要么打发个表情包，此时不要检讨是不是说错了话，误会了别人，这是牛马思维作祟，说白了她就是不喜欢。

    咱们解读《孙子兵法》，上来讲什么呢？防守，怎么立于不败。

    我本将心向明月，奈何明月照沟渠，那就不要也罢。你谁啊？

    进，是谁都会的，退，那可就是智慧了。

    六二。王臣蹇蹇，匪躬之故。

    象曰：王臣蹇蹇，终无尤也。

    君王和臣子都遇到了困难，那就不是你的原因。

    做事情一定要看大环境，王公贵族都难，那就是系统，体制出了问题，这时候你一个小老百姓就不要硬上。

    马斯克这种的牛人，买了推特，砸了4亿美元帮懂王胜选，还成立了doge部门，然后呢？一地鸡毛。

    大盘不好的时候，你想逆势做出来成绩，难上加难。

    九三。往蹇来反。

    象曰：往蹇来反，内喜之也。

    向前受阻，返回来静待时机，寻找出路，你心态平和了，换了一个角度去看问题，这不也是一件值得喜悦的事情吗？

    创业受挫，资金烧完，果断决定回归职场打工，一直为你担心的家人松了口气，不好吗？

    殚思竭虑的追一个女孩子而不得，不要了，回来看看身边的莺莺燕燕，机会真多，不开心吗？

    跟你熬半天破位了，没有止跌的迹象，果断止损，去看那些看着健康的，或者等大盘企稳后再进去，也是一种智慧。

    六四。往蹇来连。

    象曰：往蹇来连，当位实也。

    往前走受阻，就要回来联合众人。

    一个人要往上走，上面要有领导前辈提携指点，下面要有群众基层支持帮助，这样位置，当位且实在。

    咱们多次讲过，职场和生活中，你要有自己的基本盘，核心技能圈或者骨干团队。

    有了这些，你迟早被发现，没有这些，混圈子没用，你给别人带来什么价值？

    明天给你去宝钢当一把手，你一个光杆面对20万职工，镇得住吗？

    股市中也一样，个股要上涨，需要环境，大盘，量能，板块，政策的综合配合。

    如果这些没有，你减仓回来等也是值得的。

    在股市中，天时>地利>人和>k线。

    九五。大蹇朋来。

    九五是君王和至尊的位置，大蹇，是巨大的阻碍。

    核心的领导是怎么样超越了这个巨大的阻碍，把握住了千百年未有的变局？

    因为"朋来"，一切来自群众，依靠群众，为了群众，团结了一切可以团结的力量。

    之所以可以团结，因为他是一个持中守正，不改其志的"大人"。

    所以各位，如果你想当好一个大领导或者做好一个大投资，就八个字"大中至正，其介如石"。

    可惜了，某位蒋先生只是说说而已，既不公正也不坚挺，炒股炒失败了，治国也一塌糊涂。

    上六。往蹇来硕，吉。利见大人。

    象曰：往蹇来硕，志在内也；利见大人，以从贵也。

    困境已到极点，再往前就是绝路。此时回头，要依附于有能力的"大人"，反而能收获丰硕成果。

    大人是谁？你回头看，上一爻说的九五。

    你一个喽啰，在单位公司里实在不知道还投奔谁，投奔那个公正的，人品出色的，能团结大家伙的人。

    就像1940年，有志青年们捋一遍全国的势力，发现只有去延安。

    在股市里，九五是谁呢？主线板块。

    主线，是有朋的，是那个汇聚了最多资金和人气的板块。

    它涨大盘涨，它跌大盘跌。

    大盘超跌之后，修复行情只有主线板块能够带大家勇猛的V起来，其他都不行。

    蹇，是跛脚走路，是艰难跋涉。

    整个蹇卦，告诉我们在底部震荡区域，越是这时候越不能蛮干硬上，非要让她不准生气可能闹的离婚，非要马上解套结果可能套的更深。

    很多时候大环境和不可抗力过来，你打得赢就打，打不赢就走，该减仓减仓，该认怂认怂，该分房睡分房睡，然后好好读书复盘思考成败，待情绪平复后再去哄对象，待大盘企稳后再去看个股，所谓退一步海阔天空。

    其实伊朗的现在，被美以连续斩首轰炸，腿都炸坏了，正是"蹇"卦。

    而要解开就一个方法，"往蹇来硕，吉。利见大人"。

    问题是，"大人"愿意吗？'
