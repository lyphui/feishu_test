  文档内容正文: '新光犹比旧光好

    既然发不出简化点说吧，

    一直就判断AI更上游的物料要有一波趋势，所以讲MLCC和CCL等基本涨过，

    后面的一条隐约支线已经出来了，上游材料涨价和设备缺货，我们称为"新光"。

    搞过供应链和生产管理的就会知道，

    采购会分为"直接物料"和"间接物料"。

    周末给大家整理一下，

    《AI稀物料设备与拟涨价材料一览》，刚和NVIDIA的几大供应商聊过。

