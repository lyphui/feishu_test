- record_id: recvmcaW7HqNJX
  文档标题: Vol.260611 继续的剧本与再谈普通人的建议
  文档链接: https://my.feishu.cn/wiki/IfiawRsVLigqwmkDUWFcHrK0nrb
  文档内容正文: '加息的预期下去了，伊朗又打起来，美国高开低走，甲午月，也主兵革，正常。

    大盘还是N型反弹老剧本的路上，和昨天一样，不放量下跌洗走恐慌，就很难V得起来，大多数科技都要55-60日线上走一遭。

    技术上怎么看，操作流怎么去留，讲过很多遍，具体品种也在评论区讲了很多，逢反抽减仓硬科技说了很久，一直说到周二，具体一城一地的得失就不要反复询问了。

    承受能力弱又技术一般的，不要玩个股，省得每天心惊肉跳，定投或者关注相关ETF，观察标的跌破上升通道后，到21-34日线区间再布局，这样操作远比盲目折腾稳妥。

    21/34日线拉起之后，持有即可；若跌破该日线起点的上升轨道或者5日平台就离场，等待下一轮支撑格局形成后再入场。风格偏激进的投资者，也至少要等待标的连续3天不创新低再考虑介入。

    就比如半导体设备，90%的品种都朝着60日线运行，但588710/200/010又出现企稳回升的趋势。

    全市场一千多个品种，表现突出的不到二十个。

    相关标的调整幅度越大，后续机会也就越大，因为资金始终集中抱团在这类品种当中，普通投资者很难超越专业基金经理的选股能力。

    不要觉得单纯布局ETF枯燥乏味、等待难熬，动静等观本就是一种高阶的投资心态。

    无法承受短期波动，就要严格遵守交易纪律，紧盯上升轨道、平台、支撑位。不要自我标榜为长线投资者，若是选择长期持有却依旧被短期行情牵动情绪，那便算不上真正的长线投资。

    以上内容反复提及多次，今天再做重申，另外补充几点内容：

    1.AI行情发展空间依旧广阔，远未结束。昨日晚间和高端传统制造业从业者交流得知，受数据中心持续扩张影响，相关企业接到海量订单。

    从事CCL业务的企业也表示，企业资金充裕，计划新建厂房，设备全部选用进口产品。

    2.东大布局AI的决心十分坚定。昨日工信部印发光通信相关文件，结合部分暂不便公开的指标来看，东大的技术路线相比海外企业更为激进。

    盘面重点关注3966位置的支撑，以及4010/4030区间的压力位。如果3966支撑失守，指数大概率会下探前期低点。

    行情触及压力位或是市场情绪到达冰点时，可以重点观察基金重仓指数。昨日早间便能看出，资金再度布局国产半导体板块。

    个人判断，周四将成为行情变盘节点。战术上谨慎应对，战略上保持信心，行情主线依旧存在'
