  文档内容正文: "再度回归主线\n之前，市场的两大板块分为情绪和成长。\n周末是继续降温情绪的态势，明确批评游资量化兴风作浪。因此，如果你拿的是情绪股，且属于纯蹭概念、业绩很差、图形走坏的，那就得好自为之。如果你拿的也是情绪板块，但涨幅并不夸张，业绩也有支撑，之前冲高回落没来得及卖出，到现在了，今天的下探不要过于恐慌，可以观察一下能否收出小阴线和十字星。官媒也说了不是拒绝科技创新，有真业绩的龙头会支持。\n\
    既然全面压制游资量化两融，那么机构和主线的方向会再度归来。此前主流的方向是半导体设备，在游资猖獗的时候，资金抽血也没影响到它。因此，半导体设备强者恒强，588710代表的ETF可以拿住。如果你拿的是设备股，缩量上涨还要涨，乖离值不扩张就可以一直拿，继续看好300字头的设备股，比如上周五提到的长川等，在如此强的背景下，它不能跌破126.4。（懂技术和产业的同学可以继续挖掘设备股）寒土系的倒装用矽电等都已新高。而我们常提的中科飞测、京仪装备等目前也是图形健康，涨幅并不夸张。\n\
    因此：\n1. 如果你想跟上最强主线半导体设备，自己又懂技术会炒股，可以继续去发掘300字头的设备品种或其他相关标的；\n2. 你想跟上国产设备补涨，可以关注国产芯片；想埋伏预期差博年报业绩，可以布局通信，这两个ETF适合有一定风险承受能力的同学（注意通信方面要分批次，文末会谈）；\n\
    3. 新手菜鸟还是选择专属组合，不要觉得机器人ETF（比如159530）不好，它悄悄即将创历史新高。以前每次商业航天出现分歧，都会有资金流出转向机器人，这次依然不例外。机器人板块稳健的可以看浙江荣泰、拓普等Tier1主供，这几个也快新高；有一定弹性、目前涨幅也不夸张的安倍龙、鸣志等，可自行关注；\n\
    4. 如果有人想趁这轮过度打压捞一些错杀标的，传媒ETF（512980代表）如果继续下探，就会补上周五说的1.72左右的缺口，下探至冰点时刻，错过这一轮的同学可以建仓20%左右，继续观察它在这个位置能否企稳形成平台或小箱体（注意不要梭哈）。\n\
    AI应用中，弹性最大的是传媒，机构喜欢买的是AI办公、工业互联网类，这轮被打压长期看是好事，有业绩支撑的标的将会脱颖而出。市场逐步进入业绩和机构主导阶段，注意仅为学习参考，不构成任何投资建议，不要再跟游资量化跟风操作，防火防盗防小票。\n\
    今天观察：胜宏不及预期后，今天大盘是否会原谅它，如果原谅，说明海外算力走强；如果不原谅且带垮海外算力，那没入场的同学可以逢低关注515880（看样子它未包含胜宏）。\n\
    业绩季牢记口诀：财报出来后，当强不强则为弱，当弱不弱则为强，这个时候操作最要跟着机构见风使舵。\n版权归原作者所有，仅阅读使用。\n曾经的十大流通股东\n\
    \ \n9月前后有相关人士问大王，陈宴群是谁，我一头雾水。她说陈宴群成了她们公司十大流通股东，我才回过神来，这就是大游资陈小群。\n \n那时候CPO受到很多质疑，游资量化也最后砸盘走人，股价一路走低，但我们贴出了它的客户名单，其中除了英伟达还有SpaceX等，但凡涉及光电封装等业务，都绕不开它。戴军也是“十五五”半导体光电组的副组长。\n\
    \ \n那个时期，游资和两融资金被大量洗出以易中天为代表的AI硬件板块，才酝酿了第二波上涨。\n \n小群的体量，早就应该考虑的是政治风险和人身安全，而不是每天在那边造板。你把中铁建拉涨停，肯定没人管你。美国也一样。\n\
    \ \n有人问过巴菲特那些人为什么后来消失了，巴菲特说：“他们不愿意慢慢变富啊。”只要你愿意慢慢变富，就基本能富。\n这个图有些同学可能没见过。\n昏昏欲睡\n\
    反正是拉起来就压盘，压下去又拉一拉，\n防止大起大落啥意思，揣摩吧。\n直接说板块，\n-商业航天，终于是冷静下来了，除了机构和有 业绩的，散户与游资纷纷撤离，\n\
    但上头过后，这才是你真正研究的开始，这个板 块当然没完。\n-丧标代表的Ai应用，在这里基本稳住了形势，\n我们早上讲，传媒etf的在1.172的缺口处可以建\
    \ 仓，今天开盘就是机会\n纯正的AI营销类和GEO依然看好，将来消灭App 的。\n-pcb当弱不弱，遗憾的是通信被剑桥带着情绪 低落，这里依然看好，年底业绩要爆炸的就靠它\
    \ 们。\n-反复讲主力的阵地是光，电，有色，刚果动 乱，光被波及，今天只剩猛拉电，电网etf创下 新高，\n因为有点放量，同学们要注意不能跌破5日平台 了，拿个股的自己看乖离值。\n\
    咱们周五讲的Ai电力，你在前排猛涨的，20cm 品种里扒拉扒拉，基本就是那个圈子。\n商业航天流出的资金当然不想追半导体设备，于 是再次去了机器人。\n我们提示的几个都不错，\n\
    总之是情绪基本发泄完了，今天稳住了局面，后 续看谁的小步快走快吧。\n资金流入后的局面，见25年12月31日盘前的 《万物生长》\n万物生长昨天下午的复盘和谐了吗…\n\
