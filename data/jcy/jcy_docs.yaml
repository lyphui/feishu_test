  文档标题: Vol.260603 顺天应人；有福之人
  文档链接: https://my.feishu.cn/wiki/UyT9w7FBEi16I4kxo0xc4NdInvb
  文档内容正文: '顺天应人

    孚的这个涨幅，本应是上周五给大家的，被耽搁了，今天才发。也好啊，给了多好上车的机会。

    "有孚，元吉"。提示(赏饭2)

    "巳日乃孚，元亨利贞"。提示(赏饭3)

    大家不是喜欢通过频率观察看好么，打Call孚同学好多次了，几乎天天说。

    表面是国学文化，背后是我们对筹码结构，市场板块，产业链条，映射对标的深刻分析。这就是"顺天应人"，顺天应人就是上周一再次讲的相信光。

    不知道孚同学是谁，说明文章没有看到7天以前，对评论区的重要信息也没关注。

    今天是老天爷赏饭，拿到红利，说明修出了福德，没拿到也只是说明机缘未到而已，继续加油。

    享受了先贤加持恩泽的，要多去做公益。

    有福之人

    物以类聚人以群分，来这个圈子的都是富贵贤人，有福，是接纳身边的一切，心态好，有孚，孚是诚信，忠诚。

    对科技大票要忠诚，对非科技小票要渣。

    市场的本质炒的还是产业，目前的核心是光和光设备，设备昨天和今早再次说过了，朱格拉周期，基本都绕不过罗博特科。

    新锐是博众也是跟大家提比较多的，高管减持的时候告诉你别怕，拿出钱是为了买灵猴机器人，"某树在灵猴的面前就像玩具"，它的设备给某创供货，关键还有openAi的订单，它搞硬件外界都不知道吧，问就是跟业内相关人士喝过酒。

    光里价值量最大的器件就两个，

    一个DSP电芯片，国内其实没有，资金硬去对标两个，

    一个是光芯片，核心当然是校草，产量和验证最快，其他是100G200G的EML，200G能用的就东山同学拳打脚踢，且有meta订单，送样的是长光，N个月前讲它有未公布的订单，前几天评论区脱敏了，经过了校花的测试。

    东山的业绩怎样?小袁今年的预期是达到2025年旭的水平，按100亿你算下PE。

    然后再讲讲男方下，国产半导体，尤其是设备，主力早就派发，反抽是给你减仓用的，情绪是华天科技，你看今天是不是这样。

    别看寒王拉升了，别人21日线踩到支撑不跌破，完美符合《三生万物》，其他几个行。

    今天早盘讲市场的压力位4112，果然到了4107，冲不过去直接回落，这就是做T点，然后你看电力白酒又起来。

    所以那个口诀要记得，

    缩量上涨还要涨，放量大涨要当心，

    放量滞涨要减仓，跌破通道得走人。

    放量大涨，代表着买的人多了，但卖的人更多，机构在派发，如果没有较大分歧，应该缩量才对。

    因此光板块，也有了上上周半导体设备板块，派发和加速后涨不动的迹象。

    注意只是迹象，还没看出趋势。

    因此现在也只能持有不适合再追了。

    明后天，待主力再决战一下，然后我们找出其中的"相对低位"，下周开始跟车。

    初步看好,AIPC,AEC连接器,CPU。让子弹再飞一会。'
