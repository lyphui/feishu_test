    莹：所以今年pcb不用看了吗?

    南院大王 回复莹：pcb本身可能要到一季报后，现在涨的都是它上游原材料，钻针，电子布，ccl

    小龙：农尚的小红书算力还能等不?

    医学信息学：大王 东田微依然是卖铲子的哈?

    玥玥：大王，新年好!阅文集团还可拿?

