  文档内容正文: '外头跌4300家而你暖暖洋洋，这就是是主线的力量。

    中国的崛起就是先后干掉其它工业国的过程，比如电视干掉了日本，造船干掉了韩国，那么半导体芯片没理由干不过美国。

    这就是我们一直看好国产半芯片和半导体的深层逻辑。

    这个领域那就必然避不开那几个核心龙头，寒王，中芯都新高之后，自然要轮到博通的芯原，之所以讲它必然新高，毕竟有阿里字节两个爸爸的加持知识星球鉴茶财经院。

    普通人搞200/710就行了，轮着来。

    再说到存储，今天部分冲高回落但不改长期看好，别看韩国现在很厉害，过两年一样干跨你，京东方怎么颠覆面板产业的产业的，合肥克韩国啊。

    女方的道理也一样，元器件迟早“应吃尽吃”，把老外变成组装厂，就像早上康宁桥接技术利好的是孚，JPT等FAU，

    锁单三年我们2月底的40多块开始反复讲，一路到今天完整实现伯利恒钢铁时刻的130，你总拿住了吧，而液冷新贵YDET冲击130仅用了10天，牵手了吗?

