- record_id: recvjsxCq348UU
  文档标题: Vol.260513 风物长宜放眼量兼谈产业信息
  文档链接: https://my.feishu.cn/wiki/SICNwgiMNiD5QpkmRkecyUCbnEb
  文档内容正文: '前几天跟大家在正文里说过行云科技，听说过阿里算力、字节算力，大家听说过腾算力吗？一水的华为卡，它就是。

    行云是怎么来的呢？以前的主体是天泽信息，天泽的业绩基本全靠收购来的远江信息，老板是刘智辉，老刘人不错，对员工也很好，卖出股份后变成天泽次要股东。

    再然后天泽收购新三板跨境电商企业“有棵树”，有棵树的老板上位成为大股东，2022年更名为有棵树。之后因亚马逊封店事件等影响亏损40亿，被ST披星戴帽进入重整流程。

    再后来深圳天行云供应链公司入主，今年2月更名为行云科技。

    企业如何切入算力赛道？得益于湖南省的政策支持。为何布局AI领域？因为老刘出身电信行业。湖南为何给予支持？因为老刘是湖南人。

    老刘当年卖掉远江信息，在天泽信息担任副董事长期间并没有赚到多少钱，公司股价持续下跌，一度打算找人纾困。行云科技转型算力赛道后，老刘以小股东身份持有的股份，市值一下子达到数亿。

    这场翻身仗足足打了大概八年时间。

    讲述这个故事的目的，不是让大家追高买入，而是想说明产业布局和投资，很多时候需要足够的耐心。普通人可以兼顾日常工作和炒股，而资本大佬往往只能专注做一件事，中间过程繁杂、各类问题层出不穷，需要耗费很长时间去逐一解决。

    就比如农尚环境，其在2022年就斥资近10亿元拍下相关股权。但需要给林峰时间去处理牛散黄家相关事宜，事实也能证明，布局算力、采购算力卡，还得依靠业内专业人士。

    所以回看当时农尚环境28亿的市值，科技大佬自然不会满意，后续必然会有自救和资本运作动作。

    但具体何时落地兑现，没人能准确预判，不必天天盯着盘面反复询问。原本科技大佬比普通投资者更着急，反倒变成散户比资本大佬焦虑，这样又怎么能从资本运作中获利呢？

    同样逻辑的还有中天精装，大家只关注到它参股科睿斯，拥有FCBGA高端封装基板业务，这类产品是CPU封装必不可少的底座。

    其实我们早就讲过，中天精装还持有远见智存的股份，远见智存是国内唯一能够量产HBM3的企业，这家企业的估值远超中天精装本身。

    再看中天精装背后的资本背景，是东阳国资委，东阳毗邻义乌，本身就是资本市场里的投资高手。

    但科睿斯何时完成并表、远见智存何时登陆资本市场，都需要耐心等待。

    最后说说很多人反复问到的博众精工，公司业务兼顾新能源与光通信两大赛道，明面上可生产1.6T光模块自动化设备，收购的中南鸿思尚未完成并表。

    除此之外，还有不少不为外界熟知的布局：公司背后孵化并参股了行业热度极高的灵猴机器人，业内人士评价，灵猴机器人的技术含金量不输宇树科技。

    同时，博众精工还是美国版富士康JBL的核心供应商。

    另有消息，某全球新能源电池头部大厂，因自身Tier1市场份额过高，有意扶持博众精工，将其培育成行业竞争者。

    但具体如何扶持、扶持力度多大，一切都要交给时间来验证。

    短线交易和长线投资，绝大多数时候难以兼顾。选择做短线交易者，还是产业价值投资者，对应的操作思路和应对方式完全不同，要先理清自身投资策略，再进行操作。

    如果既想做短线又想布局长线，至少可以分仓操作，把决心长期持有的标的单独放入另一个账户，平日里不必频繁查看、随意操作。

    否则，当你内心纠结，反复纠结要不要卖出的时候，就说明已经不再看好这笔投资，没有初心和耐心的投资，自然难以长久坚守。

    建议大家好好读一读《四种投资者》这篇内容。'
