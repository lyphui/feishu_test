    这段时间，君子当顺天应人，主动调整与适应形势，借机实现事业突破、关系修复、革故鼎新等，今年的主题是"蜕变"。

    易经第41卦损：身强担财

    从第38卦开始就是杀跌，

    烈火烹油大涨的时候，你冷静不下来，经济和市场遇到触底，调整，震荡，期间最重要的事情是什么？是反思，是总结经验教训。

    先思考自己不足的，失去的，做错的，再思考自己成功的，得到的，做好的。

    这就"损益"，财务中有损益表。

    先说损，

    损。有孚，元吉，无咎，可贞。利有攸往。易之用？二可用享。

    象日：山下有泽，损。君子以征忿室欲。

    损卦是吉祥的，将有所俘获，大吉大利，没有灾难，可以做点事情了，将有人送来两盆食物，可享口福。

    损明明是损失，损伤，亏钱了，账户缩水了，或者项目没做成丢单子了，怎么反而是吉祥的呢？

    因为你检讨自我，智慧成长了啊。

    损卦，上面是山，下面是水，水在一天天的侵蚀山的根基，君子看到这种情况猛然惊醒：

    酒色和熬夜，让我如此憔悴！

    "君子以征忿室欲"，

    然后明白了，人生在社会上，往往最难放下的就是执念与欲望，这才是陷入困境的根本原因，

    损，就是减损自己的贪、嗔、痴，回到自然本真状态，比如渴了喝水，饿了吃饭，冷了添衣，而不是永无止境的贪欲。

    你不快乐不是因为没钱，而且动给自己提出了更高的目标，

    你不幸福不是你得到的太少，而是你试图要求的更多，

    人要知止，知足，知进退，不断的回归自我和质朴，好事会自然而来，别人主动给你饭吃。

    一壶90度的水没烧开，你非常着急，普通人想的是加大火力，找来更多的柴火燃料猛烧，永远99度，越来越焦虑。而先贤告诉你，把水倒掉三成，水声鼎沸，你还能剩下不少柴禾。

