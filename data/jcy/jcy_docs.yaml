    昨天还跟明天幸福在谈广州的航天公司，晚上就出消息了。

    广州我就熟悉个海格，年后开盘前给你过大家了，

    其他本地人有熟悉的吗

    百花齐放

    口诀都记得吧，

    当强不强则为弱，

    当弱不弱则为强。

    昨天商业航天一顿利好，今天当强的，有些掉队了，

    这个板块完当然没完，后面会去伪存真，机构逐步入场，撇去浮沫买真东西。

    金风连续拿4个板，就是机构审美。

    瀚讯今天全程强势，之前也是大资金逐步吸货的走法（图3），我们讲它相对中国卫星简直没涨，

    北有国网，南有千帆，绝大多数人其实不知道这个信息。

    这个行业其实就一句话，

    我们之前讲过的，

    “所有的公司基本都是给国网星座和千帆（垣信）干活的”。

    个人觉得，长期看国网不一定干的过垣信，上海的市场能力更强。

    你可以搜一下（智勇，看它以前的工作单位。

    我们要看到一个什么迹象，很多大资金去哪了，

    正是早上讲的三个板块，

    -AI应用/传媒，引力传媒，同学们自己挖掘的，我昨天讲过了吧，盘整8个月就为个涨停？你要是《三生万物》多看一遍，昨天不会卖的，

    蓝标（谁给起名的叫丧标啊）猛涨，易点天下20cm历史新高，

    反复提示过传媒的战略性机会了吧？

    大林你的易点天下还在不在？

    字节会赞助春晚，豆包概念是有搞头的。

