  文档内容正文: '轮着抱团切换

    晚上一下子多了好几个公告，首先是天孚，这算是低于预期，预料中的，真实版创比孚强太多，孚的业绩连东山都比不上，去年大涨是因为CPO和FAU的叙事。但FAU光库也有，厂子就在孚附近。

    然后是英维克，大多数人看到净利润800万，实际上应收大涨26%，应收账款有30.61亿，很多财务费用前置的操作。2025年Q3才有英伟达G300的订单，今年Q1才刚进谷歌，订单的收入确认存在明显的周期错配，做过企业的都懂。新业务不挣钱和费用高是正常的，中长线依然看多。以前大家经常听说转型的阵痛，它现在就是。25年下半年之前本质都是国产生意，客户是某为、移动、联通之类，跟他们做生意的情况大家都清楚。

    但情绪上预期今天整个板块都要受冲击，看市场怎么应对，它封死就没有机会，如果超级低开后拉高，不是追的机会，“低开不是低，二次探底才是底”。

    分化的一个方向是扩音绕不开的设备，有业绩化走势，比如做示波器的联讯超级平替，普源精电，营收2.32亿元，同比增长38.00%；归母净利润2315.03万元，同比增长512.01%。

    大族的两个板块，数控和激光都不错，大族激光的打孔技术业内验证也很不错，PCB之前起不来，上游太强势是重要原因，再看看鼎泰高科之类，走势都很强，进入二季度后PCB慢慢就更有看头了，它们可以对下游涨价。

    天齐锂业，一季度净利润大涨18倍，新能源继续看好钠电相关标的，宁王的协议转让只折价5%，好公司还是硬气。

    芯原股份自愿公告，2026年1月1日至4月20日，公司新签订单45.16亿元，早就讲过它同时有阿里和字节的合作资源，预期打开国产芯片新高度，中国小博通表现不错。

    前两天谈到的预期差瑞可达，全年归母净利润2.99亿元，同比增长70.63%，分红方案为对全体股东10送4派3元，不算小气，英伟达的业绩没有计入，它身处竞争激烈的汽车业，依然能够盈利。

    总体上，海外算力为代表的这一轮抱团，不会瓦解，市场选择原谅的概率并不低，但短期必然要震荡分化。

    因而风向有往国产方向偏的趋势，这个风偏即为“高低切”，比如国产芯片、国产创新药、国产电力装备、部分商业航天。

    抱团不会死，只会换一个地方抱团。今天看芯原、寒王、华丰等代表国产芯片是否接力，国产芯片三五年内都不看空，道理很简单，从产业价值角度来看，核心国产标的具备稀缺性。

    同样能观察抱团的是创新药，比如三生国健这种震荡多日又不愿意跌穿箱体下沿的标的。

    等国产板块抱团一段时间，发现部分产业链利润极低还回款缓慢，又会调头去海外赚美元的公司，发现还是海外客户合作条件更优。就这么循环往复，切换不断，抱团轮换。

    今天，又是观察当强不强和当弱不弱走势的重要日子。

    评论：

    紫木堂：大王今天的英皇会不会很惨

    南院大王：有一个多板在手怕什么，踏空的更多

    和煦微风：冲击130

    焉知鱼之乐：我英皇十四个点能抗一个半跌停不怕

    紫木堂：大王说的对

    紫木堂：肯定要调整一下子

    加应子：前期有利润垫，大王的意思不用怕，继续拿，冲130？是这个意思吗

    加应子：那是否今天先出，低点再进？

    Edward：大王，请问之前提过新雷能怎么看？一季度营收增加，亏损收窄，后面还有预期吗

    南院大王：卫星电源虽然纯正，不怎么赚钱，数据中心电源订单明显放量，利润还没凸显而已。

    Edward：谢大王！

    小伞老罗：大王，麻烦瞄一眼三安吧

    南院大王：这不就隔壁那一课讲的抵抗阵线，在这里附近磨吧

    小伞老罗：那就等机会做波段，谢谢

    继续抱团

    你爆你的雷，我抱我的团，抱团一旦形成趋势就很难逆转，

    无非是暂时换一个地方抱，

    那些miss，不及预期会很快被人遗忘。

    抱团的依然在光里，两翼的上游是材天通，锗业，福晶，腾景，东田为代表的材料，下游是设备，核心是萝卜，萝卜≈先导，

