  文档内容正文: '派发与发酵

    怎么样？大盘如早上说要到4120附近后再拉起来，抽一下，一哆嗦，再回去，给你拉个小阳有可能的，果然。

    叠加外围的日本暴跌，韩国股票都跌的熔断了，主力顺势撂倒。

    没想到周一讲的东西，周四兑现一把，周五再兑现一把。

    主线剩下最后的独苗半导体设备在加速，昨天说588710的上升趋势没有破坏还可继续拿拿，

    之前讲拓荆，华海都要突破长期盘整的位置，技术是隔壁214课的原因，逻辑是，因为还有资金没有赚到和兑现的，得大涨一把加速才能走。

    女方的通信设备呢？159381早上破5日线和上升通道，再看日韩暴跌，坚决走人。整个光破位的都走。

    今天微红之后还有人心怀侥幸，其实总体环境是什么，就是派发。不停的震荡，杀一杀再给你点希望把散户骗进去接盘，今天割明天进，再割再进，高位派一个礼拜乃至一个月都有可能的。

    今天还看到什么？

    第一，最高位的海外算力国产芯片，高位筹码开

    始松动，虽然有拉回的，但兑现迹象明显，不要侥幸。

    第二，还是有资金去做了切换的，但都是试探性的。

    -比如往AIDC数据中心和云服务板块切，比如之前买卡难的，略后排的，比如润泽，大位等，早上一个冲高被大盘又带回。

    -比如往机器人和工业母机，机器人就看好一个，回踩买点上来的，绿的谐波，工业母机的华中数控，创世纪等都不错，给新手准备的昊志机电，表现中规中矩。

    -比如往AI应用上切，龙头线上线下已经新高了，板块里的粤传媒，易点天下，引力传媒，包括蓝标等，资金还是顶住了压力的。

    -比如往低位储能和锂电，位置和pe双低的阳光电源人家起来了，app说储能不准确，应该是“数据中心电源”。

    所以不担心电网设备轮不到。

    总体上谁相对真诚？储能和机器人，尤其是工业母机，五一就讲长期看好，新的朱格拉设备周期，7-8年呢，去年先启动的是鼎泰高科。

    第三，其他的新概念，玻璃基板，碳化硅等新概念还要观察，没有走出趋势，我反而更看好落后

    制程的MCU和IGBT等，这几天涨后也在盘整。

    这些天说了N遍用最高级的风控，MA5,MA8，落袋为安，不要万一，要的一万，管住手，希望你听进去了。

    如果没有听进去呢？痛定思痛，事已至此，先吃点甜的开心一下吧。

    这回没听仔细，下回好好听进去呗。

    今天一跌，很多直播间估计走随大溜看空了，但我们对未来绝不悲观，牛还在，不要恐慌，不跌一下，怎么腾出上涨空间？

    等晚上的公报，应该有好事儿。

    南院大王

