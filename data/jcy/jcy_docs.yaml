  文档内容正文: '反弹中看诚意

    今天的高开和反弹是必然的，

    但要注意，有量的反弹有诚意，无量的反弹是诱多。

    大盘，个股都是如此，

    所以今天的重点是看诚意，那些量能不够的，冲高回落的，不够核心的，不跟板块的，不要太跟他们纠缠，该趁反弹减仓减仓，该去弱留强留强。

    目前，仍然不是推高仓位的时机，5成就挺好，看基金重仓指数站稳昨天为低点的5日平台（最差也要3天不创新低）。

    有什么短期苗头，看昨天的美股，

