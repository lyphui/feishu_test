  文档内容正文: '以静制动

    新年开门红的概率很高，

    各路大资金都会去“随需应变”，

    我们要注意两个口诀，

    一是高位看图形，低位看逻辑，

    高位的纯粹是情绪和资金推上去的，一旦走坏就会有人去兑现，这个要用好BAIS值，严守5日平台。

    低位不一定是价格低，而是成交量和拥挤度低，只要产业逻辑没有走坏，流出资金就会去高低切。

    我们把几个热门板块的拥挤度也放在下图。

    二是，当强不强则为弱，当弱不弱则为强。

    比如说，最近的年报季来了，不少公司都进行了预披露，如果业绩很好，公司没有大涨，反而跌穿重要均线，那就注意它要是周线级别调整。

    又比如最近的先进制程都在涨价，国产半导体设备是应该走强的，如果整个板块都没有像样的人走出来，那就说明不强。

    时也势也

    1，今年第一天最体现预期差的是谁？

    不是大家都熟悉的那些，

    而是在《丙午年运密码》专门大提的传媒。

    龙头当然是蓝标，10年新高，

    后面一看启动手快去追，不还有易点天下宣亚国 际之类的。

    原因么也讲了，TMT唯一没涨的，

    技术上好多年盘整，筹码都洗干净了。

    产业是AI应用必须起来。

    当然游戏传媒不分家，

    游戏去年涨的略多而已，

    ETF今天也稳稳4个多点，

    2，商业航天毫无意外继续分化缩圈，很多都掉 队了，最后只剩机构品种。

    之前讲过就两个核心，北有卫星，南有瀚讯，其 他都是服务它们的。

    盯好它们就行。

    3，光和电依然是主线，硬件受到谷歌减产小作 文影响，但谷歌链并不看空，尤其是之前讲的胜 宏，沪电代表的pcb，当年和光模块号称双雄 的，被小作文伤害太久。

    宏妹行的，被低估的这下修复了吧。

    在光的领域，所有环节都炒过了，没怎么炒过的 就剩萝卜和永鼎，永鼎的核聚变和光芯片故事打 满，

    而萝卜这种真干共封装光学的，故事和业绩能搞 到27年的大后期品种是考验你产业理解能力 的，陈小群反正被洗出去了。

    4，谷歌的小作文，还是说先进封装缺货，你要 相信谷歌的协调能力，延伸到国产设备你懂的， 588710/588200不赘述。

    5，海外算力，英皇今天没扛起硬件的大旗可惜 了，你不扛东阳光就来扛了啊，

    东阳光也是H200入华的受益者，毕竟它全资收 购了秦淮数据。但协创这种才是受益龙头，它早 就有B30，背后是郭台铭的哥哥，近水楼台。

    商业航天下一阶段和谁共振，看看4号咱们的回 答，双双涨停。

