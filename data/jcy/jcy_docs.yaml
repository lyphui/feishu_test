    后面呢？后面我们认为会继续。

    这个100多亿的金融科技etf明显放量。

    其他的金融科技都还有谁，老同学们都熟悉的，除了御三家的文丞相，财富趋势。指南针之外，还有什么安硕信息，汇金，赢时胜之类的，谁在前排看谁，谁跌破5日平台或下穿8日线推掉谁。

