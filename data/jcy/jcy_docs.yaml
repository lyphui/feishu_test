  文档内容正文: '今天看弱修复

    今天根据惯性按理还要有个冰点，冰点之后弱反弹。

    油气甲醇之类，不涨停的，要减仓或者止盈相当部分，欧美的油气已经快涨不动了。

    没有仓位的今天万万不要追油气。

    科技+周期仍是主线，具体品种不赘述。

    早则周四，晚则周五，说不定一个V字就上来了。

    这段时间，就是之前那些压盘和抛售机构的吃货期。

    弱修复

    昨天说支撑4045，今天下探到4055，起码止跌了，相对于韩国股市对得起观众。

    周期的排头兵是钨，钨粉涨价600%，化工依然看好，科技的龙头海外的是cpo+ocs，国内的是华为算力与出海。

