- record_id: recv9q93U9kEr3
  文档标题: Vol.260126 今日更新
  文档链接: https://my.feishu.cn/wiki/EsNDwgDARi2212kifrAc02FynKf
  文档内容正文: '体会一下周期的力量

    西方的经济学也好，

    中国的易经和史学也好，

    都在用各种方法告诉人们一个现实，

    万事万物都是有周期的，

    你要踩中趋势，

    说白了就是顺着周期而行即可。

    我们看几张图，

    一个是银行和光伏的对比，

    光伏在高位时，银行是狗不理的低位，

    银行在 4000 点高位时，光伏在底部反内卷。

    老同学们都知道，我们讲过锂电在 2025 年初基本出清，光伏慢点要到 2025 年末。

    对比图能看出他们的前后顺序。

    另一个是恒生科技，

    21 年的恒科是超级高点，

    银行是一个超级低位，

    随后两极反转。

    恒科指数在马老师讲话、防止无序扩张等影响下一路下滑，

    银行反而在地产危机下大涨 3 年。

    更有意思的是，在 4000 点收费站反复折磨大家，农行如日中天那会，

    很多小机构和散户终于受不了去买了后排的各种农商行、城商行后，

    套在高岗，板块迎来了悄然的调整，现在完全被 34 日线压制。

    同样的，你再看做 CPU 的 AMD，和英伟达亲儿子 corewave，可以理解为 CPU 和 GPU 的交替周期，

    虽有延迟也能看出个大概。

    理解好周期的乾坤大挪移，

    你就不会把方向搞错。

    大方向正确，剩下的是慢慢变富而已。

    去伪存真

    挨个说板块：

    巴西队跌下去拉不回来了，长上影，阿根廷拉回来一根长下影线，这就是区别。太空光伏到了尾盘，不就剩下乾照了吗，还是有真懂行资金的。'
- record_id: recv9kuIYMyxnV
  文档标题: Vol.260125 春晚赛季拉开序幕
  文档链接: https://my.feishu.cn/wiki/A2gYwyt7ViiLaQklTQ2cAH1nncc
  文档内容正文: '春晚机器人正式官宣 —— 银河机器人。基本是胡建人曾毓群拉着他小老乡王兴投出来的，北航出身的老板 92 年。受益公司天奇股份、百达精工、美湖股份，其他的蹭概念。反正你有机器人
    ETF 就行了。机器人里图不错的，拓普、浙江荣泰，弹性的安培龙。据不可靠消息，以后机器人将成为春晚常态，每年都上。

    咱们主要看谁呢？春晚主赞助商，字节。它这回是火山云引擎。那搞 AI 应用就行了，就是丧标那票人，还有个引擎的代理商汉得信息，很多同学不是擅长阿根廷平铺么。最新的消息是腾讯也加入战团，10
    个亿现金红包，最大一个一万。它就有个天地在线看情绪（因为跟李亚鹏合作拉了两个涨停也是醉了）。这里龙头看浙文互联就行了。

    春晚 AI 应用，简单粗暴的是传媒 ETF。AI 应用的后备是谁？AIDC（润泽、大位、协创等）。下周开始，国内开始大招标。

    老牌八强的有色 / 化工，有色继续看钴（盛屯、中伟），化工以前讲过简单粗暴的 ETF 516020。还有个能源化工 ETF 159981，这哥们玩的是期货，是猛的，仅限高手看。

    CPU 的继续看好，尤其是澜起、卓易代表的英特尔链和龙芯等的国产链，中期级别的机会。

    再说下太空光伏，技术有可行性吗？有的。用量大吗？想多了。这种周五高潮，周末酝酿，周一高开的，基本都要套人，你要看也等快收盘或者冰点再看。气氛龙头就是钧达股份，它能涨，东方日升就会继续领头。正宗的、本职就是干太空太阳能电池，得到乔峰慕容认可的是谁？乾照光电。其他几个机构方向的商业航天我们依然看好，反正又没怎么涨。

    下周很可能，前半周继续涨题材，下半周随着年报季来临，往科技大票切一切。

    最后给大家先看一下春晚吉祥物：四匹马。'
- record_id: recv9kuGyegt81
  文档标题: Vol.260124 易经 36 地火明夷：不妨去南方走一走
  文档链接: https://my.feishu.cn/wiki/Tfczwtwq4i2fZPkbnELcayG0nke
  文档内容正文: '晋升和上涨，就是 “晋”，但过程并非一路坦途，经常会遇到一定的调整，比如牛市多暴跌，比如你会遇到领导穿小鞋和打压，这时候应该怎么办？

    这就是第 36 卦，明夷。

    明夷：利艰贞。

    《象》曰：明入地中，“明夷”。君子以莅众用晦而明。

    夷，是受到伤害的意思。

    光明受到损伤，就像太阳隐没于地下，君子要在困难中坚守正道，在治理众人、面对世界时，要善于收敛自己的光芒，用含蓄低调的方式来处事，韬光养晦，静待天时。

    如果说上一卦的 “晋”，是东方日升，那么这一卦的 “明夷”，就是太阳落山了。

    初九：明夷于飞，垂其翼。君子于行，三日不食。有攸往，主人有言。

    象曰：君子于行，义不食也。

    如同光明受伤的鸟儿低垂翅膀飞行，君子被迫远走，途中历尽艰辛，三天饿九顿。

    为啥好端端这么仓皇？

    因为他的行为，遭到了当权者的批评，得罪了大领导。

    既然你不喜欢我，那我就不吃你的俸禄和工资了，主动割舍依附于你的利益。

    人啊，最难的是什么，是明知事不可为的时候不甘心，贪恋过去投入的沉没成本，结果越套越深，最后裹足难行。

    就像有人明明知道公司在玩猫腻，贪恋高工资不走，明明知道女孩子不喜欢他，还非在那边送东西发微信，试图挽回真心，哎兄弟，要勇于止损啊。

    此时的狼狈逃离，短空，长多。

    六二：明夷，夷于左股，用拯马壮，吉。

    一开始没有全须全尾的跑了，还是有损失的，左大腿受伤了。

    此时若能借助健壮的良马，也就是外力来拯救，可获吉祥。

    当已经开始受到伤害时，要善于借助强大的正直的外部力量来帮助自己渡过难关。

    比如说，业绩不及预期，大跌，突发利空大跌，此时最好不要割肉，主力也是亏的，你可以趁反抽再走人。

    生活工作中也一样，受到不公正排挤，就要抓紧找靠山或盟友。

    总监搞你，找 ceo 帮忙，总经理搞你，找社会上的兄弟们找他喝两顿酒。

    九三：明夷于南狩，得其大首，不可疾贞。

    还是搞不定怎么办？不要跟他缠斗了，到外面去打开一番天地，向南征讨，重开一摊子，但要注意，这个不能急，要慢慢筹划。

    1989 年后，我们改革进入进退两难的境地，尤其是东欧剧变苏联解体后，质疑姓社姓资的声浪很响，保守势力甚器尘上，改开有随时中断的风险。

    于是邓公预以普通党员的身份，于 1992 年 1 月坐火车南下，在深圳，武昌，上海等地视察，发表了重要讲话，这就是著名的 “九二南巡”。

    成果一直惠及到今天。

    六四：入于左腹，获明夷之心，于出门庭。

    人的心脏总体偏左。

    进入核心地带，了解上峰或者沉没的根本原因，再决定你是不是要毅然离开宫廷，远走他方。

    比如说，上面真的是不准你涨概念，那你就真的不要涨，对方是真的不喜欢你，你就不要心存幻想。

    已经看出系统性问题或者根本分歧之后，要果断，此时再也不要回头。

    六五：箕子之明夷，利贞。

    处黑暗之中，大智若愚，和光同尘，内心守着正道。

    箕子是商纣王的叔父。他见微子出走、比干被杀，知道直言必死。为了不放弃自己的责任和理想，他选择披发装疯，保下一命，武王克商后，他把商文明保存了下来，并建立了
    “箕子朝鲜”。

    上六：不明晦，初登于天，后入于地。

    本身已毫无光明，只有晦暗。开始时或许能高居天上，但最终必将坠入地下，彻底覆亡。

    压盘的力量和登天的资产，都是不能持续的，最后都会尘归尘，土归土，重启新的局面。

    明夷，是一局润的技术，也是一盘在黑暗中守护光明诗篇。

    如果硬要说应对股市的 “象”，下周可能的情况是：

    各位，你认为是 1 还是 2 呢？

    被错杀之后的价值发现是什么？

