  文档内容正文: '低开之后呢

    昨晚英伟达大跌，市场今天又要表演跷跷板了，这就是之前要大家布局"科技+周期"双轮驱动的原因。

    今天科技低开，周期高开几乎是确定的，周期的那些代表，有色化工机械之类说过很多次了。

    但我们要看空硬科技吗？不需要。

    之前讲过逻辑，不管英伟达AMD还是谷歌谁起来，都要用到中国供应商，管你县长是谁，她都是县长夫人。

    只是硬科技最近的趋势，是上游材料和涨价预期，从最早讲的光纤，一路扩展到FAU电子布铜箔MLCC之类的。

    英伟达大跌的还有一个潜在预期，中国大模型的调用超越美国，前5占用4席，又是一次类似deepseek的冲击。

    由此带来国产数据中心和半导体的利好，所以今天的看点之一，是如果低开，甚至低开低走后，国产半导体设备是否再如往日一样，再站出来救主。

    这里尤其值得看的，是其中的华为线，最近资金有持续布局的迹象，比如最近华为光模块华工，华为连接器华丰，华为液冷申菱/川润，华为pcb兴森，华为服务器锐捷网络等。

    重视国产的机会

    达链不行自然涨周期，跷跷板又是有色化工一通猛涨，镁材料也跟着涨停了。

    镁走完了吗？没有，从产业上说空间还很大，但不是让你追涨啊，风扇行情就守那个祖训，跌了敢买涨了敢T。

    科技基本用低开消化了英伟达的跌幅，天孚和萝卜这两大担当，一旦跌很了就有人抄底，杰普特继续领涨。

    剩下的就看今晚英伟达修复了。

    另外，我们要看到的迹象是早上再次讲的，国产数据中心和国产设备(华为线)的崛起。

    AIDC的代表，润泽，大位，协创等，协创之前公告阿里的订单，你要找英伟达买服务器2个亿。

    华为链表现今天总体明显强过海外的。

    之前说商业航天，到55、60日线稳住，目前有些品种基本差不多了，这个位置横盘站稳的品种下一波就有机会了。

    目前的情况，科技和周期的每个条线都有资金去搞，只要你逻辑顺畅。

    堪透k线的虚妄，不要被它带着走。

    丙午年，天地一气火，当然也代表电力，但是最刚猛最强烈的电是什么呢?

    ps，之前年运篇讲过，今天这个板块也有点蠢蠢欲动了。'
