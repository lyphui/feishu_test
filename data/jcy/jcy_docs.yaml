  文档内容正文: '问答

    匿名用户提问：大王好！我有个朋友是做电商的，看到存储芯片很赚钱，准备囤一批存储芯片来卖，拉我们一起投资，说亏了他兜底，赚了大家一起分，存储芯片长期需求在，请问大王这个值得博一下吗？

    假设你那朋友真有关系没被骗，假设你们真能拿到货源恰好是市场热门，假设你们没被套在高点后面还在，假设你们还都卖出去了对方不赖账还给现款。如果你朋友说，被骗了/卖亏了/没卖完/没结款/利润就这么点/是答应你兜底但没钱/你看等两年好不好？你有没有强力催收能力保证他立马还钱？你别说靠协议靠打官司

    周末提问：大王，现在舆论都说经济危机，外资大撤退，华尔街看空，普通人要持币，这些息可信度高吗

