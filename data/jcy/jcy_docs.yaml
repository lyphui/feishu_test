  文档标题: Vol.260617 男女主交替着来
  文档链接: https://my.feishu.cn/wiki/TFhEwpkbgitaVVkXcJTcIh0Cn7u
  文档内容正文: '女方的光涨了几天，加上美联储可能加息，那么就轮动到男方的板块，

    男方只有两个东西，一个是半导体系列的芯片/装备/材料/，一个是“低位传统科技”。

    一上午你看基金重仓指数在拉拓荆，长川之类的，就知道今天是半导体设备，588710应该跳进脑海，知识星球鉴茶财经院，这可是专门手把手教过好几次，再问就显得根本没看之前的东西。

    至于传统低位科技就是IGBT，APIC之类的，AIPC的华勤果然在55日线上逐步拉起来，至于既有华为韬定律，又是 lumument供应商，男女主通吃的快克，就不赘述了，

    女方的海外算力，虽然涨了几天，受不确定因素的影响，今天表现不算差，核心还是两个，一个上游稀缺材料和设备，一个是连接器MPO的延伸，

    稀缺材料和设备，存储不谈了， kewell最典型，连接器资金在后排的 ydet， RKD，致尚等做了点动作，不会跟的，直接有孚同学拦在路上，早盘能给你低吸，

    再不会玩的，朱格拉周期，科创机械 etf。

    永贵电器确实能做连接器，还有军用的，但图形不符合咱们标准。

    大多数人都搞不过男女主 etf的，你得信。

    刮刮乐的中奖率16%-22%，你想想5000选30的概率多少？

    这两天敏芯为什么起来了，跟着AIPC， mems全球老大，华勤是它的大客户。

    注意啊，AIPC目前还不是主线，看图为主别格局，

    上述，既是复盘，也是昨天谈过的东西，我们再讲一次，是要告诉大家强化认知：目前市场就这么个格局，怎么决策你非常清晰。

    男女主二人转，左脚踩右脚上去。

    什么叫上升轨道，之前谈过案例，快克这种就是上升轨道一直未破（那条紫色的线看到没），一看机构操盘。

    快克，燕麦之类都是消费电子拥抱通信比较成功的，靠的都是长期奋斗，创新求知。'
- record_id: recvmIs669hJDm
