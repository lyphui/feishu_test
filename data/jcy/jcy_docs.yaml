  文档内容正文: '老黄赶上飞机给美股注入强心剂，美股AAOI、coherent、lumument均继续创出新高，tower大涨22%，原因是拿下了旭创13亿美元的硅光大单。

    在国内，萝卜是tower的供应商。

    这个板块叫做“硅光集成”。

    旭创的物料已经备货到2027年，行业老二、老三与其差距遥遥落后。

    还有一个催化消息：英伟达向Nebius投资20亿美元，获得约8.3%股权。

    对应标的为ADIC数据中心。

    有显卡做算力的相关标的：协创、宏景、利通、大位、恒润、东方国信。

    无显卡做云服务的相关标的：铜牛、首都、数据港、青云科技等。

    如果看技术走势，大位刚回踩买点后开启拉升，东方国信刚刚启动，首都临近回踩后再度走强，相关标的昨日完成回踩。

    （错过韶关国资委背景的朗科科技了吧）

    如果资金今日来不及布局上述标的，大概率会流向AI应用板块抢筹，以蓝标为代表。

    新来的投资者看着行情火热、忍不住想操作该怎么办？可以关注电网设备ETF。不要只看外部市场给我们带来什么机遇，也要看我们能给外部市场带来什么机遇。南网数字、重庆之光望变电器正在逐步走出调整底部，后续预计还要盘整震荡。

    有人执意想短线博弈、刀口舔血该如何操作？同样可以布局硅光晶圆设备，该板块近期整体走势偏弱。

    介入止损位设置在79.5，容错空间很小，参考图一。

    CPU板块值得重点关注，本轮行情尾声领涨的标的是谁？早在1月份我们就提及，全球投机资本尚未发现其内在价值，观点属于全网领先。

    Intel亲儿子澜起。

    CPU属于中期投资逻辑，即便本轮出现回调，下一轮行情率先启动的标的中，大概率依旧少不了它，甚至有望接棒成为市场主线。

    持仓光板块标的继续持有，坚持去弱留强，不跌破上行轨道就不离场。

    今日保持谨慎，留意放量滞涨信号，一旦跌破MA8或者5日平台下沿，将21日线设为极限风控线，不盲目博弈反弹，有效跌破果断离场。

    新投资者执意短线博弈、管不住手，想要试探自身承受能力的，最多控制2-3成仓位，其中电网设备占70%+、159381约占30%，简单感受市场氛围即可。

    来到这里投资，不是盲目追高接盘，而是埋伏下一轮投资机会。从去年6月到今年5月，我们一直坚定看好光板块，认为旭创估值合理、寒王具备投资价值，如今只能说行情盛极难续，需要休整等待。

    下一轮投资机会一定会到来，但目前方向尚不明确，行情不明朗阶段只适合小仓位试探布局。

    昨日大涨之后，很多博主直接喊出6000点，一根阳线改变投资观点。上上周还在说抱团行情瓦解，昨日早盘依旧看空市场。

    杨崇和办公室挂有一幅字画，内容是苏辙的诗句：“止为潭渊深，动作涛澜起。”'
