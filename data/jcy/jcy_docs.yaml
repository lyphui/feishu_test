  文档内容正文: '美股的七仙女阵营内部也分化了，上涨标的依旧是以美光为代表的存储、泰瑞达为代表的半导体及检测设备、康宁为代表的光纤和玻璃基板。

    相关板块逻辑此前已经多次阐述，此处不再赘述，不清楚的可自行检索或翻阅前文内容。

    一言蔽之：站在光里，存在芯里，捧着玻里。

    今日听闻该类设备若引进至国内，单台售价可达一千万。AI行业竞赛热度极高，行业整体发展节奏迅猛。

    2026-06-26 07:40 周末：大王，拉普拉斯还能持有吗，走势图形看起来不太乐观。

    2026-06-26 07:41 南院大王回复周末：市场主线始终围绕AI赛道。

    2026-06-26 07:42 波波：大王，电容板块之后，顺络电子这类电感企业是否具备关注价值，目标价位能看到多少？

    2026-06-26 07:55 南院大王回复波波：只要走势图形没有走坏就可以持续关注，电感产品同样存在供给缺口，但整体价值量不及电容。

    提问：大王您好，家人现年35岁以上，正处于职业重新选择阶段，此前任职LG新能源采购岗位，之前向您咨询过相关问题，您当时提到人脉属于核心资源，这几年该方面积累还算不错，当下有意跳槽，想请教您，优先选择国内电池厂商，还是上游产业链企业？

    回复：已经35岁以上不建议盲目跳槽，当下行业板块即将迎来主升浪，后续存在资金拉高出货风险。优化个人简历后对接猎头，对比甲方企业给出的薪资待遇、岗位权限，择优入职。暂不清楚其专业背景，若有机会进入阿里等互联网大厂，负责AI基建相关业务会是最优选择，采购、电力相关工作经验均可复用，同时贴合AI长期风口，未来十年发展空间充足。

    另外想请教，新能源领域哪些细分板块、企业具备较强周期价差，业绩表现突出，适合各位投资者在中报前后短线布局？'
- record_id: recvnvYfWQN8ZS
  文档标题: 'Vol.260625 谈一谈存储预期差 '
  文档链接: https://my.feishu.cn/wiki/ZYOtwpVuUiA7upkhsOfcaBYzntd
  文档内容正文: "昨天美光业绩大好，盘后大涨。\n我们对于存储一直最看好的是HBM，(HighBandwidthMemory)，叫做高带宽内存，是一种专为高性能计算(PC)和AI设计的新一代高端存储芯片。\n\
    没有HBM就不是AI服务器，而是传统服务器。\n全球能做出来的也就SK海力士和美光。\n我们之前在存储方面没有去看江波龙之类的二道贩子，囤货商不符合审美标准。\n\
    而是看三个方向：\n一个是光纤，谷歌用3D堆叠光纤和内存池化减少对HBM的应用，光纤板块的涨幅与走势平稳大家都有切身体会。\n一个是能够落地HBM相关业务的企业，协创虽然主业并非AIDC，但起家做消费级存储，还能在海外开展“0公里二手HBM”相关业务，去年存储业务占其营收36%；另外是掌握原创性HBM设计技术、由美光前高管创办的远见智存，该企业尚未上市，中天精装持有它7%股份。\n\
    一个是国产半导体设备，之前讲过可直接关注存储自主可控赛道，受益于长鑫、长存发展的相关标的，710相关内容不再赘述，内容来源：知识星球鉴茶财经院。\n如果你觉得中天精装走势节奏偏慢，没有耐心等待机构逐步建仓，股价上涨幅度不算突出，还可以关注以下标的。\n\
    \ \n进一步聚焦在HBM设备与存储颗粒赛道：\n-赛腾股份：主营前道检测设备，核心优势覆盖关键的TSV打孔环节检测，普通存储产品无需堆叠工艺，公司已进入三星和SK海力士供应链，此前股价表现平淡主要受消费电子行业拖累。\n\
    -深科技：HBM封测业务成为公司高毛利新增增长引擎，此前也提到过，同时公司还为大普微和长鑫提供相关设备。\n-快克股份：长期跟踪标的，市场当前交易逻辑围绕其HBM\
    \ TCB热压键合技术，该业务目前尚处于起步阶段，营收占比仅5%左右；公司其余业务布局CoWoS、CPO等领域，市场空间相比单一TCB业务可能更大\n其余相关标的，要么股价位置偏高，要么基本面走势承压，暂不重点关注。\n\
    \ \n再看存储颗粒本赛道：\n聚辰股份，当前板块内股价位置最低的存储标的，此前市场普遍认为公司仅能生产车用EEPROM与配套DDR5内存条的SPD产品，实际上公司NOR\
    \ Flash产品已逐步切入AI服务器领域，通过多家头部厂商验证并进入小批量供货阶段，相关信息在年报与公开公告中无法查询到。\n \n提示：上述几家标的切勿追高，A股当前震荡行情，后续会有合适的入场机会。\n\
    \ \n昨晚康宁股价同样大涨，业务覆盖光纤、玻璃基板；CPO是康宁后续明确发力的赛道，布局CPO产业绕不开孚相关企业。\n \n用户提问：虚云：大王，一季度聚辰股份业绩为什么不行呢？2026-06-25\
    \ 09:01\n南院大王回复虚云：业绩被汽车业务拖累，现阶段只要业务绑定车企、新势力车企产业链的企业经营压力都很大。2026-06-25 09:03"
