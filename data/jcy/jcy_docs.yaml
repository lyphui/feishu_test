  文档内容正文: '昨天发生几个重要事情，村长严批科技蹭概念，晚上几十家涨幅过高的公司连发公告澄清；美联储按兵不动，但释放加息预期，美股跳水。

    后续市场预计主线依旧是高位切换高位，但市场审美或将调整，机构会回归业绩与真正具备技术实力的科技标的，而非一味爆炒玻纤、电子布这类上游材料。

    此前市场出现捆绑大闸蟹的草绳被炒作稀缺性，稻草绳估值炒得比大闸蟹本身还高的行情，PCB板块个股受损最为严重，沪电、生益电子等企业，在管理能力、经营水平、盈利能力各方面，都远优于一众上游炒作标的。

    资金将会回流核心龙头个股，代表方向为宽基龙头ETF、通信、半导体设备等，也是近期持续重点强调的板块。

    昨日美股虽整体跳水，但Aehr代表的半导体设备、Credo代表的连接器与硅光、Vertvi代表的液冷赛道走势依旧偏强，市场信号十分明确。

    今日大盘压力位4130/4150，为高抛区间；支撑位4090/4071，为低吸区间。高抛低吸操作及标的选择，依旧参照基金重仓指数判断。'
