    南院大王 回复 慢慢炖：祖上有矿和寒门少年是两个赛道

    浩宇星辰 回复 南院大王：祖上有矿，可以支持你行稳致远，寒门少年，潜力好，卡 位关键核心环节可以让你一飞冲天，是这么理解吗，大王

