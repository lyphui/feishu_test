    谷歌电源新能源，当时说折合明年pe也不到20倍，还是卫星电源龙头。

    有色就更不提了，盛屯这种有基本面的一路不带回头，不比你拿商业航天安心吗？

    你搞营销也好，做投资也好，谈恋爱也好，做事情也好，孙子兵法有句话非常值得念诵，

    “善战者，致人而不致于人”。

    你要有自己的主见和观点，你要去调动别人，不要被别人调动，

    调动别人，就是要有自己的观点和看法，而这个看法经过了理性的分析和事实的验证。

    金风再度涨停，商业航天扒拉完后，就是因为它的基本面和逻辑更硬。

    金风的乖离值已达58，明天如果板块情绪不好且鲁信不支棱，可以止盈起码一半。

    再比如东阳光，都并购的冒烟了，股价一直没动作，那不就是憋着大招么。

    今天还有资金偷偷在买什么？

    科技的洼地AIDC数据中心，润建拉板，润泽突突了一下突破颈线位，这个晚上看美股万国数据的表现。

    今早开盘前还专门再提了大家别追存储，唯一再提示的ETF是588710.

    打铁的汉子也有春天。

    今天有多少人能跑过ETF呢？

    拿住了吗'
