  文档标题: Vol.260512 残暴的欢愉
  文档链接: https://my.feishu.cn/wiki/Eop9wy56ni3qPSkv4dDct6prnVG
  文档内容正文: '前两天有人觉得光不行了，看看昨晚的美国同行，英伟达创历史新高，AAOI大涨24%，对应二线光模块；Coherent大涨13.25%，对应一线光模块。

    光门大师兄lumument大涨16.5%创历史新高，主要对应光芯片，还有CPO、OCS。

    Credo大涨11%，对应MPO、连接器、硅光。

    康宁上涨10%，对应光纤。

    AXT缩量大涨8%，对应磷化铟衬底。

    维缔技术大涨8.2%，对应电源、液冷。

    群光闪耀，其具体对应标的此前已讲解多次。

    今天要看光芯片带动接过半导体设备的大旗。

    当然设备板块并不看空，可以关注洁净室高景气赛道，美埃、亚翔等昨日均缩量上涨。

    对于光板块，现在是涨到让人投降，进场资金多为机构，散户普遍恐高、不少卖飞离场，机构不愿轻易下车，板块体量较大，一旦回落再重新拉升难度较高。

    今日盘面大概率走势：早盘借情绪一波冲高拉升，随后大幅下探，让预判即将崩盘的散户交出手中筹码，主力完成筹码收集后再度拉升。

    单纯从分钟级和日级走势来看，暂未出现崩盘迹象，残暴的欢愉行情仍将延续。

    操作策略想必大家已然清楚，可直接布局ETF：515880、159381。

    顶部行情几个见顶迹象：

    1、量能持续放大，达到四万亿左右。

    2、市场资金无处可去，板块轮动补涨直至极限，低位标的轮番拉升至涨停或历史新高，工业富联便是典型标的。

    3、板块龙头个股猛烈下杀且无法收复失地，市场筹码严重松动，半导体女方代表某创，光模块男方代表寒王。'
- record_id: recvjq15B5qOHT
  文档标题: Vol.260512 还有一哆嗦
  文档链接: https://my.feishu.cn/wiki/GJV7wCbChizL2ZkYNWVcpMXVneg
  文档内容正文: '今天的走势基本按照早盘前讲的剧本来。

    你以为要崩了，它给你拉起来，机构还在然货旭创和寒王。

    今天不会是结束，明后天情绪高潮，还有一哆嗦。

    出货得在涨的时候出，繁花似锦把棒交出去，学名叫“派发”。

    高位的海外算力，国产芯片半导体已经只能持有，不适合追高了。

    资金在逐步的切往中低位，今天轮到电网设备，创新药，学过《三生万物》你一眼就能瞄出来，中国西电走的最健康，早上还专门回复了同学。

    但请注意，切换没那么流畅，很容易泥沙俱下。

    再次跟大家复习，捋一下位置，

    -超级高位，海外与国产算力，国产半导体和算力更贵。

    -次高位，商业航天，电。

    -略高位，机器人（其实快前高了）

    -中位，工业母机，减速器，电网设备，创新药。

    -中低位，软件，AI应用。

    -超级低位，消费。

    缩量上涨的，你可以继续拿着。

    其他的，现在完全是看图阶段，密切注意放量滞涨、密切注意跌破5日平台、用最高级的风控。

    极限位置不能在21日线处无抵抗。

    从美伊那会相信孚，到去孚留创，再到悄悄吸筹国产芯片，一路45度角吃上来，都已经很撑了，暂时歇歇去遛个弯也好。

    该落袋的落袋，该减仓的减仓，到你舒服的位置。并不建议空仓，这是牛市。

    但高位也并不是通杀，而是分化，缩圈，比如大家扫货旭创，它是最便宜的光模块，这几天使劲的讲磷化铟和旋光片，估计你已经吃到了。

    另外比如CCL，MLCC之类也没怎么大涨。

    希望市场明后天的市场情绪，能够给云锗一个伯利恒钢铁时刻的机会。

    新来的，还有子弹的，留出仓位的不用着急，中线行情当然没有完，调整大概1-2个礼拜，预期6月份还有一波大的，那波更大更猛。'
- record_id: recvjgQ3WaCHrY
  文档标题: Vol.260511 烈火烹油，如履薄冰
  文档链接: https://my.feishu.cn/wiki/HKfCwdlvqiXPZWkKYHkc8Or8npg
  文档内容正文: '市场会继续在1+1+X的道路前进，切换之风加剧。

    之前的《月度行情展望》跟大家详细谈过，今天再挑部分重点：

    1、海外算力方面，有望继续聚焦CPU、光学材料、上游通胀。

    早就讲过资本迟早发现CPU的稀缺，这架势看着要像存储板块一样炒作，要密切紧盯美股行情，再关注资金扩散至服务器方向的浪潮信息等标的。

    另有相关核心标的，下一代玻纤只有其与山东玻纤具备量产能力，且产能规模较大。

    通胀方向可绿盘低吸，不建议追高。

    2、再说回国产领域，CPU/GPU之外的核心逻辑，重点看两点：

    A.昇腾概念是否扩散；B.半导体设备能否跟进。

    昇腾目前以华为CPO、光迅科技为龙头，概念扩散将延伸至华为光模块标的华工科技、PCB板块兴森科技、方正科技（同时供货英伟达）、连接器板块华丰电器，后续液冷标的强瑞技术、川润股份等。

    方正科技处于箱体回踩买点区间，不破11.29元甚至缺口位置均可关注。

    风险承受能力较强、已有利润垫的可关注华为哈勃投资的裕太微，布局DSP芯片，对标国产Marvel。

    设备端依旧关注长川科技、华峰测控等，除半导体检测业务外，同时可承接光模块检测业务。

    国产板块另一潜在切换方向为中位AIDC概念，周末再度有政策消息发酵，重点看东阳光的情绪修复力度；华为昇腾系算力中心标的行云股份打出高度，目前后排补涨标的为布局云服务和CANN、为字节跳动提供服务的东方国信。

    算电协同长期可重点关注两家企业：南网数字、派瑞股份。

    3、X方向必然重点提及，越来越多市场预期和资金正在向该方向切换，1+1板块处于绝对高位，X板块属于相对高位。

    商业航天可关注ETF563530，具体标的此前梳理过相关标的池：信维通信、飞沃科技、超捷股份等；同时具备燃气轮机概念的老牌标的应流股份，叶片制造具备核心技术壁垒。

    持续看好此前发掘的工业母机赛道，逢低吸纳布局机会，例如创世纪（机构成本8元被套三年），此外还有稳步走强的相关标的；机器人板块抱团弹性龙头为绿的谐波。

    AI应用龙头依旧看好蓝色光标，行业影响力最强。

