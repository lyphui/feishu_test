  文档内容正文: '不要被恐惧支配

    以前基本是局中不看盘的，思思说今天很特殊，你还是会议间歇在"一天的两个买卖时点"上来看一下。

    讲真没什么好恐慌的，以色列的股市都还是涨的。

    咱们能预测产业逻辑，就够了。

    没人能预测情绪演绎，就不要被带着跑，你做好自己

    情绪来的快去的也快，刚情绪毫无意义，坐等修复就行了，

    还有仓位的同学可以建观察仓那些明确有大厂订单的品种或者那些今天明显抵抗的龙头，给二次探底再看做真正低吸。

    它一跌你就怕就不开心，不就是被pua吗？

    挨炸的是伊朗又不是咱们，怕个der啊。。

    特朗普称将在"适当时机"作出结束对伊朗军事行动决定

    美国总统特朗普8日对以色列媒体说，将在"适当时机"作出结束对伊朗军事行动的最终决定。

    看谁抗跌

    早上特意说了不要怕，结果拉起来了吧。

    疾风知劲草，板荡识诚臣。

    话不多说，看谁硬气。

    先说板块，油气煤炭之类不讲，

    强的是AIDC，华为昇腾，电力，储能等，

    科技今天最扛的是AIDC，受益于龙虾和算力出海，算力的润泽，协创，大位，等老朋友了，云是当时谈智谱的优刻得，首都在线等。

    东阳光也是算力，这种利好，按理要给涨停，你

    给跌停去？不合逻辑。

    token出海板块的资金这几天是硬气的。

    -华为，反复打call的是华工科技，不赘述了吧，后面还有拓维等，华丰踩34日线拉升，看这里要站稳。

    -液冷，今天整体反弹不强，川润（这个有维缔来验厂，它同时还有燃气轮机和机械概念）飞龙（谷歌要来验厂）。

    服务器电源今天也反弹不强。

    -海外算力，主要光模块汇绿(coherent第一大供应商)，联特（谷歌验厂）等二线光模块，博创（是因有减持影响）

    -cpo/ocs里，目前是长光华芯，好几次讲它有某大厂订单，它主营光芯片，同时有的概念，是聚变，商业航天（本质是激光扩展）-11%险些拉红。

    -传媒/应用，受情绪错杀在跌破34日线后已在60日线处反弹了4天，最近美股的IGV（软件指数）比半导体强，这都是回复中谈过好几遍的。如果不破新低且有量，收复34日线视为回踩买点结构。

    阳光电源代表的储能，同上。

    国产CPU，同上，龙芯中科，杰华特，中国长城为代表，明显资金流入，评论区讲过吧。

    商业航天，同上。

    -电力，有从变压器过渡到算电协同的趋势，周末谈了三个，南网，国网信通，远光，如果南网顶住，后面补涨和估值低的就是信通。

    综合上，都是我们讲过的，产业逻辑如果没有问题，价格起来就是时间问题。

    至于风控标准和技术，不同的人承受能力不一样，有人掐一下就疼，有人打针没反应的，怎么风控，怎么买卖，《三生万物》给了，看你自己承受能力和触发。

    你要是看到血就晕，弄个etf，跌破5日平台就跑路，站住了再回来。

    其他什么板块和品种抗跌，同学们可以评论区发掘下。

    市场进入重要观望期

    美伊长期化的趋势看来已经不可避免，

    未来的交易难度变得非常大。

    所以对谨慎的玩家来说，因为大盘现在55日线附近且量能上不去，如果你拿的个股已经跌破21日线，不处于上升趋势，逢反弹要减仓，控制仓位到5成左右。

    科技+周期的双轮驱动，很早就讲一定要配周期仓位，

    周期的重点是交易通胀和战争的可能性，油气的筹码被玩坏了，

    我们看煤化工和油运就行了，

    甲醇主要是金牛，宝丰，煤化工，宝丰，华鲁恒升，油运（如老朋友海能）是懂王来了谈买美油预期。

    品种比较宽泛的煤化工鲁西，也在34日线附近，图形没有坏。

    注意，当天大热的不要追，现在的市场跟变态。

    后面受到冲击的会是石油衍生物，

    这里看两个，涤纶和氨纶。

    涤纶就看桐昆股份，图形上猛洗了两天，可以沿着34日线附近逐步吸筹，不跌穿这个支撑。

    另一个是氨纶，代表是新乡化纤，目前是揉搓状态，6.67小箱体下沿可作为一个风控位。

    化工整不明白这么复杂的，就搞etf，或者大白马万华。

    男方是华为线担纲，带头的是光模块是华工，服务器的老玩家拓维，电源麦米，液冷，申菱。

    女方的主题是谷歌来中国审厂，

    我们掌握的情况是，pcb，回去胜宏，沪电，景旺。

    液冷会去看，飞龙，英皇。

    光模块基本是旭创，xys，联特，博创4家。

    英伟达液冷供应商维缔技术去了川润。

    周末热炒的龙虾概念，最后晚用到云和算力，那就是那票AIDC们，比如利通电子（算力），优刻得，云，（不要跌破34）。

    今天科技低开基本是确定的，继续观察低开后谁往起拉，现在这会再有量能，那就是吸筹的节奏了。'
