  文档内容正文: '昨天是历史的天量成交，对短线流同学来说，应该知道那句话，天量先于天价，因而又到了严格看图的阶段，我们还是那句话，放量滞涨要注意，去弱留强看前排，聚焦男女主ETF，在轮动里高抛低吸。

    对于证券等的反弹暂时不用上头，真是趋势不差这几天，不是趋势去了被调虎离山。

    大盘今天冲击4197历史老压力位，如回踩支撑又在4120一线，想高抛低吸该看什么风向你懂的。

    美股昨天涨的是什么？光芯片、连接器、半导体设备。

    lumument在大A对应的光芯片谁你懂的，前段时间大家审美疲劳了点而已，但EML和CW芯片的核心价值不用怀疑。

    孚同学的大金主fabrint也是大涨，看今天的带动作用。'
