  文档标题: Vol.260416 大王与你读兵法4：推演与概率的艺术
  文档链接: https://my.feishu.cn/wiki/UMKOwCHgqiyurZkfsoDcbHFRnNh
  文档内容正文: '孙子说：“夫未战而庙算胜者，得算多也；未战而庙算不胜者，得算少也。”

    庙算，就是推演的意思。

    孙子认为，任何战争都不能一时冲动，贸然开战，更不能先打了再说，因为“兵者凶器也”，贸然行动也会对自己造成极大伤害。

    很多时候，你觉得只是微不足道的小问题，抱着随便玩玩、随时可以抽身的心态，结果一路补仓，最后演变成致命的损失。

    比如俄乌冲突，一开始俄方甚至不将其定义为战争，而是定为“特别军事行动”，仓促出兵，以为会受到当地民众夹道欢迎，结果陷入八百年来最大的困局。

    任何行动、投资、买入之前，必须先“庙算”。庙算就是推演，推演依靠的是5+7大模型。

    一场战事，还未开战之时，在庙算推演阶段就能判定能够取胜，是因为经过权衡、对比、分析后，己方胜算条件更多；在推演阶段就判定无法取胜的，是整体格局中有利于自己的条件太少，或是谋划规划做得远远不够。

    孙子告诉我们：“多算胜少算，而况于无算乎！”

    实战中能够获胜，是因为胜算有利条件多的一方，胜过有利条件少的一方；规划、布局、研究缜密细致的一方，胜过思路粗糙肤浅、不做深度思考的一方。

    更不用说自身有利因素本就稀少，又几乎不做谋划布局的人。“吾以此观之，胜负见矣。”

    仅凭庙算推演的结果，无需实战，胜负就已经显而易见。

    我们判断俄乌冲突俄方难以取胜，依据就是“庙算”：一是自身基础实力不足，这种灭国级别的大规模冲突，比拼的是综合国力，俄罗斯的产业和技术结构支撑不起长期消耗；二是事前几乎没有完整规划，因情绪冲动仓促发起行动。

    从一开始，就违背了《孙子兵法·计篇》中的所有原则。

    孙子秉承道家思维，主张以静制动，不动则已，一动就要势如雷霆，直奔取胜目标，自己没有六七成把握的事情，坚决不去做。

    也就是说，但凡要调动大量精力和资源去做的事，就一定要争取拿到好的结果。

    曾有朋友常年应付各类应酬，暴饮暴食，身心俱疲，坦言过得如同打仗一般。大王告诉他，每一场应酬，提前琢磨到场人员、谈话方向、可结识的资源、能办成的事务，不要别人一邀约就盲目赴局。

    人到中年，摒弃无用社交与无效努力，本质就是放弃那些胜算渺茫的事，专心聚焦胜算更高的事情。

    投资领域也是同理，如果你是实操型投资者，一定要慎战、慎初战。

    买入一只个股之前，一定要充分做好庙算，综合研判当下大盘、行业走势、资金流向、市场结构、政策消息、K线形态、筹码分布等因素，再判断是否到了合适的买入时机。

    大盘是否处于上涨趋势？行业是否属于市场热门风口？十日资金是否持续流入？板块结构是否处在行业前排？个股消息是否无减持及处罚利空？K线是否站稳均线之上？筹码上方是否无大量套牢盘？外围市场走势是否同频共振？

    如果综合研判后胜算只有三四成，那就坚决不动，宁可空仓观望；只有达到六七成把握时，再小仓位试错。久而久之，就能养成盘感，形成属于自己的交易风格。

    打仗并非每天开战就好，交易也不是每天操作就有收益。

    一个国家的命运，往往由几场关键大战决定；人生想要赚到大钱，也往往靠几笔核心关键投资。所以要学会空仓和蛰伏不动的智慧，养成庙算与事前推演的习惯。

    当然，孙子兵法讲求的只是大概率取胜，无法做到百分之百全胜，胜败本就是兵家常事。

    关键在于，你能否从失利中总结经验，提升下一次行动的胜算概率。

    因此，在前期规划筹备阶段，要投入七成以上的精力与资源，执行落地阶段，只需投入三成精力就足够。

    现实中很多人却本末倒置，前期思考准备敷衍了事，事后盲目忙碌、徒劳奔波。

    我国处事智慧向来高明，多数时候都保持隐忍蛰伏、蓄势待发。建国之后大规模战事，仅有朝鲜、印度、越南几场大战，宝岛与南海几场小规模对峙，其余时间都在默默谋划布局、积蓄实力、增加胜算筹码。

    反观俄方与美方，几乎常年四处行动、频繁入局，最终一方深陷战事泥潭，一方负债累累。

    行事要做到举重若轻，表面从容淡然，背后深思熟虑、精密推演。'
