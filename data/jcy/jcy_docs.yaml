  文档内容正文: '生产队出手了

    今天都以为大盘会很惨，甚至复制去年4月7日 的大跌，想多了。

    你看果然给你拉起来了吧，放量5300亿。

    生产队在商业航天爆火的时候狂抛etf压盘，手 里可是有1万多亿现金呢。

    你说他们买啥？优先肯定是校花校草，

    它们压秤啊，一拉指数就上来，就算是硅光，旭 创技术储备也是很强的。

    旭创强天孚就弱，再说这么大盘子，乖离值50

    了部分资金有止盈需求，但我们继续看好硅光， cpo, ocs代表的光通信和上游器件，今天ocs表 现就还可以。

    国产算力出海涨的是“尤其部分”即华为系硬件， 比如光模块的华工，电源的麦米，液冷的申菱 等，这都是讲过n久的玩家，缀在后面的中军是 英皇，飞龙都涨停了，它在后面怎么能不起来，
    所以一看前排根本不用怕。

    AIDC不看空，它只是没有元器件弹性大，前两 天日本人发了个新闻，意思是东数西算可能有延 迟，东部布局的算力中国是稀缺的，好吧，利 通。

    算力租赁的龙头协创无疑，大家都跟着它的风 向，它是目前唯一有英伟达B300的，现在江湖

    传言宏景科技也有，这两天我们验证一下。

    应用看什么呢？今晚看美股对标的软件扩展etf (IGV)，错杀过后在修复，然后传递到A股， 客观说这段时间比老美能扛。

    丙午年天地一起火，最猛烈的能量当然是可控核 聚变了。

    赶不上油气金银热门小金属，但开盘的镁不是给 了机会吗，化工也可以。

    科技+周期，双轮驱动念啥经都能成佛。

    晚上看美股修复，懂王这么着急了掉伊朗的事， 弄不好也是开仓科技了。

    不用过于担心

    伊朗遇袭，大家非常担心出军费猛砸盘，

    但你要看到，

    一方面，伊朗和美国都想尽快把事情了 掉，持久对谁都不利，

    伊朗也表达不封锁霍尔木兹海峡。

    另一方面，沙特卡塔尔等宣布石油增产， 原油贵金属今天能保住就不错了。

    所以今天，

    油气军工之类的不用追，能让你买到的都 有瑕疵，

    也不用对科技过于恐慌，如果砸的太狠， 抄底资金就会入场。

    “科技+周期”的双轮驱动，模式不会有太大 改变，周期我们依然看好化工（ ETF就很好，具体的例如弹性比万华更大 的新和成等），因为小金属有色的你如果 没有，性价比就不高了。

    这里看一下杰瑞技术，它主业搞油气装

    备，现在涨是因为燃气轮机，今天很可能 高开走兑现，高手在低点可以观察。

    它同时具备周期+科技的双属性。

    科技依然看算力出海和上游光器件，尤其 是token出海，大王周末跟产业界一些大咖 和企业家沟通，这个逻辑是能跑通的，具 体品种AIDC+硬件，华丰代表的华为链等
    就不赘述了。

    早盘如果量能太低，商业航天说不定又要 支棱一下，毕竟很多都60日线了。'
