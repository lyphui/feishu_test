    真论技术图形话，福晶这种，21日线稳住，不跌破98.3即可，天孚已经60日线了，在这里磨一下站稳可以分批次入，真跌穿平台走人，其实它的FAU，讲过很久的设备龙头JPT也能做更会面，但你不是追不上了么，

    特斯拉的FSD入华，我们看好联创电子，

    另一是世运电路，同时还有pcb概念。

    其他的，以前看好和谈过的涉及光的，海外板块的设备，元器件，材料等继续看好，因为大家来的时间不同，仓位不一样声只能战线展开，不断发掘优质企业。

    会玩的同学可以体会立体滚筒前进，好公司都加着自选，早盘看到催化或者龙头起来后做补涨，最好看到冰点到了支撑位后低吸。或者看谁有那么3天左右缩量萎靡，有点蠢蠢欲动，你可以去搞一下，拉升了走人拿利润，跌破关键位也走人。

    那有没有简单的方法？有，光的ETF159381/515880（任选一）+朱格拉的机械设备etf588850，基本上够了。

    90%的人其实跑不过etf。

    你担心追高了怎么整？金字塔式买入法前面搜索学习下，或者分批次法，分5-7天，在每天2.30买入，冰点时刻买入亦可。

    大盘不能排除还有余震风险，分钟级结构不完整，观察反弹到4140又是个压力位，站不住往下仍有可能搞个探底重回4060左右的55日线，总体是个宽幅震荡格局，盯好基金重仓指数亲们现在他们都是明牌。

    不仅要站在光里，还要把康宁的光穿在身上。

    韬定律受益发掘咱们是专业的

    三大和核心利好环节，一个键合，一个检测，一个封装。

    已经让小伙伴跟业内人士联系，并且和大佬们拉电话会了。

    敬请期待《韬定律核心三大利好》，

    没有人比咱们更懂华为，

    Meng小姐险些成为大王二嫂啊，哈哈。

    新主线逐步出来？

    来看下用早上的预判，大盘调整基本一步到位，逐步把仓位推上去了，

    不要去搞pcb、MLCC，搞上游的载板和设备，载板的兴森，设备的凯格都不错。

    其实业内那几个拿得出手的设备咱们基本挨个谈过，凯格、燕麦、科瑞、博众、萝卜等，pcb和光模块扩产都离不开它们。

    最全面的是jpt，技术最领先的是萝卜，萝卜今天涨也是踩到21日线的支撑位了，关键它还是华为供应商，你搞耦合，怎么绕得过萝卜。

    戴军是十五五国家光电封装组副组长还记得吧。

    华为的韬理论出来后，利好的还是设备，

    拓荆、华海之类的必然要突破长期盘整新高拿着就是了，588710今天也是被他救命。

    我们看哪个环节呢？封装体量大，但利润不高，预期差老三华天谈过了，3D的核心是耦合，能干耦合的都是做cpo的，萝卜、燕麦是能做的，英唐行吗？不清楚。

    另一个是高端的检测，联讯就太高了，同学们自己发掘点检测概念，比如精测、飞测之类的。

    kewell就是高端电源检测，kewell在华为体系里很多年了。

    还有呢？做连接背板的华丰科技、航天电器之类的简直没涨，是真的没涨，电器的主力有点弱。

    华为cpo换模块光迅和华工，真是涨的有点怕了，只能拿了不能追了，

    同时，华卡脖子芯片，盛科、裕太微、探针台、苏州强一股份。

    华为韬能否成为主线？要观察，我认为概率很大。

    早上跟大家说的两个技术图形的案例，福晶和天孚，看到有孚元吉并深刻体会的，都是有福之人，没看明白的没关系，下一轮的有福之人。

    有福之人不在忙。'
