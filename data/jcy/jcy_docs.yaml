  文档内容正文: '两条线继续

    一个是这两天的谷歌大会，TPU尤其是OCS的受益，

    一个是低位和补涨，低位的比如光模块的低位，PCB本B，CPO光芯片的低位，光模块扩产设备本身。国产芯片半导体等，

    玩家们不赘述，不熟练的搞ETF更稳健。

    图形是关注两种，一种是高点下来后回踩买点结构且温和放量的，一种是位置虽略高，但保持了稳健箱体，五日平台都不破的。

    《三生万物》和案例里都详细讲过，多看两遍自己就能熟练掌握。

    AI硬件和光预期会在分化中继续轮动式抱团，中途商业航天，创新药之类的过来插一杠子，主线不会有太大的改变。

    新的主线要等建国来过之后的5月中下旬才会有端倪。

    今天如果回调不要破4020。

    听说烫手了

    之前的判断，

    市场会用一天时间原谅长光，

    用两天时间原谅天孚，

    既然原谅了，大胆入就好了，

    其实长光原不原谅无所谓，之前N次讲过它还有没公布的订单，没公布之前就当利好未释放。

    胆子不大的看低位和补涨就行，

    低位光模块的最佳代表就是Cambridge,meta怎能只值一个涨停。

    补涨上，光芯片的补涨仕家，永鼎，东山，光材料的前排天通，后面补涨的福晶，东田，cpo的补涨环旭，致尚，燕麦等等，

    这都是反复复习你应该有肌肉记忆的，

    再慢一点且大的还有沪电胜宏代表的谷歌pcb,

    扩产设备JPI是代表，板块是悄摸的温和上涨，个别品种比如博众今天给了低吸机会，业绩还可以，-6%就是悬杀了，大洗过一次的凯格也很不错。

    我们对OCS的判断如何，坚决拿着不放，腾景德科立尤其是光库，专门开篇讲过。

    现在媒体开始吹磷化铟，咱们说inp是什么时候的事了。

    东山当时，拳打旭创，脚踢胜宏，现在脚踢的目标实现了，

    以上逻辑成立的重要原因，是机构在里面抱团，抱团很难散。

    搞得原本要第三天才开板的英皇都被预期了你的预期了，龙2飞龙则直接拉涨，也是怕谷歌大会上有预期啊。

    冷笑话是协创之前涨是因为算力和存储，今天是属于AIDC和后排光模块光器件一起补涨，收购的光为搞光模块和光器件咱们分析过。

    大势来时就是这样，大抱团先看到周五，下周细分领域抱团。

    不擅长玩具体的，压岁钱etf159381新高，而且还是缩量上涨，今天有多少人能涨5%超过etf呢？

    校花就是校花，旭创继之前700的目标达到后，今天又在往1W亿的第二目标冲，去年10月谁敢讲这个呢，他们自己都不信。

    去年8月份时某创的股东听说这判断后哑然失笑，大王讲隔行如隔山，你不懂股市。

    还是那个结论，论估值，创是世面是最便宜的光模块，也比PCB都便宜的多，就像宁王是最便宜的电池。

    如图，两个《三生万物》的经典图形。

    赚的烫手了不？配得感。

