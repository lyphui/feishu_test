  文档内容正文: '今天估计不压了

    昨天美股大跌，大A不用你压都会低开，真低开低走跌狠了，又要出来防大落了。

    网传的一张生产队筹码图，科创ETF已经只剩9%左右，创业板ETF也剩下的不多了。

    同时两融成交额降到了9.9%左右，上一次低点是12月12日，

    陈小群等游资昨天也认怂割肉了。

    因此，虽然降温没结束，但进程也差不了，今天有可能就不压了，

    结束是什么时候？

    商业航天，脑机接口，小组赛全部淘汰。部分AI应用，也要淘汰。

    它们在昨天呈现了机构出货的态势。

    之前我们谈过，这一轮散户追进来的筹码在4080附近，因此，

    大盘会在4080-4126附近震荡，资金逐步回归主线。

    八强：

    1,机器人。2,有色/化]。

    3，电网设备，4，国产半导体，5，海外算力，

    6,部分AI应用（传媒）。

    7，工程机械。8，创新药。

    可能的四强：

    3,4,5,6.

    可能的冠军对决

    国产半导体/芯片VS AI应用（传媒/豆包）

    八强都有机会，

    其中的优秀球员不会差的。

    春节前不会有连板小票和突然窜出来的概念板块了，以后的概率也不大了。

    在哪里赚钱都是要讲zz的，

    就像小群这种，你连个正协委员都不是，还要呼风唤雨的去搞什么“帝王概念股”，

    那是你该搞的吗，比你有钱有渠道又聪明的多了，人家为啥不去？

    八强板块巡礼

    -1,机器人。

    集中度够低，每次商业航天的资金流出都去机器人，回踩34日线买点结构的弹性品种，安培龙，恒帅。

    你说它为什么夺不了冠？去年冠过了。

    2，有色/化工，供给侧短缺，快熬出头了，相当于世界杯的黑人球队喀麦隆摩洛哥之类，有矿。不会玩的就配大白马或者etf.

    3，电网设备，分化走势，还是以出海，数据中心的为主，比如mgmt，当时本来看好他和英皇

    走出伯利恒钢铁时刻，拖的不利索，英皇终于在34日线拉起。

    4，国产半导体/芯片，提前内定的决赛圈选手，多次讲过本轮主线无疑，谁也吸不动它。

    萝卜也本质上是半导体设备你造吗，戴军是十五五光电封装组副组长，这个讲过。

    它是能玩到2027年的大后期品种，还好把陈小群洗走了。

    今天为什么芯片比设备猛呢？以前每次大盘不好，都是设备救市，要歇一下，换芯片上，加上有高盛看好CPU和GPU，龙芯海光大涨。

    决战紫禁之巅，海光6000亿新高。

    筹码结构上，是机构踩空了710之后，上车588200，今天终于历史新高了。

    -5,海外算力，之前跌，非战之罪，纯属生产队抛了压盘，今天不压，立刻不就起来了？带头的还是联特。

    为何旭创暂时不能大涨？你涨了不就指数不友好吗。

    -6,Ai应用，今天又打赢了一场小组赛。人人喊打的时候咱们也敢说属于错杀。现在是丧标带头，引力，天地，粤传媒等几个都不错，只是不

    敢大涨而已，属于跌跌撞撞，好几次处于生死关头。

    懂球的都知道，这种队伍很有韧性，只要死不了，后面会越战越强。

    它的代表传媒etf，屡次补缺口，相信你已经建仓起码一半了。

    7，工程机械。估计咱们是全网最早提出战略上重视工程机械的，因为国内和国外几个巨头大王都问过了，信息那叫准确。

    龙头当然是恒立，它还有机器人概念。

    工程机械etf是历史新高，这板块就像司马懿那

    种老阴比，悄无声息干大事，很难死的，很考验你认识他的门槛。

    8，创新药，回踩34日线拉起后再次回踩，这里若不站住一个平台或者跌破，小组赛淘汰，所以急需大厂出业绩。

    八强都是好的，念啥经都能成佛。

    话说丧标很有点符合阿根廷那种披头散发的风格啊。阿根廷的队服就是蓝色光标。

    有个叫风之子的前锋叫啥来着？

    什么叫搓揉线，农尚这几天给大家表现的非常经典。'
