  文档内容正文: '南美的主要影响是有色

    中国并不怎么需要委内瑞拉的重质原油，燃油发电的电厂在中国很少。

    油气和设备没什么看的，

    当然，你有那个北美缺电的燃气轮机概念，杰瑞股份就继续拿着，它是油服出口龙头。

    缺的是什么呢？南美的铜和锂，我们大概60%以上的铜矿砂来自于那边，进口的锂占比大约90%以上。

    这里也要谈“国产替代”，比如江西铜业，铜陵有色。

