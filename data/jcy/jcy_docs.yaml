    新手菜鸟的组合，

    保险+恒生科技+定投机器人etf的策略依然管用，保险股迭创新高，恒科是低估状态，机器人弹性大又拥挤度不高。

    为什么大金融看好保险？银行和保险是谈开门红的，险资买一堆4%的高分红有色和金融股，给客户2%的万能险分红，岂不美哉？

    其他的观点在《丙午年运》等系列文章都有，可以往前翻。

