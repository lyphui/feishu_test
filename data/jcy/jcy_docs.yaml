    伊朗的新领导出来讲话，国际油价破100，昨晚美国芯片股大跌。 今天估计又是油气、煤化工大涨，科技和成长遭遇压力的一天。 今天放出量能就好，放出了反弹，代表机构吸筹力度加大，可以看专门如图板块，它们就在55-60日线反复横跳。
    手快的同学可以跟着它们，它吸了你再吸，它放量杀跌你先走再吸。 当然你拿的是小票另说。

    后面说板块， 之前反复伊朗受益，从甲醇，煤化工，煤炭， 如果没布局，高手的话还能看啥?绿色燃料。两会第一次把它写进了报告。这里弹性大的包括生物柴油，SAF
    (可持续航空燃料) ，这东西要批文的。 图看了一下， 目前就海新能科能看，止损位5.28。 适合普通人的当然还是化工 etf。

    中东的另一个逻辑是欧洲缺油缺电，这几天资金炒的是风电和储能，风电图能看的新强联， 唯一是欧洲设厂的是天顺。 我始终认为算电协同搞那帮基建商很难持久，搞基建你还不如看阳光，起码还有海外数据中心，从图形上说，
    它如果回踩一下，让34， 55，60粘合，更好。当然它也有可能在这附近小震荡。

    说回科技，几个热点， 国产算力今天就看光迅能不能带头，或者华工反包与否，华工如果还没走，123.5恰好是5日平台的位置，涨这么多也该止盈了，虽然有可能错过后续上涨。
    美股AAOI大跌，今天光模块就看东山还是剑桥能不能支棱了。 下周一GTC大会就要召开，cpo和 ocs的预期可以看，今天的剧烈波动免不了，核心玩家一双手看得过来，不断去弱留强就行。

    然后谈一个能看到28年的品种， 之前跟大家讲过的两个磷化铟概受益， 现在1.6T光模块的光源，主要是 Inp，代表是云南锗业，但到达3.2T及以上后，这个材料就扛不住了，需要薄膜铌酸锂
    (TFLN) ，国内搞这个的天通股份，旭创专门和天通成立了合资公司，天通占51%。 铌酸锂会成为下一代高速光芯片的主要光源，当然，它还需要数百万小时的验证，所以还会反复拉锯和炒。

    电解铝加速了，有的同学自己看，缩量突破前高继续拿,放量滞涨则清仓止盈

    无心恋战

    情况明朗了，10点半就能看出机构并未入场，不但不入场还砸了盘走人，起码主力在今天的角度不看好短期的后市。

    因为全天是量化遛狗行情，除了风电亮点不多，因此绝大多数指标没有参考意义。主题词是，观望。

    可能大家都想等周末有什么情况出来，或者很多人伊朗的长期化战争会对资产价格有剧烈影响。

    我们认为，这个长期化和俄乌的长期化是两码事，它最多会像有些人身上的慢性病一样，问题还在那，但最后大家脱敏了，就像有些同学有鼻炎，你不问他或者不换季，基本感觉不出什么。

    即使是真像俄乌，刚开打前大家多慌，后来的资产价格不也涨上来了吗？

    在“和平和发展依然是时代的主题”这个结论没有推翻前，事物无非曲折上涨。

    昨天跟meta的一个高管交流，他说小扎方面今年准备投资1300亿美元左右大建数据中心，比去年高出70%，微软也正在筛选中国的液冷供应商。

    去年要读懂谷歌，今年要读懂Meta。

    下周，较大概率再踩下60日线的4050左右，放量踩出才好。

    周末了就好好休息好好玩，懂王和伊朗急着顺坡下驴比你急。

