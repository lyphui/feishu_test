  文档内容正文: '仍是光和存

    昨晚的美股感觉有点力不从心的样子，

    但仍然是光和存储在表现，

    LITE+8.81%，美光+8.88%，

    今天继续看A股映射就行了。

    考虑到3956的压力和懂王的不可预测性，还是那个观点。

    你手里的品种，注意冲高回落，注意放量滞涨，注意高换手率。

    即N年前你的那招，

    一颗红心，两手准备。

    然后坐看懂王和机构今天要不要把散户pian进场。

    美国把A10这种老古董都派去中东了，这些年它也没啥大进步了，你还活在海湾战争呢，

    东大早就玩无人机查打一体了，24小时悬你脑袋上，发现就是一堆罚单。

    不过他们也实在是没啥牌好打，阿帕奇和A10都比较费人命。

    美军向中东增派18架A-10攻击机

    财社2026年4月2日08：01上海

    据央视新闻，记者获悉

    美国国防部正将其在

    中东部署的空军A-10攻击机机队规模扩大一倍。据悉，这类飞机主要负责支援地面部队的推进作战。而此前，美国总统特朗普表示他希望在两到三周内结束与伊朗的战争。

    3956剧本

    ABC三浪走势给大家讲过了，懂王TACO，提高下B点，然后继续走。他不塌，那按原定剧本走，

    短期3956肯定过不去了老铁，

    早上你一看韩国大跌，日本大跌，原油大涨，你再看我们的基金重仓指数上来砸盘，就知道要跑，kospi在9点半可是跌了3个多点的，

    而市场一开始竟然还背离式的给你拉了个20分钟，那就是给你t出去和减仓用的，

    W底的剧本就这样。

    当然除了些个别的，比如光纤，机构在里头抱团，还有那种上来给你顶5个点以上的，像仕家这种均线粘合洗这么多天了，

    昨天还觉得仓位5成不过瘾的今天就体会到还好减仓了吧?

    今天机构本想在更上游冲击下光学材料，详见《光学材料》那篇，光库，福晶，腾景之类的表现了下，无奈大盘不支持，它们顺势躺平。

    但你知道它们一个潜在意图就行了，

    "有人想搞光学材料"，后面你懂的。

    开盘机构就拉高在跑路，尾盘又加了点回来，正是"反向做T"。

    所以，明天如果使劲低开，又给你心仪的品种砸下来-6%-8%以上的空间，那么...

    这段时间，不给大优惠不上车，不给大优惠不下车。

    前段时间问一个AI大厂的高管，你觉得上游光学材料能涨多少，

    "它们涨个一倍就差不多了还想咋样"。

