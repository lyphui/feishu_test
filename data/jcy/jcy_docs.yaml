    重要物料与三大板块抢资金

    昨天下午大A的突然发力是pricein伊朗再谈判，说实话有啥好激动，不早脱敏了吗，反而要当点心。

    还是先看美股映射，

    昨天，Credo发布声明表示将收购硅光子开发商DustPhotonics，后者产品组合涵盖400G、800G和1.6T等多种按需定制的SiPhoPIC方案，并规划延伸至3.2T。

    SiPhoPIC就是硅光，即孚系，尤其是长光校草仕家永鼎博创jpt等，当然绕不开设备的萝卜，孚同学本孚今天再不支棱，可看情况进一步的减仓（当然图并未走环）。

    光模块主要分为ow与eml两种，

    -明确能搞出cw芯片的，校草，长光，

    -明确能搞出100gEML的，长光，校草，永鼎，仕家（送样）

    -明确能搞出200gEML的，索尔思，长光（测试中预期能过）。

    100g的能做800g光模块,200g能做1.6T。

    咱们的良率还不高，Eml基本是lumument和coherent垄断。

    华工说自己能做3.2T，属实验室技术，它和光迅组团玩国产链与国产cpo，主打华为中兴等，进不了英伟达和谷歌的，开玩笑，涉军工的国企好么，倒有可能进亚马逊等云厂商。

    华工是国产旭创，光迅是国产源杰，加个国产萝卜智立方，齐活…

    credo主要干连接器，中国对应的是博创和太辰光这个知识点你要温习下。

    美国燃料电池公司bloomenergy周一宣布，其与甲骨文扩大合作，后者将采购2.8GW的BE燃料电池系统，以支持其人工智能和云计算基础设施的快速建设。

    对应的中国供应商三环集团，终于回踩买点后新高了，以及春晖质控。

    mlcc是能涨价的，数据中心受得起。

    SOFC的本质是快电，进一步说明了老美对电力的渴望，那么燃气轮机你懂的。

    昨天汽轮机调整，是因为西门子扩产，一些资金就会认为中国供应商会受挤压，老外和中国比扩产啥结果你还不知道么。

    甲骨文底部也涨了两天，meta涨了快一个礼拜，这俩的有个共同供应商是剑桥，5月份meta去验厂，这个预期差有资金会做，28号公布一季报，谨慎的同学可以在那会前后减仓以防miss。

    同样的还有液冷，液冷大年是确定的，台系的奇宏、双鸿这几天的Q1业绩，基本都是翻倍。但我们接单晚，一季报应该不会太惊艳，如果真有资金那会趁势砸了，是低吸机会。

    （段子梗，距离一季报结束还有2个礼拜，留给英皇130的时间不多了）

    今天估计是AI硬件，电池，商业航天，医药抢资金，后面两个估计抢不过前面的，因为业绩不行。

    电池本池，有宁王这个全科选手在，鹏辉属于弹性大，电池的方向是纳电，现在不到1%，将来市场占比40%左右，谈过的几个，湖南裕的正级（主打铁锂），恩捷（隔膜），容百（钠正级），电池的波动比较大，主力喜欢连续调整几天给你来个猛的，你不要光看到狠的那一下，受不了的同学可以不贪恋这个。

    热闹的市场背后公募悄咪咪的在吸筹国产半导体，进二退一那种。

    昨天旭创宣布4.17提前公布一季报，理论上属于被提前，希望今天继续带动光模块/cpo，但随时注意高位巨量啊，一巨量加速，散户就批量进来了。

    沪电的一季报我们都知道了，归母净利润11.8-12.6亿元，同比大增55%-65%，这个业绩应该比胜宏好，谷歌的加持很大，内部消息是今年争八求十（80-100），之前也说过它的订单排到2028年了，吴老板时隔34年后再度加码投资。

    虽然名字带沪，这哥们跟上海没关系，也是苏州的，虽然昆山人并不觉得自己属于苏州。

    4015突破后，上午观望下一个压力位4052。

    走往更高维度

    是个人都想窥探生命的奥秘和未来，所以西方发明了星座，塔罗，人格模型，职业锚测试等等，

    东方发明了卜算，命理，紫薇等等。

    当然八字命理比西方的这套厉害多了，高度不一样，颗粒度也细多了。

    但你说这些玄学的东西是很高级的东西吗？也不是，它是三维世界的东西，是大模型，是静态的，是术和工具的层面。

    到了五维世界，大模型包括你，都是随机出现的。

    那真正高级的是什么呢？是去“合道”，去理解和回溯你生命的本源，

    本源在哪，在宇宙。那里是生命的起源，

    你本身就蕴涵宇宙的能量和终极规律本身。

    不知道同学们有没去过台州，天台宗国清寺的创始人智者大师总结“一念三千”即为这个道理。

    那么如何往更高的维度呢？

    一是充能。最早讲宁王的时候咱们说过，人体是个16度电的电池，头顶百会穴是正极，脚底涌泉穴是负极。

    电耗光了，或者长期亏电，就会hold不住各种细胞，各种疾病。

    怎么补能？主要两点，

    一个是早点睡觉，二个是晒太阳。

    有条件的同学，每天中午得眯会，对电池好。

    二是修行，提高你的能量频率，获得更高级的input/output端口与状态。

    人世间的绝大多数东西都是能量交换。

    比如你拿工资，是用能量换来金钱，

    你买了一个股票，你的能量hold住它，它就给你赚钱，你hold不住它，它的波动就让你痛苦。

    怎么修行呢?

    一是找让你极度慢下来的东西，比如念经，打坐，读书，吹风。

    有些人做饭和打扫卫生也行，关键是能沉浸进去，呼吸平稳，状态稳定。

    二是找让你极度忘我的东西，

    修行不是闭门造车，禅宗为什么讲顿悟，是和外界的交流产生的。

    比如说，你去做公益慈善，到养老院照顾老人，到学校捐赠书籍，到社区做公益，

    那一瞬间，你感觉到自我的升华和崇高，

    再比如，你去指点和帮助跟你很匹配的，你去和让你聊天说话非常开心受益的人待一起，

    去让你充盈的圈子，那一瞬间你并不为什么利益，超然与物外。

    “谈笑有鸿儒，往来无白丁”是这个意思。

    核心是“物我两忘”，你不被世俗扰动了，你的能量就高级了，忘我了，“心”就出来了，天线就插上宇宙的USB接口了。

    总之，这个世界是高维对低纬的碾压，是有序对无序的打击，

    很多时候你并不是方法不对，而是能量不够，解决问题不要横向扯，要往纵向走。

    一楼的问题，在20楼看来是火柴盒子。

    往高维走给自己立什么样的目标呢？

    kpi这种东西就低级了，高端的谈境界，去体会，嘉靖对世俗通关了，

    你看他谈什么？

    练得身形似鹤形，

    干株松下两函经。

    我来问道无馀说，

    云在青天水在瓶。

    从今天开始，让自己体会去驾驭能量和与大道建立wifi连接的感觉。'
