  文档内容正文: '高意财报，注意量能

    先有地量，再有地价，先有天量，再有天价。现在的成交每天3万多亿，要密切注意量能的保持或者萎缩。

    一旦发现量能急剧萎缩，发现几个板块龙头股开始猛烈杀跌，要快速去弱留强，缩减仓位，以防风格漂移造成影响。

    风向标呢？海外算力板块，光通信的部分是长飞和东山，传统光模块的部分当然是旭创，etf依然是159381/515880。

    国产算力的部分，芯片寒王海光，AIDC的东阳光协创，etf588200/710。

    高位都得稳住你才可尽情看后排补涨，上一轮说光没事，因为旭创并未放量杀跌，且13日线就拉回来了，随后一路保持在5上平台之上。

    现在同学们要注意了，21日线博出反弹的，比如ocs的几个，得要保持住箱体平台，一路创下新高才行，若有跌穿5日平台的迹象且大盘不好，吃完反弹就走。

    甚至非常谨慎的，今天晚点或者盘中看情况，把手里那些涨不动的，放量滞涨的，甚至要破位的机动兵团T出来部分，观望下周的情况。

    然后谈下美股的映射，Coherent财报出色就跌，资金也走兑现。

    指引说了什么了呢，上调ocs的业绩预期，看好在数据中心互联上的长期趋势，那么四小龙你知道的。

    我们的工信部早就发文明确要搞CPO和OCS了。

    另一个，谈问题，说InP产能是当前行业面临的是大瓶颈，日全行业从3英寸向6英寸转型最大，且生行业天0美转生。

    磷化铟也是反复给大家划过重点了，未来三年的产能都被锁定，堪称AI时代的碳酸锂，龙头就是云锗，为何首供华为？鑫耀半导体华为哈勃有9%的股份啊。

    之前有同学问了这方面去延伸，有研新材，即以前的北京有色院，它和锡业股份都在搞7N的高纯铟。

    先导基电，则是打通了磷化铟外延，晶圆，芯片的产业链，广东一号专门去过，但是集团并没有把铟领域的资源注入上市公司，炒的只是预期你要注意。

    逻辑最完整的还是云锗，它如果涨的受不了，自然会延伸到后排，会打野的和高手自己看。

    题外话一，拿到云锗6英寸保供的是谁？已知的，光迅（华为系铁杆cpo），东山（替索尔思去的）。

    题外话二，在磷化铟氮化镓等衬底上大干各种芯片的是谁呢？还是苏州etf，长光主导，联合亨通，苏州市区两级国资，投50亿搞了个硅光平台，叫做星玥光子，以后要把各种光芯片搞成白菜。（当然这个后话了）

    5月的风格依然会是机构主导，那帮基金经理们咱们太熟悉了，他们只会在景气成长里抱团，上看不上鑫多多那票游资的压根就不会去，江湖草莽很容易被针对。

    盘中，依然盯好日经225的风向，看基金重仓指数的步伐，做好应对。

    今天，依然继续看好AI应用和软件方向的修复，AI取代不了人情世故。标子加油，昆仑万维图形也凑合。

    南攻北守

    今天机器人异军突起，咱们多次谈过绿的谐波，用三生万物一套，分明是回踩买点结构嘛。

    这个板块昨天之前可一直被称为植物人啊，看好它需要很大的勇气。

    产业趋势之外，主要是他们处于中位，迟早会引来高低切的资金。

    市场的风格，就是高位缩圈抱团，其他切往中位，低位，《五六月市场展望》多读几遍，有个全景地图。

    之前给基金经理们讲课，有人问为什么叫南攻北守？按k线图看，北边是不是高位，南边是不是低位？

    北守不就是缩圈，南攻不就是买入？

    那具体策略呢？

    高位的要胆大心细，图没有坏就看逻辑参与，比如云南锗业，说它都很多天了，图形又很健康，哪怕今天早上追进去，也有七八个点，长公主也会给你11%，不是所有机构都能解读出来coherent的指引说了啥，

    中低位的要有耐心，比如昊志，工业母机那会看好它，虽然这几天不猛，但也慢悠悠七八个点了，

    中低位进二退一反复揉搓你是常态，之前的Cambridge，我们说它时候100块，还有减持利空影响，让坚定拿着，现在马上200，但这也是整整熬了快一个月，一个月翻一倍，快乎？慢乎？

    不光是磷化铟稀缺，旋光片也缺啊，福晶等看着要上演伯利恒钢铁时刻了，有的都还拿着么？

    虚假的英特尔概念，CPU达到酷睿xx水平，

    真正的intel概念，"陈立武以前是我老大"，农尚的压力位是11.9，缩量突破最好，在这里盘整住也行。

    下周的风格，较大概率是，整体缩量，高位缩圈，切换中一团震荡乱麻，我们继续看好中位板块，到时见招拆招。'
