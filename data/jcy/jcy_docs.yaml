  文档内容正文: '四月行情展望

    四月份最大的变量，是市场震荡寻底和主力机构的重新入场。

    震荡寻底的走势我们此前讲过，呈现W双底结构，C点的具体位置无人能准确预测，这个点位是资金买出来的，紧盯“基金重仓指数”的信号即可。

    机构入场后，会重新布局哪些板块？还是要看他们一贯布局的核心阵地：光、电、有色、药。（此前机构还会布局白酒、汽车板块，现阶段暂不关注）

    光

    光属于科技板块，分海外、国内两条主线布局。

    有色

    稀缺金属等有色品种受战争扰动影响较大，除了锗业这类明确受益于AI发展的品种，其他标的需要观察主力资金率先布局的品种。

    现阶段可以关注稀缺气体板块，尤其是氦气，与韩国相关人士交流后得知，其氦气供应链受卡塔尔影响较大，相关标的主要有华特、金宏、广钢，可结合技术图形自行研判。

    药

    周五懂王加税的消息给医药板块带来利空冲击，板块呈现分化走势。医药板块的投资难度在一、二级市场中都是最高的，我们依旧看好小分子和GLP-1赛道，优质的相关企业数量有限，此前也提及过相关标的池，包括三生国健、爱丽丝、荣昌、苑东等。

    其中有记忆点的舒泰神，从筹码面来看，洗盘也已接近尾声。该板块操作建议轻仓参与，擅长操作的投资者可自行研判，更考验绿盘低吸、做T的操作能力。

    这段时间的市场研判主要关注两点，一是资金买入的板块，以及是否存在持续性买入的动作；二是看技术图形，标的出现回踩买点时，就是重新入场的时机，例如部分燃气轮机、部分电力装备等标的。

    四月，市场有可能迎来业绩催化与结构回踩的共振，板块和标的强者恒强的概率较高。

    关注技术图形的投资者需要注意，若标的不再具备向上趋势，重新跌穿60日均线或者箱体整理区间，就需要及时离场。

    各板块的产业趋势和核心逻辑并未发生丝毫改变，其他板块此前均有提及，在此不一一列举。

    否极泰来，春暖花开。

    注：以上内容仅为学习交流，不构成任何投资建议。

    三条抄底线

    3850,3794,3731是机构们的三条抄底区间，每次都买一点，每一条线会比上面买的多，每一次都会多买几个题材，

    如果形势不好，卖掉低吸的砸盘走人，

    如果大环境好了，九龙夺嫡看谁更得市场欢迎，更有催化和受众，再加仓它们。

    这正是“走一步看一步”的打法。

    当然大的方向依然要看产业逻辑和光通信的主线，一脚踩在十四五的AI硬件人，一脚踩在十五五的量子通信，6G等。

    前排涨完了就会涨后排，老牌涨完了就会涨新兴，比如光学材料，激光设备等，今天的博创如

    何？

    财报和并购咱们专门讲过，一边在上游布局，一边台积电在流片16T，爸爸长飞又那么厉害，有其父必有其子。

    台积电不是谁的预付款都收的。

    今天有资金明显介入国产半导体和化工，半导体我们先看图形健康的，比如早上讲的华丰，芯原等，（华丰的替代对标是航天电器），

    化工早上刚回复过同学，别看股市跌，并没有反馈涨价预期，这块我们最看好的新和成，etf目前缩量箱体震荡。

    什么叫操作习惯举个例子，比如博创，总喜欢对子顶一下，

    之前177.77等好几次，今天186.66可以t一下，

    后面如果往上突破200继续拿着，毕竟乖离不夸张，比如又走破旗翻，3天内不站稳平台，可以继续止盈部分。

    从今天福晶，东田等的表现来看，资金持续流入光学材料尤其是法拉第旋片的趋势在加强，加上福晶主业是国产光刻机的概念你懂得。

    对我们来说，目前阶段最好的方式就是在主线高抛低吸做T，比如今天带（）的朋友尾盘-五六个点可以低吸一下，

    A股目前是无头苍蝇状态，没有美股对标就不会做饭，晚上看lite的表现。

    ps，当真不得哈，假日期间解读的“益”卦，是长女长男百年好合，长女是海外算力，某创代表的校花咱们是确定的，长男当然是国产半导体，寒王是你吗？'
