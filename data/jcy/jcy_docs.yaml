  文档内容正文: '16连阳后大盘局势

    市场目前是四个热门题材

    商业航天，AI应用，半导体设备，AIDC.

    1，商业航天，龙头一直换，你要说它走完肯定没有，筹码峰大家也都看过，较大可能性是板块内部高低切换。

    周末在发酵的是我们在申请20万颗卫星的频道资源，注意不是发射啊，

    无线通信院是国家刚刚成立的平台，它受益概念包括中国卫星和中电科，中电科的平台是东方通信，东方当年也是10倍股，今年以来业绩非常不错，技术架构目前看也很健康。

    目前看瀚讯能不能接手卫星成为新一轮中军，看资金选择，产业逻辑已经谈过多次。

