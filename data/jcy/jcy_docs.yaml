  文档内容正文: '交易滞涨与依然中线看多

    之前谈过市场三阶段，

    1，交易危机，2，交易滞涨，3，交易错杀。

    目前仍是阶段2，最难熬，目前没看到结束的迹象，技术图形上，叫做站稳5日平台或者箱体，或者3日不创新低。

    但大盘和板块是两码事，结构紊乱多年了，市场有一个半的活口。

    一个，是光通信以及它带领的算力硬件。

    光通信的那几个核心我们都明白，反复去弱留强就剩cpo和ocs，机构混在天孚，弹性是长光等，

    后排的硬件呢，关键时候还得看校花，就像光模块，旭创，箱体结构比较扎实（xys新高了），宏妹也不能说图就走坏了，无非进一步粘合均线，液冷，英皇在扛着，价值量上，光模块>pcb>液冷的链条我们都熟悉，你就算把最后面的剑桥拿出来，它也比大多数看起来健康。

    主线既然是光通信，主打它们的515880/159381明显就比其他etf强很多。

    国产方面，带头的华工，华丰，华工如果之前你没走，大概率也会是《三生万物》的模型，第一次给你21日线拉起来，后面一旦放量滞涨或者不能拉上来去突破新高，就会去跌破34日线往55/60去了。

    华丰科技就是如此，然后直到一个回踩买点的结构，这会它是可以打底建观察仓了。

    -另外半条线是什么？新能源，无非储能，光伏，风电。

    已经在户储上面，比如德业，固德威，锦浪之类的你追不上了，不如看大储，

    目前位置和空间还算可以的是阳光电源，硬要说给储能电池卖铲子的就是磷酸铁锂，新能车和储能都要用，

    大A三家，富临精工，德方纳米，湖南裕能，富临的问题是股性过于活跃，波动太大一般人扛不住，德方还需要磨一磨，裕能如果再粘合调整一下是个机会，

    另一个是容百科技。也是可以建观察仓的位置，如果下探28.11的短期箱体可推一定仓位，大不了跌穿走，到26.37再看。

    至于光伏设备，看迈为差不多了，它低开调整给机会了再分批次，硬追没必要。

    咱们有两个外界不知道的信息，一个是5亿美元的潜在特斯拉采购，另一个是某在美国的储能大厂采购了它整套HJT设备用来做电站。

    整个风光电，核心是电池，里面最优秀的是宁德，各方面碾压，当时有句话重申过，如果不知道穿什么，就穿阿玛尼，如果不知道买什么，就买catl,

    现在它即将新高了。

    当然并不是说让追，而是讲两个道理，

    一个是，有些战略级的标的，你不用看图形，等它的风来就是了，

    硬要看，跌破60日线后走，然后其他啥都不买，等它收复短期中期均线后(5/813/21/尤其34时)重新入场。

    另一个是交易层面的，不是说狂跌之中就没机会，通常，先于市场调整的会先于市场企稳，你比如旭创，26年以来就弱势了到3月份506左右来个底部，

    而后于市场调整的可能会补跌，目前我担心的是存储（它是从光模块不行了之后一直涨到上个礼拜），马上还看不到光通信，可能有暂时没看到。

    总体上来说，非战之罪加不可抗力，目前其他领域没有看到更大的持续性机会，量化在那边兴风作浪更不建议去，

    继续保持5成仓位问题不大，谨慎的可以根据自己情况继续趁反弹往下减仓，

    用好5日平台理论，这个都不给的那就是图形走坏，激进点的起码3天不创新低，你再去试错，要加仓也等大盘量能上升和板块资金流入伺机而动。

    滞涨阶段，防控风险比找机会重要，

    但中长线咱们绝不悲观，什么第三次世界大战，重塑全球能源格局，你问问他们有那产能吗，

    给你过小时候的日子你乐意吗？

    70年代的滞涨和石油危机，催生了小排量车和日本的机会，大多数机构一年半后才反应过来，上一次英伟达搞出AI芯片，最洞察的机构是6周后才开始买入，涨了整整10个月后，到23年人工智能才能美股很多软件的主要板块，人们认识到美伊受益最大的是中国，需要点时间。

    辩证看问题

    好几周前我们已经清楚，没有放量大跌，就没有放量大涨。

    今天开盘前再讲，现在没有看到止跌的迹象，因而上午的反抽依然是减仓的机会。

    没减，侥幸了，执行力不足了，或者依然在扛着呢？

    找到核心问题和主线。

    目前的主线有变化吗？看起来没有。

    防守是油气煤化工，这个不讲了，但现在筹码太差也没必要。

    成长呢？依然是那条半主线，光通信代表的硬件和新能源。

    上午甚至拉起了反攻，旭创一度拉红，腾景还创下了新高。

    知道这个就够了，市场企稳后往它们身上靠，或者看他们更有弹性的后排。

    今天放量1800亿，终于有恐慌盘出来了。

    快了周二，慢了周四，就会有反拉回来。

    到那会，小加一轮，反拉后的调整，可能是小型W，继续加，然后等着涨。

    基本就这么个剧本。

    今年的大机会就在这了。

    跌不怕，怕的是你稀里糊涂的。

    不要担心牛还有没有，

    外头生产队手里捏着1万亿现金，公募基金起码4000亿，他们这会比你急了。

    TACO了

    油价大跌，光通信直线拉升。

    “交孚，无咎”。

    今天有没人交一个带孚或带光的朋友。

    先贤的智慧真是太强了，

    有意无意之中让我周末提前解读了“解”卦

    完全合着市场的拍。

    最新消息是，伊朗否认了和懂王的沟通。

    不重要，重要的是懂王宣布自己赢了，

    说明他松动了没想把事闹大，

    一方要撤了，市场是有预期的'
- record_id: recveCm6UdgM2r
  文档标题: Vol.260322 易经第40卦“解”，驱散乌云见太阳
  文档链接: https://my.feishu.cn/wiki/FvPcwUJjyiclqlks3WLcDIZNnie
  文档内容正文: '睽是互相瞪眼，发怒，吵架了，一下是好不了，中间要经历一个过程蹇，是步履蹒跚，底部震荡，互相赌气。

    然后呢？双方解开心结，开始恢复。

    在股市中，这就是剧烈杀跌、底部震荡，走出企稳的三阶段。

    真正的v型反转，有，太少太少了。

    解。利西南。无所往，其来复吉。有攸往，夙吉。

    象日：雷雨作，解。君子以赦过宥罪。

    本卦上卦为震，震为雷；下卦为坎，坎为雨，雷雨并作，化育万物，是解卦的卦象。君子观此卦象，从而赦免过失，宽宥罪责。

    利西南，也就是坤卦，坤是大地，坤也是女性，化解矛盾先往确定的目标和阻力较小的地方前进，宜用宽柔中和之道，如果没有明确方向，做不到，还不如不做，有明确方向的话，早行动吉利。

    好了，解脱困境，走出低谷，和哄女孩子的教程开始了。

    初六。无咎。

    象日：刚柔之际，义无咎也。

    在困境刚开始缓解时，要用柔顺的姿态应对刚动的大环境，不求有功，先求无过。

    这好比大病初愈，小米粥先养着，别大鱼大肉吃人参。

    一开始哄女孩子，先谈点日常琐事，今天吃啥，不要上来想着恢复如初。

    股票也是，大阴线杀跌后，应该先到"无咎"的状态，能站稳一个箱体，3天不创新低，稳住再说，稳不住就早走。

    现在职场很多35岁现象，有些人赋闲多年后重新找到了工作或者跳槽到一个新地方，不要想着自己当年年薪百万，现在月薪很低，先求"无咎"。

    九二。田获三狐，得黄矢，贞吉。

    象日：九二贞吉，得中道也。

    打猎时捕获了三只狐狸，并得到了黄色的箭矢。

    狐狸狡猾，比喻隐藏的隐患、小人或积弊。"黄矢"代表公正、光明的手段。

    趁着修复的时机，要抓住核心隐患，并用正直、不偏不倚的方法去清除它们，这样解决问题才不留隐患。

    最典型的案例是邓公的复出，他一方面顶住了全面否定教员的压力，一方面进行大规模的平反冤假错案并让知识青年回城恢复高考，一下子就抓住了时代和人心。

    六三。负且乘，致寇至，贞吝。

    象日：负且乘，亦可丑也；自我致戎，又谁咎也。

    背着财物坐在车上，招致贼寇来抢夺，自己招摇导致的问题，你说这怪谁呢？

    困境解除后，最忌讳得意忘形，炫耀张扬，刚刚走出点样子就嘚瑟，很可能又掉回去。

    鱼的记忆只有七秒，别说普通人总是好了伤疤忘了疼，大佬们更不例外。

    典型的案例是孙宏斌，当年在联想因为太气盛被老柳搞进去，出来后创办了顺驰很红火，又猛加杠杆险些爆掉只好卖给路劲，创建了融创后还是那么激进，各种拿地扩张命悬一线，到现在还没爬出坑来。

    我们有多少人，又是一次次的再犯这种错误呢，本来回本了盈利了又飘了，忘记过去的教训去玩杂毛，追高，套了心怀侥幸补仓，再度受伤。

    九四。解而拇，朋至斯孚。

    象日：解而拇，未当位也。

    拇为手，手指。

    解开被束缚的手指，和不良的链接断开，真正的朋友和伙伴才会纷至沓来。

    很多人总觉得自己运气不好，日常不开心，是因为你总跟这些负能量勾勾搭搭，纠缠不清，只有果断切割这些消耗你的人，事或坏习惯。

    旧的去了，好的才来。一个人的反弹，上升，就是不断和坏人，坏毛病，坏习惯的切割，找回自己的能量。

    什么叫坏地方，你待着难受的地方。什么叫坏人，对你不好的人，不给你回应的人。

    以前有个部下，小伙子能力出众，长的也行，家里给买了180的大平层，谈女朋友总是不顺，被别人晃的团团转。

    大王跟他讲，你不要向下兼容去找那些不如你的女孩子，酒吧里认识能有什么质量，和她们来回试探拉拉扯扯干什么？欧美同学会里去撒网，主动示好，表达心意，谁12小时内不回你信息，直接拉黑。

    和负能量一切割，他整个人都阳光了很多。

    六五。君子维有解，吉，有孚于小人。

    象日：君子有解，小人退也。

    相信很多人都当领导或者看电视，都会面临着一个问题，公司那些刺头和老油子，什么时候解决？

    是一开始就弄，杀他们立威，还是放到中后段？

    先贤告诉我们，放到后面，先不搞这些滚刀肉和疑难杂症。

    上一爻，是朋友和同志们来了，先把根据地建设搞好，基础打扎实了，把大环境的危局解了，再去搞他们。

    生活中，当你自身的能力和能量强了，邪气自然退散。

    政治上，四两能拨千斤，是因为你本身好几百吨。

    就像我党，在抗战中搞统一战线，化敌为友，那也是因为三大法宝中有了党的建设和武装斗争。

    有了这些，但是依然不骄不躁，还是团结一切可以团结的力量，化敌为友，叫大家心服口服。

    上六。公用射隼，于高墉之上，获之无不利。

    隼，是一种像鹰的猛禽，墉，城墙。

    王公站在高墙上，用箭射猛禽，一举捕获，无所不利。

    连小人都招揽和统一过来了，意味着化解行动到了最后、最高的阶段。我方占领了城墙的制高点，问题迎刃而解。

    睽、蹇、解，描述了一个完整的下跌，盘整，反弹的周期。

    大跌时，我们要么减仓，要么一步步的去弱留强，要么减仓观望；

    底部震荡期，要以退为进，反思修德，降低期望值，能打就打，不能打就走；

    反弹恢复期，要步步为营但求无过，低调谦虚不要招摇，等方方面面的问题都解决后，再乘胜追击，解决全局。

    没有一个冬天不会离去，没有一个春天不会来临。

    ps，美国的国徽，是白头海雕，高端的隼，是长城，又是东大的象征，和时局多么的呼应。

    刚刚被击落的F16，绰号正是"隼式"。

    "公用射隼，以解悖也"，是渺渺天意不可问也，还是说，高纬度早就看过了剧本，抑或一种巧合？

