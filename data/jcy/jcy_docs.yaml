    南院大王：未定。今天刚和他们开过电话会议，当然不是说的这事

    Crocodile：恒科仓位重，之前没减仓，现在应该怎么操作好，是走是留？减仓补仓？

    南院大王：躺平，不补等企稳

    笑着，使黑夜奔跑：英皇今天也算抗跌'
