  文档内容正文: '军备竞赛

    之前布局谷歌链就是为其今天开始的大会，来看一下，第八代TPU拆分：

    国产内存池化替代：澜起，其也给北美供货。

    大家忽略的一个点是，谷歌这个方式对AEC连接的需求也会增加，代表标的为博创、鼎通，以及太辰光。

    八代机全部海代冷术。

    该给的预期都给到了，美股没有走兑现，况且只是谷歌大会的第一天，今天继续持有。

    美股的燃气轮机龙头GE Vernova发布一季报，单季度营收93.39亿美元，同比增长16.27%，扣非净利润47.45亿美元，同比增长17倍。

    杭州人焦虑自己没有硬科技制造业，天天羡慕苏州，其实苏州在羡慕杭州的互联网大厂。

    AXT继续大涨15.97%。

    昨天有人看了云锗的年报觉得不及预期，其衬底业务还未展开。

    再讲一个预期，火热的光纤核心是光纤预制棒，亨通、长飞的优势在于攻克了光纤预制棒，棒的上游主材料是高纯四氯化硅，占总成本30%左右，国内生产该材料的是唐山三孚股份；其中添加剂四氯化锗用于提升纤芯折射率、降低传输损耗，直接影响光纤的光学性能，该原料由云锗供应。

    云南也因锗产业发展向好，锗元素应用广泛，望远镜与狙击枪镜头的彩色镀膜便含有锗元素。

    在东西大科技军备竞赛的大背景下，没有均值回归，只有强者恒强，游资和量化在机构的推土机攻势面前规模较小。

    继续沿之前的一体两翼展开。

    中信证券开始推长公主，称全部打满对应15亿产能，EML/CW海内外客户验证进展顺利，传闻已进入xys供应链。

    一季报透露的重要趋势

    一季报传递出核心趋势：当前阶段需聚焦业务增长、布局AI、加大投入并打造第二增长曲线。

    匿名用户提问：如何看待排队在港股上市的大模型公司（月之暗面、阶跃星辰），政策和市场资金窗口期是否仍存在，参与IPO前投资是否具备价值，有哪些风险需要注意？

    回复：政策与市场资金窗口期仍存在，相关公司具备优质发展潜力。需注意两点风险，一是大模型行业最终仅有一两家企业能突围，具体标的尚不明确；二是Pre-IPO阶段估值已处于较高水平，参与门槛较高。资金体量较大的投资者可进行配置布局，普通投资者需结合自身资金规模与投资风格理性参与。'
