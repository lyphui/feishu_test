  文档内容正文: '翘首以盼紧缺的物料和设备系列（2）

    听说大家翘首以盼，

    本来明天早上更的，这里就说一下吧，

    那些走了和没看到的同学，缘分哪。

    Elon Musk placing orders for photovoltaic equipment with Chinese companies appears
    to be genuine.

    【Maxwell Tedhnologies (Suzhou) Co., Ltd】is reportedly involved in a deal worth
    around USD 500 million, while 【Laplace Renewable Energy Technology Co. Ltd.】 may
    have orders totaling around RMB 10 billion.

    The information is considered to have roughly 80% credibility, but everyone should
    make their own judgment based on the price action and chart setup.

    Deliveries are only expected to begin in July.

    The real question is: can you hold until then-or even longer?

    NFA.

    够不够重磅，亲们。

    易经第48井，找到来时路，蓄势再出发

    前一天吃饭聚会KTV唱歌到12点，完后又去吃夜宵，回来洗洗睡下快凌晨3点了，第二天你能不难受能不瞌睡么，这就"困"。

    困，是冲的太猛而过头的反噬。

    被反噬后，遭遇挫折后，或者身体浪出问题后，当你亏了钱，躺在病床上，一天的，终于要痛定思痛好好反省了——以后要好好锻炼身体了，以后再也不搞无效社交了，以后要提高核心竞争力才行，这种靠吃饭喝酒拉订单的方式不行啊！

    你深刻反思到问题的本质和源头，找到那个滋养你来时的路，这就是"井"。

    井。改邑不改井，无丧无得。往来井井。汔至，亦未繘井，羸其瓶，凶。

    象日：木上有水，井。君子以劳民劝相。

    汔，几乎。繘，井上汲水的绳索。

    城邑可以任意搬迁，但水井依旧在那里，井水清泉常在，不增不减，人们来往不断地汲水。但若要快速汲水却半途而废、就会导致打水的罐子破损，便是凶险可惜。

    井卦下卦为巽，巽为木；上卦为坎，坎为水。水下浸而树木生长，君子观此卦象，取法于井水养人，从而勉励那些还在苦苦劳作的人们，要找到和坚守你的本源和核心竞争力，这才是你安身立命的根源。

    初六。井泥不食，旧井无禽。

    象日：井泥不食，下也。旧井无禽，时舍也。

    井底秽泥淤积不堪饮用，旧废的水井连禽鸟都不来光顾，人们已快将它舍弃不用了。

    什么是老登，老登和年龄无关，它就像旧的井，总用老眼光看问题，从不清理自己的旧思维旧观念，从不主动更新升级，反而固步自封，那就会淤泥重重被淘汰。

    就像一个老王，还以为现在是他起家的八九十年代，清华北大不如胆子大，

    又像另一个老王，公开讲，什么自动驾驶，我看都是骗子忽悠人的。

    九二。井谷射鲋，瓮漏。

    象日：井谷射鲋，无与也。

    鲋，一种小鱼。

    在井口张弓射井中小鱼，旁边的瓮瓶又破又漏，如此谋食求生，把大家都搞的没有依靠。

    井本来是用来滋养大家供水的，你把它弄枯后，射鱼自己吃，自己过潦倒，周围的人也没好处。

    真正的牛人和好企业是做什么的？是搞生态，做增量的，人们接近你要么有情绪价值，要么有物质利益，这样才能源远流长，涸泽而渔的事不能干啊。

    所以亲们，无论什么时候，不要从员工嘴里抠成本，不要去供应商那里搞压榨。

    那要干什么呢？

    九三。井渫不食，为我心恻，可以汲，王明，并受其福。

    象日：井不食，行恻也。求王明，受福也。

    君上看见井水污浊不能食用，为大家伙感到伤心。淘洗干净，就可饮，君上英明，众人都获得他的好处。

    君子要干的是做一口井，打造平台，建立生态，让亲近和接近你的人都能得到好处，既养自己，也润及他人。

    而这些，需要你有一颗悲天悯人，回归光明的心。

    六四。井甃，无咎。

    象日：井无咎，修井也。

    用砖石垒筑井壁，进行顺利。

    当你找到价值的传递方式之后，要不断的强化这个生态，把越来越多的人拉进来，让他们受益。

    苹果的app store就是典型的案例，无数的开发者和中小企业在其中获益。

    九五。井冽寒泉，食。

    象日：寒泉之食，中正也。

    水洁泉寒，清凉可口，可以食用，大家夸赞君子行事中正。

    一个人，如果要把成就所有人的事业当成自己的发心，那么你能成首富，是马老师，

    一个人，如果要把成就所有人的发心当成自己的发心，那么这就是菩萨，渡一切苦厄。

    生活中，你自己说好是没用的，真给大家带来价值和利益的，人们把它记在心里，

    这就是，

    上六。井收勿幕，有孚元吉。

    象日：元吉在上，大成也。

    水井建好之后，井口不要盖上盖子，让大家都来取水，就会大功告成，长期吉祥。

    要做大事情，就不要试图把水井控制在自己手里，要搞开放生态，让众人获益，大家才能长远。

    在功能机向智能机过渡的早期，塞班系统曾占据全球智能手机市场超过60%的份额，诺基亚靠它遥遥领先，

    然而当诺基亚收购塞班后，试图将其牢牢掌控在自己手中，形成了"诺基亚独享、其他厂商边缘化"的封闭格局，

    最终在高额授权费之下大家纷纷逃离，而开发生态的安卓后来居上，最终成为王者。

    这里就得讲下蔚来，车是好车，企业以前连年亏损，重要的原因在于，它资产太重，斥巨资建了太多了换电站。

    但李斌跟其他人不一样的是，它的换电站从第一天起就是开放的，后来先后适配到一汽广汽等大厂，25年这个板块终于实现全年盈利，成为第二增长曲线。

    相比之下，很多起个大早的车企，建了很多充电桩，一开始都是不对外开放的，恨不得卷死对方，那为什么2025年以后大家纷纷打开了呢？

    因为当年，发改等四部门发布通知，要求车企自建的大功率充电设施网络原则上应无差别开放。

    都什么年代了，还在搞封闭生态？

    总之，并卦是什么，是让你找到来时的路，那个让你意气风发奋不顾身的动力，让你前行的勇气和滋养的力量。

    城邑可以变迁、人事可以流转、环境可以更换，风格可以流转，但本心如井，价值永在，有些东西是恒久不变的。

    希望各位修身如掘井，

    默默深耕、日积月累，立己达人，不忘初心，砥砺前行！

    ps，纯按意象的解释对应到资本市场，预示着下周市场将可能分化缩圈，那些有真正价值和预期的好公司会回归，你的仓位可以在这个滋养中逐步推高，随着震荡行。

    "井收勿幕，有孚元吉"，孚同学又回来了，单纯从图上看，60日线基本站住，对高手同学来说，又到了回调可博的时机了。

    Little提问：大王，想跳槽去长鑫存储上班，所以想问下这波存储周期大概多长，担心产能过剩之后会大规模裁员。

    你能去还是可以去，一是这轮存储周期会更长，以前都是消费电子，现在更有AI汽车的共振，二是就算真过了你的经验也容易找到下家。最后大厂大平台对普通的人价值不光是工作岗位，更多是人脉资源和见识视野。'
