  文档内容正文: '五年三倍的机会

    十五五规划颁布后，各个条线板块都要分解自己的任务，那招标和规划就给供应商带来巨大机会。

    大王团队和大型企业与业内关键人士沟通后，先谈第一个机会，电力板块。

    电力分为煤电，光伏，风电，核电，生物质电(氢能)。

    其中空间最大的是，风电。

    上峰要求到2030年，

    海上风电累计并网装机规模达到1亿千瓦以上，

    而且主要是

    东海南海渤海等的远洋风电。

    目前是什么情况呢？装机大约3000万千瓦，也就是说要增长3倍才能达标。

    因此，关键词就是，

    海风，大功率风机，远海适应性。

    海上风机的绝对龙头当然是明阳智能，但是它弹性可能不足，目前从技术上看，正在收复34日线，如果给回踩55日线的机会更好，其他几个都大差不差。

    确定性比较高的是东方电缆，细分龙头，海缆在耐腐蚀抗压等方面都有很高要求，目前位置不算高，但它有个什么问题呢，股性一般，谈不上坏，也不好，几乎不给涨停，长期体验可以，短期体验不好。

    弹性更大的是亨通，光电+海缆，但亨通目前跟着长飞走光纤的路线，没有的等待调整下来也不迟。

    弹性大的呢，上周五谈过，一个是做主轴的金雷股份，是vesta，西门子等的供应商，海外占比30%以上，一个是天顺风能，下了大决心由陆转海，一把将所有陆电资产计提，因而造成亏损，但它是风电企业唯一在欧洲(德国)设厂的。

    格局因而清晰了，中军主力明阳，确定性东方，弹性金雷，天顺，可以伺机等待的是亨通。

    当然，同学们也可以根据自己的分析爱好去看别的企业或者挖掘潜力差。

    某大央企高管跟大王交流说，他们以前开会，领导经常提核电，核电，最近挂在嘴边的是风电。

    ps，注意啊，仅为一线情况了解和产业研究，布局进入和技术参考三生万物模型。

