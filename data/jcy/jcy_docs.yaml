  文档内容正文: '春节前后的剧本与策略

    量在价先。

    放量会让筹码充分交换，卖的卖完，买的买好。

    但是前段时间，市场一直是缩量调整，

    这说明什么？主力准备以时间换空间的方式完成调整。

    多久呢？你参考10月份，跌破牛熊技术线60日线后，进行了大约一个月的调整。

    你看上一轮的图(图一)，走的就很典型。

    也就是说，这波调整会到元宵节前后，

    毕竟上周才跌破60日线。

    那请问砝码的另一端是谁呢？消费和周期，我们统称为周期。

    2.5万亿以下，就是跷跷板效应。

    -科技主题涨什么？

    那些前沿技术的，刚刚有了利润或者验证的，比如萝卜代表的硅光，杰普特代表上游元器件和设备等。

    详情看12月8日的文章。

    易中天盘子太大又能摁计算器，中期逻辑没问题，缩量市场就不占便宜了，里面相对上游的天孚表现就强很多。

    -周期涨什么呢？

    那些已经有了反转，或者触底的，比如万华代表的化工，香料，医美，恒立代表的工程机械等，造纸要涨价，是能看的。

    消费又是里面的重头，我们觉得白酒没必要看，反倒是家居建材近期走的不错，比如顾家家居，三棵树等。周期反转，地产都要比白酒好。

    周期目前最简单粗暴的化工etf159870。

    传统行业，都是周期，非传统的，都是科技，这样去理解。

    -问题来了，节奏怎么把握？

    周一科技高开的概率很大，周二可能再冲高一下弄不好下午就回落。

    这时是不能追科技的，反而看到没量能，滞涨的，涨不动的，要趁冲高减仓，

    周一砸周期和消费的可能性很大，此时反而不能落井下石，是建立观察仓或者先低吸小部分，周二再砸继续低吸的机会。

    待到周三，可能消费又起来了。

    科技不能上头，反弹不是一劳永逸，

    周期也不要上头，调整是低吸机会。

    衡量科技的风向标是xys，它如果高开低走不坚挺，把你的也带下去，那就可以考虑跟着一起跑，大不了2.30再接回大部分，第二天看情况再接点，它如果很硬拿到第二天上午再说。

    -总体上，所以如果你会玩，你可以在周期和科技中，两边轮动不亦乐乎，但绝大多数人要注意，你不擅长可能会两边打脸。

    相对稳健一点，可以科技/周期~六四开或者你适应的仓位两头下注。

    但注意要看前排的。

    本周5天可能的剧本，可能是科技涨两天，消费涨两天，最后一天拉指数，大团圆。

    玩到元宵前后，科技的筹码吸足了，又会重回主线。

    你说有没可能不走跷跷板，概率很低，除非周一二大盘剧烈放量，资金全面进去。

    早上比较好的走法，反而是不要高开太多，甚至略低一点拉上去，反而不会有高开出逃踩踏。

    仅为学习不构成建议啊，剧本已经说的无比明确了，你是轮动，你是都押，你是腾笼换鸟，还是你在一个方面躺平，都要根据自己的情况来。

    这个跷跷板，给大家看一个对比图，都是新字辈的，一目了然。

    上图是新和成，周末我们聊到香精，它是做化工医药和香精的细分龙头， 下图是业绩爆表的老朋友xys。

    忠橙

    声东击西，调虎离山，围点打援。

    主力四渡赤水，把散户骗出大科技与四强，然后自己开始吸筹了。

    和美国那边的故事一样。

    重温下四强，

    -海外算力是今天最靓的仔，本来就是权重回归，弹性更大的是，光芯片，cpo，ocs等这些更上游的东西。

    现在不用看估值，反正一季报还早，上周就多次讲过lumument，你说它估值高不高？这票时髦的是跟它走的。

    etf159381之前讲过，识时务者为俊杰，你看它持仓，软硬兼备，一水的前排大聪明。

    纯通信etf也非常不错。

    -电网设备反正也不是决赛品种，前段时间是抗跌的，你要问新鲜感，之前专门讲过变压器的核心，取向硅钢，望变的一早的表现就很强。

    -国产设备/芯片的龙头是芯原，也是34线拉起来，看它明天表现。

    -AI应用受到字节新模型的刺激一早就比较强势，中文在线20cm封住涨停就知道板块差不了。

    AI广告，AI营销，AI语料会轮动接力，简单粗暴的传媒etf继续看好。

    AIDC和云也很强，代表的是大位科技，利通电子，如果润泽在，起码也得是个10cm。

    小弟们都涨涨，就显得丧标不贵了。

    今天放量1000亿，全天都比较强势，晚上看美股的反馈，

    如果美股继续强，那么决赛很可能是就是阿根廷对法国，即AI应用对海外算力。

    如果美股疲惫明天国产半导体拉起来，那么剧本依旧。

    防别人四渡赤水晃你，最关键的是要守住渡口，巍然不动。'
