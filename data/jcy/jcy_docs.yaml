- record_id: recviLlidQf2tk
  文档标题: Vol.260503 AI基建与六张网
  文档链接: https://my.feishu.cn/wiki/HiDjwTS1xii6GvkMGCVcrw23nZe
  文档内容正文: '伯克希尔的股东大会核心有两点，巴菲特的思路依然是收租模式，巴菲特以前做的是实业收租，未来阿贝尔要做科技收租，因此投资了谷歌。

    巴菲特当年卖出比亚迪，是因为其无法实现收租，宁德时代则具备收租潜力，宁德时代去年一度自率高，总举高达2.0%。

    收租模式并非卖铲子，而是黄仁勋五层理论中的应用层。

    另一大看好方向是AI基建，涵盖土木工程、电网、CPU、交换机、材料，甚至特种材料等领域。

    汽车发明后，基建形态发生根本性变化，AI发展同理。

    客观来说，在理论研究与布局方面，发改委的布局比伯克希尔更为前瞻，上月重要会议提出“六张网”：水网、电网、算力网、通信网、物流网、地下管网。

    未来为满足散热需求，AIDC或许会直接建设在地下。

    电网设备ETF（如159320）目前处于回踩买点结构的均线粘合期，节后调整后可关注。

    具体标的方面，中恒电气（已进入多家大厂供应链，为维谛HVDC平替标的，关注是否回补缺口）、麦米，弹性较大的谷歌电源OLT。

    AI基建存在一处市场预期差：

    在AI服务器的物料清单（BOM）成本中，MLCC已跃升为前三大成本组件之一，仅次于GPU（图形处理器）和存储器（主要为HBM高带宽内存）。

    MLCC相关方向值得关注。'
- record_id: recviLlUrogZd9
  文档标题: Vol.260504 谷歌入驻广州与AI五层蛋糕
  文档链接: https://my.feishu.cn/wiki/VvlfwyHQ1izwhMktVXicSO0Wnff
  文档内容正文: '4月8日，全球科技巨头谷歌正式签约入驻珠江新城地标广州国际金融中心（西塔）。

    2010年，谷歌退出中国搜索市场，此次在广州成立“谷歌跨境电商加速中心”，专业定位是为内地跨境电商企业提供近距离的海外精准营销、国际化品牌打造、数字化技术赋能、全球流量对接等全链条服务。

    通俗来讲，就是助力中国企业出海，提供AI化的综合服务，协助企业规避产地问题与各类贸易限制。

    下一步，谷歌可能在中国销售其全系列产品与TPU。

    谷歌的市值有望超过英伟达，甚至可能成为人类历史上首个市值达10万亿美元的公司。

    AI转化为生产力，最快速的路径是广告与带货，这一模式已被多次验证。

    黄仁勋提出AI五层蛋糕理论：

    第一层，能源：电力供应、新能源、热管理（各类电源、液冷、变压器、燃气轮机）。

    第二层，芯片与系统：GPU、半导体、高速互联（CPU、GPU、OCS、光模块、材料）。

    第三层，基础设施：数据中心、云计算、网络通信（AIDC、云服务、算力网）。

    第四层，AI模型：LLM、CV、NLP、多模态（智谱AI、DS、月之暗面等）。

    第五层，应用：医疗、制造、金融、自动驾驶等各类AI应用。

    谷歌在中国最大的广告代理商是蓝标，广东省属平台为省广，市属平台为传媒。

    AI硬件行情预计还能持续2-3年，需求规模庞大，3年后将进入应用主导阶段。

    广州近年招商思路转变，超越深圳难以依靠硬件，重点发力服务贸易与AI应用。早年世界500强进入内地时偏好广州，如广州宝洁、日立电梯、卡夫氏等，依托十三行的商业底蕴，《南京条约》签订后十二年才得以进入广州城。

    节后，踏空的机构与游资大概率进攻应用方向，逻辑通顺，仅为风格切换，可结合盘面判断。'
- record_id: recviLmuI0a4jn
  文档标题: Vol.260501 易经第46升：迎接主升浪
  文档链接: https://my.feishu.cn/wiki/I1kTwFz2Iixp9rkBEEGcsR1Tnud
  文档内容正文: '谷有多深，峰就有多高，盘整有多么煎熬，上升就有多么剧烈。

    经过了夬的决断，姤的相遇，萃的萃取，去粗取精，去伪存真，去弱留强，打磨了队伍，凝聚了意志，之后自然会进入主升浪。

    人生、事业、股市皆是如此，这就是易经第46卦，升。

    升。元亨。用见大人，勿恤，南征吉。

    象曰：地中生木，升。君子以顺德，积小以高大。

    升，非常亨通，有利于会见王公贵族或对方领袖，不用担忧。出征南方吉利。

    升卦，下卦为巽，为风、为木，上卦为坤，为地。君子看到树木从地下破土而出之象，彻悟从小胜到大胜的智慧，为后人留下飞黄腾达的教诲。

    初六。允升，大吉。

    象曰：允升大吉，上合志也。

    刚起步开局便十分吉利，原因是符合上方的心意与志向。

    生活中很多人少年得志，年纪轻轻成就大事，也有本领出众者蹉跎半生。问题关键在于是否获得领导关注与提拔，是否跟住时代趋势。

    新人进入单位与公司想要快速上升，就要关注核心领导关心与亟待解决的方向，主动朝着该方向努力积累，终会被发现，进而平步青云。

    投资与做事业，必须跟上时代主线。前20年要把握地产、建筑、互联网方向，2024年后的20年，要聚焦科技、流量、人工智能领域。

    投资中坚定看好国产半导体，核心逻辑便是“合志”。芯片与先进制程必将攻克，即便持续投入资源也要达成目标。

    九二。孚乃利用禴，无咎。

    象曰：九二之孚，有喜也。

    内心虔诚，即便祭品微薄也无妨，这份心意会带来喜庆。

    许多人抱怨社会不公，而现实中白手起家者众多，他们依靠积极向上的热情、谦虚谨慎的态度，紧跟时代与主流方向，最终获得相应回报。

    九三。升虚邑。

    象曰：升虚邑，无所疑也。

    登临无人设防的城邑，登高望远，所见明晰，无所疑惑。

    紧跟主线、做事认真，便能快速迈上新台阶。优质赛道与龙头标的，上方无套牢盘与压力，前景开阔。上合心意，下有筹码，应大胆推进，坚定持有，享受主升浪。

    六四。王用享于岐山，吉，无咎。

    象曰：王用享于岐山，顺事也。

    周王在岐山祭祀鬼神，吉利而无灾祸，是因为顺乎天理。

    成功之时更需如履薄冰、虚怀若谷，保持敬畏、谦卑与感恩之心，不可傲慢自大。

    六五。贞吉，升阶。

    象曰：贞吉升阶，大得志也。

    守持正道，志向舒展，新高之后再创新高，更上一层台阶。

    高位缩量上涨，往往延续上涨趋势；放量大涨，则需警惕情绪过热。

    上六。冥升，利于不息之贞。

    象曰：冥升在上，消不富也。

    冥，意为昏暗。在昏暗不明的状态下盲目上升，会消耗精力、亏损元气，难以再获富足与增益。

    上六为上升顶端，万事过犹不及。当上升严重脱离基本面，仅靠故事、情绪与资金推动时，便暗藏风险，物极必反。

    市场中脱离基本面的炒作，看似上升，实则透支未来潜力。

    错过牛股、卖飞龙头，未必是坏事。凡事留有余地，懂得知止有度，人生方得圆满。

    先贤通过升卦启示我们，想要常胜不败、平步青云，需一开始跟住主线、踏准形势，逐步积累，不惧波动，以谦卑谨慎之心享受主升，最终知止有度、懂得进退。如此方能扎根深厚、枝繁叶茂。

    按意象启迪，“用见大人”契合时代方向，“南征吉”对应南方与离火之光，市场将进入蓬勃的主升浪与加速期。

    地风升的本质，是顺势而为，厚德载物。'
