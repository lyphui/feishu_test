- record_id: recvlSbinuIIkT
  文档标题: Vol.260607 中美股市跌什么（兼谈没走被套咋办）
  文档链接: https://my.feishu.cn/wiki/AVEywLsExilPh6kgmyMc8Avvnkj
  文档内容正文: '兼谈机构重仓指数应用

    周五白天大A科技大跌，晚上美股科技大跌，周末都是各种看空发酵，

    回答几个问题，

    第一，美股在跌什么？

    美股在跌情绪，就是因为涨的太多了，英伟达这种5万亿美元的公司，从4月到现在涨了50%，空头怕，多头也怕，大家心惊胆战的，干脆刺破了来一次集中的释放，才能继续前进。

    第二，大A在跌什么？

    大A在跌拥挤度，市场被科技绑架，科技又被易中天寒等男女主绑架，都挤在一起，都不想走。

    都不想走就只能制造下跌和震荡让你走，人少了轻装继续前行。

    上述的东西重复演绎了无数遍，每一回都换汤不换药，每一回，你是怎么割的，又是怎么再追进来的，记忆犹新吧？

    第三个，自己究竟如何去留适合什么风格？

    我们的置顶有《三生万物》《四种投资者》《五级风控标准》等系列，专门回答这些问题，自己看。

    A，不要骗自己，你是搞短线的就是短线的，长线的就是长线的，长线以年为单位，短线以天，周，最长月为单位。

    长线的，尤其是国运流选手，只关注产业逻辑有无改变，还爱不爱，感情基础在不在。

    短线的，你就看好K线，用好《三生万物》，市场风偏高时，跌破MA5就走，有利润垫的，极限21日没抵抗也走（极个别龙头21/34很贴近了，再观察两天）。

    跌破60日线且无抵抗，修复以月计算，你愿不愿熬着看自己。

    大多数人的问题是什么？

    一是，明明短线选手（其实80%的人都是），非说自己是长线，涨的时候是长线选手，一跌马上变短线，问咋办？

    二是，既要赚钱，还要情绪价值，还要快，还要天天有。你只能要一个。其实90%的人跑不过ETF，你如果既缺技术，承受又差，那就是 etf，最好定投，炒国产，几个能比588710稳健，炒女方，几个超过515880了。

    所以怎么办？要对自己真诚，真赚了亏了走不走？要多问自己，不是大王。赚了走，有乖离值，50，70，100对应你的贪婪度，亏了走，5日线平台，21日线平台，55日线平台，对应你的容忍度。

    第四个是个技术问题，之前让减硬科技没减，尤其是国产半导体没减，周末或遭遇明牌利空被套了咋整？

    大低开是肯定的，

    -如果拥挤度不高，或者上升期，大低开可先买入，拉高了做T。

    -如果拥挤度较高，比如最近，开盘也不是割肉期，因为大资金没法跑，你得等它拉起来之后再减仓，减到自己舒服的位置。

    当然是你是可能减错的卖飞的，但你只能要一个不是。

    -如果你拿的品种，21/或已到60日线都不抵抗，继续放量跌，先走了再说，待它缩量，缩换手，缩波动，大约是之前的50%-30%幅度，小K线或者十字星企稳，待它“回踩买点结构”。

    不能说，明明跌破支撑，道理都懂，我就是不走，因为我亏了，付出了很大情绪价值。

    亲，沉没成本不参与决策，你亏和赚，不是你去留的原因，纪律才是。

    接受亏损和卖飞本来就是市场的组成部分，亏了走又如何？走好了，行情恢复了，再买回不就得了吗？

    就算刀口舔血，也得在板块有消息催化，龙头明显奋起的情况下，等它3天不创新低再下手。

    -大多数人在这里深亏的原因，是跌破长期均线组不走，无抵抗不走，或者走了之后不待企稳，又去干别的板块，那边又被套了，两头挨打。

    第五，基金重仓指数怎么看？

    基金重仓指数，是市场主力机构的持仓，你自己下载个东方财富，BK0536。

    A，先看总体，它的买卖，基本代表主力机构的走向，你手里品种能忤逆它的很少，它才是“真大盘”。

    B，板块里有成分股，基本是四类，海外算力，国产半导体，新能源，其他。你开盘不久就能大概看出，今天它在拉踩什么品种，谁的机会更大，10点半左右应该能决定大局，也不排除各种V，回落，他们是“真板块”。

    C，到了重要压力位或者支撑位的时候，你要看这个指数，是在买还是卖，在买卖什么品种，你跟着它就行了。

    为什么早就不让大家看男方，上上周基金重仓股天天甩半导体。

    再比如周五，4080的压力位，一到了之后，基金重仓狂卖海外算力，那你跟着甩就行了，11点后它猛拉机器人，你跟着吸点龙头大概不会错。

    大盘＞板块＞个股。

    最后一个，问题又来了，

    AI有泡沫吗？到顶了吗？

    答案是有泡沫，但到顶远的很。

    大多数人都以涨了5倍10倍看线很高，判断它高，地上趴了3年，判断它低。

    呵呵呵，小乖一个月10万零花钱，占她爸月收入比例0.1%，小美一个月1万零花钱，占她爸收入20%，你说谁花的高？

    是小乖一个月涨到30万容易，还是小美涨到一个月2万有容易？

    高低不由你说了算，也不由k线说了算，由甲方的金主爸爸们还没有钱说了算。

    它们一直在花钱，乙方再高都不叫高，它们不再花钱，乙方再低那都不算低。

    那么你说今天，国外的英伟达，谷歌，meta，微软，国内的BATJM，账上是有钱还是没钱？是痛快的在花还是抠唆的在花？

    同学们都是人中龙凤，现实也很了解，你走出科技界到外头看看，有财大气粗的金主在花钱吗？

    说“资产荒”三个字，过分吗？

    AI进展到哪了，你目前看到的AI，都是屏幕上的，它连走出屏幕都没做到，山脚下都不算。

    你拉长时间看，最终赚了大钱的，都是产业投资者和真正的长线选手，

    比如当时我们说的几个国运企业，陆积电，宁王，寒王等他们几个，年度收益是不是超过自作聪明的高抛低吸？

    但要真变成那种，是要修炼的，一次次和自己的深刻对话与反省，

    大道甚夷，其民好径，

    我们在资本市场中，倾其一生最大的敌人，都是作为动物，“本能”的那部分东西，比如贪婪，恐惧，浮躁，多疑。

    而最好的朋友，都是作为人，人性光芒的部分东西，比如勇敢，坚毅，果决，理性。

    与君共勉，易经兵法这些最顶级的智慧都学了，难道还不能用用么？

    5万亿美元的AI教父和外头直播间大神们，谁的话更可信，谁更懂产业？

    评论区：

    Daniel：感谢大王，问下，我看一些自媒体开始说美债过高，可能会产生经济危机，请问大王如何看待这事？盼望大王解答

    南院大王回复 Daniel：一窍不通。不发美债哪来的美元，不发美元哪来的钱买中国货

    提问：大王，派瑞被ST了，该怎么理解啊

    没什么大问题，去年底的信批违规，其实就是为了来年利润好看故意不确认收入，显得“平滑”，现在靴子落地了，它也算是革故鼎新，老董事长刘强被迫辞职，可能的新董事长卢道真以前是陕西省科技厅的副处，后来又是陕创投董事长，更年轻更熟悉产学研资结合那一套。'
