    你发现自己亏的钱，都是鸡零狗碎的杂毛上亏的，这三千那一万，那么以后，管住手。

    如果你跟这个朋友做生意亏了，下回继续跟下一个朋友去做，那没辙了。

    熟悉给人带来"安全感"，这很虚幻，绝大多数人只会不断重复过去的日子，生活是364+1。

    第四条智慧，

    改错，是改错误的路径依赖。

    六五。或益之，十朋之龟，弗克违。元吉。

    象日：六五元吉，自上佑也。

    朋，是两串贝连在一起，是货币。龟，也是贝。

    有人送来了价值连城的宝物，你没法拒绝，大吉大利。

    在中国的命理学中，

    财，是钱财，美色，豪宅名车美酒

    印，是身体，学业，慈悲，智慧。

    财多了自然是破印的，钱多了就是对身体，学业等不利，

    硅谷大佬们，微软的比尔盖茨，meta的扎克伯格，OpenAi奥特曼，甲骨文的埃里森，都是大学退学没拿到正经学位证的，马斯克的博士就读了两天。

    你再看看中国那些有钱大佬们，几个身体好的？王均瑶，左晖，前两天的张雪峰，都是让人扼腕痛惜。

    那怎么办呢？要有舍啊，财布施，法布施，无畏布施。

    这些，会给你带来"官"和"印"，这些在八字里才是好东西，

    官，护财，印，生身，身强有靠，可不就担财了吗。

    马老师有十八罗汉，是真惠及了无数中心企业，华为有全员持股，不才有今天吗？

    爱出者爱返，福往者福来，你给别人创造了巨大价值，他们无以回报，只好用力给钱给你，给了就收着吧。

    第五条智慧，

    小胜靠勤，中胜靠智，大胜靠德，大胜靠公。

    你不需要刻意减损自己，就能自然地利益他人。你不需要讲什么东西，能得到天下人的拥戴。

    你一分钱都不要，天下的钱都是你的，你一点都不为自己考虑，天下人都为你考虑。

    这是损卦的最高境界啊，大道之行也，天下为公。

    我们日常做的那些蝇营狗苟，苦心孤诣，各种钻营，在圣人看来都是非常可笑的，本未倒置啊。

    你做好自己的产品，不用宣发搞什么百亿红包，外卖大战，客户自然会来，

    你精益自己的技能水平，不用溜须拍马，升值加薪就在眼前。

    你不要想着，求财，求爱，求未来，

    那个求不来的，

    你自己就当成是财富，是光明，是爱本身，

    你就是春天，春天自然而来。

    ps，有孚，元吉，无咎，可贞。

    你懂的。'
