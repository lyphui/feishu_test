  文档内容正文: '是不是顶

    昨天的技术走势，

    在某些老手和空头看来，叫做“高位放巨量杀跌”。

    那现在是顶吗？当然不是。

    现在是春季躁动，眼光长远一点。

    今天非常重要，

    -商业航天就要看谁能修复，纯看图形，聚焦在前面的选手了，不要再试图搞后排和补涨。

    对技术能力一般的同学来说，短期暂时不适合参与了，非常反人性。

    对于那些昨天游资封死跌停的，更不要试图去抄底和刀口舔血，

    有利润的趁反弹减仓为上，

    这个板块当然没完，8000亿的成交量，总得反复拉扯，要顶人家也会给你一个M顶。

    今天理论上会有修复。

    -昨天的唯一活口是AI应用和传媒，前天申购进软件、传媒ETF的资金，明今天要陆续进场买了。

    这里依然是看好AI广告营销，AI医疗，聚焦前排的品种。

    简单的就趁调整看传媒etf，26年是传媒大年。

    -我们要看今天有无资金要去易中天代表的海外算力去博年底的业绩，

    现在普遍在34甚至60日线，就看这里站稳一个箱体，目前此处的筹码结构是，生产队和机构慢慢吸，两融在卖出，但结构不能一蹴而就。

    这个板块长期逻辑有没问题，没有，海外的几个厂商都是新高，明年只会继续加单。

    -之前陪同航天温和上涨的是国产半导体，它目前比海外算力要强，昨天是趁势洗盘，今天就要看，谁能反包。

    -昨天并不受大盘影响的是有色，继续看铜，铝，锡等继续看好，这个板块不用追，反正也是温和上涨。

    最后谈下电网，昨天大涨是懂王要求自负电站费用，利好sst代表的固态变压器等，今早跟业内人士沟通，他们认为，可能不光是新能源，最后这批大火电应该也有需求。

    简单粗暴的就是电网设备etf，34日线时咱们也提醒它是回踩买点结构。

    eff也非常适用于“五日平台法”，可以跌破走人，待站稳再进，风控程度高的，看盘中跌破。

    斗转星移

    -商业航天二阶段如何，瀚讯又开始揉搓，打前锋的是海格。

    -26年战略性看好传媒，就靠标哥一点哥带动，既然丧标异动了，那么开盘胆大手快的还有易点哥，值得买。

    省广也是老朋友了。

    -AIDC,今天也是反包，龙头就是字节的主供润泽，就搞他，到今天快60%，后面还有东阳光，奥飞数据等，

    弹性大的是大位科技，市场上不懂，咱们懂啊。

    农尚就不讲了，搓揉两天，两个十字星。

    会玩同学昨天尾盘就可以博了。

    -要不是中午踩了刹车，588710是反包状态，继续看好，

    国产半导体周一咱们就谈了两个，还有点低的芯原股份，以及华为+航天概念的华丰股份，今天通通反包。

    谷歌链如早上所讲，这段时间是机构在吃散户的筹码，它们准备博弈也近年报了。

    这个趋势在不断加强。

    现在的态势是，

    散户，牛散，两融，量化，在商业航天，和各种AI应用，

    机构和生产队拿了两融和散户卖出的：

    -谷歌链，达链，电网，有色。

    -国产芯片和国产半导体。

    -机构进了AI应用里的传媒和AIDC,

    -机构也进了商业航天几个主要品种。

    炒新不炒旧，现在光模块新上来的是联特汇绿，

    光迅等以前二线的公司，

    基本一水的武汉企业啊。

