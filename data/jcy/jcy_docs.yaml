- record_id: recvi2TjP7p8eq
  文档标题: Vol.260428 今日海外算力及市场观点
  文档链接: https://my.feishu.cn/wiki/IETSweIpkiHTybkBhvfcDvbcnen
  文档内容正文: '大盘在4060-4110区间震荡，市场冰点有资金拉升可低吸，高位遇抛压可做T。市场主线依旧是海外算力和国产算力，5月整体将从高位向低位切换。

    国产半导体芯片昨日有所放量，今日或出现分化或调整，但行业预期并未走完，今日国产方向大概率轮动至AIDC。

    利通电子一季报业绩大涨6倍；协创数据一季报营业收入60.8亿元，同比增长192.90%，归属于上市公司股东的净利润7.5亿元，同比增长343.45%。协创数据财报亮点为存货大幅增长至6亿多，后续均需交付，年初公告的阿里百亿级业务尚未兑现。

    业内消息显示，此前主营风能的恒润股份已拿到英伟达芯片，若今日低开绿盘，具备性价比，可小仓位博弈明日季报。

    国产算力另一核心方向为昇腾，核心标的华丰科技2025年营收25.28亿元，同比增长131.5%，归母净利润3.59亿元，较上年亏损1775万元实现爆发式反转，一季报净利润10511.26万元，同比增长230.43%。

    国产产业链并非无盈利机会，核心标的具备盈利空间，操作上以低吸为主。

    海外算力预期今日基本完成修复，英伟达创新高，存储板块大涨，叠加昨日相关标的利润同比增长11倍，剑桥科技走势强劲，光模块设备厂商凯格精机利润大增，光通信板块新一轮行情随时启动。

    资金将在光芯片（CW和EML）、光衬底（1.6T和3.2T以上）、光材料（上游FAU、V槽等）、光模块（含PCB）、光互联（osc）、光设备（CPO/扩产设备）等环节轮动，核心标的数量有限，资金在板块内反复运作，挖掘后排补涨、拉升龙头交替进行，需关注板块态势与ETF反馈。

    近期操作需注意，持仓或短线参与的标的，需为缩量上涨状态，缩量代表散户未追入，一旦放量需警惕风险。昨日海外算力板块多为缩量微涨，抛压减轻、筹码惜售，分歧逐步转为一致，板块有望齐头并进、百花齐放。'
