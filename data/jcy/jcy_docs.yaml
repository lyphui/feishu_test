  文档内容正文: '大家都知道奶茶妹吧，当时我得知她名字时对她老爸章总肃然起敬，

    章泽天的名字“泽天”，来自易经第43卦“泽天夬”(guài)。

    上一卦“益”，是修复，增加，反弹，增益，弹到一定限度，就叫“夬”。

    夬：扬于王庭，孚号，有厉，告自邑，不利即戎，利有攸往。

    象曰：泽上于天，夬；君子以施禄及下，居德则忌。

    在王庭上真诚的公开宣告危险和风险，告诉大家短期不宜大动干戈和长期的依然有利，让大家做好判断。

    夬卦，上面是泽，为水，下面是天，为乾，太阳，水蒸气漫到天上，云雨欲滴，势必往下，君子明白天道是润下的，要跟底层民众和低位股分享利益，长期独享富贵和抱团是要遭忌恨的。

    （泽天，是云蒸霞蔚的水，即癸水，泽天也是癸水女，戊癸合，癸水喜欢嫁给戊土，指比她年长的男人）。

    初九：壮于前趾，往不胜为吝。

    象曰：不胜而往，咎也。

    脚趾强劲的动起来了，如若还没有进步，这个叫“吝”，明知赢不了还要去，这就是错误，叫“咎”。

    增长的多了，赚的多了，就以为自己无所不能，要强行上马下一个项目或者股票。

    其实成功大多时是天时地利人和多种因素的聚合，反弹更是资金面政策面等利好的合力，人力的作用是有限的，要清醒。

    九二：惕号，莫夜有戎，勿恤。

    象曰：有戎无恤，得中道也。

    枕戈待旦，时刻保持警惕，就算有人半夜来偷袭，你也不怕，因为你布置了防守的力量，有人巡夜负责安全，让自己立于不败之地。

    很多人做企业和搞投资，都喜欢一把梭哈，只攻不守，很少想过自己攻不下来或者人家反扑了你怎么办，没有预留安全和保障措施。

    两件事情不能省，一个是情报工作，大盘，外围，龙头，板块的信号，一个是对冲措施，没涨停了跌停咋办？

    中国的地产商几乎都死在这条上，几乎没有政策研究部门，请了人也是拍马屁的，反复的信号提醒它们不搭理，还加了杠杆往死冲，谁都没有兜底机制，要死就一溃千里。

    在股市中，高位放出巨量，高位开始滞涨，标志性龙头股发生分歧了，都是非常明显的信号，中庸的对冲之道是先减仓观望。

    九三：壮于頄（qiú），有凶。君子夬夬独行，遇雨若濡，有愠无咎

    象曰：君子夬夬，终无咎也。

    把急躁都写在脸上，这样凶险，君子哪怕被雨淋湿，哪怕独行赶路，哪怕被人指责怨憎，也一定要敢于决断，这样最终会没有大问题。

    夬，是水高过堤坝，到底是漫出来还是溃坝，是不是“决”？

    你得拍板啊，你及时得判断决定啊，

    不能眼睁睁看着信号来了，乖离高了，涨不动了，跌破重要均线了，无动于衷，手足无措。

    日本的海军史上有个著名的“命运的五分钟”，讲他们的历史遗憾。

    二战时，南云忠一带着航母集群进攻中途岛，到底是先炸航母还是先炸岛屿他拿捏不定，让一会挂鱼雷，一会换炸弹，易燃易爆物品全堆在甲板上，再有5分钟就能收拾好，

    然而此时，美军的鱼雷机和俯冲轰炸机接踵而至，把日本四艘现代化航母全部击沉，打断了他们的脊梁骨。

    南云这种人没主见又胆小，多谋少断，典型的日本人特征。

    孙子兵法说，用兵之害，犹豫最大；三军之灾，莫过狐疑。

    反弹过后，其实你要走要留都不会错，犹豫纠结才是错。

    走就坚决走，留就胆大留，怕的是黏黏糊糊，半走不留，一会要走，一会要留。

    九四：臀无肤，其行次且。牵羊悔亡，闻言不信。

    象曰：其行次且，位不当也。闻言不信，聪不明也。

    “次且”，是踉跄。

    屁股磨的皮肤都掉了，走路踉踉跄跄的，牵的羊丢了好一些，听到了还不信。

    已经起起伏伏涨不动了，反弹后的增益开始有损失了，还是听不进话，这种人真是不聪明啊。

    “聪明”这个词就来自于这里。

    人性的弱点是，踏空比赚钱的心理爽感差一倍，很多人总是心怀侥幸，以为明天不一样，这时候已经不是信号出现，而是事情有端倪了还不懂，笨哪。

    现实中见过太多案例，明明身体有个地方间歇性不舒服，不去检查，也不去医院，逃避现实，小病拖成大病。

    九五：苋陆夬夬，中行无咎。

    象曰：中行无咎，中未光也。

    苋陆就是马齿苋，柔脆易折。

    像苋草一样经不起打击，处境岌岌可危，只有秉持中道而行才能避免灾祸。

    一直到最后阶段来临之前，都是有挽救的机会的，想做事，想挽回，想止盈或者止损，永远都有机会，永远都不晚。

    中行，就是你的操作系统和纪律，什么时候捡起来都行，想奋斗永远不晚，想进步永远都是好时机。

    问题是，有些人就破罐子破摔，思想滑坡了，自己放弃了，或者非得一条道走到黑。

    上六：无号，终有凶。

    象曰：无号之凶，终不可长也。

    连哭号的机会都没有了，最终必有凶险，因为大势已去，再怎么折腾都没用了，人力无法回天，许皮带你说呢？

    整个夬卦，最上面一爻是阴，下面五爻全是阳，五阳战一阴，是驱逐小人和逼空的态势，

    然而，五个男人团结吗？一定赢吗？慈溪一个人压五阳，结果如何？

    况且真战胜了一阴，那就是五阳变六阳，那就是乾卦的纯阳，太过一致，所以要及时见好就收啊。

    先贤用夬卦的大模型告诉我们，反弹和增长不是一帆风顺的，普反过后，就会出现分化，

    有些品种会继续走出逼空的态势，很强，你就观察风向，到其涨不动后边打边撤，有些已逐步展露颓势，渐弱，你就不要心怀侥幸，边撤边打。

    但无论哪种，是走是留你要想清楚有决断，没太多时间给你犹豫了。

    ps，再说纯玄学角度，

    从3月份大跌到3700时一片恐慌的

    “有孚，贞吉”，

    到现在反弹到4000点的“孚号，有厉”，

    带（）的朋友已带我们走过快一个月的时间和利润，下个阶段，它开始提示风险了，希望它的剩余仓位和信号指示，依然能发挥一下余热，不知是否会突破366挑战下388，不乐观就要与它短暂的告别了。

    感谢陪伴，爱过。'
