  文档内容正文: '昨天刚讲完，昨夜的美股对应爆发。AEHR涨20%，核心是测试、老化检测设备、硅光晶圆测试设备。竞争对手联讯仪器，对标萝卜、博杰，包括燕麦等，有测试都能搭上边。

    Fabrinet涨12.65%，电子制造服务EMS和光模块，天孚是它的核心合作伙伴。

    Tower涨8.78%，定制化半导体设备，从萝卜买设备。

    Lumentum涨13.72%，都很熟悉了，光龙头。光芯片/CPO/OCS等全有，最直接的还是EML光芯片，另外最近在谈包下光库的泰国厂扩产能，周五讲过了。

    Coherent涨17.63%，光模块和光学设备，易中天直接竞争对手。

    康宁涨13.4%，光纤么，核心就那么几个。

    MRVL，马沃尔有黄仁宇亲自带货，涨32%，中国没有DSP芯片，资金硬去对应优迅股份和裕太微，其实Marvell的下一个发力方向是CPO，CPO就绕不开萝卜。

    相信光要看在哪相信，去年在元器件里相信，今年要在设备的朱格拉周期里信。

    对应主要的ETF 515880，次要的588850。

    今天要看大盘能不能实现4112的站稳和突破，突破则有日线一级的反弹，如果开盘就4090都上不去又回落，那就有点没出息了，你跟好基金重仓指数即可。'
