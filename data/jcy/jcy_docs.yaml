  文档标题: Vol.260526 韬定律的三大核心利好及扩散
  文档链接: https://my.feishu.cn/wiki/E53BwWUOCiF1OJkQVIgctnv9nvT
  文档内容正文: '韬定律的本质是什么？把一堆平层公路堆成高架桥，再缩短每一个芯片和元器件的反应时间。

    那么第一个你要有造高架桥的能力，把一堆国道省道快速路堆一块，这个叫做“键合”，或者“混合键合”。

    国内搞键合的核心，是拓荆（这个叫Hybrid Bonding设备）。快克智能准备很久了，键合加封装一起干了，它本身也能做pcb设备和光模块AOI检测，快克也是lumument供应商。迈为也在切入键合，量不大。

    第二个你要有检测的能力，核心验证点在于时序和信号完整性，测试环节显著增多。

    它需要更专门的半导体自动化测试设备（ATE）来验证内部数字逻辑的极高速度（毫秒皮秒级时序）。

    国内的精智达，成功自研用于高速测试接口的ASIC芯片，实现了最高可输出9Gbps信号，可产生ps级误差的高精度时序。ps，就是皮秒级。

    另一个是伟测科技，专门为昇腾寒王的测试扩大产线（交流中讲购买了不少长川的设备）。

    第三个就是你要和外部连接，先进封装。

    芯片在内部采用混合键合进行3D堆叠；在对外高速I/O部分，要把激光器，调制器等集成，就需要采用光电封装/共封装光学（CPO）技术。

    这个领域是萝卜家族的天下，罗博特科自己是全球第一，纳米级精度的“耦合”与“堆叠”，另外两个，一个是国产罗博智立方，一个是罗博燕麦科技。

    罗博做好耦合后，由盛和晶微封装成成品，盛和基本是国内唯一能做2.5/3D堆叠的。另外TSV级封装（垂直打出硅通孔连接），也变得非常重要，代表是晶方科技。

    还有什么扩散呢？整个产线越来越复杂，对探针卡，探针台需求也放量，

    华为的供应商是强一股份，刚上市不久，订单多的做不过来。

    这种芯片是极热的，华为的液冷是申菱，目前不在主流炒作板块里头，如果给较大性价比再看。

    内部人士和采购总监们对需求的看法可能和市场是不一样的，这个大家要注意。

    今天的市场，冲击4200的可能性是有的，但要密切注意如果到了4190以后（甚至是4170）能否站稳的问题，如果不行又会回去，变成一个小型W底，这里就要及时盯好基金重仓指数，跟它做动作，现在基本是机构完全控场。

