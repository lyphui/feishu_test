    比如男方的半导体设备，588710历史新高了吧，

    女方的海外算力呢？今天旭创的下跌不就是同步创业板的下跌？而ETF是-2%几乎拉红。

    它们主要是受到lumument，高意等的影响进行短期的调整而已，中线没有问题。

    若你是操作流看短线，

    那么跌破5日平台可以走，5日线下穿10日线也可以走，之前的模型谈过多次都可以去套。没有走会怎样？

