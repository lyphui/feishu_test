- record_id: recvjYRwsZueoo
  文档标题: Vol.260516 易经第47困卦：困在高位待破局
  文档链接: https://my.feishu.cn/wiki/IPc6wtgsEiAHBbkxTxTcIT8ZnUg
  文档内容正文: '有时候你不得不感叹，很多事是老天爷赏饭，冥冥中自有天意。

    4月25日，解读的是萃取精华的【萃】，告诉大家要拿龙头，抱团升级，5月1日，告诉大家是【升】，迎接主升浪的到来。

    升到极致呢？盈不可久，物极必反啊。

    易经这门超级科学，告诉你的万事万物的大模型，股市毛毛雨了。

    困。亨，贞，大人吉，无咎。有言不信。

    象曰：泽无水，困。君子以致命遂志。

    困卦，对那些坚守正道的君子和大人有利，终究没什么问题，不要轻信流言蜚语。

    困难困顿，为什么还亨通呢？因为登高之后必有低谷，顺遂过后必有阻滞。

    升是向上行，困是向下修；先经历登高致远，再历练低谷守心，最终圆融通达，难道不好吗？

    君子能看明白，把困难和下跌当成机会与修行，当然长期有利，小人只要涨不要跌，当然成不了大事了。

    困的意象，上卦为兑，兑为泽；下卦为坎，坎为水，水渗泽底，沼泽漏了没水了。君子观此意境，以处境艰难自励，穷且益坚，克服过去，最终以行其夙愿。

    风口来的时候，环境大好，流动性过剩，什么都涨，风口一走，流动性没了，成交量萎缩，看出裸泳。

    面对困境，应该怎么办呢？

    初六。臀困于株木，入于幽谷，三岁不见。

    象曰：入于幽谷，幽不明也。

    前行的时候，屁股被卡在树木中间，山高谷深，三年不见其人，这个黑暗的环境中位置尴尬，动弹不得，不知道方向在哪。

    好端端怎么就进了幽谷呢？顺的时候，行情太好的时候，各种加杠杆乱挥霍，“投降式追高”，冲的太猛啊。

    就像当年的恒太，各种买买买，合合合，圈圈圈，已经刹不住车了。

    你让他去杠杆，哪有那么容易哦，中国的地方化债，哪个不是脱了层皮，三年都恢复不过来？

    很多人又何尝不是如此，年轻身体好的时候，天天啤酒小龙虾熬夜，过了40岁，病就来找你了。

    九二。困于酒食，朱绂 (fú)方来，利用享祀。征凶，无咎。

    象曰：困于酒食，中有庆也。

    因酒食过量而受苦，富贵刚来，有利于祭祀先祖，出去征伐是凶险的，但却没有灾难。

    这是一种在在取得成绩后停滞不前的苦恼，持仓盈利但不知何时卖出，走了吧，不甘心，觉得没赚够，继续下去吧，自己也感觉有风险。

    经过了升卦的飞黄腾达，总是会碰到天花板和阻力区的，虽然它内含机遇（中有庆），但却需要“利用享祀”，静心反思，厘清逻辑，而非盲目行动，乱动，则“征凶”。

    初六是身体的困，九二是心态的困，静不下来，浮躁，焦虑，冲动，看到什么都想去杠上一下子，利润就这么浪费了。

    六三。困于石，据于蒺藜 (jí lí)。入于其宫，不见其妻，凶。

    象曰：据于疾藜，乘刚也；入于其宫，不见其妻，不祥也。

    被石头绊倒，被蒺藜刺伤，历难归家，妻子又不见了，这是凶险之兆。

    不听劝，非要顶着趋势逆流而上跟人家赢碰硬，这就是“乘刚”，此时已无侥幸，必须深刻反省，准备承受最坏后果。

    小目标王同志对此感受太深了，人家一再告诫，不要乱出去搞并购，不要海外各种铺摊子，

    结果他说啥呢?“自己挣的钱，想咋花就咋花”。各种出去买美国的传奇影业，西班牙地产，外汇流失，带坏风气，后来单子都抢到央企头上。

    结果各大银行集中清查它的杠杆借贷，那是你的钱吗?

    九四。来徐徐，困于金车，吝，有终。

    象曰：来徐徐，志在下也。虽不当位，有与也。

    缓缓而来，被华贵的车驾所困，虽有憾惜，但终究有个结果。

    如果你扎根深厚，即使身处困境，也能最终脱困。

    大跌的时候会有反抽，你最难时候来救你的人都有代价，这就是“金车”，割肉和止损也是一种困，但断尾是能求生的。

    当年的孙宏斌入股绿城，表面给了钱，但接走了他所有的项目和垂涎已久的绿城设计院，

    金融危机时巴菲特救助高盛，也是列了一堆优先股和赎回的条件，身处困境你就得做好这个准备，别关键时刻了还瞻前顾后。

    若你不要金车来救呢？如果扎根很深，心怀基层，植根于广大的客户和人民，你最终会“有与”，能走出来。

    我D和炮党就是最典型的代表，炮党总想借力，靠英靠美，希望人家给支持和调停，结果签了一大堆各种通商航海条约，困于金车。

