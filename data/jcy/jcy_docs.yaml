  文档内容正文: '待权重反弹

    2026是AI上游器件，通胀产品和AI应用的大年。

    -AI上游元器件要看硅光，2026是硅光元年，硅光的核心是罗博，海外已得到tower验证，旭创泰国工厂是否用它的设备，不懂的还不敢说，而我们得确切消息，这个采购是确定，搞投资你得懂产业。

    其余光器件呢？12月8日的文章有。

    H200入华和AIDC扩大招标，利好的除了数据中心，更有电源液冷等器件，比如麦米，英皇等，麦米受到减持影响可以看欧陆通。

    2026也是液冷元年

    -通胀品种除了有色，是CPU/GPU/MCU等芯片。

    CPU会先涨英特尔链的澜起，卓易等，后面才过渡到国产，和算力的涨法一样，尤其是澜起还有存储概念。

    MCU的两家不适合普通人，要长期的战略投资者才行，目前它们基本是主力的成本价。

    之前谈过的IGBT是功率半导体，目前领头的是扬杰科技，弹性大的银河微电，这个板块认可的人还不多，真要入建观察仓等充分调整下更好。

    芯片etf不追求了，有接盘设备的意思。

    -上周末谈到，本周可能是权重尤其是女方海外算力的反攻，里面也有通胀概念的是光纤，这个是按公里数报价的，受益的是长飞等。

    简单粗暴的，通信etf。

    -元宝的红包季来袭，继续看好AI应用，腾讯系的天地在线你估计赶不上了，它要发红包需要用到算力和云，这里的供应商包括利通电子。

    第二阶段行情开始序幕

    在整个亚太股市大跌与贵金属的双重夹击下，大A今天没挺住，

    你要知道最近大盘的调整是怎么来的？

    是每一个热门板块加速后，猛然下跌带来的。

    商业航天猛加速，调整，

    国产半导体猛加速，调整，

    有色金属猛加速，调整。

    加完速后筹码下跌青黄不接，跌了正常。

    重温一下四强，

    电网设备（意大利）

    国产半导体芯片（德国）

    海外算力（法国）

    AI应用（阿根廷）

    当时说电网设备是意大利，有人怀疑它是不是四强，觉得有色可能才是。

    今天看出来了吧？

    泛科技板块里就电网设备etf是红的，

    它是常态板块第一个加速的，代表是特变西电涨停，加速后站不稳5日平台，然后跌下来回踩34日线，然后再逐步拉升。

    -AI应用今天是分化走势，主要受丧标减持影响，但实际上就减持4亿，它一天成交100多亿，这点减持谈不上大利空，降温是好事，整体上阿根廷（对应AI应用）今天表现算强的。

    AI广告暂时歇歇，AI营销的值得买、壹网壹创都还不错。营销有接力广告的迹象，要观察。

    继续看好战略性机会传媒，新同学和能力一般的，可以逢大跌建仓，后面不管是定投还是网格做T都游刃有余。

    -国产半导体和芯片则受韩国影响（世界经济的金丝雀），它的芯片存储一跌，人们不由得怀疑逻辑了，都认为弄个鹰派（美联储主席）上来，美联储不降息了，利空科技。

    其实再鹰派的主席也得听懂王的，这块不要自己吓自己。

    -海外算力也是高开后有些人要卖（落袋为安），会操作的看到xys高开扛不住的就应该卖了再接。

    当强不强则为弱嘛。

    当然它只是一两天的弱而已，长线继续看好硅光。

    涨价预期的长飞不继续往涨停走了。

    这段时间只要你拿的是四强与核心，坐等轮动就行，不会玩龙头的就搞etf，都不知道（标的）是谁，那就是看文章不认真。

    其实开盘跌破4100就应该跑路减仓，你没减就扛着吧。

    既然21日线、34日线均已经跌破了，就看55日线的3985吧，

    届时谁站出来力挽狂澜，谁就可能是最后赢家。

    个人认为AI应用的可能性不小。

    涨出风险，跌出机会，出清一下也好，春季行情的第二阶段开始了。

