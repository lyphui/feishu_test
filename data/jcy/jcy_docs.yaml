    阳光电源代表的储能，同上。

    国产CPU，同上，龙芯中科，杰华特，中国长城为代表，明显资金流入，评论区讲过吧。

    商业航天，同上。

    -电力，有从变压器过渡到算电协同的趋势，周末谈了三个，南网，国网信通，远光，如果南网顶住，后面补涨和估值低的就是信通。

    综合上，都是我们讲过的，产业逻辑如果没有问题，价格起来就是时间问题。

