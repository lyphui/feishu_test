  文档内容正文: '主线去往何方

    最近的市场是没有主线的，一片混沌中各种胡乱轮动。

    今天再砸，就差不多了，情绪和量能都到了冰点，市场要定出年前的方向，到底是科技还是消费。

    科技会以算力、应用等为主，总之脱离不了AI，估计也少不了商业航天，消费就是酒、家居建材、旅游那些。

    考虑到年前没有几个交易日了，今天定好的方向就要给下周温和涨涨把年前的红包发出来。

    如果要玩的炫一点，上午继续砸或者磨叽着，到了下午2点半前后再忽然启动。

    这个时间最晚到周一。

    然后就会发现，被调虎离山的板块一个长上影线，真正的目标被买了起来，四渡赤水成功。

    我们到现在，依然看好四强板块。

    今天能力挽狂澜或者中流砥柱的，就看半导体设备，毕竟没有太多瑕疵和海外拖累，也基本调到34日线，弹性大的是其中干低端芯片的，比如之前讲的IGBT、MCU等。

    老美的德州仪器这几天咸鱼翻身在科技里是最稳的，干IGBT/MCU的英飞凌也准备涨价了。

    还要再磨一磨

    今天比较完美的走法，是消费高开，让散户去追，科技低开，再砸，下午砸消费拉科技，放出量能，四渡赤水成功。

    结果呢，消费也是低开，科技砸的散户军阀们都躺平了，也不愿意换仓追，

    筹码的交换仍然不够充分，所以大家有气无力。

    消费和科技，这两个板块上午拉起来的，说明有诚意，

    目前是家长反对，只能先作罢再观望。

    下周继续磨，年前就是这样的双轮驱动了。

    直到不管上涨还是下跌，有量能出来。

    四渡赤水，教员磨了军阀们三个月呢，咱们也不差这几天。

    2026年什么已经到了底部，什么会涨价，大王约了一堆企业家明后天会聊聊，周一前会跟大家做个基本分享。

    除了光纤化工之外，目前已知，造纸涨价了。

    什么都不如家人的陪伴重要，大家周末快乐！'
