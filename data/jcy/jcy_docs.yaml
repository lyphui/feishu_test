    这个位置，半导体设备新手和普通人不能追的，这是加速期老铁，只适合高手看图，去搞那些结构完好，缩量上涨还要涨的，一旦情况不对立马跑路。

    国产板块还有个次高位AIDC数据中心和云，算力网究竟怎么建设，大家还在博弈。

    第三，高低切往哪切？

