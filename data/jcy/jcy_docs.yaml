    康宁，安费诺，+5%+3%，光纤连接器，

    lite+3.2%，

    光模块是否比光通信更强今天尚不知，

    光模块的指数修复能力更强。

    另外，美光，闪迪等都是跌的，

    再次强调，存储要当心，用最高级风控，图一坏就走，很怕它们补跌。

    每一轮超跌之后，都会有个新龙站出来，这会看是谁。

    缩量3500亿

    量在价先，这轮量能的低点预估在1.9万亿左 右，今天下午眼看就差不多了，抄底资金进入。

    主线依然是光通信和它带的硬件，

    早上已经说的几个，

    -康宁安费诺对应连接器和光纤，那就是长飞亨 通它们，

