  文档内容正文: 'AI医疗之我见

    AI应用里三大块，

    -AI广告传媒，份额最大，变现最直接，谷歌都是做这个的，也是之前建议的主攻方向，但昨天连发金牌，咱们的龙2易点直接停牌了。

    可能要盘整一番，但人民新华等如果继续强势，那就代表着后排都顶着不肯下来。

    -AlI办公，玩到最后还是有数据的企业，比如金山，用友等，或者工业互联网，海天瑞声，鼎捷等。

    不想那么费劲，软件龙头etf,或者561010.

    -AI医疗，目前阿福概念太高了，说白了阿里就是在里头收过路费，

    这也是大王一直讲阿里才是AI应用真巨头长期看好的核心原因，相对谷歌它严重低估啊。

    说回国内，

    AI医疗容量最大，业务最多的主流玩家基本都是做HIS的，普遍都亏的一塌糊涂，说白了就是苦逼的乙方软件公司。

    老板唯一的想法是，能不能把公司卖了。

    很多公司的系统和业务，都是委托给大王投的一个医疗IT企业做的。

    AI医疗板块最有价值前途的就是，

    AI电子病历。

    至于什么AI诊断之类的，医生哪敢用啊，张文宏都不敢支持。

    上市公司里谁在电子病历里比较扎实？

    嘉和美康，

    是真开发了自己的的AI病历系统，它弹性更大点。

    和仁科技，里面少有能盈利的公司，看线目前还是在揉搓，什么时候拉不知道。

    还有呢?AI精准医疗，AI药物发现。

    -港股是晶泰控股，调整一番后也快新高了，当红小生是刚上市的英矽智能。

    -美股我们关注的是TempusAi.

    说到AI医疗必然谈到药，目前带点防守性质的，低位，稳妥，拉起来不遭恨的就是创新药，

    尤其是带有AI药物发现之类的，比如成都先导，泓博医药之类的，嫌它们太高就等调整下来再说，

    后面有个皓元医药，主要是AI化合物合成，筹码结构和位置也还可以。

    589720底部放量上来后调整3天了，今天可以观察资金是否进入。

    最后谈下H200入华的事，

    最新的外媒报道，不让进，除非“确有必要”才让买，我们这边的报道，话里话外是说美国放行。

    我们在业内了解的情况是，原则上不建议买（当然也可能随时变啊）。

    那么显然，真不让买，利好国产芯片，

    直接的受益的寒王，海光，东芯。

    简单粗暴的ETF,588200,这是纯芯片。

    588710也会波及，你总得有产能。

    因为之前AIDC的大涨，

    是因为H200入华预期，这个预期没了，

    市场究竟认为不受影响，还是逻辑不洽，不好说。

    操作流看今天情况可以切一部分去国产芯片，剩下的看市场反馈，一有风吹草动止盈或者切换，毕竟涨了相当部分了。

    在不知道谁赢的时候，两边下注可是世家大族的肌肉记忆。

    今早你看风向就行了。

    目前，商业航天不断缩圈，越来越难，AI应用方兴未艾，谁接住航天流出的资金，谁就是下一个新的方向。

    整体的大盘并无大的风险，今天如果大低开，不要上头急着换仓或者买入，可以多观察或者分批次，生产队一贯的手法是，

    低开不是底，二次探底才是底。

    这几天，每次大盘如果跌的狠了，机构会把什么板块拉起来呢？

    国产半导体设备。那么今天你懂的。

    在一周内，

    AI三巨头仿佛达成默契，全面押注医疗/健康领域：

    这才2026年第14天。

    圈里也有不少非常熟悉医疗行业的同学，欢迎大家踊跃发言，万一挖出个5678910倍股的池子出来呢？

    战场态势和明天的修复

    “低开不是底，二次探底才是底”。

    早上低开后，拉升那会估计又把一些人骗进去抄底了，下午是不是给你来了次凶猛的二次探底？

    明天再跌下，有些人就得割肉了，

    然后跌完拉升。

    挨个说下板块。

    -商业航天当然没有完，但难度非常高了，反复叮嘱，高位看图形，破5日线跑，跌破5日平台跑，早上集合竞价一看高标跌停你的又破位，那还用说么？

    比如说瀚讯，5日平台和5日线的价格都是52.88，开盘就快要跌破，那先跑为敬，

    其他AI应用也是，既然你是被针对的还有二杀，

    那大不了开盘跑完收盘再接回来嘛。

    有人说我心怀侥幸，没跑成，咋办？凉拌，等着修复呗。

    除非你拿的是上了天啥都没有的10倍股。

    -AI应用是分化走势，抵抗的力量还很强，预计是贯穿今年的主题，什么AI传媒，AI游戏，AI电商，AI手机，一直玩到AI农业，最后毕业。

    -国产半导体，本轮春季躁动中流砥柱，以前每次大盘不行，都会把它拉起来保慢牛，今天早上

    再次强调，

    国产半导体设备老生常谈的中科飞测，京仪装备等大家都很熟悉，

    昨天评论区又加进的长川科技，还给光模块企业做检测设备。

    当然外头都是不知道的，行业内幕。

    一提国产半导体，你还不知道588710，那就文章看得太不仔细了，今天新高了吧，反包了吧。

    真把这看懂又手快的，就是晚上开盘扔掉AI应用和航天，杀进去半导体设备。

    大不了明天看情绪再接回来。

    -AIDC，没有问题，趁势洗盘，农尚竟然成了全板块唯一红的。

    这一轮，散户的成本区基本都在4080左右和上方，在这里洗一下甚至把这个位置跌破，

    就把意志不坚定的筹码弄走了，然后继续拉升。

    目前战场态势图，昨天讲过了。

    商业航天不是不能买，别买些乱七八糟的在天上的。

    今天那些普遍快20cm跌停吧？

    现在是很多散户游资为了追航天，在光和电，尤其是达链谷歌链，北美电网等甩卖的筹码被机构全吃了，

    进了一堆不知所云的航天，替上面筹集了卫星的费用，还帮暖了场子。

    新因为易中天太猛指数受不了，是所以先涨的都是二线的和上游的，比如校草，联特，萝卜等等。

    然鹅，等明后天你再追进去光模块pcb，人家又涨题材了，哈哈哈。

    所以我昨天文章的题目是《斗转星移》。

    本轮春季躁动的大概率模式是，

    机构搭台，题材唱戏，都能涨的，前提是别太过。

    好了，今天该看的是，如果明天AI应用继续杀一下，AI医疗，AI办公之类，该在谁那边打个底仓了。

    新手菜鸟，右上角搜索“新手菜鸟”，里面有个组合是比较稳妥的，今年恒科指数看好到8000-9000点（前提是懂王访华别miss）.

