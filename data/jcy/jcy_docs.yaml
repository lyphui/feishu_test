  文档标题: Vol.260618 产业预期差系列7-华为哈勃严选；这就被它们发现了
  文档链接: https://my.feishu.cn/wiki/OaZAwNH14ini5pk18cbcedyvnTg
  文档内容正文: '产业预期差系列7-华为哈勃严选

    哈勃是美帝太空射电望远镜的名字，能看到134亿光年之外的天体，即看到宇宙大爆炸后仅数亿年的早期星系。

    华为可是资深美粉，为了看得远和不被卡脖子，2019年成立华为哈勃，其实华为的战略产业资本部。

    目前它们在大A的主要投资公司有，

    -裕太微，以太网物理层PHY/交换/网卡这一类，问界车载网络的核心供应商，目前和华为在突破DSP芯片，哈勃占比6.97%。

    -天岳先进，哈勃从6.34%减持到了5%，做碳化硅SiC衬底，第三代半导体材料龙头，华为基站+新能源车的底层材料供应。

    -强一股份，探针卡，尤其高端MEMS探针卡及相关测试载板/维护，一种核心耗材，哈勃占比4.8%。

    -杰华特，模拟芯片MCU，以及CPU上使用的电源管理芯片，并带一部分功率/信号链相关，哈勃占比3.81%。

    -云南锗业，磷化铟砷化镓衬底，哈勃在其子公司鑫耀半导体持股约6.23%。

    -灿勤科技，微波/介质陶瓷元器件，用于谐振器/天线等无源射频件，主要在基站无线通信侧，哈勃占比3.44%。

    其他的呢？

    长公主，2.35%，卖了相当部分。

    思瑞浦，持股多年赚够了小于2%。

    东芯股份，基本只剩1%。

    注意啊，不构成建议哈，不是说哈勃投了就一定好，不是说减持了人家就不好，有些是跟它做业务协同的，而且菊厂出了名的不怎么让乙方赚钱，但你可以通过这些看出华为的赛道布局，在国产板块和相应条线起来的时候，或者在图形调整到位的时候，多个关注。

    这就被它们发现了

    咱们说了很久很久的真存储，终于有资金和机构发掘到了，远见智存是国内唯一能搞HBM的，全球也只有海力士美光和三星能做，国内的长鑫长存之类的都干不了，那票代理商更是开玩笑。

    它的HBM能卖给谁呢？谷歌，谁帮打招呼，某创。

    中天除了在远见智存有7.1%的股份，还有科睿斯27%的股份，

    科睿斯主在搞FCBGA，也就是倒装芯片球栅格阵列封装基板，该技术路线使用ABF膜作为介电层材料，业内又称ABF载板（知识星球鉴茶财经院）。

    ABF只有日本味之素能干，国内豪赌的是兴森科技，PCB板子上要覆一层ABF才能安装芯片，真、卡脖子。

    有这两个东西在手里，都能某种意义上说，这公司目前的市值就是白送你的。

    中天是东阳国资委的企业，东阳国资以擅长玩长线和卡位著称，不做亏本生意。

    我们谈它不是说让你追高，事实上它的波动非常大，不适合90%以上的投资者，咱们说的好公司多了，

    而是讲，产业投资者和小散的投资思路是完全不一样的，多数时候你只能兼得一个，产业逻辑在的时候，不要一调整就一惊一乍，吃不到四道菜的。

    受不了波动你投啥科技呢，科技必然带波动，就像寒王跌成狗的时候，我们依然敢说，它必然要超茅台的，先是股价超越，再是市值超越，第一步已经完成很多天了。

    业内大名鼎鼎的某腾，内核是寒王的架构，双方和解了要付钱的，没人给你说过吧，这才 是产业内幕。

    大王怎么能挖掘这么深呢，你得去了中科院，能跟人家聊震旦纪奥陶纪寒武纪，去了浙 江，能全文背出《送东阳马生序》，话匣子一打开，他们不就愿意谈点真东西了吗。

    读书是有用的亲们。'
- record_id: recvmLdgabpiAm
  文档标题: Vol.260617 大聪明
  文档链接: https://my.feishu.cn/wiki/EbpgwMpagiSb8TksIJ8cJpx5nce
  文档内容正文: "今天晚上美联储议息会议，无论加息、降息还是按兵不动，都会带来巨大影响。\n \n所以有部分资金昨天下午就提前预判行情、兑现离场，尤其是PCB上游板块率先跳水，毕竟前期涨幅已经过高。\n\
    \ \n今天预计还有不少打算提前止盈、节后再操作的资金进场卖出，市场出现震荡在所难免。\n \n那我们该如何操作？重点观察昨日低点4077的支撑力度，留意该点位附近前期热门的MPO、半导体材料板块的表现，同时关注基金重仓指数的动向，顺势操作即可，相关观察方法此前已经讲解多次。\n\
    \ \n8日线4024这个位置不能跌破，一旦失守，分钟级别行情将会走弱，届时需要减仓应对市场波动。\n \n昨日东山精密发布公告，拟投入12亿美元在常州扩建新基地，项目整体投入折合人民币约百亿元，主要用于生产光模块、CW以及EML光芯片。\n\
    \ \n业内戏称其“拳打胜宏，脚踢旭创”，这个说法源自公司内部人员的调侃，仔细分析并非没有依据，目前其首个目标——超越胜宏科技，已经实现。\n \n此前提到，相关预测认为该公司今年利润有望达到100亿元左右，大家可以自行测算对应市盈率。公司后续仍有发展潜力，目前已经拿下北美三大云厂商的订单，除Meta之外，其余合作方暂时不便透露。\n\
    \ \n备注：以上内容均为产业研究，不构成投资建议，切勿盲目追高。"
