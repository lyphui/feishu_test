[backtest]
# 股票代码（沪市6开头，深市0/3开头）
symbol     = 600362

# 回测区间（YYYYMMDD）
start_date = 20250101
# end_date 留空则默认使用当天日期
end_date   =

# 大盘指数代码（用于牛市判断，默认 000300 沪深300）
# 常见选项：000300=沪深300  000001=上证指数  399001=深证成指
index_symbol = 000300

# 初始资金（元）
capital    = 100000

# 止损比例（如 0.10 表示 10%），留空则不设置
stop_loss  = 0.1

# 止盈比例（如 0.30 表示 30%），留空则不设置
take_profit = 0.2

# 图表和CSV保存目录（留空则弹窗显示，不保存CSV）
save_chart_dir = output/

# HTTP 代理（如 http://127.0.0.1:7890），留空则直连
proxy =

# ── LuMACDBull 策略专属参数 ────────────────────────────────────────────────────

# True  = 红柱缩短即卖出（截陡坡，高手模式）
# False = 等死叉再卖（保守模式）
shrink_exit = true

# 股票名称 江西铜业
name = jiangxitongye