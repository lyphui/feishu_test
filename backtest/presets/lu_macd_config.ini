[backtest]
# 股票代码（沪市6开头，深市0/3开头）
symbol     = 600362


# 回测区间（YYYYMMDD）
# 注意：月线+周线需要足够热身数据，start_date 建议比实际分析起点早 3 年以上
start_date = 20210310
# end_date 留空则默认使用当天日期
end_date   =

# 初始资金（元）
capital    = 100000

# 止损比例（如 0.10 表示 10%），留空则不设置
stop_loss  =

# 止盈比例（如 0.30 表示 30%），留空则不设置
take_profit =

# 图表和CSV保存目录（留空则弹窗显示，不保存CSV）
save_chart_dir = output/

# HTTP 代理（如 http://127.0.0.1:7890），留空则直连
proxy =

# ── LuMACD 策略专属参数 ──────────────────────────────────────────────────────

# 量能放大判断窗口（周线根数），与前 N 周均量比较
vol_window = 4

# True = 缺少 volume 数据时抛出异常；False = 降级运行（跳过量能验证）
require_volume = false

# 绿柱条件（金叉时 MACD 柱是否必须 < 0）
# true  = 严格模式：金叉必须在绿柱下方（原文"更好"，此处作硬约束）
# false = 宽松模式：忽略绿柱，只要 0 轴下金叉即可（可捕捉更多信号）
require_green_bar = false


# 股票名称 江西铜业
name = jiangxitongye
